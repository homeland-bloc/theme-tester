<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging in... - Opheliapp</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050e1a;
            font-family: 'Inter', sans-serif;
        }
        .container {
            text-align: center;
            background: #0a1b2e;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(56,189,248,0.22);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h2 { color: #e2e8f0; margin-bottom: 0.5rem; }
        p { color: #94a3b8; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🗺️</div>
        <div class="spinner"></div>
        <h2 id="status">Logging you in...</h2>
        <p id="message">Please wait a moment</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7vTGI_pnSk02Qyd3YFUYe-bDlktDQhVo",
            authDomain: "opheliapp-wow.firebaseapp.com",
            projectId: "opheliapp-wow",
            storageBucket: "opheliapp-wow.firebasestorage.app",
            messagingSenderId: "749767602175",
            appId: "1:749767602175:web:170018ad1ac5d227a441ca"
        };
        firebase.initializeApp(firebaseConfig);

        const WORKER_URL = 'https://oph.opheliapp.workers.dev';
        const DISCORD_REDIRECT_URI = 'https://bicipikay.github.io/ophelia/auth/callback.html';

        async function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            const errorDescription = params.get('error_description');

            if (error) {
                document.getElementById('status').textContent = 'Login failed';
                document.getElementById('message').textContent = errorDescription || error;
                document.getElementById('message').className = 'error';
                setTimeout(() => window.location.href = '../index.html', 3000);
                return;
            }

            if (!code) {
                document.getElementById('status').textContent = 'No authorization code received';
                document.getElementById('message').textContent = 'Redirecting...';
                setTimeout(() => window.location.href = '../index.html', 2000);
                return;
            }

            const codeVerifier = sessionStorage.getItem('pkce_verifier');
            if (!codeVerifier) {
                document.getElementById('status').textContent = 'Login session expired';
                document.getElementById('message').textContent = 'Please try logging in again.';
                document.getElementById('message').className = 'error';
                setTimeout(() => window.location.href = '../index.html', 3000);
                return;
            }
            sessionStorage.removeItem('pkce_verifier');

            try {
                const tokenResponse = await fetch(`${WORKER_URL}/discord-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code,
                        code_verifier: codeVerifier,
                        redirect_uri: DISCORD_REDIRECT_URI
                    })
                });

                if (!tokenResponse.ok) {
                    const errorData = await tokenResponse.text();
                    throw new Error(`Token exchange failed: ${errorData}`);
                }

                const tokens = await tokenResponse.json();
                const { firebase_token, access_token, refresh_token, expires_in, discord_user } = tokens;

                if (!firebase_token || !discord_user) {
                    throw new Error('Incomplete response from auth worker');
                }

                await firebase.auth().signInWithCustomToken(firebase_token);
                const firebaseToken = await firebase.auth().currentUser.getIdToken();

                const avatarUrl = discord_user.avatar
                    ? `https://cdn.discordapp.com/avatars/${discord_user.id}/${discord_user.avatar}.png`
                    : null;

                const user = {
                    id: discord_user.id,
                    username: discord_user.username,
                    avatar: avatarUrl,
                    firebaseToken,
                    accessToken: access_token,
                    refreshToken: refresh_token,
                    tokenExpiry: Date.now() + expires_in * 1000,
                };

                localStorage.setItem('oph_user', JSON.stringify(user));

                try {
                    const upsertResponse = await fetch(`${WORKER_URL}/rest/v1/profiles`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${firebaseToken}`,
                            'Prefer': 'resolution=merge-duplicates'
                        },
                        body: JSON.stringify({
                            id: discord_user.id,
                            discord_id: discord_user.id,
                            username: discord_user.username,
                            avatar_hash: discord_user.avatar,
                        })
                    });

                    if (!upsertResponse.ok) {
                        console.error('Failed to upsert profile:', await upsertResponse.text());
                    }
                } catch (dbError) {
                    console.error('Error upserting profile:', dbError);
                }

                window.location.href = '../index.html';

            } catch (err) {
                console.error('Auth error:', err);
                document.getElementById('status').textContent = 'Login failed';
                document.getElementById('message').textContent = err.message;
                document.getElementById('message').className = 'error';
                setTimeout(() => window.location.href = '../index.html', 3000);
            }
        }

        handleCallback();
    </script>
</body>
</html>
