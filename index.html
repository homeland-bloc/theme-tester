                              {gTiles.map(t => renderFlatCard(t))}
                            </React.Fragment>
                          ))}
                        </>)}
                      </>);
                    })()}
                    {/* Reset All Tile Settings button */}
                    <div style={{ width: "100%", flexBasis: "100%", flexShrink: 0 }}>
                      <button style={{ ...btn(false, C.danger, "rgba(248,113,113,0.14)"), fontSize: 9, padding: "3px 8px", width: "100%" }}
                        onClick={() => {
                          if (!confirm("Reset all custom tile settings?\n\nThis will clear all custom multipliers, offsets, rotation flags, priority flags, and render-on-bottom flags, then reapply computed defaults.\n\nThis cannot be undone.")) return;
                          setTileMultipliers({});
                          setTileOffsets({});
                          setRotatableMap({});
                          setMirrorOffsetTiles({});
                          setGridOffsets({});
                          setPriorityTiles(() => {
                            const n = {};
                            flatDefaultTiles.forEach(t => { if (/\/objectives\//i.test(t.src)) n[t.id] = true; });
                            return n;
                          });
                          setBottomTiles(() => {
                            const n = {};
                            flatDefaultTiles.forEach(t => {
                              if (!t.src) return;
                              if (t.src.includes("/Water/") || t.src.includes("Jumppads/") || t.src.includes("Teleporters/") || t.src.includes("HealPad")) n[t.id] = true;
                            });
                            return n;
                          });
                        }}>
                        ↺ Reset All Tile Settings
                      </button>
                    </div>
                  </>)}
                  </div>
                  );
                })()}
              </div>
            </div>
          )}
          {/* Left toggle strip (with starred mini-cards when collapsed) */}
          <div style={{ width: tilesOpen ? 28 : 40, display: "flex", flexDirection: "column", flexShrink: 0, background: C.panelDeep, borderRight: `1px solid ${C.border}` }}>
            {/* Shortcut bar — selected tile + starred, when panel is collapsed */}
            {!tilesOpen && (() => {
              // Determine current selection key for dedup check
              const selKey = eraser ? "erase" : handMode ? "hand" : sel;
              const selAlreadyStarred = selKey !== null && starredTiles.includes(selKey);
              // Render a mini-card for the currently selected item (if not already starred)
              const SelectedCard = () => {
                if (selKey === null || selAlreadyStarred) return null;
                if (selKey === "erase") return (
                  <div style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${C.danger}`, background: "rgba(248,113,113,0.22)" }} title="Erase (selected)">
                    <span style={{ fontSize: 14 }}>🧼</span>
                  </div>
                );
                if (selKey === "hand") return (
                  <div style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid #fbbf24`, background: "rgba(251,191,36,0.14)" }} title="Hand (selected)">
                    <span style={{ fontSize: 13 }}>👋</span>
                  </div>
                );
                if (selKey === SPACE_TILE_ID) return (
                  <div style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${C.accentBright}`, background: C.accentDim }} title="Space (selected)">
                    <span style={{ fontSize: 13 }}>🛸</span>
                  </div>
                );
                const st = getTile(selKey);
                if (!st || !st.src) return null;
                const isRot = isTileRotatable(st);
                const rotDeg = cardRotations[selKey] ?? 0;
                return (
                  <div onClick={() => { if (isRot) setCardRotations(prev => ({ ...prev, [selKey]: (prev[selKey] ?? 0) + 90 })); }}
                    style={{ width: 32, height: 32, borderRadius: 6, cursor: isRot ? "pointer" : "default", overflow: "hidden", position: "relative", border: `1px solid ${C.accentBright}`, background: C.accentDim }}
                    title={isRot ? `${st.label || "Tile"} — click to rotate` : (st.label || "Tile (selected)")}>
                    <img src={st.blobSrc ?? st.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />
                    {isRot && (
                      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                        <span style={{ fontSize: 13, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.9))" }}>🐬</span>
                      </div>
                    )}
                  </div>
                );
              };
              const hasSelected = selKey !== null && !selAlreadyStarred;
              // Recent tiles: exclude current selection and starred tiles, max 3
              const visibleRecent = recentTileIds.filter(id => id !== selKey && !starredTiles.includes(id)).slice(0, 3);
              const hasRecent = visibleRecent.length > 0;
              const hasStarred = starredTiles.length > 0;
              if (!hasSelected && !hasRecent && !hasStarred) return null;
              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 3, padding: "4px 2px", overflowY: "auto", scrollbarWidth: "none", msOverflowStyle: "none" }}>
                  {hasSelected && <SelectedCard />}
                  {hasSelected && hasRecent && <div style={{ height: 1, background: C.border, margin: "1px 0" }} />}
                  {hasRecent && visibleRecent.map(rid => {
                    const rt = getTile(rid);
                    if (!rt || !rt.src) return null;
                    const active = sel === rid && !eraser;
                    const isRot = isTileRotatable(rt);
                    const rotDeg = cardRotations[rid] ?? 0;
                    return (
                      <div key={rid}
                        onClick={() => {
                          if (isRot && sel === rid && !eraser) setCardRotations(prev => ({ ...prev, [rid]: (prev[rid] ?? 0) + 90 }));
                          setSel(rid); setEraser(false); setHandMode(false);
                        }}
                        style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", overflow: "hidden", position: "relative",
                          border: `1px solid ${active ? C.accentBright : "rgba(255,255,255,0.25)"}`, background: active ? C.accentDim : C.panelDeep, opacity: 0.75 }}
                        title={`Recent: ${rt.label || `Tile ${rid}`}`}>
                        <img src={rt.blobSrc ?? rt.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />
                        {isRot && (
                          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                            <span style={{ fontSize: 10, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.9))" }}>🐬</span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  {(hasSelected || hasRecent) && hasStarred && <div style={{ height: 1, background: C.border, margin: "1px 0" }} />}
                  {starredTiles.map(sid => {
                  // Erase and Hand shortcuts in the tiles shortcut bar (collapsed strip)
                  if (sid === "erase") return (
                    <div key="erase" onClick={() => { setEraser(true); setSel(null); setHandMode(false); }}
                      style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                        border: `1px solid ${eraser ? C.danger : C.border}`, background: eraser ? "rgba(248,113,113,0.22)" : "rgba(255,255,255,0.04)" }}
                      title="Erase">
                      <span style={{ fontSize: 14 }}>🧼</span>
                    </div>
                  );
                  if (sid === "hand") return (
                    <div key="hand" onClick={() => { setHandMode(h => !h); setEraser(false); setSel(null); }}
                      style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                        border: `1px solid ${handMode ? "#fbbf24" : C.border}`, background: handMode ? "rgba(251,191,36,0.14)" : "rgba(255,255,255,0.04)" }}
                      title="Hand">
                      <span style={{ fontSize: 13 }}>👋</span>
                    </div>
                  );
                  // Space tile
                  if (sid === SPACE_TILE_ID) return (
                    <div key="space" onClick={() => { setSel(SPACE_TILE_ID); setEraser(false); setHandMode(false); }}
                      style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                        border: `1px solid ${sel === SPACE_TILE_ID && !eraser ? C.accentBright : C.border}`, background: sel === SPACE_TILE_ID && !eraser ? C.accentDim : "rgba(255,255,255,0.04)" }}
                      title="Space">
                      <span style={{ fontSize: 13 }}>🛸</span>
                    </div>
                  );
                  // selectionGroup group card
                  if (sid === "selectionGroup") {
                    const selActive = selectionMode !== 'single' || false;
                    return (
                      <div key="selectionGroup"
                        onClick={() => setSelectionMode(m => m === 'single' ? 'line' : 'single')}
                        style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                          border: `1px solid ${selectionMode !== 'single' ? C.accent : C.border}`, background: selectionMode !== 'single' ? `${C.accent}22` : "rgba(255,255,255,0.04)" }}
                        title="Selection modes">
                        <span style={{ fontSize: 14 }}>🤏</span>
                      </div>
                    );
                  }
                  // mirrorGroup group card
                  if (sid === "mirrorGroup") {
                    const anyMirror = mirrorV || mirrorH || mirrorD;
                    return (
                      <div key="mirrorGroup"
                        onClick={() => { if (anyMirror) { setMirrorV(false); setMirrorH(false); setMirrorD(false); } else setMirrorV(true); }}
                        style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                          border: `1px solid ${anyMirror ? C.pale : C.border}`, background: anyMirror ? `${C.pale}22` : "rgba(255,255,255,0.04)" }}
                        title="Mirroring">
                        <span style={{ fontSize: 14 }}>🪞</span>
                      </div>
                    );
                  }
                  // Regular tile
                  const st = getTile(sid);
                  if (!st || !st.src) return null;
                  // Folder mini-card: if tile belongs to a folder, show folder card
                  if (st.folderKey) {
                    const fKey = st.folderKey;
                    // Find all tiles in the same folder from the tiles array
                    const fTiles = tiles.filter(t => t.folderKey === fKey);
                    const previewTile = fTiles[0];
                    const folderLabel = st.folderLabel || fKey;
                    const folderIsActive = !eraser && fTiles.some(t => t.id === sel);
                    const folderIsOpen = openFolderKey === fKey;
                    return (
                      <div key={`folder-${fKey}`}
                        onClick={e => toggleFolder(fKey, e)}
                        style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", overflow: "hidden", position: "relative",
                          border: `1px solid ${folderIsActive ? C.soft : folderIsOpen ? C.accent : C.border}`,
                          background: folderIsActive ? "rgba(252,211,77,0.1)" : folderIsOpen ? C.accentDim : C.panelDeep }}
                        title={`Folder: ${folderLabel}`}>
                        {previewTile && <img src={previewTile.blobSrc ?? previewTile.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated", opacity: 0.75 }} />}
                        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                          <span style={{ fontSize: 10, lineHeight: 1, filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.9))" }}>📁</span>
                        </div>
                      </div>
                    );
                  }
                  const active = sel === sid && !eraser;
                  const isRot = isTileRotatable(st);
                  const rotDeg = cardRotations[sid] ?? 0;
                  return (
                    <div key={sid}
                      onClick={() => {
                        if (isRot && sel === sid && !eraser) {
                          setCardRotations(prev => ({ ...prev, [sid]: (prev[sid] ?? 0) + 90 }));
                        }
                        setSel(sid); setEraser(false); setHandMode(false);
                      }}
                      style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", overflow: "hidden", position: "relative",
                        border: `1px solid ${active ? C.accentBright : C.border}`, background: active ? C.accentDim : C.panelDeep }}
                      title={isRot ? `${st.label || `Tile ${sid}`} — click to rotate` : (st.label || `Tile ${sid}`)}>
                      <img src={st.blobSrc ?? st.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />
                      {isRot && (
                        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                          <span style={{ fontSize: 13, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.9))" }}>🐬</span>
                        </div>
                      )}
                    </div>
                  );
                })}
                </div>
              );
            })()}
            {/* Toggle button — fills remaining space */}
            <button onClick={() => setTilesOpen(o => !o)}
              style={{ flex: 1, minHeight: 28, background: "none", border: "none", cursor: "pointer", color: C.accentBright, fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", userSelect: "none", fontWeight: 700 }}
              title={tilesOpen ? "Collapse tiles" : "Expand tiles"}>
              {tilesOpen ? "◀" : "▶"}
            </button>
          </div>
        </div>

        {/* ── CANVAS ───────────────────────────────────────────────── */}
          <div ref={scrollRef}
            style={{ flex: 1, minWidth: 0, height: "100%", overflow: "auto", background: C.bg, cursor: handMode ? "grab" : (dragTile ? "grabbing" : eyedropperMode ? "cell" : "crosshair") }}
            onWheel={onWheel}
            onMouseDown={e => {
              if (!handModeRef.current || isDraggingRef.current) return;
              // PC hand-mode: drag to pan
              const el = scrollRef.current;
              const startX = e.clientX, startY = e.clientY;
              const startScrollLeft = el.scrollLeft, startScrollTop = el.scrollTop;
              el.style.cursor = "grabbing";
              const onMove = ev => {
                el.scrollLeft = startScrollLeft - (ev.clientX - startX);
                el.scrollTop  = startScrollTop  - (ev.clientY - startY);
              };
              const onUp = () => {
                el.style.cursor = "";
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup',   onUp);
              };
              document.addEventListener('mousemove', onMove);
              document.addEventListener('mouseup',   onUp);
              e.preventDefault();
            }}
            onMouseMove={e => {
              // Active drag: update ghost + target cell highlight
              if (isDraggingRef.current) {
                setDragPos({ x: e.clientX, y: e.clientY });
                setDragTargetCell(cellFromEvent(e.clientX, e.clientY));
                return;
              }
            }}
            onMouseUp={e => {
              // Drag is fully handled by the global document mouseup listener — skip here
              if (isDraggingRef.current) return;
              if (paintingRef.current && commitOnUpRef.current) commitOnUpRef.current();
              setPainting(false);
              paintingRef.current = false;
            }}
            onMouseLeave={e => {
              // Drag continues globally via document mousemove/mouseup — do not cancel here.
              if (isDraggingRef.current) return;
              if (paintingRef.current && commitOnUpRef.current) commitOnUpRef.current();
              setPainting(false);
              paintingRef.current = false;
            }}
          >
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minWidth: "100%", minHeight: "100%", padding: 60, boxSizing: "border-box" }}>
              <div ref={canvasContainerRef} style={{ position: "relative", width: gW, height: (gridH + 2) * CELL * zoom, flexShrink: 0, isolation: "isolate" }}>

                {/* Checkerboard — single CSS-gradient element, no inter-cell boundaries at fractional zoom */}
                <div style={{ position: "absolute", left: 0, top: CELL * zoom, width: gridW * CELL * zoom, height: gridH * CELL * zoom, backgroundColor: bg1, backgroundImage: `linear-gradient(45deg,${bg2} 25%,transparent 25%),linear-gradient(-45deg,${bg2} 25%,transparent 25%),linear-gradient(45deg,transparent 75%,${bg2} 75%),linear-gradient(-45deg,transparent 75%,${bg2} 75%)`, backgroundSize: `${2*CELL*zoom}px ${2*CELL*zoom}px`, backgroundPosition: `0 0,0 ${CELL*zoom}px,${CELL*zoom}px ${-CELL*zoom}px,${-CELL*zoom}px 0`, pointerEvents: "none" }} />
                {/* Per-cell hit targets; space tiles mask the checkerboard with the canvas background */}
                {Array.from({ length: gridH }).map((_, r) =>
                  Array.from({ length: gridW }).map((__, c) => (
                    <div key={`${r}-${c}`}
                      style={{ position: "absolute", left: c * CELL * zoom, top: (r + 1) * CELL * zoom, width: CELL * zoom, height: CELL * zoom, background: grid[r]?.[c] === SPACE_TILE_ID ? C.bg : "transparent" }}
                      onMouseDown={e => onCell(r, c, e)}
                      onMouseMove={e => onCell(r, c, e)}
                    />
                  ))
                )}

                {/* Pass 0: bottom tiles — rendered first at low z-index (always below normal tiles) */}
                {grid.map((row, r) =>
                  row.map((id, c) => {
                    const t = id && getTile(id); if (!t) return null;
                    if (t.isSpace) return null;
                    if (!bottomTiles[t.id] || priorityTiles[t.id]) return null;
                    const mult   = getTileMultiplier(t);
                    const off    = getEffectiveOffset(t, r, c);
                    const rotDeg = (gridRotations[`${r},${c}`] ?? 0) * 90;
                    const cellPx = CELL * zoom;
                    const ox = (off.ox / 100) * cellPx;
                    const oy = (off.oy / 100) * cellPx;
                    return (
                      <img key={`bot${r}-${c}`} src={t.src} alt="" draggable={false}
                        style={{ position: "absolute", left: (c + 0.5) * cellPx - (cellPx * mult) / 2 + ox, top: (r + 1 + 0.5) * cellPx + oy, width: cellPx * mult, height: "auto", transform: `translateY(-50%) rotate(${rotDeg}deg)`, pointerEvents: "none", imageRendering: "pixelated", zIndex: 1 }}
                      />
                    );
                  })
                )}
                {/* Pass 1: normal tiles (z-index = r + 1 for natural depth), skipping priority and bottom tiles */}
                {grid.map((row, r) =>
                  row.map((id, c) => {
                    const t = id && getTile(id); if (!t) return null;
                    if (t.isSpace) return null;
                    if (priorityTiles[t.id]) return null;
                    if (bottomTiles[t.id]) return null;
                    const mult   = getTileMultiplier(t);
                    const off    = getEffectiveOffset(t, r, c);
                    const rotDeg = (gridRotations[`${r},${c}`] ?? 0) * 90;
                    const cellPx = CELL * zoom;
                    const ox = (off.ox / 100) * cellPx;
                    const oy = (off.oy / 100) * cellPx;
                    return (
                      <img key={`t${r}-${c}`} src={t.src} alt="" draggable={false}
                        style={{ position: "absolute", left: (c + 0.5) * cellPx - (cellPx * mult) / 2 + ox, top: (r + 1 + 0.5) * cellPx + oy, width: cellPx * mult, height: "auto", transform: `translateY(-50%) rotate(${rotDeg}deg)`, pointerEvents: "none", imageRendering: "pixelated", zIndex: r + 2 }}
                      />
                    );
                  })
                )}
                {/* Pass 2: priority tiles — rendered last in DOM, always above every other tile */}
                {grid.map((row, r) =>
                  row.map((id, c) => {
                    const t = id && getTile(id); if (!t) return null;
                    if (t.isSpace) return null;
                    if (!priorityTiles[t.id]) return null;
                    const mult   = getTileMultiplier(t);
                    const off    = getEffectiveOffset(t, r, c);
                    const rotDeg = (gridRotations[`${r},${c}`] ?? 0) * 90;
                    const cellPx = CELL * zoom;
                    const ox = (off.ox / 100) * cellPx;
                    const oy = (off.oy / 100) * cellPx;
                    return (
                      <img key={`prio${r}-${c}`} src={t.src} alt="" draggable={false}
                        style={{ position: "absolute", left: (c + 0.5) * cellPx - (cellPx * mult) / 2 + ox, top: (r + 1 + 0.5) * cellPx + oy, width: cellPx * mult, height: "auto", transform: `translateY(-50%) rotate(${rotDeg}deg)`, pointerEvents: "none", imageRendering: "pixelated", zIndex: 9999 }}
                      />
                    );
                  })
                )}

                {/* Selection preview overlay + drag target cell highlight */}
                {(previewCells || rectPreview || dragTargetCell) && (() => {
                  const pFill   = eraser ? "rgba(239,68,68,0.22)"  : "rgba(255,255,255,0.22)";
                  const pStroke = eraser ? "rgba(239,68,68,0.70)"  : "rgba(255,255,255,0.55)";
                  return (
                    <svg style={{ position: "absolute", left: 0, top: CELL * zoom, width: gW, height: gH, pointerEvents: "none", zIndex: 250, overflow: "visible" }}>
                      {previewCells && previewCells.map(([r, c]) => (
                        <rect key={`${r},${c}`} x={c * CELL * zoom} y={r * CELL * zoom} width={CELL * zoom} height={CELL * zoom} fill={pFill} stroke={pStroke} strokeWidth="1.5" />
                      ))}
                      {rectPreview && (
                        <rect x={rectPreview.c1 * CELL * zoom} y={rectPreview.r1 * CELL * zoom} width={(rectPreview.c2 - rectPreview.c1 + 1) * CELL * zoom} height={(rectPreview.r2 - rectPreview.r1 + 1) * CELL * zoom} fill={pFill} stroke={pStroke} strokeWidth="1.5" rx="2" />
                      )}
                      {dragTargetCell && (
                        <rect x={dragTargetCell[1] * CELL * zoom} y={dragTargetCell[0] * CELL * zoom} width={CELL * zoom} height={CELL * zoom} fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.7)" strokeWidth="2" rx="2" />
                      )}
                    </svg>
                  );
                })()}

                {/* Mirror guide lines — always shown when Guides is on */}
                {showGuides && (
                  <svg style={{ position: "absolute", left: 0, top: CELL * zoom, width: gW, height: gH, pointerEvents: "none", zIndex: 200, overflow: "visible" }}>
                    {/* Vertical */}
                    <line x1={gW / 2} y1={0} x2={gW / 2} y2={gH}
                      stroke={mirrorV ? C.pale : "rgba(255,255,255,0.38)"} strokeWidth={mirrorV ? 2 : 1.5} opacity={1} strokeDasharray="6 3" />
                    {/* Horizontal */}
                    <line x1={0} y1={gH / 2} x2={gW} y2={gH / 2}
                      stroke={mirrorH ? C.soft : "rgba(255,255,255,0.38)"} strokeWidth={mirrorH ? 2 : 1.5} opacity={1} strokeDasharray="6 3" />
                  </svg>
                )}

                {/* Offset center markers — full-cell square at each cell with non-zero offset */}
                {showOffsetCenters && (() => {
                  const cellPx = CELL * zoom;
                  const markers = [];
                  grid.forEach((row, r) => row.forEach((id, c) => {
                    const t = id && getTile(id);
                    if (!t || t.isSpace) return;
                    const off = getEffectiveOffset(t, r, c);
                    if (off.ox === 0 && off.oy === 0) return;
                    markers.push({ r, c, key: `${r}-${c}` });
                  }));
                  if (!markers.length) return null;
                  return (
                    <svg style={{ position: "absolute", left: 0, top: CELL * zoom, width: gW, height: gH, pointerEvents: "none", zIndex: 10000, overflow: "visible" }}>
                      {markers.map(({ r, c, key }) => (
                        <rect key={key} x={c * cellPx} y={r * cellPx} width={cellPx} height={cellPx}
                          fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.7)" strokeWidth={1} rx={1} />
                      ))}
                    </svg>
                  );
                })()}

                {/* OTG (One Tile Gap) detection overlay */}
                {showOTG && otgCells.size > 0 && (() => {
                  const cellPx = CELL * zoom;
                  return (
                    <svg style={{ position: "absolute", left: 0, top: CELL * zoom, width: gW, height: gH, pointerEvents: "none", zIndex: 203, overflow: "visible" }}>
                      {[...otgCells].map(key => {
                        const [r, c] = key.split(",").map(Number);
                        return (
                          <rect key={key}
                            x={c * cellPx} y={r * cellPx}
                            width={cellPx} height={cellPx}
                            fill="rgba(239,68,68,0.35)"
                            stroke="rgba(239,68,68,0.85)"
                            strokeWidth="1.5"
                            rx="2"
                          />
                        );
                      })}
                    </svg>
                  );
                })()}

              </div>
            </div>
          </div>

        {/* ── RIGHT SIDEBAR: Tools ─────────────────────────────────── */}
        <div style={{ display: "flex", flexDirection: "row", flexShrink: 0, alignSelf: "stretch" }}>
          {/* Right toggle strip — shows starred-tool mini-cards when collapsed */}
          <div style={{ width: 36, background: C.panelDeep, borderLeft: `1px solid ${C.border}`, display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
            {/* Starred tool mini-cards when collapsed */}
            {!toolsOpen && (() => {
              const toolIconMap = {
                erase: "🧼", hand: "👋", space: "🛸",
                single: "S", line: "L", rect: "R", fill: "F",
                mirrorV: "H", mirrorH: "V", mirrorD: "D",
                guides: "🧭", offsetCenters: "🎯", replace: "♻️", overwrite: "🧱",
                otg: "⚠",
              };
              const toolActionMap = {
                erase: () => { setEraser(true); setSel(null); setHandMode(false); },
                hand:  () => { setHandMode(h => !h); setEraser(false); setSel(null); },
                space: () => { setSel(SPACE_TILE_ID); setEraser(false); setHandMode(false); },
                single: () => setSelectionMode('single'),
                line:   () => setSelectionMode('line'),
                rect:   () => setSelectionMode('rect'),
                fill:   () => setSelectionMode('fill'),
                mirrorV: () => setMirrorV(v => !v),
                mirrorH: () => setMirrorH(v => !v),
                mirrorD: () => setMirrorD(v => !v),
                guides: () => setShowGuides(v => !v),
                offsetCenters: () => setShowOffsetCenters(v => !v),
                replace: () => { setReplaceOpen(true); setReplaceStep(1); setReplaceA(null); setReplaceB(null); setReplaceMsg(""); },
                overwrite: () => setMirrorSettings(p => ({ ...p, allowSwap: !p.allowSwap })),
                otg: () => setShowOTG(v => !v),
              };
              const toolActiveMap = {
                erase: eraser,
                hand: handMode,
                space: sel === SPACE_TILE_ID && !eraser,
                single: selectionMode === 'single',
                line: selectionMode === 'line',
                rect: selectionMode === 'rect',
                fill: selectionMode === 'fill',
                mirrorV, mirrorH, mirrorD,
                guides: showGuides,
                offsetCenters: showOffsetCenters,
                replace: false,
                overwrite: mirrorSettings.allowSwap,
                otg: showOTG,
              };
              const toolColorMap = {
                erase: C.danger, hand: "#fbbf24", space: C.accentBright,
                single: C.accent, line: C.accent, rect: C.accent, fill: C.accent,
                mirrorV: C.pale, mirrorH: C.soft, mirrorD: C.accentBright,
                guides: C.accent, offsetCenters: C.soft, replace: C.soft, overwrite: C.accent,
                otg: C.danger,
              };
              // Only show tool-key starred items (not numeric tile IDs)
              // Include selectionGroup and mirrorGroup as special group entries
              const starredTools = starredTiles.filter(s => typeof s === "string" && (toolIconMap[s] || s === "selectionGroup" || s === "mirrorGroup"));
              if (!starredTools.length) return null;
              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 3, padding: "4px 2px", overflowY: "auto", scrollbarWidth: "none", msOverflowStyle: "none", width: "100%" }}>
                  {starredTools.map(tid => {
                    // selectionGroup group card
                    if (tid === "selectionGroup") {
                      const anySelActive = selectionMode !== 'single';
                      return (
                        <div key="selectionGroup"
                          onClick={() => setSelectionMode(m => m === 'single' ? 'line' : 'single')}
                          style={{ width: 28, height: 28, margin: "0 auto", borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                            border: `1px solid ${anySelActive ? C.accent : C.border}`, background: anySelActive ? `${C.accent}22` : "rgba(255,255,255,0.04)" }}
                          title="Selection modes">
                          <span style={{ fontSize: 13, lineHeight: 1 }}>🤏</span>
                        </div>
                      );
                    }
                    // mirrorGroup group card
                    if (tid === "mirrorGroup") {
                      const anyMirror = mirrorV || mirrorH || mirrorD;
                      return (
                        <div key="mirrorGroup"
                          onClick={() => { if (anyMirror) { setMirrorV(false); setMirrorH(false); setMirrorD(false); } else setMirrorV(true); }}
                          style={{ width: 28, height: 28, margin: "0 auto", borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                            border: `1px solid ${anyMirror ? C.pale : C.border}`, background: anyMirror ? `${C.pale}22` : "rgba(255,255,255,0.04)" }}
                          title="Mirroring">
                          <span style={{ fontSize: 13, lineHeight: 1 }}>🪞</span>
                        </div>
                      );
                    }
                    const icon = toolIconMap[tid];
                    const active = toolActiveMap[tid];
                    const color = toolColorMap[tid] ?? C.accent;
                    return (
                      <div key={tid}
                        onClick={toolActionMap[tid]}
                        style={{ width: 28, height: 28, margin: "0 auto", borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                          border: `1px solid ${active ? color : C.border}`, background: active ? `${color}22` : "rgba(255,255,255,0.04)" }}
                        title={tid}>
                        <span style={{ fontSize: 13, lineHeight: 1 }}>{icon}</span>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
            {/* Toggle button — fills remaining space */}
            <button onClick={() => setToolsOpen(o => !o)}
              style={{ flex: 1, minHeight: 28, width: "100%", background: "none", border: "none", cursor: "pointer", color: C.accentBright, fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", userSelect: "none", fontWeight: 700 }}
              title={toolsOpen ? "Collapse tools" : "Expand tools"}>
              {toolsOpen ? "▶" : "◀"}
            </button>
          </div>
          {mirrorSettingsOpen && (
            <div className="modal-backdrop" onClick={() => setMirrorSettingsOpen(false)}>
              <div className="modal-box" style={{ maxWidth: 320 }} onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Tools Settings</span>
                  <button onClick={() => setMirrorSettingsOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
                </div>
                <label style={{ display: "flex", flexDirection: "column", gap: 4, cursor: "pointer", userSelect: "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input type="checkbox" checked={mirrorSettings.mirrorSpawns}
                      onChange={ev => setMirrorSettings(p => ({ ...p, mirrorSpawns: ev.target.checked }))}
                      style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
                    <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>Mirror Spawns</span>
                  </div>
                  <span style={{ fontSize: 10, color: C.muted, paddingLeft: 22 }}>When using vertical or diagonal mirroring, red and blue spawn tiles swap automatically so the map stays balanced.</span>
                </label>
                <label style={{ display: "flex", flexDirection: "column", gap: 4, cursor: "pointer", userSelect: "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input type="checkbox" checked={mirrorSettings.mirrorRotation}
                      onChange={ev => setMirrorSettings(p => ({ ...p, mirrorRotation: ev.target.checked }))}
                      style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
                    <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>Mirror Rotation</span>
                  </div>
                  <span style={{ fontSize: 10, color: C.muted, paddingLeft: 22 }}>Mirrored tile copies have their rotation automatically flipped to match the mirroring axis (e.g. a left-pointing tile becomes right-pointing when mirrored horizontally).</span>
                </label>
              </div>
            </div>
          )}
          {toolsOpen && (
            <div style={{ width: isMobile ? 160 : 260, background: C.panelDeep, borderLeft: `1px solid ${C.border}`, borderRadius: "0 8px 8px 0", display: "flex", flexDirection: "column", overflow: "hidden", maxHeight: "min(88vh, 700px)" }}>
              <SectionHeader label="Tools" open={toolsOpen} onToggle={() => setToolsOpen(o => !o)}
                right={<button onClick={() => setMirrorSettingsOpen(true)} style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 5, cursor: "pointer", color: C.muted, fontSize: 12, padding: "1px 6px", lineHeight: 1.4 }} title="Mirroring settings">⚙</button>}
              />
              <div style={{ overflowY: "auto", flex: 1, padding: "8px 12px 10px", display: "flex", flexDirection: "column", gap: 7 }}>
                {showGuides && (
                  <div style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${C.border}`, borderRadius: 7, padding: "6px 8px", display: "flex", flexDirection: "column", gap: 3 }}>
                    <span style={{ fontSize: 9, color: C.accentBright, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>Hotkeys</span>
                    {[
                      ["E", "Erase"], ["W", "Eyedropper"], ["Z", "Undo"], ["X", "Redo"],
                    ].map(([key, label]) => (
                      <div key={key} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ minWidth: 18, height: 16, borderRadius: 4, background: "rgba(255,255,255,0.12)", border: `1px solid ${C.border}`, fontSize: 9, fontWeight: 700, color: C.accentBright, display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: "monospace" }}>{key}</span>
                        <span style={{ fontSize: 10, color: C.muted }}>{label}</span>
                      </div>
                    ))}
                  </div>
                )}
                <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, display: "flex", alignItems: "center", gap: 4 }}>Selection Mode <span onClick={() => setInfoTool("selectionMode")} style={{ fontSize: 11, cursor: "pointer", color: "rgba(255,255,255,0.65)", lineHeight: 1 }}>ⓘ</span></span>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
                  <button style={btn(selectionMode === 'single', C.accent, C.accentDim)} onClick={() => setSelectionMode('single')} title="Freehand">Single</button>
                  <button style={btn(selectionMode === 'line', C.accent, C.accentDim)} onClick={() => setSelectionMode('line')} title="Line draw">Line</button>
                  <button style={btn(selectionMode === 'rect', C.accent, C.accentDim)} onClick={() => setSelectionMode('rect')} title="Rectangle fill">Rectangle</button>
                  <button style={btn(selectionMode === 'fill', C.accent, C.accentDim)} onClick={() => setSelectionMode('fill')} title="Flood fill selection">Fill</button>
                </div>
                <div style={{ height: 1, background: C.border }} />
                <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, display: "flex", alignItems: "center", gap: 4 }}>Mirroring <span onClick={() => setInfoTool("mirroring")} style={{ fontSize: 11, cursor: "pointer", color: "rgba(255,255,255,0.65)", lineHeight: 1 }}>ⓘ</span></span>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
                  <button style={btn(mirrorV, C.pale, C.paleDim)} onClick={() => setMirrorV(v => !v)} title="Horizontal mirror (left ↔ right)">Horizontal</button>
                  <button style={btn(mirrorH, C.soft, C.softDim)} onClick={() => setMirrorH(v => !v)} title="Vertical mirror (top ↔ bottom)">Vertical</button>
                  <button style={btn(mirrorD, C.accentBright, C.accentDim)} onClick={() => setMirrorD(v => !v)} title="Diagonal mirror (180° rotation)">Diagonal</button>
                </div>
                <div style={{ height: 1, background: C.border }} />
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <div style={{ position: "relative", display: "inline-block", flexShrink: 0 }}>
                    <button style={btn(showGuides, C.accent, C.accentDim)} onClick={() => setShowGuides(v => !v)} title="Toggle mirror guide lines">Guides</button>
                    <span onClick={() => setInfoTool("guides")} style={{ position: "absolute", top: -6, right: -6, width: 13, height: 13, fontSize: 11, cursor: "pointer", color: "rgba(255,255,255,0.75)", lineHeight: "13px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))", pointerEvents: "auto" }}>ⓘ</span>
                  </div>
                  <div style={{ position: "relative", display: "inline-block", flexShrink: 0 }}>
                    <button style={btn(showOffsetCenters, C.soft, C.softDim)} onClick={() => setShowOffsetCenters(v => !v)} title="Show a marker at the placement cell of tiles with non-zero offset">Offset Centers</button>
                    <span onClick={() => setInfoTool("offsetCenters")} style={{ position: "absolute", top: -6, right: -6, width: 13, height: 13, fontSize: 11, cursor: "pointer", color: "rgba(255,255,255,0.75)", lineHeight: "13px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))", pointerEvents: "auto" }}>ⓘ</span>
                  </div>
                </div>
                <div style={{ height: 1, background: C.border }} />
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <div style={{ position: "relative", display: "inline-block", flexShrink: 0 }}>
                    <button style={btn(false, C.soft, C.softDim)} onClick={() => { setReplaceOpen(true); setReplaceStep(1); setReplaceA(null); setReplaceB(null); setReplaceMsg(""); }}>Replace</button>
                    <span onClick={() => setInfoTool("replace")} style={{ position: "absolute", top: -6, right: -6, width: 13, height: 13, fontSize: 11, cursor: "pointer", color: "rgba(255,255,255,0.75)", lineHeight: "13px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))", pointerEvents: "auto" }}>ⓘ</span>
                  </div>
                  <button style={btn(false, C.soft, C.softDim)} onClick={() => setConvertOpen(true)} title="Remap tileset tiles on the board">Convert</button>
                  <button style={btn(false, C.muted, "rgba(255,255,255,0.08)")} onClick={() => setMemoryOpen(true)} title="Storage usage">Memory…</button>
                  <div style={{ position: "relative", display: "inline-block", flexShrink: 0 }}>
                    <button style={btn(mirrorSettings.allowSwap, C.accent, C.accentDim)} onClick={() => setMirrorSettings(p => ({ ...p, allowSwap: !p.allowSwap }))} title="When enabled, painting over occupied cells replaces them instead of picking them up">Block Overwrite</button>
                    <span onClick={() => setInfoTool("overwrite")} style={{ position: "absolute", top: -6, right: -6, width: 13, height: 13, fontSize: 11, cursor: "pointer", color: "rgba(255,255,255,0.75)", lineHeight: "13px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))", pointerEvents: "auto" }}>ⓘ</span>
                  </div>
                </div>
                <div style={{ height: 1, background: C.border }} />
                <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>OTG Detection</span>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <button style={btn(showOTG, C.danger, "rgba(239,68,68,0.18)")}
                    onClick={() => setShowOTG(v => !v)}
                    title="Toggle One Tile Gap detection overlay">
                    {showOTG ? "OTG On" : "OTG Off"}
                  </button>
                  <button style={{ ...btn(false, C.soft, C.softDim), fontSize: 10, padding: "3px 9px" }}
                    onClick={() => setOtgOpen(true)}
                    title="Configure which tiles count as walls for OTG detection">
                    Settings
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>

      </div>

      {/* ══ BOTTOM BAR ═══════════════════════════════════════════════ */}
      <div style={{ flexShrink: 0, background: C.panelDeep, borderTop: `1px solid ${C.border}` }}>

        {/* Row 1 (always visible): Undo | Zoom | Redo | fold toggle */}
        <div style={{ display: "flex", alignItems: "center", padding: "5px 14px 3px", gap: 6 }}>
          <button style={btn(histIdx > 0, C.accent, C.accentDim)} onClick={undo} disabled={histIdx <= 0} title="Undo (Ctrl+Z)">Undo</button>
          <div style={{ flex: 1, display: "flex", justifyContent: "center", alignItems: "center", gap: 6 }}>
            <button style={{ ...btn(false), padding: "4px 9px", fontSize: 15, fontWeight: 700, lineHeight: 1 }} onClick={() => changeZoom(-ZOOM_STEP)}>−</button>
            <span onClick={() => applyZoom(calcFitZoom(gridW, gridH))}
              style={{ minWidth: 52, textAlign: "center", display: "inline-block", fontSize: 13, fontFamily: "monospace", fontWeight: 700, color: C.text, background: "rgba(180,40,40,0.10)", borderRadius: 7, padding: "3px 6px", border: `1px solid ${C.border}`, cursor: "pointer", userSelect: "none" }}
              title="Click to reset zoom to fit">
              {Math.round(zoom / ZOOM_STEP) * 10}%
            </span>
            <button style={{ ...btn(false), padding: "4px 9px", fontSize: 15, fontWeight: 700, lineHeight: 1 }} onClick={() => changeZoom(ZOOM_STEP)}>+</button>
          </div>
          <button style={btn(histIdx < history.length - 1, C.accent, C.accentDim)} onClick={redo} disabled={histIdx >= history.length - 1} title="Redo (Ctrl+Y)">Redo</button>
          <button onClick={() => setBottomOpen(o => !o)}
            style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 11, padding: "2px 4px", lineHeight: 1, flexShrink: 0 }}
            title={bottomOpen ? "Collapse bottom" : "Expand bottom"}>
            {bottomOpen ? "▼" : "▲"}
          </button>
        </div>

        {/* Rows 2-3: foldable */}
        {bottomOpen && (<>
          {/* Row 2: Clear | Map name | Download */}
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, padding: "3px 14px" }}>
            <button style={btn(true, C.danger, "rgba(248,113,113,0.18)")}
              onClick={() => { if (confirm("Clear the whole grid?")) setGrid(Array.from({ length: gridH }, () => Array(gridW).fill(null))); }}>
              Clear Map
            </button>
            <input type="text" value={mapName} onChange={e => setMapName(e.target.value)}
              placeholder="map name…"
              style={{ width: 180, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, fontFamily: "'Inter', sans-serif", fontSize: 11, padding: "4px 8px", outline: "none" }}
              spellCheck={false} />
            <button style={btn(true, C.soft, C.softDim)} onClick={doExport}>Download</button>
          </div>

          {/* Row 3: Background colour pickers */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, padding: "3px 14px 5px", alignItems: "center" }}>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Background</span>
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ fontSize: 10, color: C.muted, fontWeight: 600 }}>A</span>
              <input type="color" value={bg1} onChange={e => applyBg1(e.target.value)}
                style={{ width: 26, height: 26, border: "none", borderRadius: 5, cursor: "pointer", padding: 2, background: "none", flexShrink: 0 }} />
              <input type="text" value={hex1} maxLength={7}
                onChange={e => { const v = e.target.value; setHex1(v); if (validHex(v)) applyBg1(v); }}
                onBlur={() => { if (!validHex(hex1)) setHex1(bg1); }}
                style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "3px 6px", outline: "none" }}
                spellCheck={false} />
            </div>
            <button style={{ ...btn(false), fontSize: 10, padding: "3px 9px" }}
              onClick={() => { const t1 = bg1, t2 = bg2; applyBg1(t2); applyBg2(t1); }}
              title="Swap background colours">
              ⇄
            </button>
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ fontSize: 10, color: C.muted, fontWeight: 600 }}>B</span>
              <input type="color" value={bg2} onChange={e => applyBg2(e.target.value)}
                style={{ width: 26, height: 26, border: "none", borderRadius: 5, cursor: "pointer", padding: 2, background: "none", flexShrink: 0 }} />
              <input type="text" value={hex2} maxLength={7}
                onChange={e => { const v = e.target.value; setHex2(v); if (validHex(v)) applyBg2(v); }}
                onBlur={() => { if (!validHex(hex2)) setHex2(bg2); }}
                style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "3px 6px", outline: "none" }}
                spellCheck={false} />
            </div>
            <button style={{ ...btn(false), fontSize: 10, padding: "3px 9px" }}
              onClick={() => { applyBg1(DEFAULT_BG1); applyBg2(DEFAULT_BG2); save(SK.colors, { bg1: DEFAULT_BG1, bg2: DEFAULT_BG2 }); }}>↺ Reset</button>
          </div>

          {/* Row 4: Map size */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 14px" }}>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Map size</span>
            <input type="text" value={sizeWInput}
              onChange={e => setSizeWInput(e.target.value.replace(/\D/g, ""))}
              onBlur={() => { const w = parseInt(sizeWInput, 10); if (!isNaN(w) && w > 0) { setSizeWInput(String(Math.max(1, Math.min(99, w)))); } else setSizeWInput(String(gridW)); }}
              style={{ width: 36, textAlign: "center", background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "3px 4px", outline: "none" }} />
            <span style={{ fontSize: 11, color: C.muted }}>×</span>
            <input type="text" value={sizeHInput}
              onChange={e => setSizeHInput(e.target.value.replace(/\D/g, ""))}
              onBlur={() => { const h = parseInt(sizeHInput, 10); if (!isNaN(h) && h > 0) { setSizeHInput(String(Math.max(1, Math.min(99, h)))); } else setSizeHInput(String(gridH)); }}
              style={{ width: 36, textAlign: "center", background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "3px 4px", outline: "none" }} />
            <button style={{ ...btn(true, C.accent, C.accentDim), fontSize: 10, padding: "3px 9px" }}
              onClick={() => { const w = parseInt(sizeWInput, 10), h = parseInt(sizeHInput, 10); if (w > 0 && h > 0) setPendingSize({ w, h }); }}>
              Apply
            </button>
            <button style={{ ...btn(false), fontSize: 10, padding: "3px 9px" }}
              onClick={() => { setSizeWInput("21"); setSizeHInput("33"); setPendingSize({ w: 21, h: 33 }); }}>
              3v3
            </button>
          </div>

          {/* Row 5: Theme switcher */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 14px 6px" }}>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Theme</span>
            {["warm", "cold"].map(th => (
              <button key={th} onClick={() => setUiTheme(th)}
                style={{ ...btn(uiTheme === th, uiTheme === th ? C.accent : undefined, uiTheme === th ? C.accentDim : undefined), fontSize: 11, padding: "3px 12px" }}>
                {th === "warm" ? "🔥 Warm" : "❄️ Cold"}
              </button>
            ))}
          </div>
        </>)}

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
