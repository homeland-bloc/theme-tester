<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ophelia" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a0f06" />
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon setup — browsers pick the best size automatically -->
  <link rel="icon"                    href="favicon/favicon.ico" sizes="any" />
  <link rel="icon"    type="image/png" href="favicon/favicon-16x16.png"           sizes="16x16" />
  <link rel="icon"    type="image/png" href="favicon/favicon-32x32.png"           sizes="32x32" />
  <link rel="apple-touch-icon"        href="favicon/apple-touch-icon.png" />

  <title>Ophelia</title>

  <!-- Lilita One (title only) + Inter (all UI) from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; background: #1a0f06; }
    #root { height: 100%; height: 100dvh; display: flex; flex-direction: column; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(251,146,60,0.3); border-radius: 2px; }
    * { -webkit-tap-highlight-color: transparent; }

    /* Modal backdrop */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-box {
      background: #2b1a0a; border: 1px solid rgba(251,146,60,0.28);
      border-radius: 14px; padding: 22px; max-width: 340px; width: 100%;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* Seed textarea */
    .seed-area {
      width: 100%; background: rgba(251,146,60,0.06); border: 1px solid rgba(251,146,60,0.22);
      border-radius: 7px; color: #fef3e2; font-family: monospace; font-size: 11px;
      padding: 8px; resize: vertical; min-height: 56px; outline: none;
    }
    .seed-area:focus { border-color: #fb923c; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ── Constants ──────────────────────────────────────────────────────────
const GRID_W = 21, GRID_H = 33, CELL = 32;
const DEFAULT_BG1 = "#67717d", DEFAULT_BG2 = "#6e7986";
const MIN_ZOOM = 0.25, MAX_ZOOM = 4;
// Zoom buttons snap to nearest 10%
const ZOOM_STEP = 0.1;
const snapTo10 = z => Math.round(z * 10) / 10;
const SK = { tiles: "oph_tiles", grid: "oph_grid", colors: "oph_colors", userTiles: "oph_user_tiles" };
const ACCEPTED = "image/png,image/jpeg,image/gif,image/webp,image/svg+xml,image/bmp";
const MAX_HISTORY = 60;

// Default tiles are loaded dynamically from Resources/manifest.json.
// To add/remove tiles, update that JSON file (or run generate-manifest.sh).

const load = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const validHex = h => /^#[0-9A-Fa-f]{6}$/.test(h);
const isMobileDevice = () => typeof window !== "undefined" && window.innerWidth < 768;

// ── Colour palette ─────────────────────────────────────────────────────
const C = {
  bg: "#1a0f06", panel: "#2b1a0a", panelDeep: "#1f1207",
  border: "rgba(251,146,60,0.18)", accent: "#fb923c",
  accentDim: "rgba(251,146,60,0.14)", accentBright: "#fdba74",
  soft: "#fcd34d", softDim: "rgba(252,211,77,0.16)",
  pale: "#fde68a", paleDim: "rgba(253,230,138,0.14)",
  text: "#fef3e2", muted: "rgba(254,243,226,0.45)", danger: "#f87171",
};

// ── Seed codec ─────────────────────────────────────────────────────────
// Format: [symmetry_prefix]:[rle_payload]
const B62 = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
const toB62 = n => { if (n === 0) return "0"; let s = ""; while (n > 0) { s = B62[n % 62] + s; n = Math.floor(n / 62); } return s; };
const fromB62 = s => s.split("").reduce((a, c) => a * 62 + B62.indexOf(c), 0);

function encodeSeed(grid, mirrorV, mirrorH, mirrorD) {
  let sym = "a";
  if (mirrorD && !mirrorH && !mirrorV) sym = "d";
  else if (mirrorH && !mirrorD && !mirrorV) sym = "h";
  else if (mirrorV && !mirrorD && !mirrorH) sym = "v";
  else if (mirrorD && mirrorH && mirrorV) sym = "f";
  else if (mirrorD && mirrorH) sym = "dh";
  else if (mirrorD && mirrorV) sym = "dv";
  else if (mirrorH && mirrorV) sym = "hv";

  const flat = grid.flat().map(v => v ?? 0);
  const tokens = [];
  let i = 0;
  while (i < flat.length) {
    const val = flat[i];
    let run = 1;
    while (i + run < flat.length && flat[i + run] === val) run++;
    let idStr;
    if (val === 0) idStr = "_";
    else if (val <= 62) idStr = B62[val];
    else idStr = "~" + toB62(val);
    const runStr = run > 1 ? "x" + toB62(run) : "";
    tokens.push(idStr + runStr);
    i += run;
  }
  return sym + ":" + tokens.join("");
}

function decodeSeed(seed) {
  const colonIdx = seed.indexOf(":");
  if (colonIdx === -1) return null;
  const sym = seed.slice(0, colonIdx);
  const payload = seed.slice(colonIdx + 1);

  const mirrorD = sym.includes("d") || sym === "f";
  const mirrorH = sym.includes("h") || sym === "f";
  const mirrorV = sym.includes("v") || sym === "f";

  const flat = [];
  let i = 0;
  while (i < payload.length) {
    let val, idLen;
    if (payload[i] === "_") { val = 0; idLen = 1; }
    else if (payload[i] === "~") {
      let j = i + 1;
      while (j < payload.length && payload[j] !== "x" && payload[j] !== "_" && payload[j] !== "~" && B62.indexOf(payload[j]) !== -1) j++;
      val = fromB62(payload.slice(i + 1, j));
      idLen = j - i;
    } else {
      val = B62.indexOf(payload[i]);
      idLen = 1;
    }
    i += idLen;
    let run = 1;
    if (i < payload.length && payload[i] === "x") {
      let j = i + 1;
      while (j < payload.length && B62.indexOf(payload[j]) !== -1 && payload[j] !== "_" && payload[j] !== "~") j++;
      run = fromB62(payload.slice(i + 1, j));
      i = j;
    }
    for (let k = 0; k < run; k++) flat.push(val === 0 ? null : val);
  }

  const total = GRID_W * GRID_H;
  const padded = [...flat];
  while (padded.length < total) padded.push(null);
  const grid = Array.from({ length: GRID_H }, (_, r) => padded.slice(r * GRID_W, r * GRID_W + GRID_W));
  return { grid, mirrorD, mirrorH, mirrorV };
}

// ── Placeholder tile for unknown IDs on import ─────────────────────────
function makePlaceholderSrc(id) {
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><rect width='32' height='32' fill='#2b1a08'/><text x='16' y='22' font-size='12' fill='white' text-anchor='middle' font-family='monospace'>${id}</text></svg>`;
  return "data:image/svg+xml," + encodeURIComponent(svg);
}

// ── Tiny helpers ───────────────────────────────────────────────────────
const Sep = () => <div style={{ width: 1, height: 22, background: C.border, flexShrink: 0, alignSelf: "center" }} />;

function SectionHeader({ label, open, onToggle, left, right }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 12px", background: C.panelDeep, borderBottom: open ? `1px solid ${C.border}` : "none" }}>
      <button onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.2, color: C.accent, textTransform: "uppercase", fontFamily: "'Inter', sans-serif" }}>{label}</span>
        <span style={{ fontSize: 9, color: C.muted, display: "inline-block", transition: "transform 0.15s", transform: open ? "rotate(0deg)" : "rotate(-90deg)" }}>▼</span>
      </button>
      {left}
      <div style={{ flex: 1 }} />
      {right}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────
function App() {
  const savedColors = load(SK.colors, { bg1: DEFAULT_BG1, bg2: DEFAULT_BG2 });
  const mobile = isMobileDevice();

  // Default tiles loaded dynamically from Resources/manifest.json
  const [defaultTiles, setDefaultTiles]   = useState([]);
  const [tilesLoading, setTilesLoading]   = useState(true);

  // User-uploaded tiles persisted in localStorage; IDs start after defaults
  const [userTiles, setUserTiles] = useState(() => load(SK.userTiles, []));
  const tiles = useMemo(() => [...defaultTiles, ...userTiles], [defaultTiles, userTiles]);

  const [grid,        setGridRaw]   = useState(() => load(SK.grid, Array.from({ length: GRID_H }, () => Array(GRID_W).fill(null))));
  const [bg1,         setBg1]       = useState(savedColors.bg1);
  const [bg2,         setBg2]       = useState(savedColors.bg2);
  const [hex1,        setHex1]      = useState(savedColors.bg1);
  const [hex2,        setHex2]      = useState(savedColors.bg2);
  const [sel,         setSel]       = useState(null);
  const [eraser,      setEraser]    = useState(false);
  const [mirrorV,     setMirrorV]   = useState(false);
  const [mirrorH,     setMirrorH]   = useState(false);
  const [mirrorD,     setMirrorD]   = useState(false);
  const [showGuides,  setShowGuides]= useState(true);
  const [zoom,        setZoom]      = useState(1);
  const [zoomEditing, setZoomEdit]  = useState(false);
  const [zoomInput,   setZoomInput] = useState("");
  const [painting,    setPainting]  = useState(false);
  const [selectionMode, setSelectionMode] = useState('single'); // 'single' | 'line' | 'rect'
  const [rectPreview,   setRectPreview]   = useState(null);     // {r1,c1,r2,c2} during rect drag
  const [previewCells,  setPreviewCells]  = useState(null);     // [[r,c],...] during single/line drag
  // Panels: collapsed by default on mobile
  const [tilesOpen,   setTilesOpen] = useState(!mobile);
  const [toolsOpen,   setToolsOpen] = useState(!mobile);
  const [bgOpen,      setBgOpen]    = useState(!mobile);
  const [otherOpen,   setOtherOpen] = useState(!mobile);
  const [infoTile,    setInfoTile]  = useState(null);
  // Replace A→B
  const [replaceOpen, setReplaceOpen] = useState(false);
  const [replaceA,    setReplaceA]  = useState(null);
  const [replaceB,    setReplaceB]  = useState(null);
  // Seed
  const [seedOpen,    setSeedOpen]  = useState(false);
  const [seedVal,     setSeedVal]   = useState("");
  const [seedImport,  setSeedImport]= useState("");
  const [seedErr,     setSeedErr]   = useState("");
  // Failed tile tracking
  const [failedTiles,   setFailedTiles]   = useState(new Set());
  const [failedWarning, setFailedWarning] = useState(false);
  // Upload success flash
  const [uploadFlash,   setUploadFlash]   = useState(0);  // count of newly uploaded tiles
  const uploadTimerRef = useRef(null);
  // Responsive
  const [isMobile,    setIsMobile]  = useState(mobile);

  // History
  const [history,  setHistory]  = useState([grid]);
  const [histIdx,  setHistIdx]  = useState(0);

  const fileRef   = useRef();
  const scrollRef = useRef();
  // nextId is safe to start from user tiles max; updated after manifest loads
  const nextId    = useRef(userTiles.length ? Math.max(...userTiles.map(t => t.id)) + 1 : 1);

  // Stable refs for touch/paint handlers
  const selRef      = useRef(sel);
  const eraserRef   = useRef(eraser);
  const zoomRef     = useRef(zoom);
  const paintRef    = useRef(null);
  const absZoomRef  = useRef(null);
  const pinchRef    = useRef(null);

  // Selection mode refs (stable across touch handler closures)
  const selectionModeRef  = useRef('single');
  const selectionStartRef = useRef(null);     // [r, c] of mousedown cell
  const selectionEndRef   = useRef(null);     // [r, c] of latest mousemove cell
  const hoveredTilesRef   = useRef(new Set()); // accumulated "r,c" strings for line mode
  const commitOnUpRef     = useRef(null);     // commitSelectionOnMouseUp
  const pushHistRef       = useRef(null);     // pushHistorySnapshot

  useEffect(() => { selRef.current          = sel;           }, [sel]);
  useEffect(() => { eraserRef.current       = eraser;        }, [eraser]);
  useEffect(() => { zoomRef.current         = zoom;          }, [zoom]);
  useEffect(() => { selectionModeRef.current = selectionMode; }, [selectionMode]);

  // Persist
  useEffect(() => { save(SK.userTiles, userTiles); }, [userTiles]);
  useEffect(() => { save(SK.grid,      grid);       }, [grid]);

  // Load default tiles dynamically from Resources/manifest.json
  useEffect(() => {
    fetch("Resources/manifest.json")
      .then(r => r.ok ? r.json() : { tiles: [] })
      .then(({ tiles: files }) => {
        const arr = Array.isArray(files) ? files : [];
        const loaded = arr.map((f, i) => ({
          id: i + 1,
          src: `Resources/${f}`,
          isDefault: true,
        }));
        setDefaultTiles(loaded);
        nextId.current = Math.max(nextId.current, loaded.length + 1);
        // Auto-select first tile if nothing is selected yet
        if (loaded.length > 0) setSel(prev => prev ?? loaded[0].id);
      })
      .catch(() => {})
      .finally(() => setTilesLoading(false));
  }, []);

  // Responsive resize listener
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const saveColors = (b1, b2) => save(SK.colors, { bg1: b1, bg2: b2 });
  const applyBg1   = v => { setBg1(v); setHex1(v); saveColors(v, bg2); };
  const applyBg2   = v => { setBg2(v); setHex2(v); saveColors(bg1, v); };

  const markFailed = id => setFailedTiles(prev => new Set([...prev, id]));

  // Grid with history
  const setGrid = useCallback((updater, skipHistory = false) => {
    setGridRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (!skipHistory) {
        setHistory(h => {
          const trimmed = h.slice(0, histIdx + 1);
          const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
          return [...capped, next];
        });
        setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
      }
      return next;
    });
  }, [histIdx]);

  const undo = useCallback(() => {
    if (histIdx <= 0) return;
    const newIdx = histIdx - 1;
    setHistIdx(newIdx);
    setGridRaw(history[newIdx]);
  }, [history, histIdx]);

  const redo = useCallback(() => {
    if (histIdx >= history.length - 1) return;
    const newIdx = histIdx + 1;
    setHistIdx(newIdx);
    setGridRaw(history[newIdx]);
  }, [history, histIdx]);

  // Push the current grid as a history snapshot (called once on mousedown, before any paint).
  // All cell writes during a drag use skipHistory=true, so the whole drag is one undo step.
  const pushHistorySnapshot = useCallback(() => {
    const snap = grid;
    setHistory(h => {
      const trimmed = h.slice(0, histIdx + 1);
      const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
      return [...capped, snap];
    });
    setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
  }, [histIdx, grid]);

  const loadFiles = files => {
    const imageFiles = [...files].filter(f => f.type.startsWith("image/"));
    if (!imageFiles.length) return;
    let loaded = 0;
    imageFiles.forEach(f => {
      const r = new FileReader();
      r.onload = e => {
        const id = nextId.current++;
        setUserTiles(prev => [...prev, { id, src: e.target.result }]);
        loaded++;
        if (loaded === imageFiles.length) {
          // Flash notification
          setUploadFlash(imageFiles.length);
          if (uploadTimerRef.current) clearTimeout(uploadTimerRef.current);
          uploadTimerRef.current = setTimeout(() => setUploadFlash(0), 2500);
        }
      };
      r.readAsDataURL(f);
    });
  };

  const deleteTile = id => {
    setUserTiles(p => p.filter(t => t.id !== id));
    if (sel === id) setSel(null);
    setInfoTile(null);
  };

  const getMirrorPositions = useCallback((r, c) => {
    const pos = [[r, c]];
    const cR = (GRID_H - 1) / 2, cC = (GRID_W - 1) / 2;
    const oR = r - cR, oC = c - cC;
    if (mirrorV) pos.push([r, GRID_W - 1 - c]);
    if (mirrorH) pos.push([GRID_H - 1 - r, c]);
    if (mirrorD) pos.push([Math.round(cR - oR), Math.round(cC - oC)]);
    if (mirrorV && mirrorH) pos.push([GRID_H - 1 - r, GRID_W - 1 - c]);
    if (mirrorV && mirrorD) pos.push([Math.round(cR - oR), GRID_W - 1 - c]);
    if (mirrorH && mirrorD) pos.push([GRID_H - 1 - r, Math.round(cC - oC)]);
    if (mirrorV && mirrorH && mirrorD) pos.push([GRID_H - 1 - r, Math.round(cC - oC)]);
    const seen = new Set();
    return pos.filter(([pr, pc]) => {
      if (pr < 0 || pr >= GRID_H || pc < 0 || pc >= GRID_W) return false;
      const k = `${pr},${pc}`; if (seen.has(k)) return false; seen.add(k); return true;
    });
  }, [mirrorV, mirrorH, mirrorD]);

  const paintCells = useCallback((r, c) => {
    const cells = getMirrorPositions(r, c);
    setGrid(prev => {
      const g = prev.map(row => [...row]);
      cells.forEach(([pr, pc]) => { g[pr][pc] = eraser ? null : (sel ?? null); });
      return g;
    }, true); // skipHistory — snapshot is saved once on mousedown via pushHistorySnapshot
  }, [eraser, sel, getMirrorPositions, setGrid]);

  useEffect(() => { paintRef.current   = paintCells;           }, [paintCells]);
  useEffect(() => { pushHistRef.current = pushHistorySnapshot;  }, [pushHistorySnapshot]);

  // Commit an array of [r,c] cells to the grid at once (used by line and rect modes).
  // Uses refs for sel/eraser so it reads the correct values at mouseup time.
  const commitMultipleCells = useCallback((cells) => {
    if (!cells.length) return;
    const tileId   = selRef.current;
    const isEraser = eraserRef.current;
    setGrid(prev => {
      const g = prev.map(row => [...row]);
      cells.forEach(([r, c]) => {
        getMirrorPositions(r, c).forEach(([pr, pc]) => {
          g[pr][pc] = isEraser ? null : (tileId ?? null);
        });
      });
      return g;
    }, true); // skipHistory — snapshot was already saved on mousedown
  }, [getMirrorPositions, setGrid]);

  // Called on mouseup / touch-end to finalise the current selection.
  // All three modes defer their grid write to this point.
  const commitSelectionOnMouseUp = useCallback(() => {
    const mode = selectionModeRef.current;
    if (mode === 'single') {
      // place tile at the end point (where the mouse was released)
      if (selectionEndRef.current) {
        commitMultipleCells([selectionEndRef.current]);
      }
    } else if (mode === 'line') {
      const cells = [...hoveredTilesRef.current].map(k => k.split(',').map(Number));
      commitMultipleCells(cells);
    } else if (mode === 'rect') {
      if (!selectionStartRef.current) return;
      const [sr, sc] = selectionStartRef.current;
      const [er, ec] = selectionEndRef.current ?? [sr, sc];
      const cells = [];
      for (let r = Math.min(sr, er); r <= Math.max(sr, er); r++)
        for (let c = Math.min(sc, ec); c <= Math.max(sc, ec); c++)
          cells.push([r, c]);
      commitMultipleCells(cells);
    }
    setRectPreview(null);
    setPreviewCells(null);
    selectionStartRef.current = null;
    selectionEndRef.current   = null;
    hoveredTilesRef.current   = new Set();
  }, [commitMultipleCells]);

  useEffect(() => { commitOnUpRef.current = commitSelectionOnMouseUp; }, [commitSelectionOnMouseUp]);

  const onCell = (r, c, e) => {
    if (e.type === "mousedown") {
      setPainting(true);
      if (pushHistRef.current) pushHistRef.current(); // snapshot before-state once per drag
      selectionStartRef.current = [r, c];
      selectionEndRef.current   = [r, c];
      hoveredTilesRef.current   = new Set([`${r},${c}`]);
      const mode = selectionModeRef.current;
      if (mode === 'single') {
        setPreviewCells([[r, c]]);                        // single-cell cursor indicator
      } else if (mode === 'line') {
        setPreviewCells([[r, c]]);                        // start of trail
      } else if (mode === 'rect') {
        setRectPreview({ r1: r, c1: c, r2: r, c2: c }); // 1-cell bounding box
      }
      // no live writes to the grid in any mode
    } else if (e.type === "mousemove" && painting) {
      selectionEndRef.current = [r, c];
      const mode = selectionModeRef.current;
      if (mode === 'single') {
        setPreviewCells([[r, c]]);                        // single cell follows cursor
      } else if (mode === 'line') {
        hoveredTilesRef.current.add(`${r},${c}`);
        setPreviewCells([...hoveredTilesRef.current].map(k => k.split(',').map(Number)));
      } else if (mode === 'rect') {
        const [r1, c1] = selectionStartRef.current;
        setRectPreview({
          r1: Math.min(r1, r), c1: Math.min(c1, c),
          r2: Math.max(r1, r), c2: Math.max(c1, c),
        });
      }
    }
  };

  const getTile = id => tiles.find(t => t.id === id);

  // ── Zoom ──────────────────────────────────────────────────────────
  const applyZoom = useCallback((newZ, focal = null) => {
    setZoom(prev => {
      const z = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, +newZ.toFixed(2)));
      if (focal && scrollRef.current && z !== prev) {
        const scale = z / prev;
        requestAnimationFrame(() => {
          if (!scrollRef.current) return;
          scrollRef.current.scrollLeft = focal.cx * scale - focal.ox;
          scrollRef.current.scrollTop  = focal.cy * scale - focal.oy;
        });
      }
      return z;
    });
  }, []);

  // +/- buttons: snap to nearest 10%
  const changeZoom = useCallback((delta, focal = null) => {
    setZoom(prev => {
      const z = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, snapTo10(prev + delta)));
      if (focal && scrollRef.current && z !== prev) {
        const scale = z / prev;
        requestAnimationFrame(() => {
          if (!scrollRef.current) return;
          scrollRef.current.scrollLeft = focal.cx * scale - focal.ox;
          scrollRef.current.scrollTop  = focal.cy * scale - focal.oy;
        });
      }
      return z;
    });
  }, []);

  useEffect(() => { absZoomRef.current = applyZoom; }, [applyZoom]);

  const onWheel = useCallback(e => {
    if (!(e.ctrlKey || e.metaKey)) return;
    e.preventDefault();
    const el = scrollRef.current;
    const focal = el ? (() => {
      const rect = el.getBoundingClientRect();
      const ox = e.clientX - rect.left, oy = e.clientY - rect.top;
      return { cx: ox + el.scrollLeft, cy: oy + el.scrollTop, ox, oy };
    })() : null;
    changeZoom(e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP, focal);
  }, [changeZoom]);

  // ── Touch events ─────────────────────────────────────────────────
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const cellAt = touch => {
      const rect = el.getBoundingClientRect();
      const x = touch.clientX - rect.left + el.scrollLeft - 20;
      const y = touch.clientY - rect.top  + el.scrollTop  - 20 - CELL * zoomRef.current;
      const c = Math.floor(x / (CELL * zoomRef.current));
      const r = Math.floor(y / (CELL * zoomRef.current));
      return r >= 0 && r < GRID_H && c >= 0 && c < GRID_W ? [r, c] : null;
    };
    let isTouchPainting = false;
    const onTouchStart = e => {
      if (e.touches.length === 2) {
        const t0 = e.touches[0], t1 = e.touches[1];
        const mx = (t0.clientX + t1.clientX) / 2, my = (t0.clientY + t1.clientY) / 2;
        const rect = el.getBoundingClientRect();
        pinchRef.current = {
          dist: Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY),
          startZoom: zoomRef.current,
          cx: mx - rect.left + el.scrollLeft, cy: my - rect.top + el.scrollTop,
          ox: mx - rect.left, oy: my - rect.top,
        };
        e.preventDefault(); return;
      }
      if (e.touches.length !== 1 || (!selRef.current && !eraserRef.current)) return;
      const cell = cellAt(e.touches[0]);
      if (!cell) return;
      e.preventDefault();
      isTouchPainting = true;
      const [r, c] = cell;
      if (pushHistRef.current) pushHistRef.current(); // snapshot before-state once per drag
      selectionStartRef.current = [r, c];
      selectionEndRef.current   = [r, c];
      hoveredTilesRef.current   = new Set([`${r},${c}`]);
      const mode = selectionModeRef.current;
      if (mode === 'single') {
        setPreviewCells([[r, c]]);
      } else if (mode === 'line') {
        setPreviewCells([[r, c]]);
      } else if (mode === 'rect') {
        setRectPreview({ r1: r, c1: c, r2: r, c2: c });
      }
      // no live writes to the grid in any mode
    };
    const onTouchMove = e => {
      if (e.touches.length === 2 && pinchRef.current) {
        e.preventDefault();
        const t0 = e.touches[0], t1 = e.touches[1];
        const dist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
        absZoomRef.current(+(pinchRef.current.startZoom * dist / pinchRef.current.dist).toFixed(2), {
          cx: pinchRef.current.cx, cy: pinchRef.current.cy,
          ox: pinchRef.current.ox, oy: pinchRef.current.oy,
        }); return;
      }
      if (!isTouchPainting || e.touches.length !== 1) return;
      e.preventDefault();
      const cell = cellAt(e.touches[0]);
      if (!cell) return;
      const [r, c] = cell;
      selectionEndRef.current = [r, c];
      const mode = selectionModeRef.current;
      if (mode === 'single') {
        setPreviewCells([[r, c]]);
      } else if (mode === 'line') {
        hoveredTilesRef.current.add(`${r},${c}`);
        setPreviewCells([...hoveredTilesRef.current].map(k => k.split(',').map(Number)));
      } else if (mode === 'rect') {
        const [r1, c1] = selectionStartRef.current;
        setRectPreview({
          r1: Math.min(r1, r), c1: Math.min(c1, c),
          r2: Math.max(r1, r), c2: Math.max(c1, c),
        });
      }
    };
    const onTouchEnd = e => {
      if (e.touches.length < 2) pinchRef.current = null;
      if (e.touches.length === 0) {
        if (isTouchPainting && commitOnUpRef.current) commitOnUpRef.current();
        isTouchPainting = false;
      }
    };
    el.addEventListener('touchstart',  onTouchStart, { passive: false });
    el.addEventListener('touchmove',   onTouchMove,  { passive: false });
    el.addEventListener('touchend',    onTouchEnd);
    el.addEventListener('touchcancel', onTouchEnd);
    return () => {
      el.removeEventListener('touchstart',  onTouchStart);
      el.removeEventListener('touchmove',   onTouchMove);
      el.removeEventListener('touchend',    onTouchEnd);
      el.removeEventListener('touchcancel', onTouchEnd);
    };
  }, []);

  // ── Keyboard shortcuts ────────────────────────────────────────────
  useEffect(() => {
    const h = e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "z") { e.preventDefault(); e.shiftKey ? redo() : undo(); }
      if ((e.ctrlKey || e.metaKey) && e.key === "y") { e.preventDefault(); redo(); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [undo, redo]);

  // ── Replace A → B ─────────────────────────────────────────────────
  const doReplace = () => {
    if (replaceA == null || replaceB == null) return;
    setGrid(prev => prev.map(row => row.map(id => id === replaceA ? replaceB : id)));
    setReplaceOpen(false); setReplaceA(null); setReplaceB(null);
  };

  // ── Seed helpers ──────────────────────────────────────────────────
  const generateSeed = () => {
    const s = encodeSeed(grid, mirrorV, mirrorH, mirrorD);
    setSeedVal(s);
    setSeedImport(s);
  };

  const importSeed = () => {
    setSeedErr("");
    const result = decodeSeed(seedImport.trim());
    if (!result) { setSeedErr("Invalid seed format."); return; }
    const { grid: newGrid, mirrorD: nd, mirrorH: nh, mirrorV: nv } = result;
    const allIds = new Set(tiles.map(t => t.id));
    const placeholders = [];
    newGrid.forEach(row => row.forEach(id => {
      if (id && !allIds.has(id)) {
        if (!placeholders.find(p => p.id === id))
          placeholders.push({ id, name: `Unknown #${id}`, src: makePlaceholderSrc(id), isPlaceholder: true });
      }
    }));
    if (placeholders.length > 0) {
      setUserTiles(prev => {
        const existing = new Set(prev.map(t => t.id));
        return [...prev, ...placeholders.filter(p => !existing.has(p.id))];
      });
    }
    setGrid(newGrid);
    setMirrorD(nd); setMirrorH(nh); setMirrorV(nv);
    setSeedErr("Imported!");
  };

  // ── Export ────────────────────────────────────────────────────────
  const doExport = () => {
    const padding = CELL;
    const cv = document.createElement("canvas");
    cv.width  = GRID_W * CELL;
    cv.height = GRID_H * CELL + padding * 2;
    const ctx = cv.getContext("2d");
    for (let r = 0; r < GRID_H; r++) for (let c = 0; c < GRID_W; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? bg1 : bg2;
      ctx.fillRect(c * CELL, r * CELL + padding, CELL, CELL);
    }
    const draws = [];
    grid.forEach((row, r) => row.forEach((id, c) => {
      const t = id && getTile(id); if (t) draws.push({ src: t.src, r, c });
    }));
    const finish = () => cv.toBlob(b => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(b); a.download = "ophelia-map.png"; a.click();
    });
    if (!draws.length) { finish(); return; }
    let pending = draws.length;
    draws.forEach(({ src, r, c }) => {
      const img = new Image(); img.src = src;
      img.onload = () => {
        const h = CELL * (img.naturalHeight / img.naturalWidth);
        ctx.drawImage(img, c * CELL, r * CELL + padding + (CELL - h) / 2, CELL, h);
        if (--pending === 0) finish();
      };
    });
  };

  const commitZoom = () => {
    const v = parseInt(zoomInput, 10);
    if (!isNaN(v) && v > 0) {
      // Snap to nearest 10%
      const snapped = Math.round(v / 10) * 10;
      setZoom(Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, snapped / 100)));
    }
    setZoomEdit(false);
  };

  // ── Shared styles ─────────────────────────────────────────────────
  const btn = (active, color = C.accent, dim = C.accentDim) => ({
    padding: "5px 11px", borderRadius: 7, fontSize: 12, fontWeight: 600,
    cursor: "pointer", touchAction: "manipulation", userSelect: "none",
    fontFamily: "'Inter', sans-serif",
    background: active ? dim : "rgba(255,255,255,0.04)",
    color:      active ? color : C.muted,
    border:    `1px solid ${active ? color : "rgba(255,255,255,0.1)"}`,
    transition: "all 0.12s", flexShrink: 0,
  });

  const inputStyle = {
    background: "rgba(251,146,60,0.07)", border: `1px solid ${C.border}`,
    borderRadius: 5, color: C.text, fontFamily: "'Inter', monospace", fontSize: 11,
    padding: "4px 8px", outline: "none", width: "100%",
  };

  // ── Tile info modal ───────────────────────────────────────────────
  const InfoModal = () => {
    if (!infoTile) return null;
    const t = getTile(infoTile);
    if (!t) { setInfoTile(null); return null; }
    return (
      <div className="modal-backdrop" onClick={() => setInfoTile(null)}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Tile #{t.id}</span>
            <button onClick={() => setInfoTile(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ background: "#1a0c04", borderRadius: 8, padding: 12, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 120 }}>
            <img src={t.src} alt="" style={{ maxWidth: "100%", maxHeight: 180, objectFit: "contain", imageRendering: "pixelated" }} />
          </div>
          {!t.isDefault && (
            <button style={{ ...btn(false, C.danger, "rgba(248,113,113,0.14)"), width: "100%", justifyContent: "center" }}
              onClick={() => deleteTile(t.id)}>Delete tile</button>
          )}
          {t.isDefault && (
            <p style={{ fontSize: 11, color: C.muted, textAlign: "center" }}>Default tile — cannot be deleted.</p>
          )}
        </div>
      </div>
    );
  };

  // ── Replace modal ─────────────────────────────────────────────────
  const ReplaceModal = () => {
    if (!replaceOpen) return null;
    const TilePicker = ({ value, onChange, label }) => (
      <div style={{ flex: 1 }}>
        <p style={{ fontSize: 10, color: C.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: 1 }}>{label}</p>
        <div style={{ overflowY: "auto", maxHeight: 180, display: "flex", flexWrap: "wrap", gap: 5, background: "rgba(0,0,0,0.2)", borderRadius: 7, padding: 6 }}>
          {tiles.map(t => (
            <div key={t.id} onClick={() => onChange(t.id)} style={{
              width: 44, cursor: "pointer", borderRadius: 6, overflow: "hidden",
              border: `2px solid ${value === t.id ? C.accentBright : C.border}`,
              background: value === t.id ? C.accentDim : "transparent",
            }}>
              <div style={{ fontSize: 8, textAlign: "center", color: value === t.id ? C.accent : C.muted, paddingTop: 2, fontFamily: "monospace" }}>#{t.id}</div>
              <img src={t.src} alt="" style={{ width: "100%", height: 36, objectFit: "contain", imageRendering: "pixelated" }} />
            </div>
          ))}
        </div>
      </div>
    );
    return (
      <div className="modal-backdrop" onClick={() => setReplaceOpen(false)}>
        <div className="modal-box" style={{ maxWidth: 480 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Replace Tile</span>
            <button onClick={() => setReplaceOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <TilePicker value={replaceA} onChange={setReplaceA} label="Replace (A)" />
            <div style={{ display: "flex", alignItems: "center", color: C.muted, fontSize: 18, paddingTop: 24 }}>→</div>
            <TilePicker value={replaceB} onChange={setReplaceB} label="With (B)" />
          </div>
          <button style={{ ...btn(replaceA != null && replaceB != null, C.accent, C.accentDim), width: "100%" }}
            onClick={doReplace} disabled={replaceA == null || replaceB == null}>
            Replace all instances
          </button>
        </div>
      </div>
    );
  };

  // ── Seed modal ────────────────────────────────────────────────────
  const SeedModal = () => {
    if (!seedOpen) return null;
    return (
      <div className="modal-backdrop" onClick={() => setSeedOpen(false)}>
        <div className="modal-box" style={{ maxWidth: 440 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Map Seed</span>
            <button onClick={() => setSeedOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>

          <div>
            <p style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>Generate a seed from the current map:</p>
            <button style={{ ...btn(false, C.soft, C.softDim), marginBottom: 8 }} onClick={generateSeed}>Generate seed</button>
            {seedVal && (
              <textarea className="seed-area" readOnly value={seedVal} onClick={e => e.target.select()} />
            )}
          </div>

          <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 12 }}>
            <p style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>Import a seed:</p>
            <textarea className="seed-area" value={seedImport} onChange={e => { setSeedImport(e.target.value); setSeedErr(""); }}
              placeholder="Paste seed here…" />
            {seedErr && <p style={{ fontSize: 11, color: seedErr === "Imported!" ? "#4ade80" : C.danger, marginTop: 4 }}>{seedErr}</p>}
            <button style={{ ...btn(false, C.accent, C.accentDim), marginTop: 8 }} onClick={importSeed}>Import seed</button>
          </div>

          <div style={{ background: "rgba(251,146,60,0.06)", borderRadius: 7, padding: 8 }}>
            <p style={{ fontSize: 10, color: C.muted, lineHeight: 1.6 }}>
              Seed format: <code style={{ color: C.accentBright }}>[symmetry]:[rle]</code><br />
              Symmetry: <code style={{ color: C.pale }}>d</code> diagonal · <code style={{ color: C.pale }}>h</code> horizontal · <code style={{ color: C.pale }}>v</code> vertical · <code style={{ color: C.pale }}>a</code> asymmetric<br />
              Unknown tile IDs on import show as placeholder squares.
            </p>
          </div>
        </div>
      </div>
    );
  };

  // ── Failed tile warning modal ─────────────────────────────────────
  const FailedTileModal = () => {
    if (!failedWarning) return null;
    return (
      <div className="modal-backdrop" onClick={() => setFailedWarning(false)}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.danger }}>Tile unavailable</span>
            <button onClick={() => setFailedWarning(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <p style={{ fontSize: 13, color: C.text, lineHeight: 1.6 }}>
            This tile's image could not be loaded. The file may be missing from the <code style={{ color: C.accentBright }}>Resources/</code> folder.
          </p>
          <p style={{ fontSize: 11, color: C.muted }}>
            To fix this, restore the missing image file to the Resources folder and refresh the page. You can also update <code style={{ color: C.accentBright }}>Resources/manifest.json</code> to remove deleted entries.
          </p>
          <button style={{ ...btn(false, C.accent, C.accentDim) }} onClick={() => setFailedWarning(false)}>OK</button>
        </div>
      </div>
    );
  };

  // ─────────────────────────────────────────────────────────────────
  // Grid size in pixels (at current zoom)
  const gW = GRID_W * CELL * zoom;
  const gH = GRID_H * CELL * zoom;

  return (
    <div style={{
      display: "flex", flexDirection: "column", height: "100dvh",
      background: C.bg, color: C.text,
      fontFamily: "'Inter', sans-serif",
      overflow: "hidden",
      paddingTop: "env(safe-area-inset-top)", paddingBottom: "env(safe-area-inset-bottom)",
      paddingLeft: "env(safe-area-inset-left)", paddingRight: "env(safe-area-inset-right)",
    }}>

      <InfoModal />
      <ReplaceModal />
      <SeedModal />
      <FailedTileModal />

      {/* ══ TOP BAR ══════════════════════════════════════════════════ */}
      <div style={{
        display: "flex", alignItems: "center", gap: 8, padding: "0 14px",
        height: 50, flexShrink: 0,
        background: C.panel, borderBottom: `1px solid ${C.border}`,
      }}>
        {/* Logo + title */}
        <img src="favicon/favicon-32x32.png" alt="Ophelia" style={{ width: 28, height: 28, flexShrink: 0, imageRendering: "auto" }} />
        {!isMobile && (
          <span style={{
            fontFamily: "'Lilita One', cursive", fontWeight: 400, fontSize: 18,
            letterSpacing: 0.4, whiteSpace: "nowrap",
            background: "linear-gradient(90deg,#fb923c,#fcd34d)",
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            flexShrink: 0,
          }}>Ophelia - Custom Theme Tester</span>
        )}

        <div style={{ flex: 1 }} />

        {/* Zoom controls — centred in top bar */}
        <div style={{ display: "flex", alignItems: "center", gap: 5, flexShrink: 0 }}>
          <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Zoom</span>
          <button style={{ ...btn(false), padding: "4px 9px", fontSize: 15, fontWeight: 700, lineHeight: 1 }}
            onClick={() => changeZoom(-ZOOM_STEP)}>−</button>
          {zoomEditing ? (
            <input autoFocus value={zoomInput}
              onChange={e => setZoomInput(e.target.value.replace(/\D/g, ""))}
              onBlur={commitZoom}
              onKeyDown={e => { if (e.key === "Enter") e.target.blur(); if (e.key === "Escape") setZoomEdit(false); }}
              style={{ width: 52, textAlign: "center", outline: "none", background: C.accentDim, border: `1px solid ${C.accent}`, borderRadius: 7, color: C.text, fontFamily: "monospace", fontSize: 13, fontWeight: 700, padding: "3px 4px" }}
            />
          ) : (
            <span onClick={() => { setZoomEdit(true); setZoomInput(String(Math.round(zoom * 100))); }}
              style={{ minWidth: 52, textAlign: "center", display: "inline-block", fontSize: 13, fontFamily: "monospace", fontWeight: 700, color: C.text, background: "rgba(251,146,60,0.08)", borderRadius: 7, padding: "3px 6px", border: `1px solid ${C.border}`, cursor: "text", userSelect: "none" }}>
              {Math.round(zoom * 100)}%
            </span>
          )}
          <button style={{ ...btn(false), padding: "4px 9px", fontSize: 15, fontWeight: 700, lineHeight: 1 }}
            onClick={() => changeZoom(ZOOM_STEP)}>+</button>
        </div>

        <div style={{ flex: 1 }} />
      </div>

      {/* ══ 2×2 PANEL GRID ═══════════════════════════════════════════ */}
      <div style={{
        display: "grid",
        gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr",
        flexShrink: 0,
        borderBottom: `1px solid ${C.border}`,
      }}>

        {/* ── TOP-LEFT: Tiles ─────────────────────────────────────── */}
        <div style={{ background: C.panelDeep, borderRight: isMobile ? "none" : `1px solid ${C.border}`, borderBottom: `1px solid ${C.border}` }}>
          <SectionHeader
            label={`Tiles (${tiles.length})`}
            open={tilesOpen}
            onToggle={() => setTilesOpen(o => !o)}
            left={
              <div style={{ display: "flex", gap: 6, alignItems: "center", marginLeft: 8 }}>
                <button onClick={() => fileRef.current.click()}
                  style={{ ...btn(false, C.accentBright, C.accentDim), fontSize: 11, padding: "4px 10px" }}>
                  + Upload
                  <input ref={fileRef} type="file" accept={ACCEPTED} multiple style={{ display: "none" }}
                    onChange={e => { loadFiles(e.target.files); e.target.value = ""; }} />
                </button>
                {uploadFlash > 0 && (
                  <span style={{
                    fontSize: 11, fontWeight: 600, color: "#4ade80",
                    background: "rgba(74,222,128,0.14)", border: "1px solid rgba(74,222,128,0.4)",
                    borderRadius: 6, padding: "3px 8px", animation: "none",
                    transition: "opacity 0.3s",
                  }}>
                    ✓ {uploadFlash} tile{uploadFlash > 1 ? "s" : ""} added
                  </span>
                )}
              </div>
            }
          />

          {tilesOpen && (
            tilesLoading ? (
              <p style={{ padding: "6px 12px 10px", fontSize: 12, color: C.muted }}>Loading tiles…</p>
            ) : (
              <div style={{ overflowY: "auto", maxHeight: 198, padding: "8px 12px 10px" }}>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>

                  {/* ── Tile #0 — Eraser ── */}
                  <div
                    onClick={() => { setEraser(true); setSel(null); }}
                    style={{
                      flexShrink: 0, width: 64, borderRadius: 8, cursor: "pointer",
                      border: `2px solid ${eraser ? C.danger : C.border}`,
                      background: eraser ? "rgba(248,113,113,0.14)" : "rgba(255,255,255,0.03)",
                      transition: "border 0.12s, background 0.12s", overflow: "hidden",
                    }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", background: eraser ? "rgba(248,113,113,0.32)" : "rgba(248,113,113,0.14)", padding: "2px 4px" }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: eraser ? C.danger : "rgba(248,113,113,0.7)" }}>Erase</span>
                    </div>
                    <div style={{ height: 52, background: "#1a0c04", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <span style={{ fontSize: 22, color: eraser ? C.danger : "rgba(248,113,113,0.5)", lineHeight: 1 }}>✕</span>
                    </div>
                  </div>

                  {/* ── Regular tiles ── */}
                  {tiles.length === 0 ? (
                    <p style={{ padding: "0 4px", fontSize: 12, color: C.muted, alignSelf: "center" }}>
                      No tiles — upload images or add to Resources/.
                    </p>
                  ) : (
                    tiles.map(t => {
                      const active = sel === t.id && !eraser;
                      const failed = failedTiles.has(t.id);
                      return (
                        <div key={t.id}
                          onClick={() => {
                            if (failed) { setFailedWarning(true); return; }
                            setSel(t.id); setEraser(false);
                          }}
                          style={{
                            flexShrink: 0, width: 60, height: 60, borderRadius: 8,
                            cursor: failed ? "not-allowed" : "pointer",
                            border: `2px solid ${failed ? C.danger : active ? C.accentBright : C.border}`,
                            background: failed ? "rgba(248,113,113,0.08)" : active ? C.accentDim : "rgba(255,255,255,0.03)",
                            transition: "border 0.12s, background 0.12s", overflow: "hidden",
                            opacity: failed ? 0.55 : 1,
                            position: "relative",
                          }}>
                          {/* Image area fills the whole card */}
                          <div style={{ width: "100%", height: "100%", background: "#1a0c04", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            {failed ? (
                              <span style={{ fontSize: 20, color: C.danger }}>✕</span>
                            ) : (
                              <img src={t.src} alt=""
                                onError={() => markFailed(t.id)}
                                style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated" }} />
                            )}
                          </div>
                          {/* ⓘ info button — small overlay in top-right corner */}
                          <span onClick={e => { e.stopPropagation(); setInfoTile(t.id); }}
                            style={{ position: "absolute", top: 2, right: 3, fontSize: 11, cursor: "pointer", color: active ? C.accentBright : C.muted, lineHeight: 1, opacity: 0.7 }}
                            title="Tile info">ⓘ</span>
                          {/* Active highlight ring is handled by the border */}
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
            )
          )}
        </div>

        {/* ── TOP-RIGHT: Tools ────────────────────────────────────── */}
        <div style={{ background: C.panelDeep, borderBottom: `1px solid ${C.border}` }}>
          <SectionHeader label="Tools" open={toolsOpen} onToggle={() => setToolsOpen(o => !o)} />

          {toolsOpen && (
            <div style={{ overflowX: "auto" }}>
            <div style={{ padding: "8px 12px 10px", display: "flex", gap: 8, flexWrap: isMobile ? "nowrap" : "wrap", alignItems: "center", minWidth: "min-content" }}>
              {/* Selection mode */}
              <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>Selection Mode</span>
              <button style={btn(selectionMode === 'single', C.accent, C.accentDim)} onClick={() => setSelectionMode('single')} title="Freehand: paint each cell as you drag">Single</button>
              <button style={btn(selectionMode === 'line',   C.accent, C.accentDim)} onClick={() => setSelectionMode('line')}   title="Line: collect all cells under the cursor, commit on release">Line</button>
              <button style={btn(selectionMode === 'rect',   C.accent, C.accentDim)} onClick={() => setSelectionMode('rect')}   title="Rectangle: fill bounding box on release">Rectangle</button>

              <Sep />

              {/* Mirror */}
              <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>Mirror</span>
              <button style={btn(mirrorV, C.pale, C.paleDim)}         onClick={() => setMirrorV(v => !v)}>Vertical</button>
              <button style={btn(mirrorH, C.soft, C.softDim)}         onClick={() => setMirrorH(v => !v)}>Horizontal</button>
              <button style={btn(mirrorD, C.accentBright, C.accentDim)} onClick={() => setMirrorD(v => !v)}>Diagonal</button>

              <Sep />

              {/* Show Guides toggle — only meaningful when a mirror is active */}
              <button style={btn(showGuides, C.accent, C.accentDim)} onClick={() => setShowGuides(v => !v)}
                title="Toggle mirror guide lines">
                Guides
              </button>

              <Sep />

              {/* Undo / Redo */}
              <button style={btn(histIdx > 0, C.accent, C.accentDim)} onClick={undo} disabled={histIdx <= 0} title="Undo (Ctrl+Z)">Undo</button>
              <button style={btn(histIdx < history.length - 1, C.accent, C.accentDim)} onClick={redo} disabled={histIdx >= history.length - 1} title="Redo (Ctrl+Y)">Redo</button>

              <Sep />

              {/* Replace */}
              <button style={btn(false, C.soft, C.softDim)} onClick={() => setReplaceOpen(true)}>Replace</button>
            </div>
            </div>
          )}
        </div>

        {/* ── BOTTOM-LEFT: Background ──────────────────────────────── */}
        <div style={{ background: C.panelDeep, borderRight: isMobile ? "none" : `1px solid ${C.border}` }}>
          <SectionHeader label="Background" open={bgOpen} onToggle={() => setBgOpen(o => !o)} />

          {bgOpen && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 14px", flexWrap: "wrap" }}>
              {[
                { label: "A", bg: bg1, hex: hex1, setHex: setHex1, apply: applyBg1 },
                { label: "B", bg: bg2, hex: hex2, setHex: setHex2, apply: applyBg2 },
              ].map(({ label, bg, hex, setHex, apply }) => (
                <div key={label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontSize: 10, color: C.muted, fontWeight: 600 }}>{label}</span>
                  <input type="color" value={bg} onChange={e => apply(e.target.value)}
                    style={{ width: 26, height: 26, border: "none", borderRadius: 5, cursor: "pointer", padding: 2, background: "none", flexShrink: 0 }} />
                  <input type="text" value={hex} maxLength={7}
                    onChange={e => { const v = e.target.value; setHex(v); if (validHex(v)) apply(v); }}
                    onBlur={() => { if (!validHex(hex)) setHex(bg); }}
                    style={{ width: 68, background: "rgba(251,146,60,0.07)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "3px 6px", outline: "none" }}
                    spellCheck={false} />
                </div>
              ))}
              <button style={{ ...btn(false), fontSize: 10, padding: "3px 9px" }}
                onClick={() => { applyBg1(DEFAULT_BG1); applyBg2(DEFAULT_BG2); }}>↺ Reset</button>
            </div>
          )}
        </div>

        {/* ── BOTTOM-RIGHT: Other ──────────────────────────────────── */}
        <div style={{ background: C.panelDeep }}>
          <SectionHeader label="Other" open={otherOpen} onToggle={() => setOtherOpen(o => !o)} />

          {otherOpen && (
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", flexWrap: "wrap" }}>
              <button style={btn(false, C.danger, "rgba(248,113,113,0.14)")}
                onClick={() => { if (confirm("Clear the whole grid?")) setGrid(Array.from({ length: GRID_H }, () => Array(GRID_W).fill(null))); }}>
                Clear
              </button>
              <button style={btn(false, C.soft, C.softDim)} onClick={() => setSeedOpen(true)}>Seed</button>
              <button style={btn(false, C.soft, C.softDim)} onClick={doExport}>Download</button>
            </div>
          )}
        </div>

      </div>

      {/* ══ CANVAS ═══════════════════════════════════════════════════ */}
      <div style={{ flex: 1, overflow: "hidden", minHeight: 0 }}>
        <div ref={scrollRef}
          style={{ width: "100%", height: "100%", overflow: "auto", background: "#1a0c04" }}
          onWheel={onWheel}
          onMouseUp={() => { if (painting && commitOnUpRef.current) commitOnUpRef.current(); setPainting(false); }}
          onMouseLeave={() => { if (painting && commitOnUpRef.current) commitOnUpRef.current(); setPainting(false); }}
        >
          {/* Centre wrapper */}
          <div style={{ padding: 20, display: "flex", alignItems: "flex-start", justifyContent: "center", minWidth: "min-content", minHeight: "100%" }}>
            <div style={{ position: "relative", width: gW, height: (GRID_H + 2) * CELL * zoom, flexShrink: 0, margin: "0 auto" }}>

              {/* Checkerboard — offset by one CELL row for export padding */}
              {Array.from({ length: GRID_H }).map((_, r) =>
                Array.from({ length: GRID_W }).map((__, c) => (
                  <div key={`${r}-${c}`}
                    style={{
                      position: "absolute",
                      left: c * CELL * zoom,
                      top: (r + 1) * CELL * zoom,
                      width: CELL * zoom, height: CELL * zoom,
                      background: (r + c) % 2 === 0 ? bg1 : bg2,
                    }}
                    onMouseDown={e => onCell(r, c, e)}
                    onMouseMove={e => onCell(r, c, e)}
                  />
                ))
              )}

              {/* Tile images */}
              {grid.map((row, r) =>
                row.map((id, c) => {
                  const t = id && getTile(id); if (!t) return null;
                  return (
                    <img key={`t${r}-${c}`} src={t.src} alt="" draggable={false}
                      style={{
                        position: "absolute",
                        left: c * CELL * zoom,
                        top: (r + 1 + 0.5) * CELL * zoom,
                        width: CELL * zoom, height: "auto",
                        transform: "translateY(-50%)",
                        pointerEvents: "none", imageRendering: "pixelated",
                        zIndex: r + 1,
                      }}
                    />
                  );
                })
              )}

              {/* Selection preview overlay — lightweight SVG, no real write to grid state */}
              {(previewCells || rectPreview) && (
                <svg
                  style={{
                    position: "absolute",
                    left: 0,
                    top: CELL * zoom,
                    width: gW,
                    height: gH,
                    pointerEvents: "none",
                    zIndex: 250,
                    overflow: "visible",
                  }}
                >
                  {/* Single / line mode: one rect per highlighted cell */}
                  {previewCells && previewCells.map(([r, c]) => (
                    <rect
                      key={`${r},${c}`}
                      x={c * CELL * zoom}
                      y={r * CELL * zoom}
                      width={CELL * zoom}
                      height={CELL * zoom}
                      fill="rgba(255,255,255,0.22)"
                      stroke="rgba(255,255,255,0.55)"
                      strokeWidth="1.5"
                    />
                  ))}
                  {/* Rect mode: bounding-box highlight */}
                  {rectPreview && (
                    <rect
                      x={rectPreview.c1 * CELL * zoom}
                      y={rectPreview.r1 * CELL * zoom}
                      width={(rectPreview.c2 - rectPreview.c1 + 1) * CELL * zoom}
                      height={(rectPreview.r2 - rectPreview.r1 + 1) * CELL * zoom}
                      fill="rgba(255,255,255,0.22)"
                      stroke="rgba(255,255,255,0.55)"
                      strokeWidth="1.5"
                      rx="2"
                    />
                  )}
                </svg>
              )}

              {/* Mirror guide lines — SVG overlay positioned over the grid area */}
              {showGuides && (mirrorV || mirrorH || mirrorD) && (
                <svg
                  style={{
                    position: "absolute",
                    left: 0,
                    top: CELL * zoom,   // grid starts at row offset
                    width: gW,
                    height: gH,
                    pointerEvents: "none",
                    zIndex: 200,
                    overflow: "visible",
                  }}
                >
                  {/* Vertical mirror — line at horizontal centre */}
                  {mirrorV && (
                    <line
                      x1={gW / 2} y1={0}
                      x2={gW / 2} y2={gH}
                      stroke={C.pale} strokeWidth="2" opacity="0.7"
                      strokeDasharray="6 3"
                    />
                  )}
                  {/* Horizontal mirror — line at vertical centre */}
                  {mirrorH && (
                    <line
                      x1={0}  y1={gH / 2}
                      x2={gW} y2={gH / 2}
                      stroke={C.soft} strokeWidth="2" opacity="0.7"
                      strokeDasharray="6 3"
                    />
                  )}
                  {/* Diagonal (central) — line from bottom-left to top-right */}
                  {mirrorD && (
                    <line
                      x1={0}  y1={gH}
                      x2={gW} y2={0}
                      stroke={C.accentBright} strokeWidth="2" opacity="0.6"
                      strokeDasharray="8 4"
                    />
                  )}
                </svg>
              )}

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
