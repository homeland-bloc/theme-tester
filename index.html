    setHistory(h => {
      const trimmed = h.slice(0, histIdx + 1);
      const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
      return [...capped, snap];
    });
    setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
  }, [histIdx, grid, bg1, bg2]);

  const loadFiles = files => {
    const imageFiles = [...files].filter(f => f.type.startsWith("image/"));
    if (!imageFiles.length) return;
    let loaded = 0;
    const MAX_TILE_DIM = 256; // scale down large images to cap at this dimension
    imageFiles.forEach(f => {
      const r = new FileReader();
      r.onload = e => {
        if (nextId.current > USER_ID_MAX) { console.warn("User tile limit reached (IDs 500–699)"); return; }
        const id = nextId.current++;
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, MAX_TILE_DIM / Math.max(img.width, img.height, 1));
          const w = Math.max(1, Math.round(img.width * scale));
          const h = Math.max(1, Math.round(img.height * scale));
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const scaledDataUrl = canvas.toDataURL('image/png');
          canvas.toBlob(blob => {
            const blobSrc = URL.createObjectURL(blob);
            setUserTiles(prev => [...prev, { id, src: scaledDataUrl, blobSrc }]);
            loaded++;
            if (loaded === imageFiles.length) {
              setUploadFlash(imageFiles.length);
              if (uploadTimerRef.current) clearTimeout(uploadTimerRef.current);
              uploadTimerRef.current = setTimeout(() => setUploadFlash(0), 2500);
            }
          }, 'image/png');
        };
        img.src = e.target.result;
      };
      r.readAsDataURL(f);
    });
  };

  const deleteTile = id => {
    setUserTiles(p => p.filter(t => t.id !== id));
    setAtlasTiles(p => p.filter(t => t.id !== id));
    if (sel === id) setSel(null);
    setInfoTile(null);
  };

  // ── Atlas helpers ─────────────────────────────────────────────────
  const nextAtlasId = () => {
    const used = new Set(atlasTiles.map(t => t.id));
    for (let id = ATLAS_ID_START; id <= ATLAS_ID_MAX; id++) {
      if (id >= USER_ID_START && id <= USER_ID_MAX) continue; // skip user tile range
      if (!used.has(id)) return id;
    }
    return null; // full
  };

  const fetchAtlasDir = async (path) => {
    const url = `https://api.github.com/repos/She-Fairy/atlas-horizon/contents/Resources${path ? '/' + path : ''}`;
    if (atlasApiCache.has(url)) return atlasApiCache.get(url);
    const p = fetch(url).then(async r => {
      if (r.status === 403 || r.status === 429) throw new Error("rate_limit");
      if (!r.ok) throw new Error("fetch_error");
      return r.json();
    });
    atlasApiCache.set(url, p);
    const resolved = await p;
    atlasApiCache.set(url, resolved); // replace Promise with resolved data
    return resolved;
  };

  const sampleImageCenter = async (url) => {
    try {
      const blob = await fetch(url).then(r => r.blob());
      const blobUrl = URL.createObjectURL(blob);
      return await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width; canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const [r, g, b] = ctx.getImageData(Math.floor(img.width/2), Math.floor(img.height/2), 1, 1).data;
          URL.revokeObjectURL(blobUrl);
          resolve(`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`);
        };
        img.onerror = () => { URL.revokeObjectURL(blobUrl); resolve(null); };
        img.src = blobUrl;
      });
    } catch { return null; }
  };

  const addAtlasTile = (filePath) => {
    const id = nextAtlasId();
    if (id === null) { alert("Atlas tile limit reached (IDs 300–499). Remove some atlas tiles first."); return; }
    const src = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${filePath}`;
    const baseName = filePath.split('/').pop().replace(/\.[^.]+$/, '');
    const folderPath = filePath.split('/').slice(0, -1).join('/');
    const codename = folderPath ? `${folderPath}_${baseName}` : baseName;
    const tile = { id, src, isDefault: false, isAtlas: true, codename, baseCodename: baseName };
    if (folderPath) tile.atlasTilesetGroup = folderPath;
    // Settings inheritance
    if (filePath.includes('/Water/')) {
      setRotatableMap(prev => ({ ...prev, [id]: true }));
    }
    if (filePath.includes('/Objectives/')) {
      setPriorityTiles(prev => ({ ...prev, [id]: true }));
    }
    setAtlasTiles(prev => [...prev, tile]);
  };

  const addAtlasTilesetFolder = async (folderName, files) => {
    const imageFiles = files.filter(f => f.type === 'file' && /\.(png|jpg|jpeg|gif|webp|svg|bmp)$/i.test(f.name));
    for (const file of imageFiles) {
      // path relative to Resources/ (file.path is like "Resources/Water/foo.png", strip "Resources/")
      const relPath = file.path.replace(/^Resources\//, '');
      // Check if already added
      const src = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${relPath}`;
      setAtlasTiles(prev => {
        if (prev.some(t => t.src === src)) return prev;
        const id = (() => {
          const used = new Set(prev.map(t => t.id));
          for (let i = ATLAS_ID_START; i < 500; i++) { if (!used.has(i)) return i; }
          return null;
        })();
        if (id === null) return prev;
        const fileBaseName = relPath.split('/').pop().replace(/\.[^.]+$/, '');
        const fileFolderPath = relPath.split('/').slice(0, -1).join('/');
        const codename = fileFolderPath ? `${fileFolderPath}_${fileBaseName}` : fileBaseName;
        const tile = { id, src, isDefault: false, isAtlas: true, atlasTilesetGroup: fileFolderPath || folderName, codename, baseCodename: fileBaseName };
        return [...prev, tile];
      });
      // Settings inheritance
      if (relPath.includes('/Water/')) setRotatableMap(prev => ({ ...prev })); // handled per-tile below
    }
    // After batch-add, apply settings inheritance using the folder path
    imageFiles.forEach(file => {
      const relPath = file.path.replace(/^Resources\//, '');
      const src = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${relPath}`;
      setAtlasTiles(prev => {
        const tile = prev.find(t => t.src === src);
        if (!tile) return prev;
        if (relPath.includes('/Water/')) setRotatableMap(rm => ({ ...rm, [tile.id]: true }));
        if (relPath.includes('/Objectives/')) setPriorityTiles(pt => ({ ...pt, [tile.id]: true }));
        return prev;
      });
    });
  };

  const navigateAtlas = async (path) => {
    setAtlasPath(path);
    setAtlasItems(null);
    setAtlasError("");
    setAtlasLoading(true);
    try {
      const data = await fetchAtlasDir(path);
      setAtlasItems(Array.isArray(data) ? data : []);
    } catch (err) {
      if (err.message === "rate_limit") setAtlasError("GitHub rate limit reached. Try again later.");
      else setAtlasError("Failed to load folder contents.");
      setAtlasItems([]);
    } finally {
      setAtlasLoading(false);
    }
  };

  // ── Atlas Tileset system ──────────────────────────────────────────
  // Derive display name and codename prefix from a raw folder name
  // e.g. "Z_Escape_Room" → displayName "Escape Room", codename "Escape_Room"
  //      "Escape_Room"   → displayName "Escape Room", codename "Escape_Room"
  const atlasTilesetMeta = (rawName) => {
    const isCommunity = rawName.startsWith("Z_");
    const stripped = rawName.replace(/^Z_/, "");
    // Split camelCase: "BrawlClub" → "Brawl Club", "UnderwaterTheme" → "Underwater Theme"
    const camelSplit = stripped.replace(/([a-z0-9])([A-Z])/g, "$1 $2");
    // Replace underscores with spaces, then remove "Theme" suffix
    const displayName = camelSplit.replace(/_/g, " ").replace(/ Theme$/, "").trim();
    return { name: rawName, displayName, codename: stripped, isCommunity };
  };

  // Build Atlas tileset list from bundled constant — no API call needed.
  const fetchAtlasTilesetList = () => {
    if (atlasTilesetsListCache.data) return atlasTilesetsListCache.data;
    const list = ATLAS_TILESET_NAMES.map(atlasTilesetMeta);
    atlasTilesetsListCache.data = list;
    return list;
  };

  // Get BG colours for any tileset (Ophelia or Atlas) — single source of truth
  const getTilesetBgColors = (name) => {
    if (OPHELIA_BG[name]) return OPHELIA_BG[name];
    return atlasTilesetBgColors[name] ?? null;
  };

  // Load and cache BG colours for an Atlas tileset by sampling BGLight/BGDark images
  const loadAtlasTilesetBgColors = async (tilesetName) => {
    if (atlasTilesetBgColors[tilesetName]) return atlasTilesetBgColors[tilesetName];
    const base = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${tilesetName}`;
    const [bg1Val, bg2Val] = await Promise.all([
      sampleImageCenter(`${base}/BGLight.png`),
      sampleImageCenter(`${base}/BGDark.png`),
    ]);
    const colors = { bg1: bg1Val ?? null, bg2: bg2Val ?? null };
    setAtlasTilesetBgColors(prev => {
      const next = { ...prev, [tilesetName]: colors };
      try { localStorage.setItem("oph_atlas_ts_bg", JSON.stringify(next)); } catch {}
      return next;
    });
    return colors;
  };

  // Load all tiles for an Atlas tileset into atlasTiles state
  const ATLAS_SUBFOLDERS = ["Fence", "Rope", "Water", "Gamemode_Specifics"];
  const ATLAS_TILES_FOLDER = "Tiles";
  const ATLAS_WATER_FILES    = ["00001011.png", "01111111.png", "01101011.png", "11111111.png"];
  const ATLAS_TILES_FILES    = ["Barrel.png", "Bush.png", "Cactus.png", "Crate.png", "Skull.png", "Wall.png", "Wall2.png"];
  const ATLAS_ROPE_FILES     = ["Post.png", "Post_R.png", "Post_T.png", "Post_TR.png"];
  const ATLAS_FENCE_SIMPLE_FILES  = ["Fence.png", "Horizontal.png", "Vertical.png"];
  const ATLAS_FENCE_COMPLEX_FILES = ["0001.png", "0010.png", "0011.png", "0100.png", "0101.png", "1000.png", "1001.png", "1010.png", "1100.png", "Fence.png"];
  const ATLAS_GAMEMODE_FILES = ["Brawl_Ball.png", "Gem_Grab.png", "Heist.png"];
  // Canonical order for flat tiles in Tiles/ folder (case-insensitive base name match)
  const ATLAS_FLAT_ORDER = ["wall1", "wall", "wall2", "crate", "barrel", "bush1", "bush", "bush2", "skull", "breakable", "cactus"];
  const getAtlasFlatOrder = base => { const i = ATLAS_FLAT_ORDER.indexOf(base.toLowerCase()); return i >= 0 ? i : ATLAS_FLAT_ORDER.length; };
  const loadAtlasTileset = async (tilesetName) => {
    // Deduplicate concurrent loads of the same tileset
    if (atlasTilesetLoadInFlight.has(tilesetName)) return atlasTilesetLoadInFlight.get(tilesetName);
    const promise = (async () => {
    const meta = atlasTilesetMeta(tilesetName);
    const imageRe = /\.(png|jpg|jpeg|gif|webp|svg|bmp)$/i;
    const tilesToAdd = []; // { relPath, atlasFolderName, folderLabel, codename }

    try {
      // Probe for fence variant: simple (Fence/Horizontal/Vertical) vs complex (binary-named files).
      // A single HEAD request to Horizontal.png is enough — no GitHub API needed.
      const rawBase = "https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources";
      const fenceProbe = await fetch(`${rawBase}/${tilesetName}/Fence/Horizontal.png`, { method: "HEAD" });
      const fenceFilenames = fenceProbe.ok ? ATLAS_FENCE_SIMPLE_FILES : ATLAS_FENCE_COMPLEX_FILES;

      // Flat tiles from Tiles/ — hardcoded list, sorted by canonical order
      [...ATLAS_TILES_FILES].sort((a, b) => getAtlasFlatOrder(a.replace(/\.[^.]+$/, "")) - getAtlasFlatOrder(b.replace(/\.[^.]+$/, ""))).forEach(filename => {
        const base = filename.replace(/\.[^.]+$/, "");
        tilesToAdd.push({ relPath: `${tilesetName}/${ATLAS_TILES_FOLDER}/${filename}`, atlasFolderName: null, folderLabel: null, codename: `${meta.codename}_${base}` });
      });

      // Folder-based tiles — all hardcoded (Fence variant detected via probe, Rope always 4 posts)
      const ATLAS_WATER_CNS = ["WaterBend", "WaterCorner", "WaterLine", "WaterFill"];
      [["Fence", fenceFilenames], ["Rope", ATLAS_ROPE_FILES], ["Water", ATLAS_WATER_FILES], ["Gamemode_Specifics", ATLAS_GAMEMODE_FILES]].forEach(([sub, filenames]) => {
        const folderLabel = sub === "Gamemode_Specifics" ? "Objective" : sub;
        filenames.forEach((filename, i) => {
          const base = filename.replace(/\.[^.]+$/, "");
          const baseCodenameOverride = sub === "Water" ? (ATLAS_WATER_CNS[i] ?? null) : null;
          tilesToAdd.push({ relPath: `${tilesetName}/${sub}/${filename}`, atlasFolderName: sub, folderLabel, codename: `${meta.codename}_${base}`, baseCodenameOverride });
        });
      });

      // Read current state synchronously via ref (avoids calling state setters inside updaters)
      const currentTiles = atlasTilesRef.current;

      if (tilesToAdd.length === 0) return currentTiles.filter(t => t.atlasTilesetName === tilesetName);
      const existingForTs = currentTiles.filter(t => t.atlasTilesetName === tilesetName);
      const srcSet = new Set(currentTiles.map(t => t.src));
      const usedIds = new Set(currentTiles.map(t => t.id));
      const newTiles = [];
      let nextId = ATLAS_ID_START;
      for (const { relPath, atlasFolderName, folderLabel, codename, baseCodenameOverride } of tilesToAdd) {
        const src = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${relPath}`;
        if (srcSet.has(src)) continue;
        // Skip user tile ID range (500-699) and find next free atlas ID
        while ((usedIds.has(nextId) || (nextId >= USER_ID_START && nextId <= USER_ID_MAX)) && nextId <= ATLAS_ID_MAX) nextId++;
        if (nextId > ATLAS_ID_MAX) break;
        usedIds.add(nextId);
        const scopedKey = atlasFolderName ? `${tilesetName}/${atlasFolderName}` : null;
        const tile = {
          id: nextId++, src,
          isDefault: false, isAtlas: true,
          atlasTilesetName: tilesetName,
          atlasFolderName,
          folderKey: scopedKey,
          folderLabel,
          codename,
          baseCodename: baseCodenameOverride ?? relPath.split("/").pop().replace(/\.[^.]+$/, ""),
        };
        newTiles.push(tile);
        srcSet.add(src);
      }
      if (newTiles.length === 0) return existingForTs;
      // Batch-add tiles (separate from settings inheritance calls — never call setters inside updaters)
      setAtlasTiles(prev => [...prev, ...newTiles]);
      // Apply settings inheritance as independent state updates
      const waterIds   = newTiles.filter(t => t.atlasFolderName === "Water").map(t => t.id);
      const objIds     = newTiles.filter(t => t.atlasFolderName === "Gamemode_Specifics").map(t => t.id);
      if (waterIds.length > 0)  setRotatableMap(rm => { const n = { ...rm }; waterIds.forEach(id => { n[id] = true; }); return n; });
      if (objIds.length > 0)    setPriorityTiles(pt => { const n = { ...pt }; objIds.forEach(id => { n[id] = true; }); return n; });
      return [...existingForTs, ...newTiles];
    } catch (err) {
      if (err.message === "rate_limit") setAtlasRateLimitHit(true);
      console.warn("Failed to load Atlas tileset:", tilesetName, err);
      return atlasTilesRef.current.filter(t => t.atlasTilesetName === tilesetName);
    }
    })();
    atlasTilesetLoadInFlight.set(tilesetName, promise);
    promise.finally(() => atlasTilesetLoadInFlight.delete(tilesetName));
    return promise;
  };

  // Returns [pos] — just positions (used by existing drag/drop code)
  const getMirrorPositions = useCallback((r, c) => {
    return getMirrorMeta(r, c).map(m => m.pos);
  }, [mirrorV, mirrorH, mirrorD, gridW, gridH]); // eslint-disable-line

  // Returns [{pos, fV, fH, fD}] — positions + which mirror flags apply
  function getMirrorMeta(r, c) {
    const cR = (gridH - 1) / 2, cC = (gridW - 1) / 2;
    const oR = r - cR, oC = c - cC;
    const entries = [{ pos: [r, c], fV: false, fH: false, fD: false }];
    if (mirrorV) entries.push({ pos: [r, gridW - 1 - c],               fV: true,  fH: false, fD: false });
    if (mirrorH) entries.push({ pos: [gridH - 1 - r, c],               fV: false, fH: true,  fD: false });
    if (mirrorD) entries.push({ pos: [Math.round(cR - oR), Math.round(cC - oC)], fV: false, fH: false, fD: true });
    if (mirrorV && mirrorD) entries.push({ pos: [Math.round(cR - oR), gridW - 1 - c],   fV: true,  fH: false, fD: true });
    if (mirrorH && mirrorD) entries.push({ pos: [gridH - 1 - r, Math.round(cC - oC)],   fV: false, fH: true,  fD: true });
    if (mirrorV && mirrorH && mirrorD) entries.push({ pos: [gridH - 1 - r, gridW - 1 - c], fV: true, fH: true, fD: true });
    const seen = new Set();
    return entries.filter(({ pos: [pr, pc] }) => {
      if (pr < 0 || pr >= gridH || pc < 0 || pc >= gridW) return false;
      const k = `${pr},${pc}`; if (seen.has(k)) return false; seen.add(k); return true;
    });
  }

  // Flip a rotation step (0-3) based on mirror axes applied.
  // Rotation convention: 0=NW corner, 1=NE corner, 2=SE corner, 3=SW corner
  //   (equivalently, rotating a tile 90° CW each step)
  // fV = horizontal flip (left↔right): swaps 0↔1 and 2↔3  (r XOR 1)
  // fH = vertical flip (top↔bottom):   swaps 0↔3 and 1↔2  (3 - r)
  // fD = 180° point reflection:         swaps 0↔2 and 1↔3  ((r+2) % 4)
  const applyRotMirror = (rot, fV, fH, fD) => {
    let r = rot;
    if (fV) r ^= 1;            // horizontal flip: 0↔1, 2↔3
    if (fH) r = 3 - r;         // vertical flip:   0↔3, 1↔2
    if (fD) r = (r + 2) % 4;   // 180° rotation:   0↔2, 1↔3
    return r;
  };

  // Returns all grid cells on a straight line between two points (inclusive), using Bresenham's algorithm.
  const bresenhamLine = (r0, c0, r1, c1) => {
    const cells = [];
    let dr = Math.abs(r1 - r0), dc = Math.abs(c1 - c0);
    const sr = r0 < r1 ? 1 : -1, sc = c0 < c1 ? 1 : -1;
    let err = dr - dc, r = r0, c = c0;
    while (true) {
      cells.push([r, c]);
      if (r === r1 && c === c1) break;
      const e2 = 2 * err;
      if (e2 > -dc) { err -= dc; r += sr; }
      if (e2 < dr)  { err += dr; c += sc; }
    }
    return cells;
  };

  const paintCells = useCallback((r, c) => {
    const meta   = (getMirrorMetaRef.current ?? getMirrorMeta)(r, c);
    const tileId = eraser ? null : (sel ?? null);
    const rot    = tileId ? ((cardRotationsRef.current[tileId] ?? 0) / 90 % 4) : 0;
    const ms     = mirrorSettingsRef.current;
    setGrid(prev => {
      const g = prev.map(row => [...row]);
      meta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
        // Spawn swapping: applies when fH (top-bottom) or fD (diagonal) flips teams
        let id = tileId;
        if (id && ms.mirrorSpawns && (fH || fD)) id = swapSpawnId(id);
        g[pr][pc] = eraser ? null : id;
      });
      return g;
    }, true);
    if (!eraser && tileId) {
      const tile = getTile(tileId);
      const isTileRot = tile ? isTileRotatable(tile) : false;
      const effectiveRot = isTileRot ? rot : 0;
      setGridRotations(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          const r = (ms.mirrorRotation && isTileRot) ? applyRotMirror(effectiveRot, fV, fH, fD) : effectiveRot;
          if (r !== 0) n[`${pr},${pc}`] = r; else delete n[`${pr},${pc}`];
        });
        return n;
      });
      // Apply flip state from card flip mode — compute effective mode respecting spin/flip capability
      const canSpin = tile ? isTileRotatable(tile) : false;
      const canFlip = tile ? (allowFlipMapRef.current[tileId] !== undefined ? allowFlipMapRef.current[tileId] : isDefaultFlippable(tile)) : false;
      const rawFMode = cardFlipModesRef.current[tileId] ?? 'spin';
      const flipMode = !(canSpin || canFlip) ? 'spin' : (!canFlip ? 'spin' : (!canSpin ? 'flip' : rawFMode));
      const flipStep = (flipMode === 'flip') ? (cardFlipStepsRef.current[tileId] ?? 0) : 0;
      setGridFlips(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc] }) => {
          if (flipStep) n[`${pr},${pc}`] = flipStep; else delete n[`${pr},${pc}`];
        });
        return n;
      });
    } else if (eraser) {
      setGridRotations(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        return n;
      });
      setGridFlips(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        return n;
      });
    }
    // Update per-cell offset overrides for mirror offset feature
    setGridOffsets(prev => {
      const n = { ...prev };
      if (eraser) {
        meta.forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
      } else if (tileId) {
        meta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          const over = computeMirrorOffsetOverride(tileId, fV, fH, fD);
          if (over !== undefined) { n[`${pr},${pc}`] = over; } else { delete n[`${pr},${pc}`]; }
        });
      }
      return n;
    });
  }, [eraser, sel, mirrorV, mirrorH, mirrorD, setGrid, tiles]);

  useEffect(() => { paintRef.current        = paintCells;           }, [paintCells]);
  useEffect(() => { cardRotationsRef.current   = cardRotations;        }, [cardRotations]);
  useEffect(() => { gridRotationsRef.current   = gridRotations;        }, [gridRotations]);
  useEffect(() => { gridFlipsRef.current       = gridFlips;            }, [gridFlips]);
  useEffect(() => { mirrorSettingsRef.current  = mirrorSettings;       }, [mirrorSettings]);
  useEffect(() => { pushHistRef.current = pushHistorySnapshot;  }, [pushHistorySnapshot]);

  // Commit an array of [r,c] cells to the grid at once (used by line and rect modes).
  // Uses refs for sel/eraser so it reads the correct values at mouseup time.
  const commitMultipleCells = useCallback((cells) => {
    if (!cells.length) return;
    const tileId   = selRef.current;
    const isEraser = eraserRef.current;
    // Set descriptive history label
    if (isEraser) {
      histLabelRef.current = "Erase";
    } else if (tileId === SPACE_TILE_ID) {
      histLabelRef.current = "Draw Space";
    } else if (tileId === WARN_TILE_ID) {
      histLabelRef.current = "Draw Warn";
    } else if (tileId !== null) {
      const paintTile = tiles.find(t => t.id === tileId);
      if (paintTile) {
        const name = paintTile.folderLabel
          ?? deriveCodename(paintTile.src)
          ?? (paintTile.codename ?? '').split('_').slice(1).join('-')
          ?? paintTile.src?.split('/').pop().replace(/\.[^.]+$/, '');
        const ts = paintTile.tilesetName ?? paintTile.atlasTilesetName ?? null;
        histLabelRef.current = ts ? `Draw ${name} (${ts})` : (name ? `Draw ${name}` : "Draw");
      }
    }
    const rot      = tileId ? ((cardRotationsRef.current[tileId] ?? 0) / 90 % 4) : 0;
    const ms       = mirrorSettingsRef.current;
    const placedMeta = [];
    setGrid(prev => {
      const g = prev.map(row => [...row]);
      const metaFnC = getMirrorMetaRef.current ?? getMirrorMeta;
      cells.forEach(([r, c]) => {
        metaFnC(r, c).forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          if (!isEraser && g[pr][pc] !== null && !ms.allowSwap) return;
          let id = isEraser ? null : (tileId ?? null);
          if (id && ms.mirrorSpawns && (fH || fD)) id = swapSpawnId(id);
          g[pr][pc] = id;
          if (!isEraser && tileId) placedMeta.push({ pos: [pr, pc], fV, fH, fD });
        });
      });
      return g;
    });
    if (!isEraser && tileId) {
      const tile = getTile(tileId);
      const isTileRot = tile ? isTileRotatable(tile) : false;
      const effectiveRot = isTileRot ? rot : 0;
      setGridRotations(prev => {
        const n = { ...prev };
        placedMeta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          const r = (ms.mirrorRotation && isTileRot) ? applyRotMirror(effectiveRot, fV, fH, fD) : effectiveRot;
          if (r !== 0) n[`${pr},${pc}`] = r; else delete n[`${pr},${pc}`];
        });
        return n;
      });
      const canSpinC = tile ? isTileRotatable(tile) : false;
      const canFlipC = tile ? (allowFlipMapRef.current[tileId] !== undefined ? allowFlipMapRef.current[tileId] : isDefaultFlippable(tile)) : false;
      const rawFModeC = cardFlipModesRef.current[tileId] ?? 'spin';
      const flipMode = !(canSpinC || canFlipC) ? 'spin' : (!canFlipC ? 'spin' : (!canSpinC ? 'flip' : rawFModeC));
      const flipStep = (flipMode === 'flip') ? (cardFlipStepsRef.current[tileId] ?? 0) : 0;
      setGridFlips(prev => {
        const n = { ...prev };
        placedMeta.forEach(({ pos: [pr, pc] }) => {
          if (flipStep) n[`${pr},${pc}`] = flipStep; else delete n[`${pr},${pc}`];
        });
        return n;
      });
    } else if (isEraser) {
      const metaFnE = getMirrorMetaRef.current ?? getMirrorMeta;
      setGridRotations(prev => {
        const n = { ...prev };
        cells.forEach(([r, c]) => {
          metaFnE(r, c).forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        });
        return n;
      });
      setGridFlips(prev => {
        const n = { ...prev };
        const metaFnF = getMirrorMetaRef.current ?? getMirrorMeta;
        cells.forEach(([r, c]) => {
          metaFnF(r, c).forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        });
        return n;
      });
    }
    // Per-cell offset overrides
    setGridOffsets(prev => {
      const n = { ...prev };
      if (isEraser) {
        const metaFnO = getMirrorMetaRef.current ?? getMirrorMeta;
        cells.forEach(([r, c]) => {
          metaFnO(r, c).forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        });
      } else if (tileId) {
        placedMeta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          const over = computeMirrorOffsetOverride(tileId, fV, fH, fD);
          if (over !== undefined) { n[`${pr},${pc}`] = over; } else { delete n[`${pr},${pc}`]; }
        });
      }
      return n;
    });
  }, [mirrorV, mirrorH, mirrorD, setGrid, tiles]);

  // Called on mouseup / touch-end to finalise the current selection.
  // All three modes defer their grid write to this point.
  const commitSelectionOnMouseUp = useCallback(() => {
    const mode = selectionModeRef.current;

    // In highlight mode, commit to highlightedCells instead of the grid
    if (highlightModeRef.current) {
      let newCells = [];
      if (mode === 'single' || mode === 'line') {
        newCells = [...hoveredTilesRef.current].map(k => k.split(',').map(Number));
      } else if (mode === 'rect') {
        if (selectionStartRef.current) {
          const [sr, sc] = selectionStartRef.current;
          const [er, ec] = selectionEndRef.current ?? [sr, sc];
          for (let r = Math.min(sr, er); r <= Math.max(sr, er); r++)
            for (let c = Math.min(sc, ec); c <= Math.max(sc, ec); c++)
              newCells.push([r, c]);
        }
      } else if (mode === 'fill') {
        newCells = [...hoveredTilesRef.current].map(k => k.split(',').map(Number));
      }
      if (newCells.length) {
        // Track primary cells (only what the user drew — no mirrors)
        const primaryFinal = new Set(primaryHighlightedCellsRef.current);
        newCells.forEach(([r, c]) => primaryFinal.add(`${r},${c}`));
        setPrimaryHighlightedCells(primaryFinal);
        primaryHighlightedCellsRef.current = primaryFinal;
        // Apply mirroring: include mirror positions of each highlighted cell
        const getMirror = getMirrorRef.current;
        const mirroredCells = [];
        newCells.forEach(([r, c]) => {
          mirroredCells.push([r, c]);
          if (getMirror) {
            getMirror(r, c).forEach(pos => mirroredCells.push(pos));
          }
        });
        // Build final highlight synchronously so we can push it to history right away
        const finalHighlight = new Set(highlightedCellsRef.current);
        mirroredCells.forEach(([r, c]) => finalHighlight.add(`${r},${c}`));
        setHighlightedCells(finalHighlight);
        highlightedCellsRef.current = finalHighlight;
        // Push AFTER state so undo restores the pre-selection state (tile stays, highlight clears)
        // Update histIdxRef synchronously so rapid subsequent events see the correct index
        const selNextIdx = Math.min(histIdxRef.current + 1, MAX_HISTORY - 1);
        histIdxRef.current = selNextIdx;
        setHistory(h => {
          const trimmed = h.slice(0, selNextIdx);
          const capped = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
          return [...capped, { grid: gridRef.current, w: gridWRef.current, h: gridHRef.current, tileset: activeTilesetRef.current, shownTilesets: shownTilsetsRef.current, shownAtlasTilesets: shownAtlasTilesetsRef.current, bg1: bg1Ref.current, bg2: bg2Ref.current, highlight: [...finalHighlight], primaryHighlight: [...primaryFinal], rots: gridRotationsRef.current, flips: gridFlipsRef.current, label: "Highlight" }];
        });
        setHistIdx(selNextIdx);
      }
      setRectPreview(null);
      setPreviewCells(null);
      selectionStartRef.current = null;
      selectionEndRef.current   = null;
      hoveredTilesRef.current   = new Set();
      return;
    }

    if (mode === 'single') {
      // place tile at the end point (where the mouse was released)
      if (selectionEndRef.current) {
        commitMultipleCells([selectionEndRef.current]);
      }
    } else if (mode === 'line') {
      const cells = [...hoveredTilesRef.current].map(k => k.split(',').map(Number));
      commitMultipleCells(cells);
    } else if (mode === 'rect') {
      if (!selectionStartRef.current) return;
      const [sr, sc] = selectionStartRef.current;
      const [er, ec] = selectionEndRef.current ?? [sr, sc];
      const cells = [];
      for (let r = Math.min(sr, er); r <= Math.max(sr, er); r++)
        for (let c = Math.min(sc, ec); c <= Math.max(sc, ec); c++)
          cells.push([r, c]);
      commitMultipleCells(cells);
    } else if (mode === 'fill') {
      const cells = [...hoveredTilesRef.current].map(k => k.split(',').map(Number));
      commitMultipleCells(cells);
    }

          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Vertical</span>
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOy(-1)}>−</button>
            <input type="number" value={oyInput} onChange={e => setOyInput(e.target.value)}
              onBlur={() => commitOffset()} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
              style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none", textAlign: "center" }} />
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOy(+1)}>+</button>
            {(() => { const isDefault = currentOff.oy === defaultOff.oy; const stl = isDefault ? { color: "#4ade80", borderColor: "#4ade80", background: "rgba(74,222,128,0.12)" } : { color: "#f97316", borderColor: "#f97316", background: "rgba(249,115,22,0.12)" }; return (
              <button style={{ ...btn(false), fontSize: 10, padding: "3px 7px", marginLeft: "auto", ...stl }}
                disabled={isDefault} title={isDefault ? "Already at default" : "Reset to default"}
                onClick={() => { setOyInput(String(defaultOff.oy)); setTileOffsets(prev => { const n = {...prev}; const o = {...(prev[t.id] ?? {}), oy: defaultOff.oy}; n[t.id] = o; return n; }); }}>Reset</button>
            ); })()}
          </div>

          {/* Allow spinning */}
          {(() => {
            const curSpin = isTileRotatable(t);
            const isSpinDefault = curSpin === isDefaultRotatable(t);
            const spinColor = isSpinDefault ? "#4ade80" : "#f97316";
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={curSpin}
                  onChange={ev => {
                    setRotatableMap(prev => ({ ...prev, [t.id]: ev.target.checked }));
                    if (!ev.target.checked) {
                      setCardRotations(prev => { const n = {...prev}; delete n[t.id]; return n; });
                      // If flip is also off, clear flip state
                      if (!isFlipAllowed(t)) {
                        setCardFlipSteps(prev => { const n = {...prev}; delete n[t.id]; return n; });
                        setCardFlipModes(prev => { const n = {...prev}; delete n[t.id]; return n; });
                      }
                    }
                  }}
                  style={{ width: 14, height: 14, accentColor: isSpinDefault ? "#4ade80" : "#f97316", cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: spinColor }}>Allow spinning 🐬</span>
              </label>
            );
          })()}
          {/* Allow flipping */}
          {(() => {
            const curFlip = isFlipAllowed(t);
            const isFlipDefault = curFlip === isDefaultFlippable(t);
            const flipColor = isFlipDefault ? "#4ade80" : "#f97316";
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={curFlip}
                  onChange={ev => {
                    setAllowFlipMap(prev => ({ ...prev, [t.id]: ev.target.checked }));
                    if (!ev.target.checked) {
                      setCardFlipSteps(prev => { const n = {...prev}; delete n[t.id]; return n; });
                      // If flip mode was active but flip is now off, reset to spin
                      if ((cardFlipModes[t.id] ?? 'flip') === 'flip') {
                        setCardFlipModes(prev => { const n = {...prev}; delete n[t.id]; return n; });
                      }
                    }
                  }}
                  style={{ width: 14, height: 14, accentColor: isFlipDefault ? "#4ade80" : "#f97316", cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: flipColor }}>Allow flipping 🦭</span>
              </label>
            );
          })()}
          {/* Allow mirror offset */}
          {(() => {
            const isMirrorOffDefault = isMirrorOffset(t) === isDefaultMirrorOffset(t);
            const moColor = isMirrorOffDefault ? "#4ade80" : "#f97316";
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={isMirrorOffset(t)}
                  onChange={ev => setMirrorOffsetTiles(prev => ({ ...prev, [t.id]: ev.target.checked }))}
                  style={{ width: 14, height: 14, accentColor: isMirrorOffDefault ? "#4ade80" : "#f97316", cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: moColor }}>Allow mirror offset 🌪️</span>
              </label>
            );
          })()}
          {/* Always render on top */}
          {(() => {
            const topDefault = !!(t.src && TILE_SETTINGS.priority.some(p => t.src.includes(p)));
            const isTopDefault = isPriority === topDefault;
            const topColor = isTopDefault ? "#4ade80" : "#f97316";
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={isPriority}
                  onChange={ev => {
                    setPriorityTiles(prev => { const n = { ...prev }; if (ev.target.checked) n[t.id] = true; else delete n[t.id]; return n; });
                    if (ev.target.checked) setBottomTiles(prev => { const n = { ...prev }; delete n[t.id]; return n; });
                  }}
                  style={{ width: 14, height: 14, accentColor: isTopDefault ? "#4ade80" : "#f97316", cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: topColor }}>Always render on top 🚨</span>
              </label>
            );
          })()}
          {/* Always render on bottom */}
          {(() => {
            const bottomDefault = !!(t.src && TILE_SETTINGS.bottomRender.some(p => t.src.includes(p)));
            const isBottomDefault = !!bottomTiles[t.id] === bottomDefault;
            const botColor = isBottomDefault ? "#4ade80" : "#f97316";
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={!!bottomTiles[t.id]}
                  onChange={ev => {
                    setBottomTiles(prev => { const n = { ...prev }; if (ev.target.checked) n[t.id] = true; else delete n[t.id]; return n; });
                    if (ev.target.checked) setPriorityTiles(prev => { const n = { ...prev }; delete n[t.id]; return n; });
                  }}
                  style={{ width: 14, height: 14, accentColor: isBottomDefault ? "#4ade80" : "#f97316", cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: botColor }}>Always render on bottom ⚓</span>
              </label>
            );
          })()}
          {/* Auto shadow */}
          {(() => {
            const shadowOn = !!autoShadowTiles[t.id];
            const shadowColor = !shadowOn ? "#4ade80" : "#f97316";
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={shadowOn}
                  onChange={ev => setAutoShadowTiles(prev => { const n = { ...prev }; if (ev.target.checked) n[t.id] = true; else delete n[t.id]; return n; })}
                  style={{ width: 14, height: 14, accentColor: !shadowOn ? "#4ade80" : "#f97316", cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: shadowColor }}>Auto shadow 👻</span>
              </label>
            );
          })()}
          {/* Show map count */}
          {(() => {
            const isGlobal = t.codename?.startsWith("Global_");
            const countEnabled = tileCountMap[t.id] !== undefined ? tileCountMap[t.id] : isGlobal;
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={!!countEnabled}
                  onChange={ev => setTileCountMap(prev => ({ ...prev, [t.id]: ev.target.checked }))}
                  style={{ width: 14, height: 14, accentColor: "#34d399", cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: "#34d399" }}>Show map count 🧮</span>
              </label>
            );
          })()}
          {/* Starred shortcut */}
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
            <input type="checkbox" checked={starredTiles.includes(t.id)}
              onChange={() => toggleStar(t.id)}
              style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
            <span style={{ fontSize: 11, color: C.text }}>Starred shortcut ⭐</span>
          </label>

          {!t.isDefault && (
            deleteConfirmId === t.id ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 5, padding: "6px 0" }}>
                <span style={{ fontSize: 11, color: C.danger, textAlign: "center" }}>Delete this tile from the panel?</span>
                <div style={{ display: "flex", gap: 6 }}>
                  <button style={{ ...btn(false), flex: 1, fontSize: 11 }} onClick={() => setDeleteConfirmId(null)}>Cancel</button>
                  <button style={{ ...btn(true, C.danger, "rgba(248,113,113,0.18)"), flex: 1, fontSize: 11 }}
                    onClick={() => { setDeleteConfirmId(null); deleteTile(t.id); }}>Delete</button>
                </div>
              </div>
            ) : (
              <button style={{ ...btn(false, C.danger, "rgba(248,113,113,0.14)"), width: "100%", justifyContent: "center" }}
                onClick={() => setDeleteConfirmId(t.id)}>Delete tile</button>
            )
          )}
          {t.isDefault && (
            <p style={{ fontSize: 11, color: C.muted, textAlign: "center" }}>Default tile — cannot be deleted.</p>
          )}
        </div>
      </div>
    );
  };

  // ── Replace modal ─────────────────────────────────────────────────
  const [replaceMsg, setReplaceMsg] = useState("");
  const replaceMsgTimerRef = useRef(null);

  const replaceScrollRef = useRef(null);
  const ReplaceModal = () => {
    if (!replaceOpen) return null;
    const close = () => { setReplaceOpen(false); setReplaceMsg(""); setReplaceStep(1); setReplaceA(null); setReplaceB(null); };

    // Tile card used in both steps
    const RCard = ({ t, selected, onSelect, isSpace }) => (
      <div onClick={() => onSelect(isSpace ? SPACE_TILE_ID : t.id)}
        style={{ cursor: "pointer", borderRadius: 6, overflow: "hidden", aspectRatio: "1",
          border: `2px solid ${selected === (isSpace ? SPACE_TILE_ID : t.id) ? C.accentBright : C.border}`,
          background: selected === (isSpace ? SPACE_TILE_ID : t.id) ? C.accentDim : "transparent",
          display: "flex", alignItems: "center", justifyContent: "center" }}>
        {isSpace
          ? <span style={{ fontSize: 20 }}>🛸</span>
          : <img src={t.blobSrc ?? t.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated" }} />}
      </div>
    );

    const TileGridBox = ({ tileList, selected, onSelect, includeSpace }) => (
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(52px, 1fr))", gap: 5 }}>
        {tileList.map(t => <RCard key={t.id} t={t} selected={selected} onSelect={onSelect} />)}
        {includeSpace && <RCard key="space" t={null} selected={selected} onSelect={onSelect} isSpace />}
      </div>
    );

    const SepLine = ({ label }) => (
      <div style={{ gridColumn: "1 / -1", display: "flex", alignItems: "center", gap: 8, margin: "4px 0 2px" }}>
        <div style={{ height: 1, flex: 1, background: C.border }} />
        <span style={{ fontSize: 9, color: C.muted, letterSpacing: 1, textTransform: "uppercase" }}>{label}</span>
        <div style={{ height: 1, flex: 1, background: C.border }} />
      </div>
    );

    if (replaceStep === 1) {
      // Step 1: only tiles actually on the map
      const idsOnMap = new Set();
      grid.forEach(row => row.forEach(id => { if (id != null) idsOnMap.add(id); }));
      const tilesOnMap = tiles.filter(t => idsOnMap.has(t.id));
      const spaceOnMap = idsOnMap.has(SPACE_TILE_ID);
      // Ghost tile IDs: on the map but no tile object (deleted)
      const ghostIds = [...idsOnMap].filter(id => id !== SPACE_TILE_ID && !getTile(id));
      const isEmpty = tilesOnMap.length === 0 && !spaceOnMap && ghostIds.length === 0;
      return (
        <div className="modal-backdrop" onClick={close}>
          <div className="modal-box" style={{ maxWidth: 380 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Replace — which tile?</span>
              <button onClick={close} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
            </div>
            {isEmpty ? (
              <p style={{ fontSize: 12, color: C.muted, textAlign: "center", padding: "12px 0" }}>No tiles on map</p>
            ) : (
              <div style={{ overflowY: "auto", maxHeight: 300 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(52px, 1fr))", gap: 5 }}>
                  {tilesOnMap.map(t => <RCard key={t.id} t={t} selected={replaceA} onSelect={setReplaceA} />)}
                  {spaceOnMap && <RCard key="space" t={null} selected={replaceA} onSelect={setReplaceA} isSpace />}
                  {ghostIds.map(id => (
                    <div key={`ghost${id}`} onClick={() => setReplaceA(id)}
                      style={{ cursor: "pointer", borderRadius: 6, overflow: "hidden", aspectRatio: "1",
                        border: `2px solid ${replaceA === id ? "#f97316" : C.border}`,
                        background: replaceA === id ? "rgba(249,115,22,0.15)" : "rgba(249,115,22,0.05)",
                        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2 }}>
                      <span style={{ fontSize: 20, lineHeight: 1 }}>⚠️</span>
                      <span style={{ fontSize: 8, color: "#f97316", lineHeight: 1 }}>ghost</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btn(false), flex: 1 }} onClick={close}>Cancel</button>
              <button style={{ ...btn(replaceA != null, C.accent, C.accentDim), flex: 1 }}
                disabled={replaceA == null} onClick={() => setReplaceStep(2)}>Continue →</button>
            </div>
          </div>
        </div>
      );
    }

    // Step 2: full tile list — tileset tiles grouped with collapsible sections
    const shownNames     = new Set(shownTilesets ?? [activeTileset ?? manifest?.tilesets?.[0]?.name]);
    const shownAtlasSet  = new Set(shownAtlasTilesets ?? []);
    const tilesetTiles_  = tiles.filter(t => t.id >= TILESET_ID_START && t.id < GLOBAL_ID_START);
    const userTiles_     = tiles.filter(t => t.id >= USER_ID_START && t.id <= USER_ID_MAX);
    const globalTiles_   = tiles.filter(t => t.id >= GLOBAL_ID_START && t.id < ATLAS_ID_START);

    // Group Ophelia tileset tiles by tileset name
    const tsByName = {};
    tilesetTiles_.forEach(t => {
      const name = t.tilesetName ?? "Tileset";
      if (!tsByName[name]) tsByName[name] = [];
      tsByName[name].push(t);
    });

    // Collect all Atlas tileset names that have loaded tiles (for display)
    const allAtlasTsNames = [...new Set(atlasTiles.map(t => t.atlasTilesetName).filter(Boolean))];

    // Collapsible state: shown tilesets open, hidden collapsed by default
    const initCollapsed = {};
    Object.keys(tsByName).forEach(name => { initCollapsed[name] = !shownNames.has(name); });
    allAtlasTsNames.forEach(name => { initCollapsed[`atlas_${name}`] = !shownAtlasSet.has(name); });
    const [tsCollapsed, setTsCollapsed] = React.useState(() => initCollapsed);

    const onSelect = id => {
      const s = replaceScrollRef.current?.scrollTop;
      setReplaceB(id);
      requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; });
    };

    const CollapsibleSepLine = ({ label, isCollapsed, onToggle }) => (
      <div onClick={onToggle}
        style={{ gridColumn: "1 / -1", display: "flex", alignItems: "center", gap: 6, margin: "4px 0 2px", cursor: "pointer", userSelect: "none" }}>
        <span style={{ fontSize: 9, color: C.muted, lineHeight: 1 }}>{isCollapsed ? "▶" : "▼"}</span>
        <span style={{ fontSize: 9, letterSpacing: 1, textTransform: "uppercase", fontWeight: 700, color: C.accentBright }}>{label}</span>
        <div style={{ height: 1, flex: 1, background: C.border }} />
      </div>
    );

    return (
      <div className="modal-backdrop" onClick={close}>
        <div className="modal-box" style={{ maxWidth: 380 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Replace with — which tile?</span>
            <button onClick={close} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <div ref={replaceScrollRef} style={{ overflowY: "auto", maxHeight: 320, padding: "2px 0" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(52px, 1fr))", gap: 5 }}>
              {/* Empty (erase) card at the top — styled like the Erase essentials tool */}
              <SepLine label="Special" />
              <div onClick={() => onSelect(REPLACE_ERASE_ID)}
                style={{ cursor: "pointer", borderRadius: 6, overflow: "hidden", aspectRatio: "1",
                  border: `2px solid ${replaceB === REPLACE_ERASE_ID ? "#f87171" : C.border}`,
                  background: "rgba(255,255,255,0.03)",
                  display: "flex", flexDirection: "column" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center",
                  background: replaceB === REPLACE_ERASE_ID ? "rgba(248,113,113,0.38)" : "rgba(248,113,113,0.18)", padding: "2px 4px" }}>
                  <span style={{ fontSize: 9, fontWeight: 700, color: replaceB === REPLACE_ERASE_ID ? "#f87171" : "rgba(248,113,113,0.8)" }}>Erase</span>
                </div>
                <div style={{ flex: 1, background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 18, lineHeight: 1, opacity: replaceB === REPLACE_ERASE_ID ? 1 : 0.55 }}>🧼</span>
                </div>
              </div>
              <RCard key="space" t={null} selected={replaceB} onSelect={onSelect} isSpace />
              {/* Per-Ophelia-tileset collapsible sections (only shown tilesets) */}
              {Object.entries(tsByName).filter(([name]) => shownNames.has(name)).map(([name, tsTs]) => {
                const isCollapsed = !!tsCollapsed[name];
                return (
                  <React.Fragment key={name}>
                    <CollapsibleSepLine label={name} isCollapsed={isCollapsed}
                      onToggle={() => setTsCollapsed(p => ({ ...p, [name]: !p[name] }))} />
                    {!isCollapsed && tsTs.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={onSelect} />)}
                  </React.Fragment>
                );
              })}
              {/* Per-Atlas-tileset collapsible sections (only shown tilesets) */}
              {allAtlasTsNames.filter(atsTsName => shownAtlasSet.has(atsTsName)).map(atsTsName => {
                const collKey = `atlas_${atsTsName}`;
                const isCollapsed = !!tsCollapsed[collKey];
                const meta = atlasTilesetMeta(atsTsName);
                const tsTiles = atlasTiles.filter(t => t.atlasTilesetName === atsTsName);
                return (
                  <React.Fragment key={atsTsName}>
                    <CollapsibleSepLine label={meta.displayName} isCollapsed={isCollapsed}
                      onToggle={() => setTsCollapsed(p => ({ ...p, [collKey]: !p[collKey] }))} />
                    {!isCollapsed && tsTiles.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={onSelect} />)}
                  </React.Fragment>
                );
              })}
              {userTiles_.length > 0 && <SepLine label="Uploaded" />}
              {userTiles_.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={onSelect} />)}
              {globalTiles_.length > 0 && <SepLine label="Global" />}
              {globalTiles_.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={onSelect} />)}
            </div>
          </div>
          {replaceMsg ? (
            <div style={{ textAlign: "center", fontSize: 12, fontWeight: 600, color: "#4ade80", background: "rgba(74,222,128,0.12)", border: "1px solid rgba(74,222,128,0.35)", borderRadius: 7, padding: "6px 12px" }}>
              {replaceMsg}
            </div>
          ) : (
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btn(false), flex: 1 }} onClick={() => { setReplaceStep(1); setReplaceB(null); }}>← Back</button>
              <button style={{ ...btn(replaceB != null && replaceB !== REPLACE_ERASE_ID, C.accent, C.accentDim) }}
                disabled={replaceB == null || replaceB === REPLACE_ERASE_ID} onClick={doSwap}>Swap all</button>
              <button style={{ ...btn(replaceB != null, C.accent, C.accentDim), flex: 1 }}
                disabled={replaceB == null} onClick={doReplace}>Replace all</button>
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── OTG Detection Settings modal ──────────────────────────────────
  const OTGSettingsModal = () => {
    if (!otgOpen) return null;
    const close = () => setOtgOpen(false);

    const SepLine = ({ label }) => (
      <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "6px 0 2px" }}>
        <div style={{ height: 1, flex: 1, background: C.border }} />
        <span style={{ fontSize: 9, color: C.muted, letterSpacing: 1, textTransform: "uppercase" }}>{label}</span>
        <div style={{ height: 1, flex: 1, background: C.border }} />
      </div>
    );

    const TileRow = ({ t }) => {
      const effective = otgWallOverrides[t.id] !== undefined ? otgWallOverrides[t.id] : isDefaultOTGWall(t);
      return (
        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "2px 0", userSelect: "none" }}>
          <input type="checkbox" checked={effective}
            onChange={ev => setOtgWallOverrides(p => ({ ...p, [t.id]: ev.target.checked }))}
            style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer", flexShrink: 0 }} />
          <div style={{ width: 24, height: 24, flexShrink: 0 }}>
            <img src={t.blobSrc ?? t.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated" }} />
          </div>
          <span style={{ fontSize: 11, color: C.text }}>{deriveCodename(t.src) || `#${t.id}`}</span>
        </label>
      );
    };

    const tilesetTiles_ = tiles.filter(t => t.id >= TILESET_ID_START && t.id < GLOBAL_ID_START);
    const userTiles_    = tiles.filter(t => t.id >= USER_ID_START && t.id <= USER_ID_MAX);
    const globalTiles_  = tiles.filter(t => t.id >= GLOBAL_ID_START && t.id < ATLAS_ID_START);

    return (
      <div className="modal-backdrop" onClick={close}>
        <div className="modal-box" style={{ maxWidth: 360 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>OTG Detection — Wall Tiles</span>
            <button onClick={close} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>Checked tiles count as walls for OTG detection. Unchecked tiles are treated as passable.</p>
          <div style={{ overflowY: "auto", maxHeight: 360, display: "flex", flexDirection: "column", gap: 1 }}>
            {tilesetTiles_.length > 0 && <SepLine label="Tileset" />}
            {tilesetTiles_.map(t => <TileRow key={t.id} t={t} />)}
            {userTiles_.length > 0 && <SepLine label="Uploaded" />}
            {userTiles_.map(t => <TileRow key={t.id} t={t} />)}
            {globalTiles_.length > 0 && <SepLine label="Global" />}

  // ── Memory usage modal ───────────────────────────────────────────
