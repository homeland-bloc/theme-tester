        ctx.save();
        ctx.translate(cx, cy);
        if (rotDeg) ctx.rotate(rotDeg * Math.PI / 180);
        ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
        ctx.restore();
      });
      finish();
    });
  };

  const commitZoom = () => {
    const v = parseInt(zoomInput, 10);
    if (!isNaN(v) && v > 0) {
      // Snap to nearest 5%
      const snapped = Math.round(v / 5) * 5;
      setZoom(Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, snapped / 100)));
    }
    setZoomEdit(false);
  };

  // ── Shared styles ─────────────────────────────────────────────────
  const btn = (active, color = C.accent, dim = C.accentDim) => ({
    padding: "5px 11px", borderRadius: 7, fontSize: 12, fontWeight: 600,
    cursor: "pointer", touchAction: "manipulation", userSelect: "none",
    fontFamily: "'Inter', sans-serif",
    background: active ? dim : "rgba(255,255,255,0.04)",
    color:      active ? color : C.muted,
    border:    `1px solid ${active ? color : "rgba(255,255,255,0.1)"}`,
    transition: "all 0.12s", flexShrink: 0,
  });

  const inputStyle = {
    background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`,
    borderRadius: 5, color: C.text, fontFamily: "'Inter', monospace", fontSize: 11,
    padding: "4px 8px", outline: "none", width: "100%",
  };

  // ── Tile info modal ───────────────────────────────────────────────
  const MAX_MULT_ARROW = 7; // arrow buttons cap; text field has no cap
  const InfoModal = () => {
    if (!infoTile) return null;
    const t = getTile(infoTile);
    if (!t) { setInfoTile(null); return null; }
    const defaultMult = getDefaultMultiplier(t);
    const currentMult = getTileMultiplier(t);
    const defaultOff  = getDefaultOffset(t);
    const currentOff  = getTileOffset(t);
    const [multInput, setMultInput] = React.useState(String(currentMult));
    const [oxInput,   setOxInput]   = React.useState(String(currentOff.ox));
    const [oyInput,   setOyInput]   = React.useState(String(currentOff.oy));
    const isPriority = !!priorityTiles[t.id];

    const commitMult = val => {
      const v = parseFloat(val ?? multInput);
      if (!isNaN(v) && v > 0) {
        const rounded = Math.round(v * 100) / 100;
        setTileMultipliers(prev => ({ ...prev, [t.id]: rounded }));
        setMultInput(String(rounded));
      } else setMultInput(String(currentMult));
    };
    const stepMult = delta => {
      const cur = parseFloat(multInput) || currentMult;
      const next = Math.max(0.1, Math.min(MAX_MULT_ARROW, Math.round((cur + delta) * 20) / 20));
      commitMult(String(next));
    };
    const commitOffset = (ox2, oy2) => {
      const ox = ox2 !== undefined ? ox2 : parseFloat(oxInput);
      const oy = oy2 !== undefined ? oy2 : parseFloat(oyInput);
      const newOff = { ox: isNaN(ox) ? 0 : ox, oy: isNaN(oy) ? 0 : oy };
      setTileOffsets(prev => ({ ...prev, [t.id]: newOff }));
    };
    const stepOx = delta => {
      const cur = parseFloat(oxInput) || 0;
      const next = Math.round((cur + delta) * 100) / 100;
      setOxInput(String(next));
      commitOffset(next, parseFloat(oyInput) || 0);
    };
    const stepOy = delta => {
      const cur = parseFloat(oyInput) || 0;
      const next = Math.round((cur + delta) * 100) / 100;
      setOyInput(String(next));
      commitOffset(parseFloat(oxInput) || 0, next);
    };

    const fieldRow = (label, input, setInput, onBlur, extra) => (
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>{label}</span>
        <input type="number" value={input} onChange={e => setInput(e.target.value)}
          onBlur={onBlur} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
          style={{ width: 72, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none" }} />
        {extra}
      </div>
    );

    return (
      <div className="modal-backdrop" onClick={() => setInfoTile(null)}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Tile info</span>
            <button onClick={() => setInfoTile(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ background: C.panelDeep, borderRadius: 8, padding: 12, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 120 }}>
            <div className="tile-img-checker" style={{ borderRadius: 4, overflow: "hidden" }}>
              <img src={t.blobSrc ?? t.src} alt="" style={{ maxWidth: "260px", maxHeight: 180, imageRendering: "pixelated" }} />
            </div>
          </div>

          {/* Tile codename */}
          {(() => {
            const codename = deriveCodename(t.src);
            const customName = tileNames[t.id] ?? "";
            if (t.isDefault && codename) {
              return <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Codename</span>
                <span style={{ fontSize: 12, fontFamily: "monospace", color: C.text }}>{codename}</span>
              </div>;
            }
            if (!t.isDefault) {
              return <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Name</span>
                <input value={customName} onChange={e => setTileNames(prev => ({ ...prev, [t.id]: e.target.value }))}
                  placeholder="Enter name…"
                  style={{ flex: 1, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none" }} />
              </div>;
            }
            return null;
          })()}

          {/* Size multiplier */}
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Size multiplier (%)</span>
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepMult(-0.05)}>−</button>
            <input type="number" value={multInput} step="0.05"
              onChange={e => setMultInput(e.target.value)}
              onBlur={() => commitMult()}
              onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
              style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none", textAlign: "center" }} />
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepMult(+0.05)}>+</button>
            {(() => { const isDefault = currentMult === defaultMult; const greenStyle = isDefault ? { color: "#4ade80", borderColor: "#4ade80", background: "rgba(74,222,128,0.12)" } : {}; return (
              <button style={{ ...btn(false), fontSize: 10, padding: "3px 7px", marginLeft: "auto", ...greenStyle }}
                disabled={isDefault} title={isDefault ? "Already at default" : "Reset to default"}
                onClick={() => { setTileMultipliers(prev => { const n = {...prev}; delete n[t.id]; return n; }); setMultInput(String(defaultMult)); }}>Reset</button>
            ); })()}
          </div>

          {/* Offsets */}
          <span style={{ fontSize: 11, color: C.muted, fontWeight: 600 }}>Offsets (%) 📐</span>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Horizontal</span>
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOx(-0.05)}>−</button>
            <input type="number" value={oxInput} onChange={e => setOxInput(e.target.value)}
              onBlur={() => commitOffset()} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
              style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none", textAlign: "center" }} />
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOx(+0.05)}>+</button>
            {(() => { const isDefault = currentOff.ox === defaultOff.ox; const greenStyle = isDefault ? { color: "#4ade80", borderColor: "#4ade80", background: "rgba(74,222,128,0.12)" } : {}; return (
              <button style={{ ...btn(false), fontSize: 10, padding: "3px 7px", marginLeft: "auto", ...greenStyle }}
                disabled={isDefault} title={isDefault ? "Already at default" : "Reset to default"}
                onClick={() => { setOxInput(String(defaultOff.ox)); setTileOffsets(prev => { const n = {...prev}; const o = {...(prev[t.id] ?? {}), ox: defaultOff.ox}; n[t.id] = o; return n; }); }}>Reset</button>
            ); })()}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Vertical</span>
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOy(-0.05)}>−</button>
            <input type="number" value={oyInput} onChange={e => setOyInput(e.target.value)}
              onBlur={() => commitOffset()} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
              style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none", textAlign: "center" }} />
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOy(+0.05)}>+</button>
            {(() => { const isDefault = currentOff.oy === defaultOff.oy; const greenStyle = isDefault ? { color: "#4ade80", borderColor: "#4ade80", background: "rgba(74,222,128,0.12)" } : {}; return (
              <button style={{ ...btn(false), fontSize: 10, padding: "3px 7px", marginLeft: "auto", ...greenStyle }}
                disabled={isDefault} title={isDefault ? "Already at default" : "Reset to default"}
                onClick={() => { setOyInput(String(defaultOff.oy)); setTileOffsets(prev => { const n = {...prev}; const o = {...(prev[t.id] ?? {}), oy: defaultOff.oy}; n[t.id] = o; return n; }); }}>Reset</button>
            ); })()}
          </div>

          {/* Allow rotation */}
          {(() => {
            const isRotDefault = isTileRotatable(t) === isDefaultRotatable(t);
            const rotColor = isRotDefault ? "#4ade80" : C.text;
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={isTileRotatable(t)}
                  onChange={ev => setRotatableMap(prev => ({ ...prev, [t.id]: ev.target.checked }))}
                  style={{ width: 14, height: 14, accentColor: isRotDefault ? "#4ade80" : C.accent, cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: rotColor }}>Allow rotation 🔄</span>
              </label>
            );
          })()}
          {/* Allow mirror offset */}
          {(() => {
            const isMirrorOffDefault = isMirrorOffset(t) === isDefaultMirrorOffset(t);
            const moColor = isMirrorOffDefault ? "#4ade80" : C.text;
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={isMirrorOffset(t)}
                  onChange={ev => setMirrorOffsetTiles(prev => ({ ...prev, [t.id]: ev.target.checked }))}
                  style={{ width: 14, height: 14, accentColor: isMirrorOffDefault ? "#4ade80" : C.accent, cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: moColor }}>Allow mirror offset 🌊</span>
              </label>
            );
          })()}
          {/* Always render on top */}
          {(() => {
            const topDefault = /\/objectives\//i.test(t.src ?? "");
            const isTopDefault = isPriority === topDefault;
            const topColor = isTopDefault ? "#4ade80" : C.text;
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={isPriority}
                  onChange={ev => {
                    setPriorityTiles(prev => { const n = { ...prev }; if (ev.target.checked) n[t.id] = true; else delete n[t.id]; return n; });
                    if (ev.target.checked) setBottomTiles(prev => { const n = { ...prev }; delete n[t.id]; return n; });
                  }}
                  style={{ width: 14, height: 14, accentColor: isTopDefault ? "#4ade80" : C.accent, cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: topColor }}>Always render on top 🚨</span>
              </label>
            );
          })()}
          {/* Always render on bottom */}
          {(() => {
            const bottomDefault = !!(t.src && (t.src.includes("/Water/") || t.src.includes("Jumppads/") || t.src.includes("Teleporters/") || t.src.includes("HealPad")));
            const isBottomDefault = !!bottomTiles[t.id] === bottomDefault;
            const botColor = isBottomDefault ? "#4ade80" : C.text;
            return (
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                <input type="checkbox" checked={!!bottomTiles[t.id]}
                  onChange={ev => {
                    setBottomTiles(prev => { const n = { ...prev }; if (ev.target.checked) n[t.id] = true; else delete n[t.id]; return n; });
                    if (ev.target.checked) setPriorityTiles(prev => { const n = { ...prev }; delete n[t.id]; return n; });
                  }}
                  style={{ width: 14, height: 14, accentColor: isBottomDefault ? "#4ade80" : C.accent, cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: botColor }}>Always render on bottom ⚓</span>
              </label>
            );
          })()}
          {/* Starred shortcut */}
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
            <input type="checkbox" checked={starredTiles.includes(t.id)}
              onChange={() => toggleStar(t.id)}
              style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
            <span style={{ fontSize: 11, color: C.text }}>Starred shortcut ⭐{!starredTiles.includes(t.id) && starredTiles.filter(s => typeof s !== "string").length >= 10 ? <span style={{ color: C.muted, marginLeft: 6 }}>(max 10 tiles reached)</span> : null}</span>
          </label>

          {!t.isDefault && (
            <button style={{ ...btn(false, C.danger, "rgba(248,113,113,0.14)"), width: "100%", justifyContent: "center" }}
              onClick={() => deleteTile(t.id)}>Delete tile</button>
          )}
          {t.isDefault && (
            <p style={{ fontSize: 11, color: C.muted, textAlign: "center" }}>Default tile — cannot be deleted.</p>
          )}
        </div>
      </div>
    );
  };

  // ── Replace modal ─────────────────────────────────────────────────
  const [replaceMsg, setReplaceMsg] = useState("");
  const replaceMsgTimerRef = useRef(null);

  const replaceScrollRef = useRef(null);
  const ReplaceModal = () => {
    if (!replaceOpen) return null;
    const close = () => { setReplaceOpen(false); setReplaceMsg(""); setReplaceStep(1); setReplaceA(null); setReplaceB(null); };

    // Tile card used in both steps
    const RCard = ({ t, selected, onSelect, isSpace }) => (
      <div onClick={() => onSelect(isSpace ? SPACE_TILE_ID : t.id)}
        style={{ cursor: "pointer", borderRadius: 6, overflow: "hidden", aspectRatio: "1",
          border: `2px solid ${selected === (isSpace ? SPACE_TILE_ID : t.id) ? C.accentBright : C.border}`,
          background: selected === (isSpace ? SPACE_TILE_ID : t.id) ? C.accentDim : "transparent",
          display: "flex", alignItems: "center", justifyContent: "center" }}>
        {isSpace
          ? <span style={{ fontSize: 20 }}>🛸</span>
          : <img src={t.blobSrc ?? t.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated" }} />}
      </div>
    );

    const TileGridBox = ({ tileList, selected, onSelect, includeSpace }) => (
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(52px, 1fr))", gap: 5 }}>
        {tileList.map(t => <RCard key={t.id} t={t} selected={selected} onSelect={onSelect} />)}
        {includeSpace && <RCard key="space" t={null} selected={selected} onSelect={onSelect} isSpace />}
      </div>
    );

    const SepLine = ({ label }) => (
      <div style={{ gridColumn: "1 / -1", display: "flex", alignItems: "center", gap: 8, margin: "4px 0 2px" }}>
        <div style={{ height: 1, flex: 1, background: C.border }} />
        <span style={{ fontSize: 9, color: C.muted, letterSpacing: 1, textTransform: "uppercase" }}>{label}</span>
        <div style={{ height: 1, flex: 1, background: C.border }} />
      </div>
    );

    if (replaceStep === 1) {
      // Step 1: only tiles actually on the map
      const idsOnMap = new Set();
      grid.forEach(row => row.forEach(id => { if (id != null) idsOnMap.add(id); }));
      const tilesOnMap = tiles.filter(t => idsOnMap.has(t.id));
      const spaceOnMap = idsOnMap.has(SPACE_TILE_ID);
      return (
        <div className="modal-backdrop" onClick={close}>
          <div className="modal-box" style={{ maxWidth: 380 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Replace — which tile?</span>
              <button onClick={close} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
            </div>
            {tilesOnMap.length === 0 && !spaceOnMap ? (
              <p style={{ fontSize: 12, color: C.muted, textAlign: "center", padding: "12px 0" }}>No tiles on map</p>
            ) : (
              <div style={{ overflowY: "auto", maxHeight: 300 }}>
                <TileGridBox tileList={tilesOnMap} selected={replaceA} onSelect={setReplaceA} includeSpace={spaceOnMap} />
              </div>
            )}
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btn(false), flex: 1 }} onClick={close}>Cancel</button>
              <button style={{ ...btn(replaceA != null, C.accent, C.accentDim), flex: 1 }}
                disabled={replaceA == null} onClick={() => setReplaceStep(2)}>Continue →</button>
            </div>
          </div>
        </div>
      );
    }

    // Step 2: full tile list with section separators
    const tilesetTiles_ = tiles.filter(t => t.id >= TILESET_ID_START && t.id < USER_ID_START);
    const userTiles_    = tiles.filter(t => t.id >= USER_ID_START && t.id < GLOBAL_ID_START);
    const globalTiles_  = tiles.filter(t => t.id >= GLOBAL_ID_START);
    return (
      <div className="modal-backdrop" onClick={close}>
        <div className="modal-box" style={{ maxWidth: 380 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Replace with — which tile?</span>
            <button onClick={close} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <div ref={replaceScrollRef} style={{ overflowY: "auto", maxHeight: 320, padding: "2px 0" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(52px, 1fr))", gap: 5 }}>
              {tilesetTiles_.length > 0 && <SepLine label="Tileset" />}
              {tilesetTiles_.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={id => { const s = replaceScrollRef.current?.scrollTop; setReplaceB(id); requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; }); }} />)}
              {userTiles_.length > 0 && <SepLine label="Uploaded" />}
              {userTiles_.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={id => { const s = replaceScrollRef.current?.scrollTop; setReplaceB(id); requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; }); }} />)}
              {globalTiles_.length > 0 && <SepLine label="Global" />}
              {globalTiles_.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={id => { const s = replaceScrollRef.current?.scrollTop; setReplaceB(id); requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; }); }} />)}
              <SepLine label="Special" />
              <RCard key="space" t={null} selected={replaceB} onSelect={id => { const s = replaceScrollRef.current?.scrollTop; setReplaceB(id); requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; }); }} isSpace />
            </div>
          </div>
          {replaceMsg ? (
            <div style={{ textAlign: "center", fontSize: 12, fontWeight: 600, color: "#4ade80", background: "rgba(74,222,128,0.12)", border: "1px solid rgba(74,222,128,0.35)", borderRadius: 7, padding: "6px 12px" }}>
              {replaceMsg}
            </div>
          ) : (
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btn(false), flex: 1 }} onClick={() => { setReplaceStep(1); setReplaceB(null); }}>← Back</button>
              <button style={{ ...btn(replaceB != null, C.accent, C.accentDim), flex: 1 }}
                disabled={replaceB == null} onClick={doReplace}>Replace all</button>
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── OTG Detection Settings modal ──────────────────────────────────
  const OTGSettingsModal = () => {
    if (!otgOpen) return null;
    const close = () => setOtgOpen(false);

    const SepLine = ({ label }) => (
      <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "6px 0 2px" }}>
        <div style={{ height: 1, flex: 1, background: C.border }} />
        <span style={{ fontSize: 9, color: C.muted, letterSpacing: 1, textTransform: "uppercase" }}>{label}</span>
        <div style={{ height: 1, flex: 1, background: C.border }} />
      </div>
    );

    const TileRow = ({ t }) => {
      const effective = otgWallOverrides[t.id] !== undefined ? otgWallOverrides[t.id] : isDefaultOTGWall(t);
      return (
        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "2px 0", userSelect: "none" }}>
          <input type="checkbox" checked={effective}
            onChange={ev => setOtgWallOverrides(p => ({ ...p, [t.id]: ev.target.checked }))}
            style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer", flexShrink: 0 }} />
          <div style={{ width: 24, height: 24, flexShrink: 0 }}>
            <img src={t.blobSrc ?? t.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated" }} />
          </div>
          <span style={{ fontSize: 11, color: C.text }}>{deriveCodename(t.src) || `#${t.id}`}</span>
        </label>
      );
    };

    const tilesetTiles_ = tiles.filter(t => t.id >= TILESET_ID_START && t.id < USER_ID_START);
    const userTiles_    = tiles.filter(t => t.id >= USER_ID_START && t.id < GLOBAL_ID_START);
    const globalTiles_  = tiles.filter(t => t.id >= GLOBAL_ID_START);

    return (
      <div className="modal-backdrop" onClick={close}>
        <div className="modal-box" style={{ maxWidth: 360 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>OTG Detection — Wall Tiles</span>
            <button onClick={close} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>Checked tiles count as walls for OTG detection. Unchecked tiles are treated as passable.</p>
          <div style={{ overflowY: "auto", maxHeight: 360, display: "flex", flexDirection: "column", gap: 1 }}>
            {tilesetTiles_.length > 0 && <SepLine label="Tileset" />}
            {tilesetTiles_.map(t => <TileRow key={t.id} t={t} />)}
            {userTiles_.length > 0 && <SepLine label="Uploaded" />}
            {userTiles_.map(t => <TileRow key={t.id} t={t} />)}
            {globalTiles_.length > 0 && <SepLine label="Global" />}
            {globalTiles_.map(t => <TileRow key={t.id} t={t} />)}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{ ...btn(false), flex: 1 }} onClick={() => setOtgWallOverrides({})}>Reset defaults</button>
            <button style={{ ...btn(true, C.accent, C.accentDim), flex: 1 }} onClick={close}>Done</button>
          </div>
        </div>
      </div>
    );
  };

  // ── Failed tile warning modal ─────────────────────────────────────
  const FailedTileModal = () => {
    if (!failedWarning) return null;
    return (
      <div className="modal-backdrop" onClick={() => setFailedWarning(false)}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.danger }}>Tile unavailable</span>
            <button onClick={() => setFailedWarning(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <p style={{ fontSize: 13, color: C.text, lineHeight: 1.6 }}>
            This tile's image could not be loaded. The file may be missing from the <code style={{ color: C.accentBright }}>Resources/</code> folder.
          </p>
          <p style={{ fontSize: 11, color: C.muted }}>
            To fix this, restore the missing image file to the Resources folder and refresh the page. You can also update <code style={{ color: C.accentBright }}>Resources/manifest.json</code> to remove deleted entries.
          </p>
          <button style={{ ...btn(false, C.accent, C.accentDim) }} onClick={() => setFailedWarning(false)}>OK</button>
        </div>
      </div>
    );
  };

  // ── Tool info modal (Erase / Hand / Space) ───────────────────────
  const ToolInfoModal = () => {
    if (!infoTool) return null;
    const toolDefs = {
      erase: { label: "Erase", icon: "🧼", color: C.danger, desc: "Removes tiles from cells. Click or drag across cells to erase.", iconColor: null },
      hand:  { label: "Hand", icon: "👋", color: "#fbbf24", desc: "Drag to pan the map canvas. On mobile, swipe to scroll.", iconColor: null },
      space: { label: "Space", icon: "🛸", color: C.accentBright, desc: "Places an invisible space tile, making the cell fully transparent in the exported map.", iconColor: null },
      single: { label: "Single", icon: "S", color: C.accent, desc: "Freehand paint mode. Click or drag to place tiles one cell at a time.", iconColor: C.accent },
      line:   { label: "Line", icon: "L", color: C.accent, desc: "Line draw mode. Click a start cell and drag to an end cell — tiles are placed in a straight line between them.", iconColor: C.accent },
      rect:   { label: "Rectangle", icon: "R", color: C.accent, desc: "Rectangle fill mode. Click and drag to define a bounding box — all cells inside are filled with the selected tile.", iconColor: C.accent },
      fill:   { label: "Fill", icon: "F", color: C.accent, desc: "Flood fill mode. Click a cell to select all connected cells sharing the same filled/empty state (BFS). Commit fills them all at once.", iconColor: C.accent },
      mirrorV: { label: "Horizontal Mirror", icon: "H", color: C.pale, desc: "Mirrors every paint action horizontally (left ↔ right). The mirror axis runs vertically through the grid centre.", iconColor: C.pale },
      mirrorH: { label: "Vertical Mirror", icon: "V", color: C.soft, desc: "Mirrors every paint action vertically (top ↔ bottom). The mirror axis runs horizontally through the grid centre.", iconColor: C.soft },
      mirrorD: { label: "Diagonal Mirror", icon: "D", color: C.accentBright, desc: "Mirrors every paint action diagonally (point-reflected through the grid centre). Can be combined with Horizontal and Vertical mirrors.", iconColor: C.accentBright },
      guides: { label: "Guides", icon: "🧭", color: C.accent, desc: "Shows dashed mirror axis lines on the canvas — a vertical line and a horizontal line through the grid centre. Useful for aligning tiles when mirroring is active.", iconColor: null },
      offsetCenters: { label: "Offset Centers", icon: "🎯", color: C.soft, desc: "Overlays a white + marker at the original grid-cell centre of every tile that has a non-zero offset applied. Useful for checking placement alignment.", iconColor: null },
      replace: { label: "Replace", icon: "♻️", color: C.soft, desc: "Two-step tile replacement: first pick a tile on the map, then pick its replacement. All instances of the original tile are swapped at once.", iconColor: null },
      overwrite: { label: "Block Overwrite", icon: "🧱", color: C.accent, desc: "When enabled, painting over an occupied cell replaces it with the currently selected tile instead of picking it up for dragging.", iconColor: null },
    };
    const def = toolDefs[infoTool];
    if (!def) return null;
    // Space uses numeric SPACE_TILE_ID for starring; erase/hand use string keys
    const toolId = infoTool === "space" ? SPACE_TILE_ID : infoTool;
    const isStarredTool = starredTiles.includes(toolId);
    return (
      <div className="modal-backdrop" onClick={() => setInfoTool(null)}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>{def.label}</span>
            <button onClick={() => setInfoTool(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ background: C.panelDeep, borderRadius: 8, padding: 20, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 80 }}>
            <span style={{ fontSize: 36, color: def.iconColor ?? undefined }}>{def.icon}</span>
          </div>
          <p style={{ fontSize: 12, color: C.muted, lineHeight: 1.6 }}>{def.desc}</p>
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
            <input type="checkbox" checked={isStarredTool}
              onChange={() => toggleStar(toolId)}
              style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
            <span style={{ fontSize: 11, color: C.text }}>Starred shortcut ⭐{!isStarredTool && starredTiles.filter(s => typeof s === "string").length >= 10 ? <span style={{ color: C.muted, marginLeft: 6 }}>(max 10 tools reached)</span> : null}</span>
          </label>
        </div>
      </div>
    );
  };

  // ── Memory usage modal ───────────────────────────────────────────
  const MemoryModal = () => {
    if (!memoryOpen) return null;
    const entries = [];
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      const val = localStorage.getItem(key) || "";
      const bytes = val.length * 2;
      total += bytes;
      entries.push({ key, bytes });
    }
    entries.sort((a, b) => b.bytes - a.bytes);
    const fmt = b => b < 1024 ? `${b} B` : `${(b/1024).toFixed(1)} KB`;
    return (
      <div className="modal-backdrop" onClick={() => setMemoryOpen(false)}>
        <div className="modal-box" style={{ maxWidth: 400 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Storage Usage</span>
            <button onClick={() => setMemoryOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <div style={{ overflowY: "auto", maxHeight: 320, display: "flex", flexDirection: "column", gap: 2 }}>
            {entries.map(({ key, bytes }) => (
              <div key={key} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, padding: "2px 0", borderBottom: `1px solid ${C.border}` }}>
                <span style={{ color: C.muted, fontFamily: "monospace", fontSize: 10 }}>{key}</span>
                <span style={{ color: C.text, fontWeight: 600 }}>{fmt(bytes)}</span>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: C.text }}>Total: <strong>{fmt(total)}</strong></span>
            <button style={{ ...btn(true, C.danger, "rgba(248,113,113,0.14)") }}
              onClick={() => { if (confirm("Clear all stored data and reset the app to factory defaults?")) { localStorage.clear(); window.location.reload(); } }}>
              Clear All Data
            </button>
          </div>
          <button style={btn(false)} onClick={() => setMemoryOpen(false)}>Close</button>
        </div>
      </div>
    );
  };

  // ── Convert modal — remap tileset tiles on the board ────────────
  const ConvertModal = () => {
    if (!convertOpen) return null;
    const tilesets = manifest?.tilesets ?? [];
    const [fromTs, setFromTs] = React.useState(activeTileset ?? tilesets[0]?.name ?? "");
    const [toTs,   setToTs]   = React.useState(tilesets.find(t => t.name !== fromTs)?.name ?? "");
    // Build id maps for all tilesets (same logic as the old computeAllTileIds)
    const buildIdMaps = () => {
      let id = TILESET_ID_START;
      const maps = {};
      for (const tsDef of tilesets) {
        const m = {};
        for (const key of (tsDef.order ?? [])) {
          if (tsDef.folders?.[key]) m[key] = tsDef.folders[key].map(() => id++);
          else if (tsDef.files?.[key]) m[key] = [id++];
        }
        maps[tsDef.name] = m;
      }
      return maps;
    };
    const maps = buildIdMaps();
    const fromMap = maps[fromTs] ?? {};
    const toMap   = maps[toTs]   ?? {};
    const idRemap = {};
    for (const key of Object.keys(fromMap)) {
      const oIds = fromMap[key], nIds = toMap[key];
      if (nIds) oIds.forEach((oid, i) => { if (i < nIds.length) idRemap[oid] = nIds[i]; });
    }
    const fromAll = new Set(Object.values(fromMap).flat());
    const boardFromIds = new Set();
    grid.forEach(row => row.forEach(id => { if (id != null && fromAll.has(id)) boardFromIds.add(id); }));
    const unmapped = [...boardFromIds].filter(id => idRemap[id] === undefined);
    const mappable = [...boardFromIds].filter(id => idRemap[id] !== undefined);
    const doConvert = () => {
      const newGrid = grid.map(row => row.map(id =>
        (id != null && fromAll.has(id) && idRemap[id] !== undefined) ? idRemap[id] : id
      ));
      setGrid(newGrid);
      setConvertOpen(false);
    };
    return (
      <div className="modal-backdrop" onClick={() => setConvertOpen(false)}>
        <div className="modal-box" style={{ maxWidth: 360 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Convert Tileset Tiles</span>
            <button onClick={() => setConvertOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.6 }}>Remaps tiles on the board from one tileset to another by matching tile names. Tiles with no equivalent in the target tileset are left unchanged.</p>
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 3, flex: 1 }}>
              <span style={{ fontSize: 10, color: C.muted }}>From</span>
              <select value={fromTs} onChange={e => setFromTs(e.target.value)}
                style={{ background: C.panel, color: C.text, border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 11, padding: "3px 6px", cursor: "pointer", outline: "none" }}>
                {tilesets.map(ts => <option key={ts.name} value={ts.name}>{ts.name}</option>)}
              </select>
            </div>
            <span style={{ color: C.muted, fontSize: 18, marginTop: 14 }}>→</span>
            <div style={{ display: "flex", flexDirection: "column", gap: 3, flex: 1 }}>
              <span style={{ fontSize: 10, color: C.muted }}>To</span>
              <select value={toTs} onChange={e => setToTs(e.target.value)}
                style={{ background: C.panel, color: C.text, border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 11, padding: "3px 6px", cursor: "pointer", outline: "none" }}>
                {tilesets.map(ts => <option key={ts.name} value={ts.name}>{ts.name}</option>)}
              </select>
            </div>
          </div>
          {fromTs && toTs && fromTs !== toTs && (
            <div style={{ fontSize: 11, color: C.text, background: C.panelAlt ?? "rgba(0,0,0,0.2)", borderRadius: 6, padding: "6px 10px" }}>
              <div>{mappable.length} tile type{mappable.length !== 1 ? "s" : ""} will be converted.</div>
              {unmapped.length > 0 && <div style={{ color: "#fbbf24" }}>{unmapped.length} type{unmapped.length !== 1 ? "s" : ""} have no match in {toTs} and will stay as-is.</div>}
            </div>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{ ...btn(true, C.accent, C.accentDim), flex: 1 }}
              disabled={!fromTs || !toTs || fromTs === toTs}
              onClick={doConvert}>
              Convert
            </button>
            <button style={btn(false)} onClick={() => setConvertOpen(false)}>Cancel</button>
          </div>
        </div>
      </div>
    );
  };

  // ─────────────────────────────────────────────────────────────────
  // Grid size in pixels (at current zoom)
  const gW = gridW * CELL * zoom;
  const gH = gridH * CELL * zoom;

  return (
    <div style={{
      display: "flex", flexDirection: "column", height: "100dvh",
      background: C.bg, color: C.text, fontFamily: "'Inter', sans-serif",
      overflow: "hidden",
      paddingTop: "env(safe-area-inset-top)", paddingBottom: "env(safe-area-inset-bottom)",
      paddingLeft: "env(safe-area-inset-left)", paddingRight: "env(safe-area-inset-right)",
    }}>

      <InfoModal />
      <ReplaceModal />
      <OTGSettingsModal />
      <FailedTileModal />
      <ToolInfoModal />
      <MemoryModal />
      <ConvertModal />

      {/* Map size confirmation dialog */}
      {pendingSize && (() => {
        const { w, h } = pendingSize;
        const shrinkW = w < gridW, shrinkH = h < gridH;
        const expandW = w > gridW, expandH = h > gridH;
        const willLose = shrinkW || shrinkH;
        const lines = [];
        if (shrinkW) lines.push(`Columns reduced from ${gridW} to ${w}: tiles in columns ${w + 1}–${gridW} will be removed.`);
        if (shrinkH) lines.push(`Rows reduced from ${gridH} to ${h}: tiles in rows ${h + 1}–${gridH} will be removed.`);
        if (expandW) lines.push(`Columns increased from ${gridW} to ${w}: new empty columns added on the right.`);
        if (expandH) lines.push(`Rows increased from ${gridH} to ${h}: new empty rows added at the bottom.`);
        return (
          <div className="modal-backdrop" onClick={() => setPendingSize(null)}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Apply map size {w} × {h}?</span>
                <button onClick={() => setPendingSize(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {lines.map((l, i) => <p key={i} style={{ fontSize: 12, color: willLose ? C.danger : C.text }}>{l}</p>)}
                {!willLose && !expandW && !expandH && <p style={{ fontSize: 12, color: C.muted }}>No content changes — same size.</p>}
                {willLose && <p style={{ fontSize: 11, color: C.muted }}>This cannot be undone.</p>}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={{ ...btn(false), flex: 1 }} onClick={() => setPendingSize(null)}>Cancel</button>
                <button style={{ ...btn(true, willLose ? C.danger : C.accent, willLose ? "rgba(248,113,113,0.14)" : C.accentDim), flex: 1 }}
                  onClick={() => { applyGridSize(w, h); setPendingSize(null); }}>
                  {willLose ? "Apply & Remove tiles" : "Apply"}
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Folder panel — floating modal anchored near card (Task 4) ── */}
      {openFolderKey && (() => {
        // Search tileset + global entry lists for the open folder key
        const allEntries = [...tilesetEntries, ...globalEntries];
        const entry = allEntries.find(e => e.type === 'folder' && e.key === openFolderKey);
        if (!entry) return null;
        const cardSz = isMobile ? 46 : 56;
        const cols = 4;
        const panelW = cardSz * cols + 5 * (cols - 1) + 12; // 4 cols + gaps + padding
        const maxH = Math.min(360, window.innerHeight - 32);
        const anchorX = Math.min(folderPanelAnchor.x, window.innerWidth - panelW - 8);
        const anchorY = Math.min(folderPanelAnchor.y, window.innerHeight - maxH - 8);
        return (
          <div ref={folderPanelRef}
            style={{ position: "fixed", left: anchorX, top: anchorY, width: panelW, maxHeight: maxH,
              background: C.panel, border: `1px solid ${C.border}`, borderRadius: 10,
              boxShadow: "0 8px 32px rgba(0,0,0,0.7)", zIndex: 2000, overflow: "hidden",
              display: "flex", flexDirection: "column" }}>
            <div style={{ padding: "5px 8px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: 0.5 }}>{entry.label}</span>
              <button onClick={() => setOpenFolderKey(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 15, lineHeight: 1, padding: "0 2px" }}>×</button>
            </div>
            <div style={{ overflowY: "auto", padding: 6 }}>
              <div style={{ display: "grid", gridTemplateColumns: `repeat(${cols}, ${cardSz}px)`, gap: 5 }}>
                {entry.tiles.map(t => {
                  const active = sel === t.id && !eraser;
                  const failed = failedTiles.has(t.id);
                  const isStarredF = starredTiles.includes(t.id);
                  const rotatable = isTileRotatable(t);
                  const rotDeg = cardRotations[t.id] ?? 0;
                  return (
                    <div key={t.id}
                      onClick={() => {
                        if (failed) { setFailedWarning(true); return; }
                        if (rotatable && sel === t.id && !eraser) {
                          setCardRotations(prev => ({ ...prev, [t.id]: (prev[t.id] ?? 0) + 90 }));
                        }
                        setSel(t.id); setEraser(false); setHandMode(false);
                      }}
                      style={{ width: cardSz, height: cardSz, borderRadius: 8, cursor: failed ? "not-allowed" : "pointer",
                        border: `2px solid ${failed ? C.danger : active ? C.accentBright : C.border}`,
                        background: active ? C.accentDim : "transparent",
                        position: "relative", opacity: failed ? 0.55 : 1, overflow: "visible" }}>
                      <div style={{ position: "absolute", inset: 0, borderRadius: 6, overflow: "hidden", background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {failed ? <span style={{ fontSize: 18 }}>⚠️</span>
                          : <img src={t.blobSrc ?? t.src} alt="" onError={() => markFailed(t.id)} style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />}
                      </div>
                      {rotatable && (
                        <div style={{ position: "absolute", inset: 0, zIndex: 4, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                          <span style={{ fontSize: 17, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s", filter: "drop-shadow(0 1px 3px rgba(0,0,0,0.9))" }}>🐬</span>
                        </div>
                      )}
                      <span onClick={ev => { ev.stopPropagation(); setInfoTile(t.id); }}
                        style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredF ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                        title={isStarredF ? "Starred tile — click for info" : "Tile info"}>ⓘ</span>
                      <MultLabel t={t} />
                      <TileBadge t={t} />
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Drag ghost — follows cursor/finger while dragging a tile ── */}
      {dragTile && (() => {
        const t = getTile(dragTile);
        if (!t) return null;
        if (t.isSpace) return (
          <div style={{ position: "fixed", left: dragPos.x - (CELL * zoom) / 2, top: dragPos.y - (CELL * zoom) / 2,
            width: CELL * zoom, height: CELL * zoom, display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: CELL * zoom * 0.6, opacity: 0.65, pointerEvents: "none", zIndex: 9999 }}>🛸</div>
        );
        return (
          <img src={t.blobSrc ?? t.src} alt="" draggable={false}
            style={{
              position: "fixed",
              left: dragPos.x - (CELL * zoom) / 2,
              top:  dragPos.y - (CELL * zoom) / 2,
              width: CELL * zoom, height: CELL * zoom,
              objectFit: "contain", imageRendering: "pixelated",
              opacity: 0.65, pointerEvents: "none", zIndex: 9999,
              filter: "drop-shadow(0 2px 8px rgba(0,0,0,0.6))",
            }} />
        );
      })()}

      {/* ══ TOP BAR ══════════════════════════════════════════════════ */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "0 14px", height: 50, flexShrink: 0, background: C.panel, borderBottom: `1px solid ${C.border}` }}>
        <img src="favicon/favicon-32x32.png" alt="Ophelia" style={{ width: 28, height: 28, flexShrink: 0, imageRendering: "auto" }} />
        <span className="oph-title-text" style={{ fontFamily: "'Lilita One', cursive", fontWeight: 400, fontSize: isMobile ? 15 : 18, letterSpacing: 0.4, whiteSpace: "nowrap", flexShrink: 0, display: "inline-block" }}>
          Ophelia — Custom Theme Tester
        </span>
      </div>

      {/* ══ MIDDLE ROW: canvas with sidebars ════════════════════════ */}
      <div style={{ flex: 1, display: "flex", flexDirection: "row", overflow: "hidden", minHeight: 0 }}>

        {/* ── LEFT SIDEBAR: Tiles ──────────────────────────────────── */}
        <div style={{ display: "flex", flexDirection: "row", flexShrink: 0, alignSelf: "stretch" }}>
          {tilesOpen && (
            <div style={{ width: isMobile ? 160 : 240, background: C.panelDeep, borderRight: `1px solid ${C.border}`, borderRadius: "8px 0 0 8px", display: "flex", flexDirection: "column", overflow: "hidden", maxHeight: "min(88vh, 700px)" }}>
              <SectionHeader
                label={`Tiles (${tilesetTileCount + userTiles.length})`}
                open={tilesOpen}
                onToggle={() => setTilesOpen(o => !o)}
                right={uploadFlash > 0 ? (
                  <span style={{ fontSize: 10, fontWeight: 600, color: "#4ade80", background: "rgba(74,222,128,0.14)", border: "1px solid rgba(74,222,128,0.4)", borderRadius: 6, padding: "2px 6px" }}>
                    ✓ {uploadFlash}
                  </span>
                ) : null}
              />
              {/* Tileset selector — checkboxes, multiple visible simultaneously */}
              {manifest?.tilesets?.length > 0 && (
                <div style={{ padding: "5px 8px", borderBottom: `1px solid ${C.border}`, flexShrink: 0, display: "flex", flexWrap: "wrap", gap: 5, alignItems: "center" }}>
                  {manifest.tilesets.map(ts => {
                    const isActive = (activeTileset ?? manifest.tilesets[0]?.name) === ts.name;
                    return (
                      <label key={ts.name} style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", userSelect: "none" }}>
                        <input type="checkbox" checked={isActive} onChange={() => { if (!isActive) switchTileset(ts.name); }}
                          style={{ accentColor: C.accent, cursor: "pointer", width: 12, height: 12 }} />
                        <span style={{ fontSize: 11, color: isActive ? C.accentBright : C.text, fontWeight: isActive ? 600 : 400 }}>
                          {ts.name}{ts.name === "Sewer" ? " (WIP)" : ""}
                        </span>
                      </label>
                    );
                  })}
                </div>
              )}
              {/* Atlas button row */}
              <div style={{ padding: "4px 8px", borderBottom: `1px solid ${C.border}`, flexShrink: 0, display: "flex", alignItems: "center", gap: 6 }}>
                <button
                  onClick={() => { setAtlasOpen(o => !o); if (!atlasOpen && atlasItems === null) navigateAtlas(""); }}
                  style={{ ...btn(atlasOpen, C.accent, C.accentDim), fontSize: 10, padding: "3px 8px", flex: 1 }}
                  title="Browse She-Fairy/atlas-horizon tiles">
                  🗺 Atlas…
                </button>
                {atlasTiles.length > 0 && (
                  <span style={{ fontSize: 9, color: C.muted }}>{atlasTiles.length}</span>
                )}
              </div>

              {/* Atlas floating panel */}
              {atlasOpen && (() => {
                const isRoot = atlasPath === "";
                const pathParts = atlasPath ? atlasPath.split('/') : [];
                const imageExts = /\.(png|jpg|jpeg|gif|webp|svg|bmp)$/i;
                return (
                  <div style={{ position: "fixed", top: 80, left: isMobile ? 10 : 250, width: isMobile ? "calc(100vw - 20px)" : 320, maxHeight: 480, background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, boxShadow: "0 8px 32px rgba(0,0,0,0.75)", zIndex: 3000, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                    {/* Header */}
                    <div style={{ padding: "6px 10px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                      {!isRoot && (
                        <button onClick={() => { const up = pathParts.slice(0, -1).join('/'); navigateAtlas(up); }}
                          style={{ background: "none", border: "none", cursor: "pointer", color: C.accentBright, fontSize: 14, lineHeight: 1, padding: "0 2px" }} title="Go up">←</button>
                      )}
                      <span style={{ fontSize: 10, color: C.accent, fontWeight: 700, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        Resources{atlasPath ? ' / ' + pathParts.join(' / ') : ' /'}
                      </span>
                      <button onClick={() => setAtlasOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 16, lineHeight: 1, padding: "0 2px" }}>×</button>
                    </div>
                    {/* Add all in folder button (non-root) */}
                    {!isRoot && atlasItems && atlasItems.length > 0 && (
                      <div style={{ padding: "4px 8px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
                        <button
                          onClick={async () => {
                            const imageFiles = atlasItems.filter(f => f.type === 'file' && imageExts.test(f.name));
                            if (imageFiles.length === 0) return;
                            const groupName = pathParts[pathParts.length - 1];
                            await addAtlasTilesetFolder(groupName, imageFiles);
                          }}
                          style={{ ...btn(false, C.soft, "rgba(252,211,77,0.12)"), fontSize: 10, padding: "3px 8px", width: "100%" }}>
                          + Add all tiles in this folder
                        </button>
                      </div>
                    )}
                    {/* Error */}
                    {atlasError && (
                      <div style={{ padding: "6px 10px", color: "#f87171", fontSize: 11, borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>{atlasError}</div>
                    )}
                    {/* Content */}
                    <div style={{ overflowY: "auto", flex: 1, padding: "4px 0" }}>
                      {atlasLoading ? (
                        <div style={{ padding: "12px 10px", color: C.muted, fontSize: 11, textAlign: "center" }}>Loading…</div>
                      ) : atlasItems === null ? null : atlasItems.length === 0 ? (
                        <div style={{ padding: "12px 10px", color: C.muted, fontSize: 11, textAlign: "center" }}>Empty folder</div>
                      ) : atlasItems.map(item => {
                        const isDir = item.type === 'dir';
                        const isImg = !isDir && imageExts.test(item.name);
                        if (!isDir && !isImg) return null;
                        const relPath = item.path.replace(/^Resources\//, '');
                        const rawSrc = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${relPath}`;
                        const alreadyAdded = atlasTiles.some(t => t.src === rawSrc);
                        return (
                          <div key={item.name}
                            onClick={() => {
                              if (isDir) {
                                if (isRoot) {
                                  // Root folder click: offer "As Group" vs "Individually"
                                  const choice = confirm(`Add all tiles in "${item.name}" as a group (OK) or browse individually (Cancel)?`);
                                  if (choice) {
                                    // As Group: fetch folder then add all
                                    (async () => {
                                      try {
                                        const files = await fetchAtlasDir(relPath);
                                        addAtlasTilesetFolder(item.name, Array.isArray(files) ? files : []);
                                      } catch {}
                                    })();
                                  } else {
                                    navigateAtlas(relPath);
                                  }
                                } else {
                                  navigateAtlas(relPath);
                                }
                              } else {
                                if (!alreadyAdded) addAtlasTile(relPath);
                              }
                            }}
                            style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 10px", cursor: "pointer", background: "transparent", transition: "background 0.1s" }}
                            onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.07)"}
                            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                            {isDir ? (
                              <span style={{ fontSize: 14, lineHeight: 1, flexShrink: 0 }}>📁</span>
                            ) : (
                              <div style={{ width: 20, height: 20, flexShrink: 0, background: C.panelDeep, borderRadius: 3, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
                                <img src={rawSrc} alt="" style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated" }} />
                              </div>
                            )}
                            <span style={{ fontSize: 10, color: C.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}</span>
                            {!isDir && alreadyAdded && <span style={{ fontSize: 10, color: "#4ade80", flexShrink: 0 }}>✓</span>}
                            {isDir && <span style={{ fontSize: 10, color: C.muted, flexShrink: 0 }}>›</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              <input ref={fileRef} type="file" accept={ACCEPTED} multiple style={{ display: "none" }}
                onChange={e => { loadFiles(e.target.files); e.target.value = ""; }} />
              <div style={{ overflowY: "auto", flex: 1, padding: "8px 8px 10px" }}>
                {(() => {
                  // Desktop: 64px cards, 5px gaps. Mobile: 56px cards, 5px gaps, 2 per row.
                  const cardSz  = isMobile ? 56 : 64;
                  const cardGap = 5;

                  const RotChevron = ({ rotDeg }) => (
                    <div style={{ position: "absolute", inset: 0, zIndex: 4, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                      <span style={{ fontSize: 17, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s", filter: "drop-shadow(0 1px 3px rgba(0,0,0,0.9))" }}>🐬</span>
                    </div>
                  );
                  const renderFlatCard = t => {
                    const active    = sel === t.id && !eraser;
                    const failed    = failedTiles.has(t.id);
                    const rotatable = isTileRotatable(t);
                    const rotDeg    = cardRotations[t.id] ?? 0;
                    const isStarred = starredTiles.includes(t.id);
                    return (
                      <div key={t.id}
                        onClick={() => {
                          if (failed) { setFailedWarning(true); return; }
                          if (rotatable && sel === t.id && !eraser) {
                            // Already selected rotatable tile: rotate 90° clockwise
                            setCardRotations(prev => ({ ...prev, [t.id]: (prev[t.id] ?? 0) + 90 }));
                          }
                          setSel(t.id); setEraser(false); setHandMode(false);
                        }}
                        style={{ flexShrink: 0, width: cardSz, height: cardSz, borderRadius: 8, cursor: failed ? "not-allowed" : "pointer", border: `2px solid ${failed ? C.danger : active ? C.accentBright : C.border}`, background: failed ? "rgba(248,113,113,0.08)" : active ? C.accentDim : "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", opacity: failed ? 0.55 : 1, position: "relative", overflow: "visible" }}>
                        {/* Inner clipped area for image */}
                        <div style={{ position: "absolute", inset: 0, borderRadius: 6, overflow: "hidden", background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          {failed ? <span style={{ fontSize: 20 }}>⚠️</span>
                            : <img src={t.blobSrc ?? t.src} alt="" onError={() => markFailed(t.id)} style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />}
                        </div>
                        {rotatable && <RotChevron rotDeg={rotDeg} />}
                        {/* Info button: yellow if starred, white otherwise — top-right corner */}
                        <span onClick={e => { e.stopPropagation(); setInfoTile(t.id); }}
                          style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: isStarred ? 11 : 13, cursor: "pointer", color: isStarred ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                          title={isStarred ? "Starred tile — click for info" : "Tile info"}>{isStarred ? "★" : "ⓘ"}</span>
                        <MultLabel t={t} />
                        <TileBadge t={t} />
                      </div>
                    );
                  };

                  const renderFolderCard = entry => {
                    const { key, label, tiles: fTiles } = entry;
                    const isThisOpen = openFolderKey === key;
                    const folderActive = !eraser && fTiles.some(t => t.id === sel);
                    const previewTiles = fTiles.slice(0, 4);
                    return (
                      <div key={key}
                        onClick={e => toggleFolder(key, e)}
                        onMouseDown={e => e.stopPropagation()}
                        onTouchStart={e => e.stopPropagation()}
                        style={{ flexShrink: 0, width: cardSz, height: cardSz, borderRadius: 8, cursor: "pointer",
                          border: `2px solid ${folderActive ? C.soft : isThisOpen ? C.accent : C.border}`,
                          background: folderActive ? "rgba(252,211,77,0.07)" : isThisOpen ? C.accentDim : C.panelDeep,
                          overflow: "hidden", position: "relative",
                          transition: "border 0.12s, background 0.12s" }}>
                        {/* 2×2 preview grid — fills full card, no label strip */}
                        <div style={{ position: "absolute", inset: 0, display: "grid", gridTemplateColumns: "1fr 1fr", gridTemplateRows: "1fr 1fr", gap: 1 }}>
                          {previewTiles.map(t => (
                            <div key={t.id} style={{ background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                              <img src={t.blobSrc ?? t.src} alt="" style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated", opacity: 0.55 }} />
                            </div>
                          ))}
                          {Array.from({ length: Math.max(0, 4 - previewTiles.length) }).map((_, i) => (
                            <div key={`e${i}`} style={{ background: C.panelDeep }} />
                          ))}
                        </div>
                        {/* Chevron — full white, large and tappable */}
                        <div style={{ position: "absolute", inset: 0, zIndex: 3, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                          <span style={{ fontSize: 22, lineHeight: 1, color: C.text,
                            display: "inline-block", transform: isThisOpen ? "rotate(0deg)" : "rotate(-90deg)", transition: "transform 0.15s",
                            filter: "drop-shadow(0 1px 3px rgba(0,0,0,0.9))" }}>▼</span>
                        </div>
                      </div>
                    );
                  };

                  const renderEntry = entry => entry.type === 'flat' ? renderFlatCard(entry.tile) : renderFolderCard(entry);

                  return (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: cardGap }}>
                  {/* ── Essentials section ── */}
                  <div onClick={() => setPanelCollapsed(p => ({ ...p, essentials: !p.essentials }))}
                    style={{ width: "100%", flexBasis: "100%", flexShrink: 0, display: "flex", alignItems: "center", gap: 4, padding: "3px 2px", cursor: "pointer", userSelect: "none" }}>
                    <span style={{ fontSize: 9, color: C.muted, lineHeight: 1 }}>{panelCollapsed.essentials ? "▶" : "▼"}</span>
                    <span style={{ fontSize: 9, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.8 }}>Essentials</span>
                    <div style={{ flex: 1, height: 1, background: C.border, marginLeft: 4 }} />
                  </div>
                  {!panelCollapsed.essentials && (<>
                  {/* 1. Eraser */}
                  {(() => {
                    const isStarredErase = starredTiles.includes("erase");
                    return (
                      <div onClick={() => { setEraser(true); setSel(null); setHandMode(false); }}
                        style={{ flexShrink: 0, width: cardSz, borderRadius: 8, cursor: "pointer", border: `2px solid ${eraser ? C.danger : C.border}`, background: eraser ? "rgba(248,113,113,0.14)" : "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", position: "relative", overflow: "visible" }}>
                        <div style={{ borderRadius: 6, overflow: "hidden" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", background: eraser ? "rgba(248,113,113,0.32)" : "rgba(248,113,113,0.14)", padding: "2px 4px" }}>
                            <span style={{ fontSize: 9, fontWeight: 700, color: eraser ? C.danger : "rgba(248,113,113,0.7)" }}>Erase</span>
                          </div>
                          <div style={{ height: cardSz - 18, background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <span style={{ fontSize: 20, lineHeight: 1, opacity: eraser ? 1 : 0.55 }}>🧼</span>
                          </div>
                        </div>
                        <span onClick={e => { e.stopPropagation(); setInfoTool("erase"); }}
                          style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredErase ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                          title="Erase info">ⓘ</span>
                      </div>
                    );
                  })()}
                  {/* 1b. Hand (pan) */}
                  {(() => {
                    const isStarredHand = starredTiles.includes("hand");
                    return (
                      <div onClick={() => { setHandMode(h => !h); setEraser(false); setSel(null); }}
                        style={{ flexShrink: 0, width: cardSz, borderRadius: 8, cursor: "pointer", border: `2px solid ${handMode ? "#fbbf24" : C.border}`, background: handMode ? "rgba(251,191,36,0.14)" : "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", position: "relative", overflow: "visible" }}>
                        <div style={{ borderRadius: 6, overflow: "hidden" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", background: handMode ? "rgba(251,191,36,0.28)" : "rgba(251,191,36,0.08)", padding: "2px 4px" }}>
                            <span style={{ fontSize: 9, fontWeight: 700, color: handMode ? "#fbbf24" : C.muted }}>Hand</span>
                          </div>
                          <div style={{ height: cardSz - 18, background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <span style={{ fontSize: 20, lineHeight: 1, opacity: handMode ? 1 : 0.55 }}>👋</span>
                          </div>
                        </div>
                        <span onClick={e => { e.stopPropagation(); setInfoTool("hand"); }}
                          style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredHand ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                          title="Hand info">ⓘ</span>
                      </div>
                    );
                  })()}
                  {/* 1c. Eyedropper */}
                  {(() => {
                    return (
                      <div onClick={() => { setEyedropperMode(prev => !prev); setEraser(false); setHandMode(false); if (!eyedropperMode) setSel(null); }}
                        style={{ flexShrink: 0, width: cardSz, borderRadius: 8, cursor: "pointer", border: `2px solid ${eyedropperMode ? C.accentBright : C.border}`, background: eyedropperMode ? C.accentDim : "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", position: "relative", overflow: "visible" }}>
                        <div style={{ borderRadius: 6, overflow: "hidden" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", background: eyedropperMode ? "rgba(125,211,252,0.22)" : "rgba(125,211,252,0.06)", padding: "2px 4px" }}>
                            <span style={{ fontSize: 9, fontWeight: 700, color: eyedropperMode ? C.accentBright : C.muted }}>Pick</span>
                          </div>
                          <div style={{ height: cardSz - 18, background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <span style={{ fontSize: 20, lineHeight: 1, opacity: eyedropperMode ? 1 : 0.55 }}>🧪</span>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                  {/* 1d. Space tile — in Essentials */}
                  {(() => {
                    const isStarredSpace = starredTiles.includes(SPACE_TILE_ID);
                    const spaceActive = sel === SPACE_TILE_ID && !eraser;
                    return (
                      <div onClick={() => { setSel(SPACE_TILE_ID); setEraser(false); setHandMode(false); }}
                        style={{ flexShrink: 0, width: cardSz, borderRadius: 8, cursor: "pointer",
                          border: `2px solid ${spaceActive ? C.accentBright : C.border}`,
                          background: spaceActive ? C.accentDim : "rgba(255,255,255,0.03)",
                          transition: "border 0.12s, background 0.12s", position: "relative", overflow: "visible" }}
                        title="Space — makes cell transparent">
                        <div style={{ borderRadius: 6, overflow: "hidden" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", background: spaceActive ? "rgba(125,211,252,0.22)" : "rgba(125,211,252,0.08)", padding: "2px 4px" }}>
                            <span style={{ fontSize: 9, fontWeight: 700, color: spaceActive ? C.accentBright : C.muted }}>Space</span>
                          </div>
                          <div style={{ height: cardSz - 18, background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <span style={{ fontSize: 20, lineHeight: 1 }}>🛸</span>
                          </div>
                        </div>
                        <span onClick={e => { e.stopPropagation(); setInfoTool("space"); }}
                          style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredSpace ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                          title="Space info">ⓘ</span>
                      </div>
                    );
                  })()}
                  </>)}
                  {tilesLoading ? (
                    <p style={{ fontSize: 12, color: C.muted, alignSelf: "center" }}>Loading…</p>
                  ) : (<>
                    {/* ── Section header helper ── */}
                    {(() => {
                      const SectionHeader = ({ id, label, count }) => (
                        <div onClick={() => setPanelCollapsed(p => ({ ...p, [id]: !p[id] }))}
                          style={{ width: "100%", flexBasis: "100%", flexShrink: 0, display: "flex", alignItems: "center", gap: 4, padding: "3px 2px", cursor: "pointer", userSelect: "none", marginTop: 4 }}>
                          <span style={{ fontSize: 9, color: C.muted, lineHeight: 1 }}>{panelCollapsed[id] ? "▶" : "▼"}</span>
                          <span style={{ fontSize: 9, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: 0.8 }}>{label}</span>
                          {count > 0 && <span style={{ fontSize: 8, color: C.muted, marginLeft: 2 }}>({count})</span>}
                          <div style={{ flex: 1, height: 1, background: C.border, marginLeft: 4 }} />
                        </div>
                      );
                      // Active tileset name for the section label
                      const tsName = activeTileset ?? manifest?.tilesets?.[0]?.name ?? "Tileset";
                      return (<>
                        {/* ── Tileset tiles ── */}
                        {tilesetEntries.length > 0 && (<>
                          <SectionHeader id="tileset" label={tsName} count={tilesetEntries.reduce((n, e) => n + (e.tiles?.length ?? 1), 0)} />
                          {!panelCollapsed.tileset && tilesetEntries.map(renderEntry)}
                        </>)}
                        {/* ── User Uploaded ── */}
                        {(userTiles.length > 0 || true) && (<>
                          <SectionHeader id="user" label="User Uploaded" count={userTiles.length} />
                          {!panelCollapsed.user && (<>
                            {userTiles.map(t => renderFlatCard(t))}
                            <div onClick={() => fileRef.current.click()}
                              style={{ flexShrink: 0, width: cardSz, height: cardSz, borderRadius: 8, cursor: "pointer", border: `2px dashed ${C.border}`, background: "rgba(255,255,255,0.03)", overflow: "hidden", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2 }}
                              title="Upload tiles">
                              <span style={{ fontSize: 22, color: C.muted, lineHeight: 1, fontWeight: 300 }}>+</span>
                              <span style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.8, lineHeight: 1 }}>Upload</span>
                            </div>
                          </>)}
                        </>)}
                        {/* ── Global ── */}
                        {globalEntries.length > 0 && (<>
                          <SectionHeader id="global" label="Global" count={globalEntries.reduce((n, e) => n + (e.tiles?.length ?? 1), 0)} />
                          {!panelCollapsed.global && globalEntries.map(renderEntry)}
                        </>)}
                      </>);
                    })()}
                    {/* 6b. Atlas Explored section */}
                    {atlasTiles.length > 0 && (() => {
                      const groups = {};
                      const ungrouped = [];
                      atlasTiles.forEach(t => {
                        if (t.atlasTilesetGroup) {
                          if (!groups[t.atlasTilesetGroup]) groups[t.atlasTilesetGroup] = [];
                          groups[t.atlasTilesetGroup].push(t);
                        } else ungrouped.push(t);
                      });
                      return (<>
                        <div onClick={() => setPanelCollapsed(p => ({ ...p, atlas: !p.atlas }))}
                          style={{ width: "100%", flexBasis: "100%", flexShrink: 0, display: "flex", alignItems: "center", gap: 4, padding: "3px 2px", cursor: "pointer", userSelect: "none", marginTop: 4 }}>
                          <span style={{ fontSize: 9, color: C.muted, lineHeight: 1 }}>{panelCollapsed.atlas ? "▶" : "▼"}</span>
                          <span style={{ fontSize: 9, fontWeight: 700, color: C.accent, textTransform: "uppercase", letterSpacing: 0.8 }}>Atlas Explored</span>
                          <span style={{ fontSize: 8, color: C.muted, marginLeft: 2 }}>({atlasTiles.length})</span>
                          <div style={{ flex: 1, height: 1, background: C.border, marginLeft: 4 }} />
                          <button onClick={e => { e.stopPropagation(); if (confirm("Remove all atlas tiles?")) setAtlasTiles([]); }}
                            style={{ ...btn(false, C.danger, "rgba(248,113,113,0.14)"), fontSize: 8, padding: "1px 5px" }}>✕ Clear</button>
                        </div>
                        {!panelCollapsed.atlas && (<>
                          {ungrouped.map(t => renderFlatCard(t))}
                          {Object.entries(groups).map(([groupName, gTiles]) => (
                            <React.Fragment key={groupName}>
                              <div style={{ width: "100%", flexBasis: "100%", flexShrink: 0, marginTop: 4, marginBottom: 2 }}>
                                <span style={{ fontSize: 9, color: C.muted, fontWeight: 600 }}>📁 {groupName}</span>
                              </div>
