  // ── Convert modal — remap tileset tiles on the board ────────────
  const ConvertModal = () => {
    if (!convertOpen) return null;
    const opheliaTilesets = manifest?.tilesets ?? [];
    // Show ALL Ophelia tilesets from manifest, and all Atlas tilesets that have tiles loaded
    const allOpheliaList = opheliaTilesets;
    const allAtlasList   = atlasTilesetList ?? [];
    const allAvailableNames = [
      ...allOpheliaList.map(ts => ts.name),
      ...allAtlasList.map(a => a.name),
    ];

    const defaultFrom = activeTileset ?? allAvailableNames[0] ?? "";
    const defaultTo   = allAvailableNames.find(n => n !== defaultFrom) ?? "";
    const [fromTs, setFromTs] = React.useState(defaultFrom);
    const [toTs,   setToTs]   = React.useState(defaultTo);

    // Build Ophelia ID maps (key-based, sequential IDs from manifest)
    const buildOpheliaIdMaps = () => {
      let id = TILESET_ID_START;
      const maps = {};
      const WATER_CNS = ["waterbend","watercorner","waterline","waterfill","waterdoublebend","waterdoubleline","waterfull"];
      for (const tsDef of opheliaTilesets) {
        const m = {};
        for (const key of (tsDef.order ?? [])) {
          if (tsDef.folders?.[key]) {
            if (key === "water") {
              tsDef.folders[key].forEach((_, i) => { m[WATER_CNS[i] ?? `water${i}`] = [id++]; });
            } else {
              m[key] = tsDef.folders[key].map(() => id++);
            }
          } else if (tsDef.files?.[key]) m[key] = [id++];
        }
        maps[tsDef.name] = m;
      }
      return maps;
    };

    // Normalize a codename for cross-system matching:
    // "Wall1"→"wall", "Wall2"→"wall2", "Crate"→"crate", "FenceH"→"fenceh"
    // Strips trailing "1" so "Wall1" and "Wall" both map to "wall"
    const normCode = s => s.toLowerCase().replace(/1$/, '') || s.toLowerCase();

    // Build Atlas ID maps (normCode-keyed, from loaded atlasTiles)
    const buildAtlasCodenameMap = (tsName) => {
      const m = {};
      atlasTiles.filter(t => t.atlasTilesetName === tsName).forEach(t => { m[normCode(t.baseCodename)] = t.id; });
      return m;
    };

    // Cross-system remap builder: Ophelia key-map ↔ Atlas tile list
    const buildCrossSystemRemap = (opheliaKeyMap, atlasTilesList) => {
      const remap = {};
      const fromIds = new Set();
      // Build lookup: normalizedName → Atlas tile (flat tiles)
      const atlasFlat = atlasTilesList.filter(t => !t.atlasFolderName);
      const atlasByNorm = {};
      atlasFlat.forEach(t => {
        const norm = normCode(t.baseCodename);
        if (!atlasByNorm[norm]) atlasByNorm[norm] = t;
      });
      // Build folder lookup: folderName → sorted tiles by id
      const atlasByFolder = {};
      atlasTilesList.filter(t => t.atlasFolderName).forEach(t => {
        if (!atlasByFolder[t.atlasFolderName]) atlasByFolder[t.atlasFolderName] = [];
        atlasByFolder[t.atlasFolderName].push(t);
      });
      Object.values(atlasByFolder).forEach(arr => arr.sort((a, b) => a.id - b.id));
      // Index trackers for folder-based matching
      const folderIdx = {};
      const usedAtlasIds = new Set();

      for (const [key, opheliaIds] of Object.entries(opheliaKeyMap)) {
        opheliaIds.forEach(oid => fromIds.add(oid));
        const norm = normCode(key);
        // Try flat tile match first (with skull/breakable alias)
        const flatMatch = atlasByNorm[norm] ?? atlasByNorm[norm === 'breakable' ? 'skull' : norm === 'skull' ? 'breakable' : ''];
        if (flatMatch) {
          opheliaIds.forEach(oid => { remap[oid] = flatMatch.id; });
          usedAtlasIds.add(flatMatch.id);
          continue;
        }
        // Identify folder type from key prefix (Fence/Rope/Water/objectives)
        const FOLDER_PREFIXES = [
          ["fence", "Fence"], ["rope", "Rope"], ["water", "Water"],
          ["ball", "Gamemode_Specifics"], ["safe", "Gamemode_Specifics"],
          ["mine", "Gamemode_Specifics"], ["gem", "Gamemode_Specifics"],
          ["obj", "Gamemode_Specifics"], ["skull", "Gamemode_Specifics"],
        ];
        const folderMatch = FOLDER_PREFIXES.find(([prefix]) => norm.startsWith(prefix));
        if (folderMatch) {
          const folderName = folderMatch[1];
          const folderTiles = atlasByFolder[folderName] ?? [];
          const nameMatch = folderTiles.find(t => normCode(t.baseCodename) === norm);
          if (nameMatch) {
            opheliaIds.forEach(oid => { remap[oid] = nameMatch.id; });
            usedAtlasIds.add(nameMatch.id);
          } else {
            const availTiles = folderTiles.filter(t => !usedAtlasIds.has(t.id));
            const idx = folderIdx[folderName] ?? 0;
            if (idx < availTiles.length) {
              opheliaIds.forEach(oid => { remap[oid] = availTiles[idx].id; });
              usedAtlasIds.add(availTiles[idx].id);
              folderIdx[folderName] = idx + 1;
            }
          }
        }
      }
      return { remap, fromIds };
    };

    // Compute remap
    const opheliaIdMaps = buildOpheliaIdMaps();
    const idRemap = {};
    const fromAll = new Set();

    const fromIsOphelia = !!opheliaIdMaps[fromTs];
    const toIsOphelia   = !!opheliaIdMaps[toTs];

    if (fromIsOphelia && toIsOphelia) {
      // Ophelia→Ophelia: key-based remap
      const fromMap = opheliaIdMaps[fromTs] ?? {};
      const toMap   = opheliaIdMaps[toTs]   ?? {};
      Object.values(fromMap).flat().forEach(id => fromAll.add(id));
      for (const key of Object.keys(fromMap)) {
        const oIds = fromMap[key], nIds = toMap[key];
        if (nIds) oIds.forEach((oid, i) => { if (i < nIds.length) idRemap[oid] = nIds[i]; });
      }
    } else if (!fromIsOphelia && !toIsOphelia && fromTs && toTs) {
      // Atlas→Atlas: normCode-based remap (robust across tilesets with slightly different naming)
      const fromCodeMap = buildAtlasCodenameMap(fromTs);
      const toCodeMap   = buildAtlasCodenameMap(toTs);
      Object.entries(fromCodeMap).forEach(([code, fromId]) => {
        fromAll.add(fromId);
        if (toCodeMap[code] !== undefined) idRemap[fromId] = toCodeMap[code];
      });
    } else if (fromIsOphelia && !toIsOphelia) {
      // Ophelia→Atlas: cross-system match via normalized codenames
      const fromMap = opheliaIdMaps[fromTs] ?? {};
      const atlasTs = atlasTiles.filter(t => t.atlasTilesetName === toTs);
      const { remap, fromIds } = buildCrossSystemRemap(fromMap, atlasTs);
      fromIds.forEach(id => fromAll.add(id));
      Object.assign(idRemap, remap);
    } else if (!fromIsOphelia && toIsOphelia) {
      // Atlas→Ophelia: reverse cross-system match
      const toMap = opheliaIdMaps[toTs] ?? {};
      const atlasTs = atlasTiles.filter(t => t.atlasTilesetName === fromTs);
      atlasTs.forEach(t => fromAll.add(t.id));
      // Build reverse: Atlas baseCodename → Ophelia key IDs
      const atlasFlat = atlasTs.filter(t => !t.atlasFolderName);
      const atlasByNorm = {};
      atlasFlat.forEach(t => { const n = normCode(t.baseCodename); if (!atlasByNorm[n]) atlasByNorm[n] = t.id; });
      const atlasByFolder = {};
      atlasTs.filter(t => t.atlasFolderName).forEach(t => {
        if (!atlasByFolder[t.atlasFolderName]) atlasByFolder[t.atlasFolderName] = [];
        atlasByFolder[t.atlasFolderName].push(t);
      });
      Object.values(atlasByFolder).forEach(arr => arr.sort((a, b) => a.id - b.id));
      const FOLDER_PREFIXES = [
        ["fence", "Fence"], ["rope", "Rope"], ["water", "Water"],
        ["ball", "Gamemode_Specifics"], ["safe", "Gamemode_Specifics"],
        ["mine", "Gamemode_Specifics"], ["gem", "Gamemode_Specifics"],
        ["obj", "Gamemode_Specifics"], ["skull", "Gamemode_Specifics"],
      ];
      const folderIdx = {};
      for (const [key, opheliaIds] of Object.entries(toMap)) {
        const norm = normCode(key);
        const aliasNorm = norm === 'breakable' ? 'skull' : norm === 'skull' ? 'breakable' : null;
        const atlasId = atlasByNorm[norm] ?? (aliasNorm != null ? atlasByNorm[aliasNorm] : undefined);
        if (atlasId !== undefined) {
          opheliaIds.forEach(oid => { idRemap[atlasId] = oid; });
          continue;
        }
        const folderMatch = FOLDER_PREFIXES.find(([prefix]) => norm.startsWith(prefix));
        if (folderMatch) {
          const folderName = folderMatch[1];
          const folderTiles = atlasByFolder[folderName] ?? [];
          const nameMatch = folderTiles.find(t => normCode(t.baseCodename) === norm);
          if (nameMatch) {
            opheliaIds.forEach(oid => { idRemap[nameMatch.id] = oid; });
          } else {
            const availTiles = folderTiles.filter(t => idRemap[t.id] === undefined);
            const idx = folderIdx[folderName] ?? 0;
            if (idx < availTiles.length) {
              opheliaIds.forEach(oid => { idRemap[availTiles[idx].id] = oid; });
              folderIdx[folderName] = idx + 1;
            }
          }
        }
      }
    }

    const boardFromIds = new Set();
    grid.forEach(row => row.forEach(id => { if (id != null && fromAll.has(id)) boardFromIds.add(id); }));
    const unmapped = [...boardFromIds].filter(id => idRemap[id] === undefined);
    const mappable = [...boardFromIds].filter(id => idRemap[id] !== undefined);

    const doConvert = () => {
      const newGrid = grid.map(row => row.map(id =>
        (id != null && fromAll.has(id) && idRemap[id] !== undefined) ? idRemap[id] : id
      ));
      setGrid(newGrid);
      setConvertOpen(false);
    };

    const getDisplayName = (name) => {
      const atlasDef = atlasTilesetList?.find(a => a.name === name);
      return atlasDef ? atlasDef.displayName : name;
    };

    const TsSelect = ({ value, onChange }) => (
      <select value={value} onChange={e => onChange(e.target.value)}
        style={{ background: C.panel, color: C.text, border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 11, padding: "3px 6px", cursor: "pointer", outline: "none" }}>
        {allOpheliaList.length > 0 && (
          <optgroup label="Ophelia">
            {allOpheliaList.map(ts => <option key={ts.name} value={ts.name}>{ts.name}</option>)}
          </optgroup>
        )}
        {allAtlasList.length > 0 && (
          <optgroup label="Atlas">
            {allAtlasList.map(a => <option key={a.name} value={a.name}>{a.displayName}</option>)}
          </optgroup>
        )}
      </select>
    );

    return (
      <div className="modal-backdrop" onClick={() => setConvertOpen(false)}>
        <div className="modal-box" style={{ maxWidth: 360 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Convert Tileset Tiles</span>
            <button onClick={() => setConvertOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.6 }}>Remaps tiles on the board from one tileset to another by matching tile names. Tiles with no equivalent in the target tileset are left unchanged.</p>
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 3, flex: 1 }}>
              <span style={{ fontSize: 10, color: C.muted }}>From</span>
              <TsSelect value={fromTs} onChange={v => {
                setFromTs(v);
                if (v === toTs) {
                  const alt = allAvailableNames.find(n => n !== v);
                  if (alt) setToTs(alt);
                }
              }} />
            </div>
            <span style={{ color: C.muted, fontSize: 18, marginTop: 14 }}>→</span>
            <div style={{ display: "flex", flexDirection: "column", gap: 3, flex: 1 }}>
              <span style={{ fontSize: 10, color: C.muted }}>To</span>
              <TsSelect value={toTs} onChange={v => {
                setToTs(v);
                if (v === fromTs) {
                  const alt = allAvailableNames.find(n => n !== v);
                  if (alt) setFromTs(alt);
                }
              }} />
            </div>
          </div>
          {fromTs && toTs && fromTs !== toTs && (
            <div style={{ fontSize: 11, color: C.text, background: C.panelAlt ?? "rgba(0,0,0,0.2)", borderRadius: 6, padding: "6px 10px" }}>
              <div>{mappable.length} tile type{mappable.length !== 1 ? "s" : ""} will be converted.</div>
              {unmapped.length > 0 && <div style={{ color: "#fbbf24" }}>{unmapped.length} type{unmapped.length !== 1 ? "s" : ""} have no match in {getDisplayName(toTs)} and will stay as-is.</div>}
            </div>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{ ...btn(true, C.accent, C.accentDim), flex: 1 }}
              disabled={!fromTs || !toTs || fromTs === toTs}
              onClick={doConvert}>
              Convert
            </button>
            <button style={btn(false)} onClick={() => setConvertOpen(false)}>Cancel</button>
          </div>
        </div>
      </div>
    );
  };

  // ── Hotkeys modal ─────────────────────────────────────────────
  const HotkeysModal = () => {
    if (!hotkeysOpen) return null;
    const keys = [
      ["E", "Erase tool"],
      ["W", "Pick (eyedropper) tool"],
      ["R", "Rotate selected tile"],
      ["C", "Open Convert modal"],
      ["Z / Ctrl+Z", "Undo"],
      ["X / Ctrl+Y", "Redo"],
      ["Escape", "Clear highlight"],
      ["Arrow keys", "Pan the map"],
      ["+/-", "Zoom in/out"],
    ];
    return (
      <div className="modal-backdrop" onClick={() => setHotkeysOpen(false)}>
        <div className="modal-box" style={{ maxWidth: 320 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Hotkeys</span>
            <button onClick={() => setHotkeysOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {keys.map(([key, desc]) => (
              <div key={key} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <kbd style={{ background: "rgba(0,0,0,0.35)", border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 7px", fontSize: 11, fontFamily: "monospace", color: C.accentBright, minWidth: 80, textAlign: "center", flexShrink: 0 }}>{key}</kbd>
                <span style={{ fontSize: 11, color: C.text }}>{desc}</span>
              </div>
            ))}
          </div>
          <button style={btn(false)} onClick={() => setHotkeysOpen(false)}>Close</button>
        </div>
      </div>
    );
  };

  // ─────────────────────────────────────────────────────────────────
  // Grid size in pixels (at current zoom)
  const gW = gridW * CELL * zoom;
  const gH = gridH * CELL * zoom;

  return (
    <div style={{
      display: "flex", flexDirection: "column", height: "100dvh",
      background: C.bg, color: C.text, fontFamily: "'Inter', sans-serif",
      overflow: "hidden",
      paddingTop: "env(safe-area-inset-top)", paddingBottom: "env(safe-area-inset-bottom)",
      paddingLeft: "env(safe-area-inset-left)", paddingRight: "env(safe-area-inset-right)",
    }}>

      <InfoModal />
      <ReplaceModal />
      <OTGSettingsModal />
      <HistoryModal />
      <FailedTileModal />
      <ToolInfoModal />
      <MemoryModal />
      <ConvertModal />
      <HotkeysModal />

      {/* Grid load warning banner */}
      {gridLoadWarning && (
        <div style={{ position: "fixed", bottom: 16, left: "50%", transform: "translateX(-50%)", zIndex: 3000, background: "rgba(30,20,5,0.97)", border: "1px solid rgba(251,191,36,0.5)", borderRadius: 8, padding: "8px 14px", display: "flex", alignItems: "center", gap: 10, boxShadow: "0 4px 20px rgba(0,0,0,0.6)", maxWidth: 420 }}>
          <span style={{ fontSize: 16 }}>⚠️</span>
          <span style={{ fontSize: 11, color: "#fef3c7", lineHeight: 1.5, flex: 1 }}>
            {gridLoadWarning} tile{gridLoadWarning > 1 ? "s" : ""} from your saved map could not be matched to any loaded tile and were cleared. This can happen after a tileset update.
          </span>
          <button onClick={() => setGridLoadWarning(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "#fbbf24", fontSize: 16, lineHeight: 1, padding: "0 2px", flexShrink: 0 }}>×</button>
        </div>
      )}

      {/* Clear Atlas Cache modal */}
      {clearAtlasOpen && (() => {
        const shownAtlasSet = new Set(shownAtlasTilesets ?? []);
        const onAtlasTileset = shownAtlasSet.size > 0;
        const clearAtlasTiles = (keepShown) => {
          const keepSet = keepShown ? shownAtlasSet : new Set();
          const toRemove = atlasTiles.filter(t => !keepSet.has(t.atlasTilesetName));
          if (toRemove.length === 0) { setClearAtlasOpen(false); return; }
          if (!confirm(`Clear ${toRemove.length} tile(s) from ${[...new Set(toRemove.map(t => t.atlasTilesetName))].length} tileset(s)? Atlas tiles on the map will be erased. This cannot be undone.`)) return;
          const removeIds = new Set(toRemove.map(t => t.id));
          setAtlasTiles(prev => prev.filter(t => !removeIds.has(t.id)));
          if (!keepShown) setShownAtlasTilesets([]);
          else setShownAtlasTilesets(prev => prev.filter(n => keepSet.has(n)));
          setGrid(prev => prev.map(row => row.map(cell => removeIds.has(cell) ? null : cell)));
          const cleanObj = obj => { const n = { ...obj }; toRemove.forEach(t => delete n[t.id]); return n; };
          setTileMultipliers(cleanObj); setTileOffsets(cleanObj);
          setRotatableMap(cleanObj); setAllowFlipMap(cleanObj);
          setPriorityTiles(cleanObj); setBottomTiles(cleanObj);
          setTileNames(cleanObj); setMirrorOffsetTiles(cleanObj);
          setStarredTiles(prev => prev.filter(id => !removeIds.has(id)));
          if (removeIds.has(sel)) setSel(null);
          setClearAtlasOpen(false);
        };
        return (
          <div className="modal-backdrop" onClick={() => setClearAtlasOpen(false)}>
            <div className="modal-box" style={{ maxWidth: 360 }} onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Clear Atlas Tileset Memory</span>
                <button onClick={() => setClearAtlasOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
              </div>
              <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>
                Removes Atlas tileset tile data cached in this browser. Cleared atlas tiles on the map will be erased.
              </p>
              <p style={{ fontSize: 11, color: "#fbbf24", lineHeight: 1.5 }}>
                Currently cached: <strong style={{ color: C.text }}>{[...new Set(atlasTiles.map(t => t.atlasTilesetName))].length} tileset(s), {atlasTiles.length} tile(s)</strong>
              </p>
              {onAtlasTileset && (
                <p style={{ fontSize: 11, color: "#f87171", lineHeight: 1.5, padding: "4px 8px", background: "rgba(248,113,113,0.08)", borderRadius: 5, border: "1px solid rgba(248,113,113,0.2)" }}>
                  ⚠️ You currently have an Atlas tileset active. Clearing it will remove those tiles from the map.
                </p>
              )}
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {onAtlasTileset && (
                  <button
                    disabled={atlasTiles.length === 0}
                    style={{ ...btn(false, "#60a5fa", "rgba(96,165,250,0.14)"), fontSize: 11, opacity: atlasTiles.length === 0 ? 0.45 : 1 }}
                    onClick={() => clearAtlasTiles(true)}>
                    🗑 Clear Other Tilesets (keep active)
                  </button>
                )}
                <button
                  disabled={atlasTiles.length === 0}
                  style={{ ...btn(false, C.danger, "rgba(248,113,113,0.14)"), fontSize: 11, opacity: atlasTiles.length === 0 ? 0.45 : 1 }}
                  onClick={() => clearAtlasTiles(false)}>
                  🗑 Clear All Atlas Memory
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Delete Custom Tiles modal */}
      {deleteCustomOpen && (() => {
        const customTiles = [
          ...userTiles.map(t => ({ ...t, _group: "Uploaded" })),
        ];
        const allIds = new Set(customTiles.map(t => t.id));
        const allSelected = allIds.size > 0 && [...allIds].every(id => deleteCustomSel.has(id));
        return (
          <div className="modal-backdrop" onClick={() => setDeleteCustomOpen(false)}>
            <div className="modal-box" style={{ maxWidth: 360 }} onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Delete Custom Tiles</span>
                <button onClick={() => setDeleteCustomOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
              </div>
              <p style={{ fontSize: 11, color: C.muted }}>Select tiles to permanently remove from this session.</p>
              {/* Select all toggle */}
              <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", userSelect: "none", fontSize: 11, color: C.text }}>
                <input type="checkbox" checked={allSelected} onChange={() => {
                  setDeleteCustomSel(allSelected ? new Set() : new Set(allIds));
                }} style={{ accentColor: C.danger, cursor: "pointer" }} />
                Select all ({customTiles.length})
              </label>
              <div style={{ maxHeight: 220, overflowY: "auto", display: "flex", flexDirection: "column", gap: 4, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 8px" }}>
                {customTiles.length === 0 ? (
                  <span style={{ fontSize: 11, color: C.muted }}>No custom tiles found.</span>
                ) : customTiles.map(t => (
                  <label key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
                    <input type="checkbox" checked={deleteCustomSel.has(t.id)} onChange={() => {
                      setDeleteCustomSel(prev => {
                        const n = new Set(prev);
                        n.has(t.id) ? n.delete(t.id) : n.add(t.id);
                        return n;
                      });
                    }} style={{ accentColor: C.danger, cursor: "pointer" }} />
                    {(t.blobSrc || t.src) && <img src={t.blobSrc ?? t.src} alt="" style={{ width: 20, height: 20, objectFit: "contain", imageRendering: "pixelated", background: C.panelDeep, borderRadius: 3 }} />}
                    <span style={{ fontSize: 11, color: C.text, flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.label || t.codename || `Tile ${t.id}`}</span>
                  </label>
                ))}
              </div>
              <button
                disabled={deleteCustomSel.size === 0}
                style={{ ...btn(false, C.danger, "rgba(248,113,113,0.14)"), fontSize: 11, opacity: deleteCustomSel.size === 0 ? 0.45 : 1 }}
                onClick={() => {
                  if (!confirm(`Delete ${deleteCustomSel.size} uploaded tile(s)? This cannot be undone.`)) return;
                  const toDelete = new Set(deleteCustomSel);
                  setUserTiles(prev => prev.filter(t => !toDelete.has(t.id)));
                  // Remove deleted tiles from the grid
                  setGrid(prev => prev.map(row => row.map(cell => toDelete.has(cell) ? null : cell)));
                  // Clean up per-tile settings for deleted tiles
                  const cleanObj = obj => { const n = { ...obj }; toDelete.forEach(id => delete n[id]); return n; };
                  setTileMultipliers(cleanObj);
                  setTileOffsets(cleanObj);
                  setRotatableMap(cleanObj);
                  setAllowFlipMap(cleanObj);
                  setPriorityTiles(cleanObj);
                  setBottomTiles(cleanObj);
                  setTileNames(cleanObj);
                  setMirrorOffsetTiles(cleanObj);
                  setStarredTiles(prev => prev.filter(id => !toDelete.has(id)));
                  if (toDelete.has(sel)) { setSel(null); }
                  setDeleteCustomOpen(false);
                }}>
                🗑 Delete Selected ({deleteCustomSel.size})
              </button>
            </div>
          </div>
        );
      })()}

      {/* Custom map size modal */}
      {customSizeOpen && (
        <div className="modal-backdrop" onClick={() => setCustomSizeOpen(false)}>
          <div className="modal-box" style={{ maxWidth: 260 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Custom Map Size</span>
              <button onClick={() => setCustomSizeOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
              <input type="text" value={sizeWInput}
                onChange={e => setSizeWInput(e.target.value.replace(/\D/g, ""))}
                onBlur={() => { const w = parseInt(sizeWInput, 10); if (isNaN(w) || w < 1) setSizeWInput(String(gridW)); else setSizeWInput(String(Math.max(1, Math.min(99, w)))); }}
                style={{ width: 48, textAlign: "center", background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 13, padding: "4px 6px", outline: "none" }} />
              <span style={{ fontSize: 13, color: C.muted }}>×</span>
              <input type="text" value={sizeHInput}
                onChange={e => setSizeHInput(e.target.value.replace(/\D/g, ""))}
                onBlur={() => { const h = parseInt(sizeHInput, 10); if (isNaN(h) || h < 1) setSizeHInput(String(gridH)); else setSizeHInput(String(Math.max(1, Math.min(99, h)))); }}
                style={{ width: 48, textAlign: "center", background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 13, padding: "4px 6px", outline: "none" }} />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btn(false), flex: 1 }} onClick={() => setCustomSizeOpen(false)}>Cancel</button>
              <button style={{ ...btn(true, C.accent, C.accentDim), flex: 1 }}
                onClick={() => {
                  const w = parseInt(sizeWInput, 10), h = parseInt(sizeHInput, 10);
                  if (w > 0 && h > 0) { setCustomSizeOpen(false); setPendingSize({ w, h }); }
                }}>Apply</button>
            </div>
          </div>
        </div>
      )}

      {/* Map size confirmation dialog */}
      {pendingSize && (() => {
        const { w, h } = pendingSize;
        const shrinkW = w < gridW, shrinkH = h < gridH;
        const expandW = w > gridW, expandH = h > gridH;
        const willLose = shrinkW || shrinkH;
        const lines = [];
        if (shrinkW) lines.push(`Columns reduced from ${gridW} to ${w}: tiles in columns ${w + 1}–${gridW} will be removed.`);
        if (shrinkH) lines.push(`Rows reduced from ${gridH} to ${h}: tiles in rows ${h + 1}–${gridH} will be removed.`);
        if (expandW) lines.push(`Columns increased from ${gridW} to ${w}: new empty columns added on the right.`);
        if (expandH) lines.push(`Rows increased from ${gridH} to ${h}: new empty rows added at the bottom.`);
        return (
          <div className="modal-backdrop" onClick={() => setPendingSize(null)}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Apply map size {w} × {h}?</span>
                <button onClick={() => setPendingSize(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {lines.map((l, i) => <p key={i} style={{ fontSize: 12, color: willLose ? C.danger : C.text }}>{l}</p>)}
                {!willLose && !expandW && !expandH && <p style={{ fontSize: 12, color: C.muted }}>No content changes — same size.</p>}
                {willLose && <p style={{ fontSize: 11, color: C.muted }}>This cannot be undone.</p>}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={{ ...btn(false), flex: 1 }} onClick={() => setPendingSize(null)}>Cancel</button>
                <button style={{ ...btn(true, willLose ? C.danger : C.accent, willLose ? "rgba(248,113,113,0.14)" : C.accentDim), flex: 1 }}
                  onClick={() => { applyGridSize(w, h); setPendingSize(null); }}>
                  {willLose ? "Apply & Remove tiles" : "Apply"}
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Folder panel — floating modal anchored near card (Task 4) ── */}
      {openFolderKey && (() => {
        // Search tileset + global + Atlas entry lists for the open folder key
        const atlasEntries = shownAtlasTilesets.flatMap(tsName => {
          const tsTiles = atlasTiles.filter(t => t.atlasTilesetName === tsName);
          const folderNames = [...new Set(tsTiles.filter(t => t.atlasFolderName).map(t => t.atlasFolderName))];
          return folderNames.map(folderName => {
            const fTiles = tsTiles.filter(t => t.atlasFolderName === folderName);
            return { type: 'folder', key: `${tsName}/${folderName}`, label: fTiles[0]?.folderLabel ?? folderName, tiles: fTiles };
          });
        });
        const allEntries = [...tilesetEntries, ...globalEntries, ...atlasEntries];
        const entry = allEntries.find(e => e.type === 'folder' && e.key === openFolderKey);
        if (!entry) return null;
        const cardSz = isMobile ? 56 : 72;
        const cols = entry.tiles.length > 16 ? 5 : 4; // wider panel for large Atlas folders
        const panelW = cardSz * cols + 5 * (cols - 1) + 12;
        const maxH = Math.min(480, window.innerHeight - 32);
        const anchorX = Math.min(folderPanelAnchor.x, window.innerWidth - panelW - 8);
        const anchorY = Math.min(folderPanelAnchor.y, window.innerHeight - maxH - 8);
        return (
          <div ref={folderPanelRef}
            style={{ position: "fixed", left: anchorX, top: anchorY, width: panelW, maxHeight: maxH,
              background: C.panel, border: `1px solid ${C.border}`, borderRadius: 10,
              boxShadow: "0 8px 32px rgba(0,0,0,0.7)", zIndex: 2000, overflow: "hidden",
              display: "flex", flexDirection: "column" }}>
            <div style={{ padding: "5px 8px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: 0.5 }}>{entry.label}</span>
              <button onClick={() => setOpenFolderKey(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 15, lineHeight: 1, padding: "0 2px" }}>×</button>
            </div>
            <div style={{ overflowY: "auto", padding: 6 }}>
              <div style={{ display: "grid", gridTemplateColumns: `repeat(${cols}, ${cardSz}px)`, gap: 5 }}>
                {entry.tiles.map(t => {
                  const active = sel === t.id && !eraser;
                  const failed = failedTiles.has(t.id);
                  const isStarredF = starredTiles.includes(t.id);
                  const canSpinF  = isTileRotatable(t);
                  const canFlipF  = isFlipAllowed(t);
                  const rotatable = canSpinF || canFlipF;
                  const rotDeg = cardRotations[t.id] ?? 0;
                  const rawFMode  = cardFlipModes[t.id] ?? 'spin';
                  const fMode = !rotatable ? 'spin' : (!canFlipF ? 'spin' : (!canSpinF ? 'flip' : rawFMode));
                  const fStep = (fMode === 'flip') ? (cardFlipSteps[t.id] ?? 0) : 0;
                  const fxF = (fStep === 1 || fStep === 2) ? -1 : 1; const fyF = (fStep === 2 || fStep === 3) ? -1 : 1;
                  const imgTf = (fMode === 'flip') ? `scale(${fxF}, ${fyF})` : `rotate(${rotDeg}deg)`;
                  const eFx = (fStep === 1 || fStep === 2) ? -1 : 1; const eFy = (fStep === 2 || fStep === 3) ? -1 : 1;
                  return (
                    <div key={t.id}
                      onClick={() => {
                        if (failed) { setFailedWarning(true); return; }
                        if (rotatable && sel === t.id && !eraser) {
                          if (fMode === 'flip' && canFlipF) { setCardFlipSteps(prev => ({ ...prev, [t.id]: ((prev[t.id] ?? 0) + 1) % 4 })); }
                          else if (fMode !== 'flip' && canSpinF) { setCardRotations(prev => ({ ...prev, [t.id]: (prev[t.id] ?? 0) + 90 })); }
                        }
                        setSel(t.id); setEraser(false); setHandMode(false); setHighlightMode(false); setHighlightedCells(new Set()); highlightedCellsRef.current = new Set(); setPrimaryHighlightedCells(new Set()); primaryHighlightedCellsRef.current = new Set();
                      }}
                      style={{ width: cardSz, height: cardSz, borderRadius: 8, cursor: failed ? "not-allowed" : "pointer",
                        border: `2px solid ${failed ? C.danger : active ? C.accentBright : C.border}`,
                        background: active ? C.accentDim : "transparent",
                        position: "relative", opacity: failed ? 0.55 : 1, overflow: "visible" }}>
                      <div style={{ position: "absolute", inset: 0, borderRadius: 6, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", background: C.panelDeep }}>
                        {failed ? <span style={{ fontSize: 18 }}>⚠️</span>
                          : <img src={t.blobSrc ?? t.src} alt="" onError={() => markFailed(t.id)} className={tileCardLightBg ? "tile-img-checker" : undefined} style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated", transform: imgTf, transition: "transform 0.15s" }} />}

                                      setHistory(h => {

                {/* Preset selector */}
                <select value={selectedBgPreset}
                  onChange={e => {
                    const key = e.target.value;
                    if (key === "custom") {
                      applyBgPreset("custom", customBg.bg1, customBg.bg2);
                      setCustomBgModalOpen(true);
                    } else {
                      const p = allBgPresets[key];
                      if (p?.bg1) {
                        histLabelRef.current = "Background";
                        pushHistorySnapshot();
                        applyBgPreset(key, p.bg1, p.bg2);
                      } else if (key && !OPHELIA_BG[key]) {
                        loadAtlasTilesetBgColors(key).then(colors => {
                          if (colors?.bg1) { histLabelRef.current = "Background"; pushHistorySnapshot(); applyBgPreset(key, colors.bg1, colors.bg2); }
                        });
                      }
                    }
                  }}
                  style={{ background: C.panel, color: selectedBgPreset === "custom" ? C.accent : C.accentBright, border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 10, padding: "2px 4px", cursor: "pointer", outline: "none", fontStyle: selectedBgPreset === "custom" ? "italic" : "normal" }}>
                  <option value="custom" style={{ color: C.accent, fontStyle: "italic" }}>✏ Custom…</option>
                  <optgroup label="Ophelia">
                    {Object.keys(OPHELIA_BG).map(k => <option key={k} value={k} style={{ color: C.text, fontStyle: "normal" }}>{k}</option>)}
                  </optgroup>
                  {allAtlasBgList.length > 0 && (
                    <optgroup label="Atlas">
                      {allAtlasBgList.map(a => (
                        <option key={a.name} value={a.name} style={{ color: C.text, fontStyle: "normal" }}>{a.displayName}</option>
                      ))}
                    </optgroup>
                  )}
                </select>
                {selectedBgPreset === "custom" && (
                  <button style={{ ...btn(false), fontSize: 10, padding: "2px 7px" }}
                    onClick={() => setCustomBgModalOpen(true)}>
                    Edit…
                  </button>
                )}
                {bgMismatch && resetDisplayName && (
                  <button style={{ ...btn(false), fontSize: 10, padding: "2px 7px", whiteSpace: "nowrap" }}
                    onClick={() => { pushHistorySnapshot(); applyBgPreset(activeTileset, defaultBg.bg1, defaultBg.bg2); }}
                    title={`Reset background colours to ${resetDisplayName} defaults`}>
                    ↩ {resetDisplayName}
                  </button>
                )}
              </div>
            );
          })()}

          {/* Custom Background modal */}
          {customBgModalOpen && (
            <div className="modal-backdrop" onClick={() => setCustomBgModalOpen(false)}>
              <div className="modal-box" style={{ maxWidth: 280 }} onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Custom Background</span>
                  <button onClick={() => setCustomBgModalOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 11, color: C.muted, width: 14, textAlign: "center", fontWeight: 600 }}>A</span>
                    <input type="color" value={customBg.bg1}
                      onPointerDown={() => pushHistorySnapshot()}
                      onChange={e => applyBg1(e.target.value)}
                      style={{ width: 32, height: 32, border: "none", borderRadius: 5, cursor: "pointer", padding: 2, background: "none", flexShrink: 0 }} />
                    <input type="text" value={hex1} maxLength={7}
                      onFocus={() => pushHistorySnapshot()}
                      onChange={e => { const v = e.target.value; setHex1(v); if (validHex(v)) applyBg1(v); }}
                      onBlur={() => { if (!validHex(hex1)) setHex1(customBg.bg1); }}
                      style={{ flex: 1, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "5px 8px", outline: "none" }}
                      spellCheck={false} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "center" }}>
                    <button style={{ ...btn(false), fontSize: 11, padding: "3px 14px" }}
                      onClick={() => { pushHistorySnapshot(); applyBg1(customBg.bg2); applyBg2(customBg.bg1); }}
                      title="Swap colours">⇄ Swap</button>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 11, color: C.muted, width: 14, textAlign: "center", fontWeight: 600 }}>B</span>
                    <input type="color" value={customBg.bg2}
                      onPointerDown={() => pushHistorySnapshot()}
                      onChange={e => applyBg2(e.target.value)}
                      style={{ width: 32, height: 32, border: "none", borderRadius: 5, cursor: "pointer", padding: 2, background: "none", flexShrink: 0 }} />
                    <input type="text" value={hex2} maxLength={7}
                      onFocus={() => pushHistorySnapshot()}
                      onChange={e => { const v = e.target.value; setHex2(v); if (validHex(v)) applyBg2(v); }}
                      onBlur={() => { if (!validHex(hex2)) setHex2(customBg.bg2); }}
                      style={{ flex: 1, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "5px 8px", outline: "none" }}
                      spellCheck={false} />
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Row 4: Map size */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 14px" }}>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Map size</span>
            {(() => {
              const isCustom = !(gridW === 21 && gridH === 33) && !(gridW === 60 && gridH === 60);
              const curVal = gridW === 21 && gridH === 33 ? "3v3" : gridW === 60 && gridH === 60 ? "showdown" : `custom_${gridW}_${gridH}`;
              return (
                <select
                  value={curVal}
                  onChange={e => {
                    const v = e.target.value;
                    if (v === "3v3") { setSizeWInput("21"); setSizeHInput("33"); setPendingSize({ w: 21, h: 33 }); }
                    else if (v === "showdown") { setSizeWInput("60"); setSizeHInput("60"); setPendingSize({ w: 60, h: 60 }); }
                    else if (v === "custom") { setSizeWInput(String(gridW)); setSizeHInput(String(gridH)); setCustomSizeOpen(true); }
                  }}
                  style={{ background: C.panel, color: C.text, border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 10, padding: "3px 5px", cursor: "pointer", outline: "none" }}>
                  <option value="3v3">3v3 (21×33)</option>
                  <option value="showdown">Showdown (60×60)</option>
                  {isCustom && <option value={`custom_${gridW}_${gridH}`}>Custom ({gridW}×{gridH})</option>}
                  <option value="custom">Custom Map Size…</option>
                </select>
              );
            })()}
          </div>

          {/* Row 5: Theme switcher */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 14px 6px" }}>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Theme</span>
            <button onClick={() => setAutoTheme(v => !v)}
              style={{ ...btn(autoTheme, C.accent, C.accentDim), fontSize: 11, padding: "3px 12px" }}
              title="Automatically switch between Warm and Cold theme based on background colour temperature">Auto 🌦️</button>
            {["warm", "cold"].map(th => (
              <button key={th} onClick={() => { setAutoTheme(false); setUiTheme(th); }}
                style={{ ...btn(!autoTheme && uiTheme === th, !autoTheme && uiTheme === th ? C.accent : undefined, !autoTheme && uiTheme === th ? C.accentDim : undefined), fontSize: 11, padding: "3px 12px", opacity: autoTheme ? 0.45 : 1 }}>
                {th === "warm" ? "🔥 Warm" : "❄️ Cold"}
              </button>
            ))}
          </div>
        </>)}

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
