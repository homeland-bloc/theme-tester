<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="manifest" href="manifest.json" />

  <!-- Favicon setup — browsers pick the best size automatically -->
  <link rel="icon"                    href="favicon/favicon.ico" sizes="any" />
  <link rel="icon"    type="image/png" href="favicon/favicon-16x16.png"           sizes="16x16" />
  <link rel="icon"    type="image/png" href="favicon/favicon-32x32.png"           sizes="32x32" />
  <link rel="apple-touch-icon"        href="favicon/apple-touch-icon.png" />

  <title>Opheliapp</title>

  <!-- Lilita One (title only) + Inter (all UI) from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; background: #1a0f06; }
    #root { height: 100%; height: 100dvh; display: flex; flex-direction: column; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.18); border-radius: 4px; }
    [data-theme="warm"] ::-webkit-scrollbar-thumb { background: rgba(251,146,60,0.55); border-radius: 4px; border: 1px solid rgba(251,146,60,0.2); }
    [data-theme="warm"] ::-webkit-scrollbar-thumb:hover { background: rgba(251,146,60,0.8); }
    [data-theme="cold"] ::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.55); border-radius: 4px; border: 1px solid rgba(56,189,248,0.2); }
    [data-theme="cold"] ::-webkit-scrollbar-thumb:hover { background: rgba(56,189,248,0.85); }
    * { -webkit-tap-highlight-color: transparent; }

    /* Checkered transparent background — applied to the exact-size image wrapper inside modals */
    .tile-img-checker {
      display: inline-block;
      background-color: #b0b0b0;
      background-image: linear-gradient(45deg, #d0d0d0 25%, transparent 25%),
                        linear-gradient(-45deg, #d0d0d0 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #d0d0d0 75%),
                        linear-gradient(-45deg, transparent 75%, #d0d0d0 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
    }
    .tile-img-checker img { display: block; }

    /* Title gradient — overridden by oph-dyn-style on theme change */
    .oph-title-text { background: linear-gradient(90deg,#c45c6a,#fb923c,#fbbf24); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }

    /* Modal backdrop — must sit above priority tiles (z-index 9999) and folder panel (2000) */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; padding: 20px;
    }
    .modal-box {
      background: #2b1a0a; border: 1px solid rgba(251,146,60,0.18);
      border-radius: 14px; padding: 22px; max-width: 340px; width: 100%;
      display: flex; flex-direction: column; gap: 16px;
    }

  </style>
  <!-- Synchronously apply saved theme's scrollbar colours before React hydrates -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem("oph_theme");
        var isC = t === "cold";
        var sc  = isC ? "rgba(56,189,248,0.55)"  : "rgba(251,146,60,0.55)";
        var sch = isC ? "rgba(56,189,248,0.85)"  : "rgba(251,146,60,0.8)";
        var sb  = isC ? "rgba(56,189,248,0.2)"   : "rgba(251,146,60,0.2)";
        var mbg = isC ? "#0a1b2e"                : "#2b1a0a";
        var mbc = isC ? "rgba(56,189,248,0.22)"  : "rgba(251,146,60,0.18)";
        var tg  = isC ? "linear-gradient(90deg,#a78bfa,#38bdf8,#34d399)"
                      : "linear-gradient(90deg,#c45c6a,#fb923c,#fbbf24)";
        var bg  = isC ? "#050e1a" : "#1a0f06";
        document.documentElement.style.background = bg;
        document.documentElement.setAttribute("data-theme", isC ? "cold" : "warm");
        document.body && (document.body.style.background = bg);
        var s = document.createElement("style");
        s.id = "oph-dyn-style";
        s.textContent = "html, body { background: "+bg+" !important; } .modal-box { background: "+mbg+" !important; border-color: "+mbc+" !important; } .oph-title-text { background: "+tg+" !important; -webkit-background-clip: text !important; background-clip: text !important; -webkit-text-fill-color: transparent !important; color: transparent !important; }";
        document.head.appendChild(s);
      } catch(e) {}
    })();
  </script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ── Constants ──────────────────────────────────────────────────────────
const GRID_W = 21, GRID_H = 33, CELL = 32;
const DEFAULT_BG1 = "#67717d", DEFAULT_BG2 = "#6e7986";
const MIN_ZOOM = 0.25, MAX_ZOOM = 4;
// Zoom buttons snap to nearest 5%
const ZOOM_STEP = 0.05;
const snapTo10 = z => Math.round(z * 20) / 20;
const SK = { tiles: "oph_tiles", grid: "oph_grid", colors: "oph_colors", userTiles: "oph_user_tiles", multipliers: "oph_multipliers", priority: "oph_priority", offsets: "oph_offsets", rotatable: "oph_rotatable", tileRots: "oph_tile_rots", gridW: "oph_gridW", gridH: "oph_gridH", tileNames: "oph_tile_names", bottom: "oph_bottom", mirrorOffset: "oph_mirror_offset", gridOff: "oph_grid_off", activeTileset: "oph_active_ts", atlasTiles: "oph_atlas_tiles" };
const ACCEPTED = "image/png,image/jpeg,image/gif,image/webp,image/svg+xml,image/bmp";
const MAX_HISTORY = 60;
// Non-overlapping tile ID ranges — prevents collisions between sections regardless of reordering
const TILESET_ID_START = 1;   // 001–199: active tileset tiles (Mausoleum wall1=1, etc.)
const USER_ID_START    = 500; // 500–699: user-uploaded tiles (moved to avoid overlap with tileset IDs 1-499)
const USER_ID_MAX      = 699;
const GLOBAL_ID_START  = 200; // 200–299: global tiles (water, spawns, objectives, etc.)
const ATLAS_ID_START   = 300; // 300–499 (and 700–9999): atlas tiles (She-Fairy/atlas-horizon)

const WARN_TILE_ID     = 997; // special: places a warning-marker ghost tile

// Module-level cache for GitHub API responses (survives re-renders, not page reload)
const atlasApiCache = new Map(); // url → resolved data
// Session-cached Atlas tileset list (fetched once per page load)
const atlasTilesetsListCache = { pending: null, data: null, error: null };

// Pre-bundled Atlas tileset folder names — replaces the GitHub API list call entirely.
// Excludes "Additional" and "Global" (special/shared resource folders, not tilesets).

  "Aquarium","Arcade","Bandstand","Bazaar","Beach","Biodome","Brawlywood",
  "Candyland","Castle_Courtyard","Circus","City","Coin_Factory","Deep_Sea",
  "Desert","Enchanted_Woods","Escape_Room","Fighting_Game","Ghost_Station",
  "Gift_Shop","Grassy_Field","Hockey","Holiday","Ice_Island","Katana_Kingdom",
  "Medieval_Manor","Mine","Mortuary","Oasis","Oddities_Shop","Pirate_Ship",
  "Ranger_Ranch","Retropolis","Robot_Factory","Rooftop","Rumble_Jungle",
  "Scrapyard","Skating_Bowl","Snowtel","Spongebob","Stadium","Starr_Force",
  "Starr_Toon","Stranger_Things","Stranger_Things_Forest","Stranger_Things_Lab",
  "Stranger_Things_Lair","Stunt_Show","Subway_Surfers","Super_City","Super_City_2",
  "Swamp_of_Love","The_Hub","Tropical_Island","Wasteland","Water_Park","Wild_West",
  "Z_BrawlClub","Z_CasinoTheme","Z_JurassicTheme","Z_SkyTheme","Z_UnderwaterTheme",
];
// In-flight deduplication for loadAtlasTileset — prevents concurrent duplicate loads
const atlasTilesetLoadInFlight = new Map(); // tilesetName → Promise
// Hardcoded BG colours for Ophelia tilesets (single source of truth)
const OPHELIA_BG = {
  Airport:   { bg1: "#9cacbc", bg2: "#94a2b2" },
  Mausoleum: { bg1: "#67717d", bg2: "#6e7986" },
  Sewer:     { bg1: "#4F594A", bg2: "#586352" },
  Halloween: { bg1: "#3A313E", bg2: "#413643" },
  Cafe:      { bg1: "#AD6B45", bg2: "#B5714A" },
  Pharmacy:  { bg1: "#95a4ae", bg2: "#a2b0b8" },
};

// Tilesets that are still work-in-progress — shown with a WIP badge in the UI.
const WIP_TILESETS = new Set(["Airport"]);

// Default per-tile settings: src pattern → property value.
// Functions like isDefaultRotatable/isDefaultOTGWall read from here.
const TILE_SETTINGS = {
  rotatable:    ["/Water/"],               // src substrings → tile is rotatable (spin) by default
  flippable:    ["/Fence/", "/Rope/", "Jumppads/"],  // src substrings → tile is flippable by default
  otgPassable:  ["bush", "Bush", "SpeedTile", "SlowTile", "Objective", "Rope/", "Jumppads/", "Teleporters/", "HealPad", "Spawn", "SpawnPoint", "spawn"],
  mirrorOffset: ["Jumppads/", "Teleporters/", "HealPad"],
  bottomRender: ["/Water/", "Jumppads/", "Teleporters/", "HealPad"],
  priority:     ["/objectives/", "/Objectives/", "/Objective/"],
};

// Default tiles are loaded dynamically from Resources/manifest.json.
// To add/remove tiles, update that JSON file (or run generate-manifest.sh).

const load = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };

// Derive a human-readable codename from a tile's src path (display only, IDs unchanged)
const deriveCodename = src => {
  if (!src) return null;
  const file = src.split("/").pop().replace(/\.[^.]+$/, "");
  const map = {
    // Mausoleum
    "MSLM-wall": "Wall1", "MSLM-wall2": "Wall2", "MSLM-crate": "Crate", "MSLM-barrel": "Barrel",
    "MSLM-cactus": "Cactus", "MSLM-bush": "Bush", "MSLM-break": "Breakable",
    "MSLM-fence": "Fence1", "MSLM-fenceHORIZONTAL": "Fence2", "MSLM-fenceVERTICAL": "Fence3",
    "MSLM-post1": "Rope1", "MSLM-post2": "Rope2", "MSLM-post3": "Rope3", "MSLM-post4": "Rope4",
    "MSLM-water": "WaterFill", "MSLM-waterBEND": "WaterBend", "MSLM-waterCORNER": "WaterCorner", "MSLM-waterLINE": "WaterLine",
    "MSLM-waterDOUBLEBEND": "WaterDoubleBend", "MSLM-waterDOUBLELINE": "WaterDoubleLine", "MSLM-waterFULL": "WaterFull",
    // Mausoleum objectives
    "MSLM-ball": "Ball", "MSLM-safe": "Safe", "MSLM-mine": "GemMine",
    // Global water
    "00001011": "GWaterBend", "01111111": "GWaterCorner", "01101011": "GWaterLine", "11111111": "GWaterFill",
    // Global special
    "Unbreakable": "Unbreakable", "HealPad": "HealPad", "SlowTile": "SlowTile",
    "Smoke": "Smoke", "SpeedTile": "SpeedTile", "Spikes": "Spike",
    // Spawns
    "1": "SpawnBlue", "2": "SpawnRed", "5": "RespawnBlue", "6": "RespawnRed",
    "3": "SpawnSolo", "4": "SpawnDuo", "7": "SpawnTrio",
    // Objectives
    "Bounty": "BountyGObjective", "Gem_Grab": "GGObjective", "Heist": "HeistObjective", "Hot_Zone": "HZObjective",
    // Teleporters
    "Blue": "BlueTeleport", "Green": "GreenTeleport", "Red": "RedTeleport", "Yellow": "YellowTeleport",
    // Sewer
    "SWR-wall": "Wall1", "SWR-wall2": "Wall2", "SWR-crate": "Crate", "SWR-barrel": "Barrel",
    "SWR-cactus": "Cactus", "SWR-bush": "Bush", "SWR-breakable": "Breakable",
    "SWR-fence": "Fence", "SWR-fence-VALVE": "FenceValve",
    "SWR-fenceH": "FenceH", "SWR-fenceH-L": "FenceH-L", "SWR-fenceH-R": "FenceH-R", "SWR-fenceH-VALVE": "FenceH-Valve",
    "SWR-fenceV": "FenceV", "SWR-fenceV-T": "FenceV-T", "SWR-fenceV-B": "FenceV-B", "SWR-fenceV-B-VALVE": "FenceV-B-Valve",
    "SWR-fenceV-TURN-L": "FenceV-TurnL", "SWR-fenceV-TURN-R": "FenceV-TurnR",
    "SWR-fenceV-TURN2-L": "FenceV-Turn2L", "SWR-fenceV-TURN2-R": "FenceV-Turn2R",
    "SWR-post": "Rope", "SWR-post-H": "RopeH", "SWR-post-H-L": "RopeH-L", "SWR-post-H-R": "RopeH-R",
    "SWR-post-V": "RopeV", "SWR-post-V-H": "RopeV-H", "SWR-post-V-L": "RopeV-L", "SWR-post-V-R": "RopeV-R",
    "SWR-waterBEND": "WaterBend", "SWR-waterCORNER": "WaterCorner", "SWR-waterLINE": "WaterLine",
    "SWR-water": "WaterFill", "SWR-waterDOUBLEBEND": "WaterDoubleBend", "SWR-waterDOUBLELINE": "WaterDoubleLine", "SWR-waterFULL": "WaterFull",
    "SWR-ball": "Ball", "SWR-safe": "Safe", "SWR-mine": "GemMine",
    // Airport
    "AIRP-waterBEND": "WaterBend", "AIRP-waterCORNER": "WaterCorner", "AIRP-waterLINE": "WaterLine",
    "AIRP-water": "WaterFill", "AIRP-waterDOUBLEBEND": "WaterDoubleBend", "AIRP-waterDOUBLELINE": "WaterDoubleLine", "AIRP-waterFULL": "WaterFull",
    // Community tilesets water — named by position for cross-tileset compatibility
    "WaterCurve": "WaterBend", "WaterTwist": "WaterCorner", "WaterLine": "WaterLine", "WaterFill": "WaterFill",
    "WaterBubble1": "WaterDoubleBend", "WaterBubble2": "WaterDoubleLine",
    "Brawl_Ball": "BrawlBall", "goalRed": "GoalRed", "goalBlue": "GoalBlue",
    // Jumppads
    "B": "BottomJumppad", "BL": "BottomLeftJumppad", "BR": "BottomRightJumppad",
    "L": "LeftJumppad", "R": "RightJumppad", "T": "TopJumppad",
    "TL": "TopLeftJumppad", "TR": "TopRightJumppad",
  };
  return map[file] ?? null;
};
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ── Palette-based grid serialization ───────────────────────────────────
// Each tile is identified by a stable codename independent of runtime IDs:
//   default tiles  → their src path  (e.g. "Resources/Mausoleum/MSLM-wall.png")
//   atlas tiles    → "a:" + codename (e.g. "a:Arcade_Wall1_wall1")
//   user tiles     → "u:" + stored id (id is persisted, so it is stable)
//   space tile     → "space"
const GRID_FORMAT_VERSION = 2;
const getTileCodename = tile => {
  if (!tile) return null;
  if (tile.id === SPACE_TILE_ID) return "space";
  if (tile.isAtlas) return "a:" + tile.codename;
  if (!tile.isDefault) return "u:" + tile.id;
  return tile.src;
};
const resolveCodename = (codename, tiles) => {
  if (!codename) return null;
  if (codename === "space") return { id: SPACE_TILE_ID };
  if (codename.startsWith("u:")) { const uid = parseInt(codename.slice(2), 10); return tiles.find(t => t.id === uid) ?? null; }
  if (codename.startsWith("a:")) { const cn = codename.slice(2); return tiles.find(t => t.isAtlas && t.codename === cn) ?? null; }
  return tiles.find(t => t.src === codename) ?? null;
};
const encodeGridForStorage = (grid, tiles) => {
  const tileById = new Map(tiles.map(t => [t.id, t]));
  const palette = [];
  const idToIdx = new Map();
  const getIdx = (id, cn) => { if (!idToIdx.has(id)) { idToIdx.set(id, palette.length + 1); palette.push(cn); } return idToIdx.get(id); };
  for (const row of grid) for (const id of row) {
    if (id === null) continue;
    if (id === SPACE_TILE_ID) { getIdx(id, "space"); continue; }
    if (!idToIdx.has(id)) { const cn = getTileCodename(tileById.get(id)); if (cn) getIdx(id, cn); }
  }
  return { v: GRID_FORMAT_VERSION, palette, grid: grid.map(row => row.map(id => id === null ? null : (idToIdx.get(id) ?? null))) };
};

// Convert a data URL to a blob URL for faster browser rendering (blob URLs bypass data URI parsing overhead)
const dataURLtoBlobURL = dataURL => {
  try {
    const sep = dataURL.indexOf(',');
    const meta = dataURL.slice(0, sep);
    const data = dataURL.slice(sep + 1);
    const mime = (meta.match(/:(.*?);/) || [])[1] || 'application/octet-stream';
    if (meta.includes(';base64')) {
      const bytes = atob(data);
      const arr = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      return URL.createObjectURL(new Blob([arr], { type: mime }));
    }
    return URL.createObjectURL(new Blob([decodeURIComponent(data)], { type: mime }));
  } catch { return null; }
};
const validHex = h => /^#[0-9A-Fa-f]{6}$/.test(h);
const isMobileDevice = () => typeof window !== "undefined" && window.innerWidth < 768;

// ── Colour palettes ────────────────────────────────────────────────────
const THEMES = {
  warm: {
    bg: "#1a0f06", panel: "#2b1a0a", panelDeep: "#1f1207",
    border: "rgba(251,146,60,0.18)", accent: "#fb923c",
    accentDim: "rgba(251,146,60,0.14)", accentBright: "#fdba74",
    soft: "#fcd34d", softDim: "rgba(252,211,77,0.16)",
    pale: "#fde68a", paleDim: "rgba(253,230,138,0.14)",
    text: "#fef3e2", muted: "rgba(254,243,226,0.45)", danger: "#f87171",
  },
  cold: {
    bg: "#06101a", panel: "#0a1b2e", panelDeep: "#071320",
    border: "rgba(56,189,248,0.22)", accent: "#38bdf8",
    accentDim: "rgba(56,189,248,0.15)", accentBright: "#7dd3fc",
    soft: "#34d399", softDim: "rgba(52,211,153,0.16)",
    pale: "#a7f3d0", paleDim: "rgba(167,243,208,0.14)",
    text: "#e2f0fe", muted: "rgba(226,240,254,0.45)", danger: "#f87171",
  },
};
// C is mutable so App can update it on theme change; Sep/SectionHeader always read the current value
let C = (() => { try { const t = JSON.parse(localStorage.getItem("oph_theme")); return { ...(THEMES[t] || THEMES.warm) }; } catch { return { ...THEMES.warm }; } })();

// ── Tiny helpers ───────────────────────────────────────────────────────
const Sep = () => <div style={{ width: 1, height: 22, background: C.border, flexShrink: 0, alignSelf: "center" }} />;

function SectionHeader({ label, open, onToggle, left, right }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 12px", background: C.panelDeep, borderBottom: open ? `1px solid ${C.border}` : "none" }}>
      <button onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.2, color: C.accent, textTransform: "uppercase", fontFamily: "'Inter', sans-serif" }}>{label}</span>
        <span style={{ fontSize: 9, color: C.muted, display: "inline-block", transition: "transform 0.15s", transform: open ? "rotate(0deg)" : "rotate(-90deg)" }}>▼</span>
      </button>
      {left}
      <div style={{ flex: 1 }} />
      {right}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────
// ── Fit-to-viewport zoom ───────────────────────────────────────────────
function calcFitZoom(gw, gh) {
  const gridW = gw || GRID_W, gridH = gh || GRID_H;
  const w = window.innerWidth, h = window.innerHeight;
  const mobile = w < 768;
  // Mobile: only the 28px toggle strips are visible (sidebars collapsed)
  // Desktop: left 240 + right 260 + 2×28 strips = 556
  const sideW = mobile ? 56 : 556;
  const topH = 50;
  // Bottom bar: 3 rows × ~30px each ≈ 92px
  const botH = 92;
  const pad = 24;
  const availW = Math.max(1, w - sideW - pad);
  const availH = Math.max(1, h - topH - botH - pad);
  return Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, snapTo10(Math.min(availW / (gridW * CELL), availH / (gridH * CELL)))));
}

function App() {
  const savedColors = load(SK.colors, { bg1: DEFAULT_BG1, bg2: DEFAULT_BG2 });
  const mobile = isMobileDevice();

  // Default tiles loaded dynamically from Resources/manifest.json
  const [defaultTiles, setDefaultTiles]   = useState([]);
  const [tilesLoading, setTilesLoading]   = useState(true);

  // User-uploaded tiles persisted in localStorage; IDs start after defaults
  // blobSrc is generated at load time for faster rendering (blob URLs skip data URI parsing)
  const [userTiles, setUserTiles] = useState(() => {
    const saved = load(SK.userTiles, []);
    return saved.map(t => ({ ...t, blobSrc: t.src ? dataURLtoBlobURL(t.src) : undefined }));
  });
  // Atlas tiles: stored in localStorage, IDs 300–499
  const [atlasTiles, setAtlasTiles] = useState(() => load(SK.atlasTiles, []));
  // Atlas icon size for the browser panel
  const [atlasIconSize, setAtlasIconSize] = useState(() => load("oph_atlas_icon_size", 20));
  // Atlas panel UI state
  const [atlasOpen,    setAtlasOpen]    = useState(false);
  const [atlasPath,    setAtlasPath]    = useState(""); // current browse path within Resources/
  const [atlasItems,   setAtlasItems]   = useState(null); // null=not yet loaded, array=loaded
  const [atlasError,   setAtlasError]   = useState("");
  const [atlasLoading, setAtlasLoading] = useState(false);

  const tiles = useMemo(() => [...defaultTiles, ...userTiles, ...atlasTiles], [defaultTiles, userTiles, atlasTiles]);

  const [gridW, setGridW] = useState(() => load(SK.gridW, GRID_W));
  const [gridH, setGridH] = useState(() => load(SK.gridH, GRID_H));
  // Holds v2 palette data between component init and tile-load resolution.
  // Must be declared before the grid useState so the init function can write to it.

    // Airport heist safe → 2.2x
    if (s.includes("AIRP-safe")) return 2.2;
    // Gem Grab & Heist objectives + Mausoleum safe + Sewer safe → 2x
    if (s.includes("Gem_Grab") || s.includes("Heist") || s.includes("MSLM-safe") || s.includes("SWR-safe")) return 2.0;
    // Bounty star → 1.2x
    if (s.includes("Bounty")) return 1.2;
    // Atlas Post_R / Post_TR rope tiles → 1.5×
    if (s.includes("/Rope/Post_R") || s.includes("/Rope/Post_TR")) return 1.5;
    return 1.0;
  };

  const getTileMultiplier = t => {
    if (tileMultipliers[t.id] !== undefined) return tileMultipliers[t.id];
    return getDefaultMultiplier(t);
  };

  // Returns { ox, oy } in % (100 = one full cell width/height). Positive ox=right, positive oy=down.
  const getDefaultOffset = t => {
    if (!t?.src) return { ox: 0, oy: 0 };
    const s = t.src;
    // Jumppads: +50% H, +66% V (sprite anchor is above center)
    if (s.includes("Jumppads/")) return { ox: 50, oy: 66 };
    // Teleporters: +50% H, +60% V
    if (s.includes("Teleporters/")) return { ox: 50, oy: 60 };
    // HealPad: centred on 2×2 area
    if (s.includes("HealPad")) return { ox: 50, oy: 50 };
    // Global unbreakable
    if (s.includes("Unbreakable")) return { ox: 0, oy: -12 };
    // Goal posts
    if (s.includes("goalRed") || s.includes("goalBlue")) return { ox: 0, oy: -50 };
    // Airport heist safe
    if (s.includes("AIRP-safe")) return { ox: 0, oy: -42 };
    // Global objectives
    if (s.includes("Heist")) return { ox: 0, oy: -60 };
    if (s.includes("Brawl_Ball")) return { ox: 0, oy: -14 };
    if (s.includes("Bounty")) return { ox: 0, oy: 4 };
    // Mausoleum objectives
    if (s.includes("MSLM-safe")) return { ox: 0, oy: -90 };
    if (s.includes("MSLM-ball")) return { ox: 0, oy: -20 };
    if (s.includes("MSLM-mine")) return { ox: 0, oy: -20 };
    // Airport (wall2 must be checked before wall since "AIRP-wall" matches both)
    if (s.includes("AIRP-wall2"))  return { ox: 0, oy: -20 };
    if (s.includes("AIRP-wall"))   return { ox: 0, oy: -4 };
    if (s.includes("AIRP-crate"))  return { ox: 0, oy: -10 };
    if (s.includes("AIRP-cactus")) return { ox: 0, oy: -10 };
    if (s.includes("AIRP-bush"))   return { ox: 0, oy: -10 };
    // Airport fence (AIRP-fence-V checked before generic fence path)
    if (s.includes("AIRP-fence-V"))    return { ox: 0, oy: -84 };
    if (s.includes("Airport/Fence/"))  return { ox: 0, oy: -40 };
    // Airport rope
    if (s.includes("Airport/Rope/"))   return { ox: 0, oy: -44 };
    // Atlas Post_R / Post_TR rope tiles
    if (s.includes("/Rope/Post_R") || s.includes("/Rope/Post_TR")) return { ox: 25, oy: 0 };
    // Mausoleum fence
    if (s.includes("Mausoleum/Fence/")) return { ox: 0, oy: -15 };
    // Mausoleum rope (MSLM-post*)
    if (s.includes("MSLM-post")) return { ox: 0, oy: -30 };
    // Mausoleum wall2 (checked before wall1 since "MSLM-wall" matches both)
    if (s.includes("MSLM-wall2")) return { ox: 0, oy: -24 };
    if (s.includes("MSLM-wall") && !s.includes("MSLM-wall2")) return { ox: 0, oy: -12 };
    if (s.includes("MSLM-crate")) return { ox: 0, oy: -10 };
    if (s.includes("MSLM-barrel")) return { ox: 0, oy: -12 };
    if (s.includes("MSLM-cactus")) return { ox: 0, oy: -10 };
    if (s.includes("MSLM-bush")) return { ox: 0, oy: -10 };
    if (s.includes("MSLM-break")) return { ox: 0, oy: -8 };
    // Sewer objectives
    if (s.includes("SWR-ball")) return { ox: 0, oy: -34 };
    if (s.includes("SWR-safe")) return { ox: 0, oy: -56 };
    if (s.includes("SWR-mine")) return { ox: 0, oy: -10 };
    if (s.includes("SWR-breakable")) return { ox: 0, oy: -10 };
    // Sewer fence
    if (s.includes("Sewer/Fence/")) return { ox: 0, oy: -40 };
    // Sewer rope
    if (s.includes("Sewer/Rope/")) return { ox: 0, oy: -60 };
    // Sewer wall2 (checked before wall1)
    if (s.includes("SWR-wall2")) return { ox: 0, oy: -12 };
    if (s.includes("SWR-wall") && !s.includes("SWR-wall2")) return { ox: 0, oy: -12 };
    if (s.includes("SWR-crate")) return { ox: 0, oy: -10 };
    if (s.includes("SWR-barrel")) return { ox: 0, oy: -8 };
    if (s.includes("SWR-cactus")) return { ox: 0, oy: -12 };
    if (s.includes("SWR-bush")) return { ox: 0, oy: -10 };
    // Halloween RopeConnects: +50 horizontal offset
    if (s.includes("Halloween/Rope/RopeConnects")) return { ox: 50, oy: 0 };
    return { ox: 0, oy: 0 };
  };

  const getTileOffset = t => {
    if (tileOffsets[t.id] !== undefined) return tileOffsets[t.id];
    return getDefaultOffset(t);
  };

  // Returns the effective offset for a cell, respecting per-cell overrides (from mirror-offset placement).
  const getEffectiveOffset = (t, r, c) => {
    const over = gridOffsets[`${r},${c}`];
    if (over !== undefined) return over;
    return getTileOffset(t);
  };

  // Spawn tile identification (src-based)
  const isSpawn1 = t => !!(t?.src && t.src.includes("Spawns/1.png")); // red
  const isSpawn2 = t => !!(t?.src && t.src.includes("Spawns/2.png")); // blue
  const isRespawn1 = t => !!(t?.src && t.src.includes("Spawns/5.png")); // red respawn
  const isRespawn2 = t => !!(t?.src && t.src.includes("Spawns/6.png")); // blue respawn
  const isGoalRed  = t => !!(t?.src && t.src.includes("goalRed.png"));
  const isGoalBlue = t => !!(t?.src && t.src.includes("goalBlue.png"));
  const swapSpawnId = (id) => {
    const t = tiles.find(x => x.id === id);
    if (!t) return id;
    if (isSpawn1(t)) { const b = tiles.find(x => isSpawn2(x)); return b ? b.id : id; }
    if (isSpawn2(t)) { const r = tiles.find(x => isSpawn1(x)); return r ? r.id : id; }
    if (isRespawn1(t)) { const b = tiles.find(x => isRespawn2(x)); return b ? b.id : id; }
    if (isRespawn2(t)) { const r = tiles.find(x => isRespawn1(x)); return r ? r.id : id; }
    if (isGoalRed(t))  { const b = tiles.find(x => isGoalBlue(x)); return b ? b.id : id; }
    if (isGoalBlue(t)) { const r = tiles.find(x => isGoalRed(x)); return r ? r.id : id; }
    return id;
  };

  // Water tiles have rotation on by default
  const isDefaultRotatable = t => !!(t?.src && TILE_SETTINGS.rotatable.some(p => t.src.includes(p)));

  const isTileRotatable = t => {
    if (rotatableMap[t.id] !== undefined) return rotatableMap[t.id];
    return isDefaultRotatable(t);
  };

  const isDefaultFlippable = t => !!(t?.src && TILE_SETTINGS.flippable.some(p => t.src.includes(p)));
  const isFlipAllowed = t => {
    if (allowFlipMap[t.id] !== undefined) return allowFlipMap[t.id];
    return isDefaultFlippable(t); // fence/rope flippable by default; water is spin-only
  };

  const isDefaultMirrorOffset = t => !!(t?.src && TILE_SETTINGS.mirrorOffset.some(p => t.src.includes(p)));
  const isMirrorOffset = t => {
    if (mirrorOffsetTiles[t.id] !== undefined) return mirrorOffsetTiles[t.id];
    return isDefaultMirrorOffset(t);
  };

  // OTG: which tiles count as walls by default (all except passable game-layer tiles)
  const isDefaultOTGWall = t => {
    if (!t?.src) return false;
    return !TILE_SETTINGS.otgPassable.some(p => t.src.includes(p));
  };
  const isOTGWall = t => {
    if (otgWallOverrides[t.id] !== undefined) return otgWallOverrides[t.id];
    return isDefaultOTGWall(t);
  };

  // Compute the set of OTG cells ("r,c" strings) — memoised so it only runs when the map/settings change
  const otgCells = useMemo(() => {
    if (!showOTG) return new Set();
    // For OTG purposes, map edges always count as walls
    const isWall = (r, c) => {
      if (r < 0 || r >= gridH || c < 0 || c >= gridW) return true; // edge = wall
      const id = grid[r]?.[c];
      if (id == null) return false;
      const t = id === SPACE_TILE_ID ? null : tiles.find(x => x.id === id);
      if (!t || t.isSpace) return false;
      if (otgWallOverrides[t.id] !== undefined) return otgWallOverrides[t.id];
      return isDefaultOTGWall(t);
    };
    const isEmpty = (r, c) => r >= 0 && r < gridH && c >= 0 && c < gridW && !isWall(r, c);
    const result = new Set();

    // ── Check 1: opposing pair ────────────────────────────────────────
    // Flag an empty tile if any of 4 axis pairs are both walls/edges:
    // left+right, top+bottom, NW+SE, NE+SW  (edges count as walls)
    for (let r = 0; r < gridH; r++) {
      for (let c = 0; c < gridW; c++) {
        if (!isEmpty(r, c)) continue;
        if (isWall(r, c-1) && isWall(r, c+1)) { result.add(`${r},${c}`); continue; } // left+right
        if (isWall(r-1, c) && isWall(r+1, c)) { result.add(`${r},${c}`); continue; } // top+bottom
        if (isWall(r-1, c-1) && isWall(r+1, c+1) && !isWall(r, c-1) && !isWall(r-1, c)) { result.add(`${r},${c}`); continue; } // NW+SE
        if (isWall(r-1, c+1) && isWall(r+1, c-1) && !isWall(r, c+1) && !isWall(r-1, c)) { result.add(`${r},${c}`); continue; } // NE+SW
      }
    }

    // ── Check 2: 2×2 diagonal squeeze ────────────────────────────────
    // Scan every 2×2 block. If two diagonally opposing cells are both walls
    // and the other two are both empty, flag both empty cells.
    for (let r = 0; r < gridH - 1; r++) {
      for (let c = 0; c < gridW - 1; c++) {
        const tl = isWall(r, c), tr = isWall(r, c+1);
        const bl = isWall(r+1, c), br = isWall(r+1, c+1);
        // TL+BR walls, TR+BL empty
        if (tl && br && !tr && !bl) { result.add(`${r},${c+1}`); result.add(`${r+1},${c}`); }
        // TR+BL walls, TL+BR empty
        if (tr && bl && !tl && !br) { result.add(`${r},${c}`); result.add(`${r+1},${c+1}`); }
      }
    }

    // ── Check 3: 2×3 / 3×2 corner squeeze ────────────────────────────
    // 2×3 blocks (2 cols wide, 3 rows tall): opposite corners = walls, middles = empty → flag middles
    for (let r = 0; r < gridH - 2; r++) {
      for (let c = 0; c < gridW - 1; c++) {
        const tl = isWall(r, c), tr = isWall(r, c+1);
        const ml = isEmpty(r+1, c), mr = isEmpty(r+1, c+1);
        const bl = isWall(r+2, c), br = isWall(r+2, c+1);
        // top-left + bottom-right walls, both middle-row cells empty
        if (tl && br && ml && mr) { result.add(`${r+1},${c}`); result.add(`${r+1},${c+1}`); }
        // top-right + bottom-left walls, both middle-row cells empty
        if (tr && bl && ml && mr) { result.add(`${r+1},${c}`); result.add(`${r+1},${c+1}`); }
      }
    }
    // 3×2 blocks (3 cols wide, 2 rows tall): opposite corners = walls, middles = empty → flag middles
    for (let r = 0; r < gridH - 1; r++) {
      for (let c = 0; c < gridW - 2; c++) {
        const tl = isWall(r, c), tr = isWall(r, c+2);
        const ml = isEmpty(r, c+1), mr = isEmpty(r+1, c+1);
        const bl = isWall(r+1, c), br = isWall(r+1, c+2);
        // top-left + bottom-right walls, both middle-column cells empty
        if (tl && br && ml && mr) { result.add(`${r},${c+1}`); result.add(`${r+1},${c+1}`); }
        // top-right + bottom-left walls, both middle-column cells empty
        if (tr && bl && ml && mr) { result.add(`${r},${c+1}`); result.add(`${r+1},${c+1}`); }
      }
    }
    return result;
  }, [showOTG, grid, gridW, gridH, otgWallOverrides, tiles]);

  // MultLabel: shows size multiplier at top-left when != 1.0
  const MultLabel = ({ t }) => {
    const mult = getTileMultiplier(t);
    if (mult === 1.0) return null;
    if (hideDefaultLabels && mult === getDefaultMultiplier(t)) return null;
    return (
      <span style={{ position: "absolute", top: 1, left: 2, fontSize: 7, fontWeight: 700, color: C.accentBright, background: "rgba(0,0,0,0.65)", borderRadius: 3, padding: "1px 3px", lineHeight: 1.3, pointerEvents: "none", zIndex: 5 }}>
        {mult}×
      </span>
    );
  };

  // Pre-computed tile → count in grid (for CountBadge). Only computed when showTileCount is on.
  const tileCounts = showTileCount ? (() => {
    const counts = {};
    grid.forEach(row => row.forEach(id => { if (id != null) counts[id] = (counts[id] ?? 0) + 1; }));
    return counts;
  })() : {};

  // Count badge shown at top-left of tile cards when "Show tile count" is enabled.
  // Ignores "Hide default tile settings labels" — always shown when the feature is on.
  const CountBadge = ({ t }) => {
    if (!showTileCount) return null;
    const isGlobal = t.codename?.startsWith("Global_");
    const enabled = tileCountMap[t.id] !== undefined ? tileCountMap[t.id] : isGlobal;
    if (!enabled) return null;
    const count = tileCounts[t.id] ?? 0;
    if (count === 0) return null;
    return (
      <span style={{ position: "absolute", top: -7, left: -7, fontSize: 8, fontWeight: 700, color: "#34d399", background: "rgba(0,0,0,0.75)", borderRadius: 3, padding: "1px 3px", lineHeight: 1.3, pointerEvents: "none", zIndex: 7 }}>
        ×{count}
      </span>
    );
  };

  // Badge label shown at bottom-left of tile cards (priority/offset/mirrorOffset badges, NOT multiplier)
  const TileBadge = ({ t }) => {
    const off    = getTileOffset(t);
    const defOff = getDefaultOffset(t);
    const hasOff = off.ox !== 0 || off.oy !== 0;
    const offIsDefault = off.ox === defOff.ox && off.oy === defOff.oy;
    const showOff       = hasOff && (!hideDefaultLabels || !offIsDefault);
    const isPrio        = !!priorityTiles[t.id];
    const isBottom      = !!bottomTiles[t.id];
    const hasMirrorOff  = isMirrorOffset(t);
    const hasShadow     = !!autoShadowTiles[t.id];
    const prioDefault   = !!(t.src && TILE_SETTINGS.priority.some(p => t.src.includes(p)));
    const bottomDefault = !!(t.src && TILE_SETTINGS.bottomRender.some(p => t.src.includes(p)));
    const mirrorOffDefault = !!(t.src && TILE_SETTINGS.mirrorOffset.some(p => t.src.includes(p)));
    const showPrio      = isPrio && (!hideDefaultLabels || !prioDefault);
    const showBottom    = isBottom && (!hideDefaultLabels || !bottomDefault);
    const showMirrorOff = hasMirrorOff && (!hideDefaultLabels || !mirrorOffDefault);
    if (!showOff && !showPrio && !showBottom && !showMirrorOff && !hasShadow) return null;
    const parts = [];
    if (showPrio)  parts.push("🚨");
    if (showBottom) parts.push("⚓");
    if (showOff)  parts.push("📐");
    if (showMirrorOff) parts.push("🌪️");
    if (hasShadow) parts.push("👻");
    return (
      <span style={{ position: "absolute", bottom: -7, left: -7, fontSize: 8, fontWeight: 700, color: C.accentBright, background: "rgba(0,0,0,0.65)", borderRadius: 3, padding: "1px 3px", lineHeight: 1.3, pointerEvents: "none", zIndex: 6 }}>
        {parts.join("")}
      </span>
    );
  };

  // Active tileset name (primary — drives BG colour on switch, history tileset field)
  const [activeTileset, setActiveTileset] = useState(null);
  // Set of tileset names whose tiles are shown in the panel (multi-select)
  const [shownTilesets, setShownTilesets] = useState(() => load("oph_shown_tilesets", null));
  const [allowTsMixing, setAllowTsMixing] = useState(() => load("oph_allow_mixing", true));
  const [hiddenAtlasGroups, setHiddenAtlasGroups] = useState(() => load("oph_hidden_atlas_groups", []));
  // Tileset dropdown open state
  const [tilesetDropOpen, setTilesetDropOpen] = useState(false);
  // Atlas tileset list fetched from GitHub API (null = not yet loaded)
  const [atlasTilesetList, setAtlasTilesetList] = useState(null);
  const [atlasTilesetError, setAtlasTilesetError] = useState("");
  const [atlasRateLimitHit, setAtlasRateLimitHit] = useState(false);
  const [gridLoadWarning, setGridLoadWarning] = useState(null); // null or count of unresolved tiles
  const [clearAtlasOpen, setClearAtlasOpen] = useState(false);
  const [customBgModalOpen, setCustomBgModalOpen] = useState(false);
  // Which Atlas tilesets are shown in the panel (persisted)
  const [shownAtlasTilesets, setShownAtlasTilesets] = useState(() => load("oph_shown_atlas_tilesets", []));
  // Cached BG colours extracted from each Atlas tileset's BGLight/BGDark images
  const [atlasTilesetBgColors, setAtlasTilesetBgColors] = useState(() => load("oph_atlas_ts_bg", {}));
  // Parsed manifest data
  const [manifest, setManifest] = useState(null);
  useEffect(() => { openFolderKeyRef.current = openFolderKey; }, [openFolderKey]);
  useEffect(() => { shownTilsetsRef.current = shownTilesets; }, [shownTilesets]);
  // toggleFolder uses ref to read current value — avoids stale-closure reopening after
  // the outside-click mousedown handler closes the panel in the same event cycle.
  const toggleFolder = (key, e) => {
    if (openFolderKeyRef.current === key) {
      setOpenFolderKey(null);
    } else {
      setOpenFolderKey(key);
      if (e?.currentTarget) {
        const rect = e.currentTarget.getBoundingClientRect();
        setFolderPanelAnchor({ x: rect.right + 6, y: rect.top });
      }
    }
  };
  // Close folder panel on outside click
  useEffect(() => {
    if (!openFolderKey) return;
    const handler = ev => {
      if (folderPanelRef.current && !folderPanelRef.current.contains(ev.target)) {
        setOpenFolderKey(null);
      }
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('touchstart', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('touchstart', handler);
    };
  }, [openFolderKey]);

  // Build the flat defaultTiles list and the ordered panel entries from manifest + activeTileset.
  // ALL tilesets are loaded with sequential non-overlapping IDs so that switching themes never
  // causes ID collisions (e.g. Mausoleum breakable ID 7 stays valid even when Sewer is active).
  // shownTilesets controls which tilesets appear in the panel (multi-select).
  // Returns: tilesetEntriesPerTs, tilesetEntries, globalEntries, flatDefaultTiles, tilesetTileCount
  const { tilesetEntriesPerTs, tilesetEntries, globalEntries, flatDefaultTiles, tilesetTileCount } = useMemo(() => {
    if (!manifest) return { tilesetEntriesPerTs: [], tilesetEntries: [], globalEntries: [], flatDefaultTiles: [], tilesetTileCount: 0 };
    const flatTiles = [];
    let idCounter = TILESET_ID_START;
    const makeTile = src => ({ id: idCounter++, src: `Resources/${src}`, isDefault: true });
    const displayLabel = (key, folderPath) => {
      if (folderPath) { const s = folderPath.replace(/\/$/, '').split('/').pop(); if (s) return s; }
      return key;
    };

    // Determine which tilesets are shown — fall back to just the active one
    const defaultShown = [activeTileset ?? manifest.tilesets?.[0]?.name];
    const shownNames = new Set(shownTilesets ?? defaultShown);

    // ── ALL tilesets — IDs assigned sequentially so no tileset reuses another's IDs ──
    const entriesPerTs = []; // [{ name, entries, count }]
    let tsCount = 0;
    for (const tsDef of (manifest.tilesets ?? [])) {
      const isShown = shownNames.has(tsDef.name);
      const entries = [];
      for (const key of (tsDef.order ?? [])) {
        if (tsDef.folders?.[key]) {
          const folderPath = tsDef.folderPaths?.[key] ?? `${tsDef.name}/${key}/`;
          const label = displayLabel(key, folderPath);
          const scopedKey = `${tsDef.name}/${key}`;
          const folderTiles = tsDef.folders[key].map(fn => {
            const t = makeTile(`${folderPath}${fn}`);
            t.folderKey = scopedKey; t.folderLabel = label; t.tilesetName = tsDef.name;
            t.codename = `${tsDef.name}_${fn.replace(/\.[^.]+$/, '')}`;
            return t;
          });
          flatTiles.push(...folderTiles);
          if (isShown) { entries.push({ type: 'folder', key: scopedKey, label, tiles: folderTiles }); tsCount += folderTiles.length; }
        } else if (tsDef.files?.[key]) {
          const t = makeTile(tsDef.files[key]);
          t.tilesetName = tsDef.name;
          t.codename = `${tsDef.name}_${tsDef.files[key].split('/').pop().replace(/\.[^.]+$/, '')}`;
          flatTiles.push(t);
          if (isShown) { entries.push({ type: 'flat', tile: t }); tsCount++; }
        }
      }
      if (isShown) entriesPerTs.push({ name: tsDef.name, entries, count: entries.reduce((n, e) => n + (e.tiles?.length ?? 1), 0) });
    }

    // ── Global tiles (including objectives) — IDs start at GLOBAL_ID_START (200) ──
    idCounter = GLOBAL_ID_START; // jump to 200 regardless of how many tileset tiles there were
    const gDef = manifest.global;
    const glbEntries = [];
    if (gDef) {
      for (const key of (gDef.order ?? [])) {
        const files = gDef.folders?.[key];
        if (!files || files.length === 0) continue;
        const folderPath = gDef.folderPaths?.[key] ?? `Global/${key}/`;
        const label = displayLabel(key, folderPath);
        const EXCLUDED_GLOBAL_FILES = { jumppads: ["TL.png", "L.png", "BL.png"] };
        const folderTiles = files
          .filter(fn => !(EXCLUDED_GLOBAL_FILES[key] ?? []).includes(fn))
          .map(fn => {
            const t = makeTile(`${folderPath}${fn}`);
            t.folderKey = `global_${key}`; t.folderLabel = label;
            t.codename = `Global_${fn.replace(/\.[^.]+$/, '')}`;
            return t;
          });
        flatTiles.push(...folderTiles);
        glbEntries.push({ type: 'folder', key: `global_${key}`, label, tiles: folderTiles });
      }
    }

    const tsEntries = entriesPerTs.flatMap(ts => ts.entries);
    return { tilesetEntriesPerTs: entriesPerTs, tilesetEntries: tsEntries, globalEntries: glbEntries, flatDefaultTiles: flatTiles, tilesetTileCount: tsCount };
  }, [manifest, activeTileset, shownTilesets]);

  // Switch tileset — only updates the tile panel and BG colours; board tiles are never remapped.
  // To convert tiles on the board use the Convert tool.
  const switchTileset = (newTilesetName) => {
    if (!manifest || newTilesetName === activeTileset) return;
    setActiveTileset(newTilesetName);
    const tsBg = getTilesetBgColors(newTilesetName);
    if (tsBg) applyBgPreset(newTilesetName, tsBg.bg1, tsBg.bg2);
  };

  // Toggle a tileset in the shown set; always keep at least one shown (across Ophelia + Atlas).
  const toggleTilesetShown = (name) => {
    const cur = shownTilsetsRef.current ?? [activeTilesetRef.current ?? name];
    const inSet = cur.includes(name);
    const atlasCount = shownAtlasTilesetsRef.current?.length ?? 0;
    if (inSet && cur.length <= 1 && atlasCount === 0) return;
    const nextShown = inSet ? cur.filter(n => n !== name) : [...cur, name];
    const tsBg = !inSet ? getTilesetBgColors(name) : null;
    const newBg1 = tsBg ? tsBg.bg1 : bg1Ref.current;
    const newBg2 = tsBg ? tsBg.bg2 : bg2Ref.current;
    const nextActive = !inSet ? name :
      (nextShown.length > 0 ? activeTilesetRef.current :
        (shownAtlasTilesetsRef.current?.[0] ?? activeTilesetRef.current));
    const snap = { grid: gridRef.current, w: gridWRef.current, h: gridHRef.current, tileset: nextActive, shownTilesets: nextShown, shownAtlasTilesets: shownAtlasTilesetsRef.current, bg1: newBg1, bg2: newBg2, highlight: [...highlightedCellsRef.current], rots: gridRotationsRef.current, flips: gridFlipsRef.current };
    setHistory(h => {
      const trimmed = h.slice(0, histIdxRef.current + 1);
      const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
      return [...capped, snap];
    });
    setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
    setShownTilesets(nextShown);
    if (!inSet) {
      setActiveTileset(name);
      if (tsBg) applyBgPreset(name, tsBg.bg1, tsBg.bg2);
    } else if (nextShown.length === 0 && atlasCount > 0) {
      setActiveTileset(shownAtlasTilesetsRef.current[0]);
    }
  };

  // Sync defaultTiles and nextId whenever flatDefaultTiles changes.
  // Auto-flag any tile whose src path contains "/objectives/" as priority (case-insensitive).
  useEffect(() => {
    setDefaultTiles(flatDefaultTiles);
    if (flatDefaultTiles.length > 0) {
      setSel(prev => prev ?? flatDefaultTiles[0].id);
      // Rebuild priority/bottomRender/autoShadow for default tiles from scratch each time the manifest
      // changes. This prevents stale IDs (from a previous manifest order) lingering in persisted state
      // and wrongly applying settings to unrelated tiles. Non-default tile entries (atlas IDs ≥ 300,
      // user IDs 500-699) are preserved as-is since their IDs don't shift with manifest changes.
      const rebuildDefaultFlags = (prev, matchFn) => {
        const next = {};
        Object.entries(prev).forEach(([id, val]) => {
          const n = Number(id);
          if (n >= ATLAS_ID_START) next[n] = val; // keep atlas + user tile overrides
        });
        flatDefaultTiles.forEach(t => { if (t.src && matchFn(t.src)) next[t.id] = true; });
        return next;
      };
      setPriorityTiles(prev => rebuildDefaultFlags(prev, s => TILE_SETTINGS.priority.some(p => s.includes(p))));
      setBottomTiles(prev => rebuildDefaultFlags(prev, s => TILE_SETTINGS.bottomRender.some(p => s.includes(p))));

        s.includes("Halloween/Jumppads/") || s.includes("Halloween/Teleporters/")));
    }
  }, [flatDefaultTiles]);

  // Load manifest from Resources/manifest.json
  useEffect(() => {
    fetch("Resources/manifest.json")
      .then(r => r.ok ? r.json() : {})
      .then(data => {
        setManifest(data);
        const firstName = data.tilesets?.[0]?.name ?? null;
        const saved = load(SK.activeTileset, null);
        const name = (saved && data.tilesets?.some(ts => ts.name === saved)) ? saved : firstName;
        setActiveTileset(name);
        // Init shownTilesets: use saved value if it exists, otherwise default to all tilesets
        const allNames = data.tilesets?.map(ts => ts.name) ?? [name];
        const savedShown = load("oph_shown_tilesets", null);
        setShownTilesets(savedShown ?? allNames);
      })
      .catch(() => {})
      .finally(() => setTilesLoading(false));
  }, []);
  // Resolve a v2 palette-format grid once all tiles (including default tiles from the manifest) are loaded.
  // Guard on flatDefaultTiles.length rather than tiles.length: if the user has atlas tiles persisted in
  // localStorage, tiles is non-empty from the very first render (before the setDefaultTiles useEffect
  // runs), so tiles.length === 0 is not a reliable signal that default tiles are available yet.
  // flatDefaultTiles is computed in the same render that sets tilesLoading=false, so it is always ready.
  useEffect(() => {
    if (!pendingGridLoadRef.current || tilesLoading || flatDefaultTiles.length === 0) return;
    const pending = pendingGridLoadRef.current;
    pendingGridLoadRef.current = null; // clear before setGridRaw so save effect runs correctly
    const { palette, grid: indexGrid } = pending;
    const unresolved = [];

    const allTiles = [...flatDefaultTiles, ...userTiles, ...atlasTiles];
    const idFromPaletteIdx = [null, ...palette.map(cn => {
      const tile = resolveCodename(cn, allTiles);
      if (!tile) unresolved.push(cn);
      return tile?.id ?? null;
    })];
    const resolvedGrid = indexGrid.map(row =>
      row.map(idx => idx == null ? null : (idFromPaletteIdx[idx] ?? null))
    );
    setGridRaw(resolvedGrid);
    if (unresolved.length > 0) {
      console.warn(`[map load] ${unresolved.length} tile(s) could not be resolved:`, unresolved);
      setGridLoadWarning(unresolved.length);
    }
  }, [tiles, tilesLoading, flatDefaultTiles]); // eslint-disable-line
  useEffect(() => { if (activeTileset) save(SK.activeTileset, activeTileset); }, [activeTileset]);
  useEffect(() => { if (shownTilesets) save("oph_shown_tilesets", shownTilesets); }, [shownTilesets]);
  useEffect(() => { save("oph_allow_mixing", allowTsMixing); }, [allowTsMixing]);
  useEffect(() => { save("oph_hidden_atlas_groups", hiddenAtlasGroups); }, [hiddenAtlasGroups]);
  useEffect(() => { try { localStorage.setItem("oph_shown_atlas_tilesets", JSON.stringify(shownAtlasTilesets)); } catch {} }, [shownAtlasTilesets]);

  useEffect(() => {
    setAtlasTilesetList(fetchAtlasTilesetList());
  }, []); // eslint-disable-line
  // Dynamic starred tiles: keep wall1+bush for shown tilesets, remove them for hidden tilesets.
  // Non-wall1/bush stars (user-added tiles and tool shortcuts) are always preserved.
  useEffect(() => {
    if (!manifest) return;
    let id = TILESET_ID_START;
    const allWall1BushIds = new Set();
    const shownWall1BushIds = [];
    const shownSet = new Set(shownTilesets ?? []);
    for (const tsDef of (manifest.tilesets ?? [])) {
      for (const key of (tsDef.order ?? [])) {
        if (tsDef.folders?.[key]) tsDef.folders[key].forEach(() => id++);
        else if (tsDef.files?.[key]) {
          const tid = id++;
          if (key === 'wall1' || key === 'bush') {
            allWall1BushIds.add(tid);
            if (shownSet.has(tsDef.name)) shownWall1BushIds.push(tid);
          }
        }
      }
    }
    setStarredTiles(prev => {
      const toolStars = prev.filter(s => typeof s === 'string');
      const otherTileStars = prev.filter(s => typeof s !== 'string' && !allWall1BushIds.has(s));
      const newStarred = [...shownWall1BushIds, ...otherTileStars, ...toolStars];
      return JSON.stringify(newStarred) === JSON.stringify(prev) ? prev : newStarred;
    });
  }, [manifest, shownTilesets]);
  // Close tileset dropdown on outside click (bubble phase so stopPropagation inside the dropdown works)
  useEffect(() => {
    if (!tilesetDropOpen) return;
    const handler = () => setTilesetDropOpen(false);
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [tilesetDropOpen]);

  // Responsive resize listener
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const saveColors = (b1, b2) => save(SK.colors, { bg1: b1, bg2: b2 });

  // Debounced BG history push — uses refs so the callback always reads the latest values.
  // 350 ms of quiet after the last applyBg call → one undo step per drag session.
  const pushBgHistory = useCallback(() => {
    if (bgHistTimerRef.current) clearTimeout(bgHistTimerRef.current);
    bgHistTimerRef.current = setTimeout(() => {
      const snap = { grid: gridRef.current, w: gridWRef.current, h: gridHRef.current, tileset: activeTilesetRef.current, shownTilesets: shownTilsetsRef.current, shownAtlasTilesets: shownAtlasTilesetsRef.current, bg1: bg1Ref.current, bg2: bg2Ref.current, highlight: [...highlightedCellsRef.current], rots: gridRotationsRef.current, flips: gridFlipsRef.current };
      setHistory(h => {
        const trimmed = h.slice(0, histIdxRef.current + 1);
        const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
        return [...capped, snap];
      });
      setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
      bgHistTimerRef.current = null;
    }, 350);
  }, []);

  const applyBg1 = v => {
    setBg1(v); setHex1(v);
    setCustomBg(prev => { const n = { ...prev, bg1: v }; save("oph_custom_bg", n); return n; });
    setSelectedBgPreset("custom"); save("oph_bg_preset_key", "custom");
    saveColors(v, bg2); pushBgHistory();
  };
  const applyBg2 = v => {
    setBg2(v); setHex2(v);
    setCustomBg(prev => { const n = { ...prev, bg2: v }; save("oph_custom_bg", n); return n; });
    setSelectedBgPreset("custom"); save("oph_bg_preset_key", "custom");
    saveColors(bg1, v); pushBgHistory();
  };
  const applyBgPreset = (key, b1, b2) => {
    setBg1(b1); setBg2(b2); setHex1(b1); setHex2(b2);
    setSelectedBgPreset(key); save("oph_bg_preset_key", key);
    saveColors(b1, b2);
  };

  const markFailed = id => setFailedTiles(prev => new Set([...prev, id]));

  // Grid with history
  const setGrid = useCallback((updater, skipHistory = false) => {
    const snapLabel = histLabelRef.current || "Draw";
    if (!skipHistory) histLabelRef.current = "Draw";
    setGridRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (!skipHistory) {
        setHistory(h => {
          const trimmed = h.slice(0, histIdx + 1);
          const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
          return [...capped, { grid: next, w: gridWRef.current, h: gridHRef.current, tileset: activeTilesetRef.current, shownTilesets: shownTilsetsRef.current, shownAtlasTilesets: shownAtlasTilesetsRef.current, bg1: bg1Ref.current, bg2: bg2Ref.current, highlight: [...highlightedCellsRef.current], rots: gridRotationsRef.current, flips: gridFlipsRef.current, label: snapLabel }];
        });
        setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
      }
      return next;
    });
  }, [histIdx]);

  const restoreSnap = snap => {
    setGridRaw(snap.grid ?? snap);
    if (snap.w !== undefined) { setGridW(snap.w); setGridH(snap.h); }
    if (snap.tileset != null) setActiveTileset(snap.tileset);
    if (snap.bg1 !== undefined) {
      setBg1(snap.bg1); setHex1(snap.bg1); setBg2(snap.bg2); setHex2(snap.bg2);
      save(SK.colors, { bg1: snap.bg1, bg2: snap.bg2 });
      setSelectedBgPreset("custom"); save("oph_bg_preset_key", "custom");
    } else if (snap.tileset != null && snap.tileset !== activeTilesetRef.current) {
      const tsBg = OPHELIA_BG[snap.tileset];
      if (tsBg) applyBgPreset(snap.tileset, tsBg.bg1, tsBg.bg2);
    }
    if (snap.highlight !== undefined) {
      const s = new Set(snap.highlight);
      setHighlightedCells(s);
      highlightedCellsRef.current = s;
      const sp = new Set(snap.primaryHighlight ?? snap.highlight);
      setPrimaryHighlightedCells(sp);
      primaryHighlightedCellsRef.current = sp;
      setHighlightMode(s.size > 0);
      highlightModeRef.current = s.size > 0;
    }
    // Always clear any in-progress highlight drag when restoring a snapshot
    setHighlightDragOffset(null);
    highlightDragOffsetRef.current = null;
    highlightDragAnchorCell.current = null;
    isHighlightDraggingRef.current = false;
    if (snap.shownTilesets !== undefined) {
      setShownTilesets(snap.shownTilesets);
      shownTilsetsRef.current = snap.shownTilesets;
    }
    if (snap.shownAtlasTilesets !== undefined) {
      setShownAtlasTilesets(snap.shownAtlasTilesets);
      shownAtlasTilesetsRef.current = snap.shownAtlasTilesets;
    }
    if (snap.rots !== undefined) {
      setGridRotations(snap.rots);
      gridRotationsRef.current = snap.rots;
    }
    if (snap.flips !== undefined) {
      setGridFlips(snap.flips);
      gridFlipsRef.current = snap.flips;
    }
  };

  // Apply a duplicate: place copy of primary highlighted cells at current drag-offset position, with mirroring
  const applyDuplicate = useCallback(() => {
    const offset = highlightDragOffsetRef.current;
    if (!offset || (offset.dr === 0 && offset.dc === 0)) return;
    const { dr, dc } = offset;
    // Only iterate primary cells — mirror placement is handled by getMirrorMetaFn below
    const oldCells = [...primaryHighlightedCellsRef.current];
    const ms = mirrorSettingsRef.current;
    const getMirrorMetaFn = getMirrorMetaRef.current;
    const currentGrid = gridRef.current;
    const newG = currentGrid.map(row => [...row]);
    const newRots = { ...gridRotationsRef.current };
    const newFlips = { ...gridFlipsRef.current };
    const seenNew = new Set();
    oldCells.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      const id = currentGrid[r]?.[c] ?? null;
      if (id === null) return;
      const srcRot = gridRotationsRef.current[key] ?? 0;
      const srcFlip = gridFlipsRef.current[key] ?? 0;
      const tile = tiles.find(t => t.id === id);
      const isRotatable = tile ? isTileRotatable(tile) : false;
      const newR = r + dr, newC = c + dc;
      if (newR < 0 || newR >= gridHRef.current || newC < 0 || newC >= gridWRef.current) return;
      const placements = [];
      const primaryKey = `${newR},${newC}`;
      if (!seenNew.has(primaryKey)) {
        seenNew.add(primaryKey);
        placements.push({ newR, newC, id, rot: srcRot, flip: srcFlip });
      }
      if (getMirrorMetaFn) {
        getMirrorMetaFn(newR, newC).forEach(({ pos: [mr, mc], fV, fH, fD }) => {
          const mKey = `${mr},${mc}`;
          if (!seenNew.has(mKey)) {
            seenNew.add(mKey);
            const mirrorId = (id && ms.mirrorSpawns && (fH || fD)) ? swapSpawnId(id) : id;
            const mirrorRot = (ms.mirrorRotation && isRotatable) ? applyRotMirror(srcRot, fV, fH, fD) : srcRot;
            placements.push({ newR: mr, newC: mc, id: mirrorId, rot: mirrorRot, flip: srcFlip });
          }
        });
      }
      placements.forEach(({ newR: nr, newC: nc, id: tid, rot, flip }) => {
        newG[nr][nc] = tid;
        if (rot !== 0) newRots[`${nr},${nc}`] = rot; else delete newRots[`${nr},${nc}`];
        if (flip) newFlips[`${nr},${nc}`] = flip; else delete newFlips[`${nr},${nc}`];
      });
    });

    if (pushHistRef.current) pushHistRef.current();

    setGridRotations(newRots); gridRotationsRef.current = newRots;
    setGridFlips(newFlips); gridFlipsRef.current = newFlips;

    highlightDragAnchorCell.current = null;

    setHistIdx(newIdx);
    restoreSnap(history[newIdx]);
  }, [history, histIdx]);

  // All cell writes during a drag use skipHistory=true, so the whole drag is one undo step.
  const pushHistorySnapshot = useCallback(() => {
    const label = histLabelRef.current || "Draw";
    histLabelRef.current = "Draw";
