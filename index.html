<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Opheliapp" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a0f06" />
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon setup — browsers pick the best size automatically -->
  <link rel="icon"                    href="favicon/favicon.ico" sizes="any" />
  <link rel="icon"    type="image/png" href="favicon/favicon-16x16.png"           sizes="16x16" />
  <link rel="icon"    type="image/png" href="favicon/favicon-32x32.png"           sizes="32x32" />
  <link rel="apple-touch-icon"        href="favicon/apple-touch-icon.png" />

  <title>Opheliapp</title>

  <!-- Lilita One (title only) + Inter (all UI) from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; background: #1a0f06; }
    #root { height: 100%; height: 100dvh; display: flex; flex-direction: column; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.18); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(251,146,60,0.55); border-radius: 4px; border: 1px solid rgba(251,146,60,0.2); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(251,146,60,0.8); }
    * { -webkit-tap-highlight-color: transparent; }

    /* Checkered transparent background — applied to the exact-size image wrapper inside modals */
    .tile-img-checker {
      display: inline-block;
      background-color: #bbb;
      background-image: linear-gradient(45deg, #eee 25%, transparent 25%),
                        linear-gradient(-45deg, #eee 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #eee 75%),
                        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0;
    }
    .tile-img-checker img { display: block; }

    /* Title gradient — overridden by oph-dyn-style on theme change */
    .oph-title-text { background: linear-gradient(90deg,#c45c6a,#fb923c,#fbbf24); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }

    /* Modal backdrop — must sit above priority tiles (z-index 9999) and folder panel (2000) */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; padding: 20px;
    }
    .modal-box {
      background: #2b1a0a; border: 1px solid rgba(251,146,60,0.18);
      border-radius: 14px; padding: 22px; max-width: 340px; width: 100%;
      display: flex; flex-direction: column; gap: 16px;
    }

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ── Constants ──────────────────────────────────────────────────────────
const GRID_W = 21, GRID_H = 33, CELL = 32;
const DEFAULT_BG1 = "#67717d", DEFAULT_BG2 = "#6e7986";
const MIN_ZOOM = 0.25, MAX_ZOOM = 4;
// Zoom buttons snap to nearest 5%
const ZOOM_STEP = 0.05;
const snapTo10 = z => Math.round(z * 20) / 20;
const SK = { tiles: "oph_tiles", grid: "oph_grid", colors: "oph_colors", userTiles: "oph_user_tiles", multipliers: "oph_multipliers", priority: "oph_priority", offsets: "oph_offsets", rotatable: "oph_rotatable", tileRots: "oph_tile_rots", gridW: "oph_gridW", gridH: "oph_gridH", tileNames: "oph_tile_names", bottom: "oph_bottom", mirrorOffset: "oph_mirror_offset", gridOff: "oph_grid_off", activeTileset: "oph_active_ts", atlasTiles: "oph_atlas_tiles" };
const ACCEPTED = "image/png,image/jpeg,image/gif,image/webp,image/svg+xml,image/bmp";
const MAX_HISTORY = 60;
// Non-overlapping tile ID ranges — prevents collisions between sections regardless of reordering
const TILESET_ID_START = 1;   // 001–099: active tileset tiles (Mausoleum wall1=1, etc.)
const USER_ID_START    = 100; // 100–199: user-uploaded tiles
const USER_ID_MAX      = 199;
const GLOBAL_ID_START  = 200; // 200–299: global tiles (water, spawns, objectives, etc.)
const ATLAS_ID_START   = 300; // 300–499: atlas tiles (She-Fairy/atlas-horizon)
const SPACE_TILE_ID    = 998; // special: makes a cell fully transparent

// Module-level cache for GitHub API responses (survives re-renders, not page reload)
const atlasApiCache = new Map(); // url → resolved data

// Default per-tile settings: src pattern → property value.
// Functions like isDefaultRotatable/isDefaultOTGWall read from here.
const TILE_SETTINGS = {
  rotatable:    ["/Water/"],   // src substrings → tile is rotatable by default
  otgPassable:  ["bush", "Bush", "SpeedTile", "SlowTile", "Objective", "Rope/", "Jumppads/", "Teleporters/", "HealPad", "Spawn", "SpawnPoint", "spawn"],
  mirrorOffset: ["Jumppads/", "Teleporters/", "HealPad"],
  bottomRender: ["/Water/", "Jumppads/", "Teleporters/", "HealPad"],
  priority:     ["/objectives/", "/Objectives/", "/Objective/"],
};

// Default tiles are loaded dynamically from Resources/manifest.json.
// To add/remove tiles, update that JSON file (or run generate-manifest.sh).

const load = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };

// Derive a human-readable codename from a tile's src path (display only, IDs unchanged)
const deriveCodename = src => {
  if (!src) return null;
  const file = src.split("/").pop().replace(/\.[^.]+$/, "");
  const map = {
    // Mausoleum
    "MSLM-wall": "Wall1", "MSLM-wall2": "Wall2", "MSLM-crate": "Crate", "MSLM-barrel": "Barrel",
    "MSLM-cactus": "Cactus", "MSLM-bush": "Bush", "MSLM-break": "Breakable",
    "MSLM-fence": "Fence1", "MSLM-fenceHORIZONTAL": "Fence2", "MSLM-fenceVERTICAL": "Fence3",
    "MSLM-post1": "Rope1", "MSLM-post2": "Rope2", "MSLM-post3": "Rope3", "MSLM-post4": "Rope4",
    "MSLM-water": "WaterFill", "MSLM-waterBEND": "WaterBend", "MSLM-waterCORNER": "WaterCorner", "MSLM-waterLINE": "WaterLine",
    "MSLM-waterDOUBLEBEND": "WaterDoubleBend", "MSLM-waterDOUBLELINE": "WaterDoubleLine", "MSLM-waterFULL": "WaterFullTile",
    // Mausoleum objectives
    "MSLM-ball": "Ball", "MSLM-safe": "Safe", "MSLM-mine": "GemMine",
    // Global water
    "00001011": "GWaterBend", "01111111": "GWaterCorner", "01101011": "GWaterLine", "11111111": "GWaterFill",
    // Global special
    "Unbreakable": "Unbreakable", "HealPad": "HealPad", "SlowTile": "SlowTile",
    "Smoke": "Smoke", "SpeedTile": "SpeedTile", "Spikes": "Spike",
    // Spawns
    "1": "SpawnRed", "2": "SpawnBlue", "5": "RespawnRed", "6": "RespawnBlue",
    // Objectives
    "Bounty": "BountyGObjective", "Gem_Grab": "GGObjective", "Heist": "HeistObjective", "Hot_Zone": "HZObjective",
    // Teleporters
    "Blue": "BlueTeleport", "Green": "GreenTeleport", "Red": "RedTeleport", "Yellow": "YellowTeleport",
    // Sewer
    "SWR-wall": "Wall1", "SWR-wall2": "Wall2", "SWR-crate": "Crate", "SWR-barrel": "Barrel",
    "SWR-cactus": "Cactus", "SWR-bush": "Bush", "SWR-breakable": "Breakable",
    "SWR-fence": "Fence", "SWR-fence-VALVE": "FenceValve",
    "SWR-fenceH": "FenceH", "SWR-fenceH-L": "FenceH-L", "SWR-fenceH-R": "FenceH-R", "SWR-fenceH-VALVE": "FenceH-Valve",
    "SWR-fenceV": "FenceV", "SWR-fenceV-T": "FenceV-T", "SWR-fenceV-B": "FenceV-B", "SWR-fenceV-B-VALVE": "FenceV-B-Valve",
    "SWR-fenceV-TURN-L": "FenceV-TurnL", "SWR-fenceV-TURN-R": "FenceV-TurnR",
    "SWR-fenceV-TURN2-L": "FenceV-Turn2L", "SWR-fenceV-TURN2-R": "FenceV-Turn2R",
    "SWR-post": "Rope", "SWR-post-H": "RopeH", "SWR-post-H-L": "RopeH-L", "SWR-post-H-R": "RopeH-R",
    "SWR-post-V": "RopeV", "SWR-post-V-H": "RopeV-H", "SWR-post-V-L": "RopeV-L", "SWR-post-V-R": "RopeV-R",
    "SWR-ball": "Ball", "SWR-safe": "Safe", "SWR-mine": "GemMine",
    "Brawl_Ball": "BrawlBall", "goalRed": "GoalRed", "goalBlue": "GoalBlue",
    // Jumppads
    "B": "BottomJumppad", "BL": "BottomLeftJumppad", "BR": "BottomRightJumppad",
    "L": "LeftJumppad", "R": "RightJumppad", "T": "TopJumppad",
    "TL": "TopLeftJumppad", "TR": "TopRightJumppad",
  };
  return map[file] ?? null;
};
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
// Convert a data URL to a blob URL for faster browser rendering (blob URLs bypass data URI parsing overhead)
const dataURLtoBlobURL = dataURL => {
  try {
    const sep = dataURL.indexOf(',');
    const meta = dataURL.slice(0, sep);
    const data = dataURL.slice(sep + 1);
    const mime = (meta.match(/:(.*?);/) || [])[1] || 'application/octet-stream';
    if (meta.includes(';base64')) {
      const bytes = atob(data);
      const arr = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
      return URL.createObjectURL(new Blob([arr], { type: mime }));
    }
    return URL.createObjectURL(new Blob([decodeURIComponent(data)], { type: mime }));
  } catch { return null; }
};
const validHex = h => /^#[0-9A-Fa-f]{6}$/.test(h);
const isMobileDevice = () => typeof window !== "undefined" && window.innerWidth < 768;

// ── Colour palettes ────────────────────────────────────────────────────
const THEMES = {
  warm: {
    bg: "#1a0f06", panel: "#2b1a0a", panelDeep: "#1f1207",
    border: "rgba(251,146,60,0.18)", accent: "#fb923c",
    accentDim: "rgba(251,146,60,0.14)", accentBright: "#fdba74",
    soft: "#fcd34d", softDim: "rgba(252,211,77,0.16)",
    pale: "#fde68a", paleDim: "rgba(253,230,138,0.14)",
    text: "#fef3e2", muted: "rgba(254,243,226,0.45)", danger: "#f87171",
  },
  cold: {
    bg: "#06101a", panel: "#0a1b2e", panelDeep: "#071320",
    border: "rgba(56,189,248,0.22)", accent: "#38bdf8",
    accentDim: "rgba(56,189,248,0.15)", accentBright: "#7dd3fc",
    soft: "#34d399", softDim: "rgba(52,211,153,0.16)",
    pale: "#a7f3d0", paleDim: "rgba(167,243,208,0.14)",
    text: "#e2f0fe", muted: "rgba(226,240,254,0.45)", danger: "#f87171",
  },
};
// C is mutable so App can update it on theme change; Sep/SectionHeader always read the current value
let C = (() => { try { const t = JSON.parse(localStorage.getItem("oph_theme")); return { ...(THEMES[t] || THEMES.warm) }; } catch { return { ...THEMES.warm }; } })();

// ── Tiny helpers ───────────────────────────────────────────────────────
const Sep = () => <div style={{ width: 1, height: 22, background: C.border, flexShrink: 0, alignSelf: "center" }} />;

function SectionHeader({ label, open, onToggle, left, right }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 12px", background: C.panelDeep, borderBottom: open ? `1px solid ${C.border}` : "none" }}>
      <button onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.2, color: C.accent, textTransform: "uppercase", fontFamily: "'Inter', sans-serif" }}>{label}</span>
        <span style={{ fontSize: 9, color: C.muted, display: "inline-block", transition: "transform 0.15s", transform: open ? "rotate(0deg)" : "rotate(-90deg)" }}>▼</span>
      </button>
      {left}
      <div style={{ flex: 1 }} />
      {right}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────
// ── Fit-to-viewport zoom ───────────────────────────────────────────────
function calcFitZoom(gw, gh) {
  const gridW = gw || GRID_W, gridH = gh || GRID_H;
  const w = window.innerWidth, h = window.innerHeight;
  const mobile = w < 768;
  // Mobile: only the 28px toggle strips are visible (sidebars collapsed)
  // Desktop: left 240 + right 260 + 2×28 strips = 556
  const sideW = mobile ? 56 : 556;
  const topH = 50;
  // Bottom bar: 3 rows × ~30px each ≈ 92px
  const botH = 92;
  const pad = 24;
  const availW = Math.max(1, w - sideW - pad);
  const availH = Math.max(1, h - topH - botH - pad);
  return Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, snapTo10(Math.min(availW / (gridW * CELL), availH / (gridH * CELL)))));
}

function App() {
  const savedColors = load(SK.colors, { bg1: DEFAULT_BG1, bg2: DEFAULT_BG2 });
  const mobile = isMobileDevice();

  // Default tiles loaded dynamically from Resources/manifest.json
  const [defaultTiles, setDefaultTiles]   = useState([]);
  const [tilesLoading, setTilesLoading]   = useState(true);

  // User-uploaded tiles persisted in localStorage; IDs start after defaults
  // blobSrc is generated at load time for faster rendering (blob URLs skip data URI parsing)
  const [userTiles, setUserTiles] = useState(() => {
    const saved = load(SK.userTiles, []);
    return saved.map(t => ({ ...t, blobSrc: t.src ? dataURLtoBlobURL(t.src) : undefined }));
  });
  // Atlas tiles: stored in localStorage, IDs 300–499
  const [atlasTiles, setAtlasTiles] = useState(() => load(SK.atlasTiles, []));
  // Atlas icon size for the browser panel
  const [atlasIconSize, setAtlasIconSize] = useState(() => load("oph_atlas_icon_size", 20));
  // Atlas panel UI state
  const [atlasOpen,    setAtlasOpen]    = useState(false);
  const [atlasPath,    setAtlasPath]    = useState(""); // current browse path within Resources/
  const [atlasItems,   setAtlasItems]   = useState(null); // null=not yet loaded, array=loaded
  const [atlasError,   setAtlasError]   = useState("");
  const [atlasLoading, setAtlasLoading] = useState(false);

  const tiles = useMemo(() => [...defaultTiles, ...userTiles, ...atlasTiles], [defaultTiles, userTiles, atlasTiles]);

  const [gridW, setGridW] = useState(() => load(SK.gridW, GRID_W));
  const [gridH, setGridH] = useState(() => load(SK.gridH, GRID_H));
  const [grid,        setGridRaw]   = useState(() => {
    const saved = load(SK.grid, null);
    const gW = load(SK.gridW, GRID_W), gH = load(SK.gridH, GRID_H);
    if (saved && saved.length === gH && saved[0]?.length === gW) return saved;
    return Array.from({ length: gH }, () => Array(gW).fill(null));
  });
  const [bg1,         setBg1]       = useState(savedColors.bg1);
  const [bg2,         setBg2]       = useState(savedColors.bg2);
  const [hex1,        setHex1]      = useState(savedColors.bg1);
  const [hex2,        setHex2]      = useState(savedColors.bg2);
  const [sel,         setSel]       = useState(null);
  const [eraser,      setEraser]    = useState(false);
  const [handMode,    setHandMode]  = useState(false);
  const [mirrorV,     setMirrorV]   = useState(false);
  const [mirrorH,     setMirrorH]   = useState(false);
  const [mirrorD,     setMirrorD]   = useState(false);
  const [showGuides,    setShowGuides]    = useState(false);
  const [mirrorSettings, setMirrorSettings] = useState({ mirrorSpawns: true, mirrorRotation: true, allowSwap: false });
  const [mirrorSettingsOpen, setMirrorSettingsOpen] = useState(false);
  const [tilesSettingsOpen,  setTilesSettingsOpen]  = useState(false);
  const [tileCardLightBg,    setTileCardLightBg]    = useState(() => load("oph_tile_card_light_bg", true));
  const [shortcutPopover,   setShortcutPopover]   = useState(null); // "selectionGroup" | "mirrorGroup" | null
  const [zoom,        setZoom]      = useState(calcFitZoom);
  const [zoomEditing, setZoomEdit]  = useState(false);
  const [zoomInput,   setZoomInput] = useState("");
  const [painting,    setPainting]  = useState(false);
  const [selectionMode, setSelectionMode] = useState('single'); // 'single' | 'line' | 'rect' | 'fill'
  const [eyedropperMode, setEyedropperMode] = useState(false); // eyedropper pick tool
  const [highlightMode, setHighlightMode] = useState(false);
  const [highlightedCells, setHighlightedCells] = useState(new Set()); // Set of "r,c" strings
  const highlightedCellsRef = useRef(new Set()); // mirror for closures
  const [highlightDragOffset, setHighlightDragOffset] = useState(null); // {dr, dc} cell offset while dragging highlight
  const highlightDragOffsetRef = useRef(null);
  const isHighlightDraggingRef = useRef(false);
  const highlightDragAnchorCell = useRef(null); // [r,c] of the cell where drag started
  const highlightModeRef = useRef(false);
  const eyedropperModeRef = useRef(false);
  const [rectPreview,   setRectPreview]   = useState(null);     // {r1,c1,r2,c2} during rect drag
  const [previewCells,  setPreviewCells]  = useState(null);     // [[r,c],...] during single/line drag
  // Drag-to-move
  const [dragTile,       setDragTile]       = useState(null);   // tile id being dragged, null when idle
  const [dragPos,        setDragPos]        = useState({ x: 0, y: 0 }); // screen coords for ghost image
  const [dragTargetCell, setDragTargetCell] = useState(null);   // [r,c] cell under cursor while dragging
  // Folder panel (floating modal)
  const [openFolderKey,    setOpenFolderKey]    = useState(null);
  const [folderPanelAnchor, setFolderPanelAnchor] = useState({ x: 0, y: 0 });
  const folderPanelRef    = useRef(null);
  const openFolderKeyRef  = useRef(null); // always-current key for reliable toggle
  // Panels: collapsed by default on mobile
  const [tilesOpen,   setTilesOpen] = useState(!mobile);
  const [toolsOpen,   setToolsOpen] = useState(!mobile);
  const [bgOpen,      setBgOpen]    = useState(!mobile);
  const [otherOpen,   setOtherOpen] = useState(!mobile);
  // Bottom section: extra rows collapsed by default on mobile
  const [bottomOpen,  setBottomOpen] = useState(!mobile);
  const [infoTile,    setInfoTile]  = useState(null);
  const [infoTool,    setInfoTool]  = useState(null); // "erase" | "hand" | "space"
  // Starred tiles: up to 5, shown when tiles panel is collapsed
  // Special IDs: "erase" and "hand"; regular tiles use numeric ID
  const [starredTiles, setStarredTiles] = useState(() => load("oph_starred", [1, 6, "selectionGroup", "mirrorGroup", "guides", "overwrite"]));
  const toggleStar = id => setStarredTiles(prev => {
    if (prev.includes(id)) return prev.filter(s => s !== id);
    return [...prev, id];
  });
  // Last 3 selected tile IDs (numeric only, most-recent first)
  const [recentTileIds, setRecentTileIds] = useState(() => load("oph_recent", []));

  // Map size input fields (local string state for editing)
  const [sizeWInput, setSizeWInput] = useState(String(load(SK.gridW, GRID_W)));
  const [sizeHInput, setSizeHInput] = useState(String(load(SK.gridH, GRID_H)));
  const [customSizeOpen, setCustomSizeOpen] = useState(false);

  // Replace A→B
  const [replaceOpen, setReplaceOpen] = useState(false);
  const [memoryOpen, setMemoryOpen] = useState(false);
  const [convertOpen, setConvertOpen] = useState(false);
  const [hotkeysOpen, setHotkeysOpen] = useState(false);
  const [replaceStep, setReplaceStep] = useState(1); // 1=pick tile on map, 2=pick replacement
  const [replaceA,    setReplaceA]  = useState(null);
  const [replaceB,    setReplaceB]  = useState(null);
  // OTG (One Tile Gap) detection
  const [showOTG,          setShowOTG]          = useState(false);
  const [otgOpen,          setOtgOpen]          = useState(false);
  const [otgWallOverrides, setOtgWallOverrides] = useState(() => load("oph_otg_walls", {}));
  // Map name for export filename
  const [mapName, setMapName] = useState(() => load("oph_map_name", ""));
  // Pending map size change awaiting confirmation
  const [pendingSize, setPendingSize] = useState(null); // { w, h }
  // Tile size multipliers
  const [tileMultipliers, setTileMultipliers] = useState(() => load(SK.multipliers, {}));
  // Priority tiles: rendered in a second DOM pass at z-index 9999 (always on top)
  const [priorityTiles, setPriorityTiles] = useState(() => load(SK.priority, {}));
  // Bottom tiles: rendered in Pass 0 at low z-index (always below normal tiles)
  const [bottomTiles, setBottomTiles] = useState(() => load(SK.bottom, {}));
  // Per-tile offsets: { [id]: { ox: %, oy: % } }  (positive oy = down, positive ox = right)
  const [tileOffsets, setTileOffsets] = useState(() => load(SK.offsets, {}));
  // Per-tile "Allow rotation" toggle: { [id]: bool } — undefined = use default
  const [rotatableMap, setRotatableMap] = useState(() => load(SK.rotatable, {}));
  // Per-tile custom names (user-uploaded tiles): { [id]: string }
  const [tileNames, setTileNames] = useState(() => load(SK.tileNames, {}));
  // Per-tile card rotation step 0-3 (0=up,1=right,2=down,3=left) — used for next placement
  const [cardRotations, setCardRotations] = useState({});
  // Per-tile flip mode: 'spin' (default) or 'flip'
  const [cardFlipModes, setCardFlipModes] = useState({}); // { [tileId]: 'spin' | 'flip' }
  // Per-tile flip cycle step 0-3 (0=none,1=flipX,2=flipX+Y,3=flipY)
  const [cardFlipSteps, setCardFlipSteps] = useState({}); // { [tileId]: 0|1|2|3 }
  // Per-cell grid rotation: { "r,c": 0|1|2|3 }
  const [gridRotations, setGridRotations] = useState(() => load(SK.tileRots, {}));
  const [gridFlips,     setGridFlips]     = useState(() => load("oph_grid_flips", {})); // { "r,c": 0|1|2|3 }
  const [gridOffsets,       setGridOffsets]       = useState(() => load(SK.gridOff, {}));
  const [mirrorOffsetTiles, setMirrorOffsetTiles] = useState(() => load(SK.mirrorOffset, {}));
  const [showOffsetCenters, setShowOffsetCenters] = useState(false);
  // Collapsible tiles panel sections: true = collapsed

  // Persist

  useEffect(() => { save(SK.atlasTiles,  atlasTiles); }, [atlasTiles]);
  useEffect(() => { save("oph_atlas_icon_size", atlasIconSize); }, [atlasIconSize]);
  useEffect(() => { save("oph_panel_collapsed", panelCollapsed); }, [panelCollapsed]);
  useEffect(() => { save(SK.grid,         grid);            }, [grid]);
  useEffect(() => { save(SK.multipliers,  tileMultipliers); }, [tileMultipliers]);
  useEffect(() => { save(SK.priority,     priorityTiles);   }, [priorityTiles]);
  useEffect(() => { save(SK.offsets,      tileOffsets);     }, [tileOffsets]);
  useEffect(() => { save(SK.bottom,      bottomTiles);     }, [bottomTiles]);
  useEffect(() => { save(SK.rotatable,    rotatableMap);    }, [rotatableMap]);
  useEffect(() => { save(SK.tileRots,     gridRotations);   }, [gridRotations]);
  useEffect(() => { save(SK.gridOff,      gridOffsets);       }, [gridOffsets]);
  useEffect(() => { save("oph_grid_flips", gridFlips);        }, [gridFlips]);
  useEffect(() => { save(SK.mirrorOffset, mirrorOffsetTiles); }, [mirrorOffsetTiles]);
  useEffect(() => { save("oph_otg_walls", otgWallOverrides); }, [otgWallOverrides]);
  useEffect(() => { save(SK.tileNames,    tileNames);       }, [tileNames]);
  useEffect(() => { save("oph_tile_card_light_bg", tileCardLightBg); }, [tileCardLightBg]);
  useEffect(() => {
    save("oph_theme", uiTheme);
    document.body.style.background = C.bg;
    // Update dynamic theme styles (scrollbars, modal)
    const isC = uiTheme === "cold";
    const scrollColor = isC ? "rgba(56,189,248,0.55)" : "rgba(251,146,60,0.55)";

  }, [uiTheme]);
  useEffect(() => { save("oph_starred", starredTiles); }, [starredTiles]);
  useEffect(() => { save("oph_recent", recentTileIds); }, [recentTileIds]);
  // Track last 3 selected numeric tile IDs
  useEffect(() => {

  useEffect(() => { save("oph_map_name", mapName); }, [mapName]);
  useEffect(() => { save(SK.gridW, gridW); setSizeWInput(String(gridW)); }, [gridW]);
  useEffect(() => { save(SK.gridH, gridH); setSizeHInput(String(gridH)); }, [gridH]);

  const getDefaultMultiplier = t => {
    if (!t?.src) return 1.0;
    const s = t.src;
    // Spawns
    if (s.includes("Spawns/")) return 1.65;
    // Barrel: Sewer 1.05×, Mausoleum/default 1.1×
    if (s.includes("SWR-barrel")) return 1.05;
    if (s.includes("barrel") || s.includes("MSLM-barrel")) return 1.1;
    // Breakable (MSLM-break only, NOT Unbreakable)
    if (s.includes("MSLM-break") || (s.includes("break") && !s.includes("Unbreakable"))) return 1.1;
    // Jumppads & Teleporters & HealPad → 2x
    if (s.includes("Jumppads/") || s.includes("Teleporters/") || s.includes("HealPad")) return 2.0;
    // Hot Zone
    if (s.includes("Hot_Zone")) return 7.0;
    // Smoke / poison / gas
    if (s.includes("Smoke")) return 1.65;
    // Gem mine (MSLM-mine) → 2.3x
    if (s.includes("MSLM-mine")) return 2.3;
    // Brawl ball (MSLM-ball) → 1.7x
    if (s.includes("MSLM-ball")) return 1.7;
    // Sewer objectives
    if (s.includes("SWR-ball")) return 1.5;
    if (s.includes("SWR-mine")) return 2.0;
    // Global Brawl Ball → 2x
    if (s.includes("Brawl_Ball")) return 2.0;
    // Goal posts → 7x
    if (s.includes("goalRed") || s.includes("goalBlue")) return 7.0;
    // Gem Grab & Heist objectives + Mausoleum safe + Sewer safe → 2x
    if (s.includes("Gem_Grab") || s.includes("Heist") || s.includes("MSLM-safe") || s.includes("SWR-safe")) return 2.0;
    // Bounty star → 1.25x
    if (s.includes("Bounty")) return 1.25;
    return 1.0;
  };

  const getTileMultiplier = t => {
    if (tileMultipliers[t.id] !== undefined) return tileMultipliers[t.id];
    return getDefaultMultiplier(t);
  };

  // Returns { ox, oy } in % (100 = one full cell width/height). Positive ox=right, positive oy=down.
  const getDefaultOffset = t => {
    if (!t?.src) return { ox: 0, oy: 0 };
    const s = t.src;
    // Jumppads, Teleporters, HealPad: +50% H and +50% V so 2× tile sits centred on a 2×2 area
    if (s.includes("Jumppads/") || s.includes("Teleporters/") || s.includes("HealPad")) return { ox: 50, oy: 50 };
    // Mausoleum safe: -90 vertical
    if (s.includes("MSLM-safe")) return { ox: 0, oy: -90 };
    // Heist objectives: -50 vertical
    if (s.includes("Heist")) return { ox: 0, oy: -50 };
    // Goal posts: -50 vertical
    if (s.includes("goalRed") || s.includes("goalBlue")) return { ox: 0, oy: -50 };
    // Sewer objectives
    if (s.includes("SWR-ball")) return { ox: 0, oy: -30 };
    if (s.includes("SWR-safe")) return { ox: 0, oy: -50 };
    if (s.includes("SWR-mine")) return { ox: 0, oy: -20 };
    if (s.includes("SWR-breakable")) return { ox: 0, oy: 20 };
    // Sewer fence tiles
    if (s.includes("Sewer/Fence/")) return { ox: 0, oy: -30 };
    // Sewer rope tiles
    if (s.includes("Sewer/Rope/")) return { ox: 0, oy: -50 };
    // Bounty star: slight upward offset
    if (s.includes("Bounty")) return { ox: 0, oy: -10 };
    // Mausoleum Wall2: -12 vertical
    if (s.includes("MSLM-wall2")) return { ox: 0, oy: -12 };
    // Sewer Wall2: -5 vertical
    if (s.includes("SWR-wall2")) return { ox: 0, oy: -5 };
    // Mausoleum rope fences (MSLM-post*): -20 vertical
    if (s.includes("MSLM-post")) return { ox: 0, oy: -20 };
    return { ox: 0, oy: 0 };
  };

  const getTileOffset = t => {
    if (tileOffsets[t.id] !== undefined) return tileOffsets[t.id];
    return getDefaultOffset(t);
  };

  // Returns the effective offset for a cell, respecting per-cell overrides (from mirror-offset placement).
  const getEffectiveOffset = (t, r, c) => {
    const over = gridOffsets[`${r},${c}`];
    if (over !== undefined) return over;
    return getTileOffset(t);
  };

  // Spawn tile identification (src-based)
  const isSpawn1 = t => !!(t?.src && t.src.includes("Spawns/1.png")); // red
  const isSpawn2 = t => !!(t?.src && t.src.includes("Spawns/2.png")); // blue
  const isRespawn1 = t => !!(t?.src && t.src.includes("Spawns/5.png")); // red respawn
  const isRespawn2 = t => !!(t?.src && t.src.includes("Spawns/6.png")); // blue respawn
  const isGoalRed  = t => !!(t?.src && t.src.includes("goalRed.png"));
  const isGoalBlue = t => !!(t?.src && t.src.includes("goalBlue.png"));
  const swapSpawnId = (id) => {
    const t = tiles.find(x => x.id === id);
    if (!t) return id;
    if (isSpawn1(t)) { const b = tiles.find(x => isSpawn2(x)); return b ? b.id : id; }
    if (isSpawn2(t)) { const r = tiles.find(x => isSpawn1(x)); return r ? r.id : id; }
    if (isRespawn1(t)) { const b = tiles.find(x => isRespawn2(x)); return b ? b.id : id; }
    if (isRespawn2(t)) { const r = tiles.find(x => isRespawn1(x)); return r ? r.id : id; }
    if (isGoalRed(t))  { const b = tiles.find(x => isGoalBlue(x)); return b ? b.id : id; }
    if (isGoalBlue(t)) { const r = tiles.find(x => isGoalRed(x)); return r ? r.id : id; }
    return id;
  };

  // Water tiles have rotation on by default
  const isDefaultRotatable = t => !!(t?.src && TILE_SETTINGS.rotatable.some(p => t.src.includes(p)));

  const isTileRotatable = t => {
    if (rotatableMap[t.id] !== undefined) return rotatableMap[t.id];
    return isDefaultRotatable(t);
  };

  const isDefaultMirrorOffset = t => !!(t?.src && TILE_SETTINGS.mirrorOffset.some(p => t.src.includes(p)));
  const isMirrorOffset = t => {
    if (mirrorOffsetTiles[t.id] !== undefined) return mirrorOffsetTiles[t.id];
    return isDefaultMirrorOffset(t);
  };

  // OTG: which tiles count as walls by default (all except passable game-layer tiles)
  const isDefaultOTGWall = t => {
    if (!t?.src) return false;
    return !TILE_SETTINGS.otgPassable.some(p => t.src.includes(p));
  };
  const isOTGWall = t => {
    if (otgWallOverrides[t.id] !== undefined) return otgWallOverrides[t.id];
    return isDefaultOTGWall(t);
  };

  // Compute the set of OTG cells ("r,c" strings) — memoised so it only runs when the map/settings change
  const otgCells = useMemo(() => {
    if (!showOTG) return new Set();
    // For OTG purposes, map edges always count as walls
    const isWall = (r, c) => {
      if (r < 0 || r >= gridH || c < 0 || c >= gridW) return true; // edge = wall
      const id = grid[r]?.[c];
      if (id == null) return false;
      const t = id === SPACE_TILE_ID ? null : tiles.find(x => x.id === id);
      if (!t || t.isSpace) return false;
      if (otgWallOverrides[t.id] !== undefined) return otgWallOverrides[t.id];
      return isDefaultOTGWall(t);
    };
    const isEmpty = (r, c) => r >= 0 && r < gridH && c >= 0 && c < gridW && !isWall(r, c);
    const result = new Set();

    // ── Check 1: opposing pair ────────────────────────────────────────
    // Flag an empty tile if any of 4 axis pairs are both walls/edges:
    // left+right, top+bottom, NW+SE, NE+SW  (edges count as walls)
    for (let r = 0; r < gridH; r++) {
      for (let c = 0; c < gridW; c++) {
        if (!isEmpty(r, c)) continue;
        if (isWall(r, c-1) && isWall(r, c+1)) { result.add(`${r},${c}`); continue; } // left+right
        if (isWall(r-1, c) && isWall(r+1, c)) { result.add(`${r},${c}`); continue; } // top+bottom
        if (isWall(r-1, c-1) && isWall(r+1, c+1) && !isWall(r, c-1) && !isWall(r-1, c)) { result.add(`${r},${c}`); continue; } // NW+SE
        if (isWall(r-1, c+1) && isWall(r+1, c-1) && !isWall(r, c+1) && !isWall(r-1, c)) { result.add(`${r},${c}`); continue; } // NE+SW
      }
    }

    // ── Check 2: 2×2 diagonal squeeze ────────────────────────────────
    // Scan every 2×2 block. If two diagonally opposing cells are both walls
    // and the other two are both empty, flag both empty cells.
    for (let r = 0; r < gridH - 1; r++) {
      for (let c = 0; c < gridW - 1; c++) {
        const tl = isWall(r, c), tr = isWall(r, c+1);
        const bl = isWall(r+1, c), br = isWall(r+1, c+1);
        // TL+BR walls, TR+BL empty
        if (tl && br && !tr && !bl) { result.add(`${r},${c+1}`); result.add(`${r+1},${c}`); }
        // TR+BL walls, TL+BR empty
        if (tr && bl && !tl && !br) { result.add(`${r},${c}`); result.add(`${r+1},${c+1}`); }
      }
    }

    // ── Check 3: 2×3 / 3×2 corner squeeze ────────────────────────────
    // 2×3 blocks (2 cols wide, 3 rows tall): opposite corners = walls, middles = empty → flag middles
    for (let r = 0; r < gridH - 2; r++) {
      for (let c = 0; c < gridW - 1; c++) {
        const tl = isWall(r, c), tr = isWall(r, c+1);
        const ml = isEmpty(r+1, c), mr = isEmpty(r+1, c+1);
        const bl = isWall(r+2, c), br = isWall(r+2, c+1);
        // top-left + bottom-right walls, both middle-row cells empty
        if (tl && br && ml && mr) { result.add(`${r+1},${c}`); result.add(`${r+1},${c+1}`); }
        // top-right + bottom-left walls, both middle-row cells empty
        if (tr && bl && ml && mr) { result.add(`${r+1},${c}`); result.add(`${r+1},${c+1}`); }
      }
    }
    // 3×2 blocks (3 cols wide, 2 rows tall): opposite corners = walls, middles = empty → flag middles
    for (let r = 0; r < gridH - 1; r++) {
      for (let c = 0; c < gridW - 2; c++) {
        const tl = isWall(r, c), tr = isWall(r, c+2);
        const ml = isEmpty(r, c+1), mr = isEmpty(r+1, c+1);
        const bl = isWall(r+1, c), br = isWall(r+1, c+2);
        // top-left + bottom-right walls, both middle-column cells empty
        if (tl && br && ml && mr) { result.add(`${r},${c+1}`); result.add(`${r+1},${c+1}`); }
        // top-right + bottom-left walls, both middle-column cells empty
        if (tr && bl && ml && mr) { result.add(`${r},${c+1}`); result.add(`${r+1},${c+1}`); }
      }
    }
    return result;
  }, [showOTG, grid, gridW, gridH, otgWallOverrides, tiles]);

  // MultLabel: shows size multiplier at top-left when != 1.0
  const MultLabel = ({ t }) => {
    const mult = getTileMultiplier(t);
    if (mult === 1.0) return null;
    return (
      <span style={{ position: "absolute", top: 1, left: 2, fontSize: 7, fontWeight: 700, color: C.accentBright, background: "rgba(0,0,0,0.65)", borderRadius: 3, padding: "1px 3px", lineHeight: 1.3, pointerEvents: "none", zIndex: 5 }}>
        {mult}×
      </span>
    );
  };

  // Badge label shown at bottom-left of tile cards (priority/offset/mirrorOffset badges, NOT multiplier)
  const TileBadge = ({ t }) => {
    const off    = getTileOffset(t);
    const hasOff        = off.ox !== 0 || off.oy !== 0;
    const isPrio        = !!priorityTiles[t.id];
    const isBottom      = !!bottomTiles[t.id];
    const hasMirrorOff  = isMirrorOffset(t);
    if (!hasOff && !isPrio && !isBottom && !hasMirrorOff) return null;
    const parts = [];
    if (isPrio)  parts.push("🚨");
    if (isBottom) parts.push("⚓");
    if (hasOff)  parts.push("📐");
    if (hasMirrorOff) parts.push("🌪️");
    return (
      <span style={{ position: "absolute", bottom: 2, left: 3, fontSize: 8, fontWeight: 700, color: C.accentBright, background: "rgba(0,0,0,0.65)", borderRadius: 3, padding: "1px 3px", lineHeight: 1.3, pointerEvents: "none" }}>
        {parts.join("")}
      </span>
    );
  };

  // Active tileset name (primary — drives BG colour on switch, history tileset field)
  const [activeTileset, setActiveTileset] = useState(null);
  // Set of tileset names whose tiles are shown in the panel (multi-select)
  const [shownTilesets, setShownTilesets] = useState(() => load("oph_shown_tilesets", null));
  const [hiddenAtlasGroups, setHiddenAtlasGroups] = useState(() => load("oph_hidden_atlas_groups", []));
  // Tileset dropdown open state
  const [tilesetDropOpen, setTilesetDropOpen] = useState(false);
  // Parsed manifest data
  const [manifest, setManifest] = useState(null);
  useEffect(() => { openFolderKeyRef.current = openFolderKey; }, [openFolderKey]);
  // toggleFolder uses ref to read current value — avoids stale-closure reopening after
  // the outside-click mousedown handler closes the panel in the same event cycle.
  const toggleFolder = (key, e) => {
    if (openFolderKeyRef.current === key) {
      setOpenFolderKey(null);
    } else {
      setOpenFolderKey(key);
      if (e?.currentTarget) {
        const rect = e.currentTarget.getBoundingClientRect();
        setFolderPanelAnchor({ x: rect.right + 6, y: rect.top });
      }
    }
  };
  // Close folder panel on outside click
  useEffect(() => {
    if (!openFolderKey) return;
    const handler = ev => {
      if (folderPanelRef.current && !folderPanelRef.current.contains(ev.target)) {
        setOpenFolderKey(null);
      }
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('touchstart', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('touchstart', handler);
    };
  }, [openFolderKey]);

  // Build the flat defaultTiles list and the ordered panel entries from manifest + activeTileset.
  // ALL tilesets are loaded with sequential non-overlapping IDs so that switching themes never
  // causes ID collisions (e.g. Mausoleum breakable ID 7 stays valid even when Sewer is active).
  // shownTilesets controls which tilesets appear in the panel (multi-select).
  // Returns: tilesetEntriesPerTs, tilesetEntries, globalEntries, flatDefaultTiles, tilesetTileCount
  const { tilesetEntriesPerTs, tilesetEntries, globalEntries, flatDefaultTiles, tilesetTileCount } = useMemo(() => {
    if (!manifest) return { tilesetEntriesPerTs: [], tilesetEntries: [], globalEntries: [], flatDefaultTiles: [], tilesetTileCount: 0 };
    const flatTiles = [];
    let idCounter = TILESET_ID_START;
    const makeTile = src => ({ id: idCounter++, src: `Resources/${src}`, isDefault: true });
    const displayLabel = (key, folderPath) => {
      if (folderPath) { const s = folderPath.replace(/\/$/, '').split('/').pop(); if (s) return s; }
      return key;
    };

    // Determine which tilesets are shown — fall back to just the active one
    const defaultShown = [activeTileset ?? manifest.tilesets?.[0]?.name];
    const shownNames = new Set(shownTilesets ?? defaultShown);

    // ── ALL tilesets — IDs assigned sequentially so no tileset reuses another's IDs ──
    const entriesPerTs = []; // [{ name, entries, count }]
    let tsCount = 0;
    for (const tsDef of (manifest.tilesets ?? [])) {
      const isShown = shownNames.has(tsDef.name);
      const entries = [];
      for (const key of (tsDef.order ?? [])) {
        if (tsDef.folders?.[key]) {
          const folderPath = tsDef.folderPaths?.[key] ?? `${tsDef.name}/${key}/`;
          const label = displayLabel(key, folderPath);
          const scopedKey = `${tsDef.name}/${key}`;
          const folderTiles = tsDef.folders[key].map(fn => {
            const t = makeTile(`${folderPath}${fn}`);
            t.folderKey = scopedKey; t.folderLabel = label; t.tilesetName = tsDef.name;
            t.codename = `${tsDef.name}_${fn.replace(/\.[^.]+$/, '')}`;
            return t;
          });
          flatTiles.push(...folderTiles);
          if (isShown) { entries.push({ type: 'folder', key: scopedKey, label, tiles: folderTiles }); tsCount += folderTiles.length; }
        } else if (tsDef.files?.[key]) {
          const t = makeTile(tsDef.files[key]);
          t.tilesetName = tsDef.name;
          t.codename = `${tsDef.name}_${tsDef.files[key].split('/').pop().replace(/\.[^.]+$/, '')}`;
          flatTiles.push(t);
          if (isShown) { entries.push({ type: 'flat', tile: t }); tsCount++; }
        }
      }
      if (isShown) entriesPerTs.push({ name: tsDef.name, entries, count: entries.reduce((n, e) => n + (e.tiles?.length ?? 1), 0) });
    }

    // ── Global tiles (including objectives) — IDs start at GLOBAL_ID_START (200) ──
    idCounter = GLOBAL_ID_START; // jump to 200 regardless of how many tileset tiles there were
    const gDef = manifest.global;
    const glbEntries = [];
    if (gDef) {
      for (const key of (gDef.order ?? [])) {
        const files = gDef.folders?.[key];
        if (!files || files.length === 0) continue;
        const folderPath = gDef.folderPaths?.[key] ?? `Global/${key}/`;
        const label = displayLabel(key, folderPath);
        const folderTiles = files.map(fn => {
          const t = makeTile(`${folderPath}${fn}`);
          t.folderKey = `global_${key}`; t.folderLabel = label;
          t.codename = `Global_${fn.replace(/\.[^.]+$/, '')}`;
          return t;
        });
        flatTiles.push(...folderTiles);
        glbEntries.push({ type: 'folder', key: `global_${key}`, label, tiles: folderTiles });
      }
    }

    const tsEntries = entriesPerTs.flatMap(ts => ts.entries);
    return { tilesetEntriesPerTs: entriesPerTs, tilesetEntries: tsEntries, globalEntries: glbEntries, flatDefaultTiles: flatTiles, tilesetTileCount: tsCount };
  }, [manifest, activeTileset, shownTilesets]);

  // Switch tileset — only updates the tile panel and BG colours; board tiles are never remapped.
  // To convert tiles on the board use the Convert tool.
  const switchTileset = (newTilesetName) => {
    if (!manifest || newTilesetName === activeTileset) return;
    setActiveTileset(newTilesetName);
    const tsBg = { Mausoleum: { bg1: "#67717d", bg2: "#6e7986" }, Sewer: { bg1: "#4F594A", bg2: "#586352" } }[newTilesetName];
    if (tsBg) { setBg1(tsBg.bg1); setHex1(tsBg.bg1); setBg2(tsBg.bg2); setHex2(tsBg.bg2); save(SK.colors, tsBg); }
  };

  // Toggle a tileset in the shown set; always keep at least one shown.
  const toggleTilesetShown = (name) => {
    setShownTilesets(prev => {
      const cur = prev ?? [activeTileset ?? name];
      const s = new Set(cur);
      if (s.has(name)) { if (s.size <= 1) return cur; s.delete(name); }
      else {
        s.add(name); setActiveTileset(name);
        const tsBg = { Mausoleum: { bg1: "#67717d", bg2: "#6e7986" }, Sewer: { bg1: "#4F594A", bg2: "#586352" } }[name];
        if (tsBg) { setBg1(tsBg.bg1); setHex1(tsBg.bg1); setBg2(tsBg.bg2); setHex2(tsBg.bg2); save(SK.colors, tsBg); }
      }
      return [...s];
    });
  };

  // Sync defaultTiles and nextId whenever flatDefaultTiles changes.
  // Auto-flag any tile whose src path contains "/objectives/" as priority (case-insensitive).
  useEffect(() => {
    setDefaultTiles(flatDefaultTiles);
    if (flatDefaultTiles.length > 0) {
      setSel(prev => prev ?? flatDefaultTiles[0].id);
      setPriorityTiles(prev => {
        const next = { ...prev };
        let changed = false;
        flatDefaultTiles.forEach(t => {
          if (t.src && TILE_SETTINGS.priority.some(p => t.src.includes(p)) && !next[t.id]) {
            next[t.id] = true; changed = true;
          }
        });
        return changed ? next : prev;
      });
      setBottomTiles(prev => {
        const next = { ...prev };
        let changed = false;
        flatDefaultTiles.forEach(t => {
          if (!t.src) return;
          const isBottom = TILE_SETTINGS.bottomRender.some(p => t.src.includes(p));
          if (isBottom && !next[t.id]) {
            next[t.id] = true; changed = true;
          }
        });
        return changed ? next : prev;
      });
    }
  }, [flatDefaultTiles]);

  // Load manifest from Resources/manifest.json
  useEffect(() => {
    fetch("Resources/manifest.json")
      .then(r => r.ok ? r.json() : {})
      .then(data => {
        setManifest(data);
        const firstName = data.tilesets?.[0]?.name ?? null;
        const saved = load(SK.activeTileset, null);
        const name = (saved && data.tilesets?.some(ts => ts.name === saved)) ? saved : firstName;
        setActiveTileset(name);
        // Init shownTilesets: use saved value if it exists, otherwise default to all tilesets
        const allNames = data.tilesets?.map(ts => ts.name) ?? [name];
        const savedShown = load("oph_shown_tilesets", null);
        setShownTilesets(savedShown ?? allNames);
      })
      .catch(() => {})
      .finally(() => setTilesLoading(false));
  }, []);
  useEffect(() => { if (activeTileset) save(SK.activeTileset, activeTileset); }, [activeTileset]);
  useEffect(() => { if (shownTilesets) save("oph_shown_tilesets", shownTilesets); }, [shownTilesets]);
  useEffect(() => { save("oph_hidden_atlas_groups", hiddenAtlasGroups); }, [hiddenAtlasGroups]);
  // Close tileset dropdown on outside click (bubble phase so stopPropagation inside the dropdown works)
  useEffect(() => {
    if (!tilesetDropOpen) return;
    const handler = () => setTilesetDropOpen(false);
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [tilesetDropOpen]);

  // Responsive resize listener
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const saveColors = (b1, b2) => save(SK.colors, { bg1: b1, bg2: b2 });
  const applyBg1   = v => { setBg1(v); setHex1(v); saveColors(v, bg2); };
  const applyBg2   = v => { setBg2(v); setHex2(v); saveColors(bg1, v); };

  const markFailed = id => setFailedTiles(prev => new Set([...prev, id]));

  // Grid with history
  const setGrid = useCallback((updater, skipHistory = false) => {
    setGridRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (!skipHistory) {
        setHistory(h => {
          const trimmed = h.slice(0, histIdx + 1);
          const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
          return [...capped, { grid: next, w: gridWRef.current, h: gridHRef.current, tileset: activeTilesetRef.current }];
        });
        setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
      }
      return next;
    });
  }, [histIdx]);

  const restoreSnap = snap => {
    setGridRaw(snap.grid ?? snap);
    if (snap.w !== undefined) { setGridW(snap.w); setGridH(snap.h); }
    if (snap.tileset != null) setActiveTileset(snap.tileset);
    if (snap.bg1 !== undefined) {
      setBg1(snap.bg1); setHex1(snap.bg1); setBg2(snap.bg2); setHex2(snap.bg2);
      save(SK.colors, { bg1: snap.bg1, bg2: snap.bg2 });
    } else if (snap.tileset != null && snap.tileset !== activeTilesetRef.current) {
      const tsBg = { Mausoleum: { bg1: "#67717d", bg2: "#6e7986" }, Sewer: { bg1: "#4F594A", bg2: "#586352" } }[snap.tileset];
      if (tsBg) { setBg1(tsBg.bg1); setHex1(tsBg.bg1); setBg2(tsBg.bg2); setHex2(tsBg.bg2); save(SK.colors, tsBg); }
    }
  };

  const undo = useCallback(() => {
    if (histIdx <= 0) return;
    const newIdx = histIdx - 1;
    setHistIdx(newIdx);
    restoreSnap(history[newIdx]);
  }, [history, histIdx]);

  const redo = useCallback(() => {
    if (histIdx >= history.length - 1) return;
    const newIdx = histIdx + 1;
    setHistIdx(newIdx);
    restoreSnap(history[newIdx]);
  }, [history, histIdx]);

  // Push the current grid as a history snapshot (called once on mousedown, before any paint).
  // All cell writes during a drag use skipHistory=true, so the whole drag is one undo step.
  const pushHistorySnapshot = useCallback(() => {
    const snap = { grid, w: gridWRef.current, h: gridHRef.current, tileset: activeTilesetRef.current, bg1, bg2 };
    setHistory(h => {
      const trimmed = h.slice(0, histIdx + 1);
      const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
      return [...capped, snap];
    });
    setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
  }, [histIdx, grid, bg1, bg2]);

  const loadFiles = files => {
    const imageFiles = [...files].filter(f => f.type.startsWith("image/"));
    if (!imageFiles.length) return;
    let loaded = 0;
    imageFiles.forEach(f => {
      const blobSrc = URL.createObjectURL(f); // fast blob URL for immediate rendering
      const r = new FileReader();
      r.onload = e => {
        if (nextId.current > USER_ID_MAX) { console.warn("User tile limit reached (IDs 100–199)"); return; }
        const id = nextId.current++;
        setUserTiles(prev => [...prev, { id, src: e.target.result, blobSrc }]);
        loaded++;
        if (loaded === imageFiles.length) {
          // Flash notification
          setUploadFlash(imageFiles.length);
          if (uploadTimerRef.current) clearTimeout(uploadTimerRef.current);
          uploadTimerRef.current = setTimeout(() => setUploadFlash(0), 2500);
        }
      };
      r.readAsDataURL(f);
    });
  };

  const deleteTile = id => {
    setUserTiles(p => p.filter(t => t.id !== id));
    setAtlasTiles(p => p.filter(t => t.id !== id));
    if (sel === id) setSel(null);
    setInfoTile(null);
  };

  // ── Atlas helpers ─────────────────────────────────────────────────
  const nextAtlasId = () => {
    const used = new Set(atlasTiles.map(t => t.id));
    for (let id = ATLAS_ID_START; id < 500; id++) { if (!used.has(id)) return id; }
    return null; // full
  };

  const fetchAtlasDir = async (path) => {
    const url = `https://api.github.com/repos/She-Fairy/atlas-horizon/contents/Resources${path ? '/' + path : ''}`;
    if (atlasApiCache.has(url)) return atlasApiCache.get(url);
    const p = fetch(url).then(async r => {
      if (r.status === 403 || r.status === 429) throw new Error("rate_limit");
      if (!r.ok) throw new Error("fetch_error");
      return r.json();
    });
    atlasApiCache.set(url, p);
    const resolved = await p;
    atlasApiCache.set(url, resolved); // replace Promise with resolved data
    return resolved;
  };

  const sampleImageCenter = async (url) => {
    try {
      const blob = await fetch(url).then(r => r.blob());
      const blobUrl = URL.createObjectURL(blob);
      return await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width; canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const [r, g, b] = ctx.getImageData(Math.floor(img.width/2), Math.floor(img.height/2), 1, 1).data;
          URL.revokeObjectURL(blobUrl);
          resolve(`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`);
        };
        img.onerror = () => { URL.revokeObjectURL(blobUrl); resolve(null); };
        img.src = blobUrl;
      });
    } catch { return null; }
  };

  const addAtlasTile = (filePath) => {
    const id = nextAtlasId();
    if (id === null) { alert("Atlas tile limit reached (IDs 300–499). Remove some atlas tiles first."); return; }
    const src = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${filePath}`;
    const baseName = filePath.split('/').pop().replace(/\.[^.]+$/, '');
    const folderPath = filePath.split('/').slice(0, -1).join('/');
    const codename = folderPath ? `${folderPath}_${baseName}` : baseName;
    const tile = { id, src, isDefault: false, isAtlas: true, codename, baseCodename: baseName };
    if (folderPath) tile.atlasTilesetGroup = folderPath;
    // Settings inheritance
    if (filePath.includes('/Water/')) {
      setRotatableMap(prev => ({ ...prev, [id]: true }));
    }
    if (filePath.includes('/Objectives/')) {
      setPriorityTiles(prev => ({ ...prev, [id]: true }));
    }
    setAtlasTiles(prev => [...prev, tile]);
  };

  const addAtlasTilesetFolder = async (folderName, files) => {
    const imageFiles = files.filter(f => f.type === 'file' && /\.(png|jpg|jpeg|gif|webp|svg|bmp)$/i.test(f.name));
    for (const file of imageFiles) {
      // path relative to Resources/ (file.path is like "Resources/Water/foo.png", strip "Resources/")
      const relPath = file.path.replace(/^Resources\//, '');
      // Check if already added
      const src = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${relPath}`;
      setAtlasTiles(prev => {
        if (prev.some(t => t.src === src)) return prev;
        const id = (() => {
          const used = new Set(prev.map(t => t.id));
          for (let i = ATLAS_ID_START; i < 500; i++) { if (!used.has(i)) return i; }
          return null;
        })();
        if (id === null) return prev;
        const fileBaseName = relPath.split('/').pop().replace(/\.[^.]+$/, '');
        const fileFolderPath = relPath.split('/').slice(0, -1).join('/');
        const codename = fileFolderPath ? `${fileFolderPath}_${fileBaseName}` : fileBaseName;
        const tile = { id, src, isDefault: false, isAtlas: true, atlasTilesetGroup: fileFolderPath || folderName, codename, baseCodename: fileBaseName };
        return [...prev, tile];
      });
      // Settings inheritance
      if (relPath.includes('/Water/')) setRotatableMap(prev => ({ ...prev })); // handled per-tile below
    }
    // After batch-add, apply settings inheritance using the folder path
    imageFiles.forEach(file => {
      const relPath = file.path.replace(/^Resources\//, '');
      const src = `https://raw.githubusercontent.com/She-Fairy/atlas-horizon/main/Resources/${relPath}`;
      setAtlasTiles(prev => {
        const tile = prev.find(t => t.src === src);
        if (!tile) return prev;
        if (relPath.includes('/Water/')) setRotatableMap(rm => ({ ...rm, [tile.id]: true }));
        if (relPath.includes('/Objectives/')) setPriorityTiles(pt => ({ ...pt, [tile.id]: true }));
        return prev;
      });
    });
  };

  const navigateAtlas = async (path) => {
    setAtlasPath(path);
    setAtlasItems(null);
    setAtlasError("");
    setAtlasLoading(true);
    try {
      const data = await fetchAtlasDir(path);
      setAtlasItems(Array.isArray(data) ? data : []);
    } catch (err) {
      if (err.message === "rate_limit") setAtlasError("GitHub rate limit reached. Try again later.");
      else setAtlasError("Failed to load folder contents.");
      setAtlasItems([]);
    } finally {
      setAtlasLoading(false);
    }
  };

  // Returns [pos] — just positions (used by existing drag/drop code)
  const getMirrorPositions = useCallback((r, c) => {
    return getMirrorMeta(r, c).map(m => m.pos);
  }, [mirrorV, mirrorH, mirrorD]); // eslint-disable-line

  // Returns [{pos, fV, fH, fD}] — positions + which mirror flags apply
  function getMirrorMeta(r, c) {
    const cR = (gridH - 1) / 2, cC = (gridW - 1) / 2;
    const oR = r - cR, oC = c - cC;
    const entries = [{ pos: [r, c], fV: false, fH: false, fD: false }];
    if (mirrorV) entries.push({ pos: [r, gridW - 1 - c],               fV: true,  fH: false, fD: false });
    if (mirrorH) entries.push({ pos: [gridH - 1 - r, c],               fV: false, fH: true,  fD: false });
    if (mirrorD) entries.push({ pos: [Math.round(cR - oR), Math.round(cC - oC)], fV: false, fH: false, fD: true });
    if (mirrorV && mirrorD) entries.push({ pos: [Math.round(cR - oR), gridW - 1 - c],   fV: true,  fH: false, fD: true });
    if (mirrorH && mirrorD) entries.push({ pos: [gridH - 1 - r, Math.round(cC - oC)],   fV: false, fH: true,  fD: true });
    if (mirrorV && mirrorH && mirrorD) entries.push({ pos: [gridH - 1 - r, gridW - 1 - c], fV: true, fH: true, fD: true });
    const seen = new Set();
    return entries.filter(({ pos: [pr, pc] }) => {
      if (pr < 0 || pr >= gridH || pc < 0 || pc >= gridW) return false;
      const k = `${pr},${pc}`; if (seen.has(k)) return false; seen.add(k); return true;
    });
  }

  // Flip a rotation step (0-3) based on mirror axes applied.
  // Rotation convention: 0=NW corner, 1=NE corner, 2=SE corner, 3=SW corner
  //   (equivalently, rotating a tile 90° CW each step)
  // fV = horizontal flip (left↔right): swaps 0↔1 and 2↔3  (r XOR 1)
  // fH = vertical flip (top↔bottom):   swaps 0↔3 and 1↔2  (3 - r)
  // fD = 180° point reflection:         swaps 0↔2 and 1↔3  ((r+2) % 4)
  const applyRotMirror = (rot, fV, fH, fD) => {
    let r = rot;
    if (fV) r ^= 1;            // horizontal flip: 0↔1, 2↔3
    if (fH) r = 3 - r;         // vertical flip:   0↔3, 1↔2
    if (fD) r = (r + 2) % 4;   // 180° rotation:   0↔2, 1↔3
    return r;
  };

  const paintCells = useCallback((r, c) => {
    const meta   = (getMirrorMetaRef.current ?? getMirrorMeta)(r, c);
    const tileId = eraser ? null : (sel ?? null);
    const rot    = tileId ? ((cardRotationsRef.current[tileId] ?? 0) / 90 % 4) : 0;
    const ms     = mirrorSettingsRef.current;
    setGrid(prev => {
      const g = prev.map(row => [...row]);
      meta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
        // Spawn swapping: applies when fH (top-bottom) or fD (diagonal) flips teams
        let id = tileId;
        if (id && ms.mirrorSpawns && (fH || fD)) id = swapSpawnId(id);
        g[pr][pc] = eraser ? null : id;
      });
      return g;
    }, true);
    if (!eraser && tileId) {
      const tile = getTile(tileId);
      const isTileRot = tile ? isTileRotatable(tile) : false;
      setGridRotations(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          n[`${pr},${pc}`] = (ms.mirrorRotation && isTileRot) ? applyRotMirror(rot, fV, fH, fD) : rot;
        });
        return n;
      });
      // Apply flip state from card flip mode
      const flipMode = cardFlipModesRef.current[tileId] ?? 'spin';
      const flipStep = (flipMode === 'flip') ? (cardFlipStepsRef.current[tileId] ?? 0) : 0;
      setGridFlips(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc] }) => {
          if (flipStep) n[`${pr},${pc}`] = flipStep; else delete n[`${pr},${pc}`];
        });
        return n;
      });
    } else if (eraser) {
      setGridRotations(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        return n;
      });
      setGridFlips(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        return n;
      });
    }
    // Update per-cell offset overrides for mirror offset feature
    setGridOffsets(prev => {
      const n = { ...prev };
      if (eraser) {
        meta.forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
      } else if (tileId) {
        meta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          const over = computeMirrorOffsetOverride(tileId, fV, fH, fD);
          if (over !== undefined) { n[`${pr},${pc}`] = over; } else { delete n[`${pr},${pc}`]; }
        });
      }
      return n;
    });
  }, [eraser, sel, mirrorV, mirrorH, mirrorD, setGrid, tiles]);

  useEffect(() => { paintRef.current        = paintCells;           }, [paintCells]);
  useEffect(() => { cardRotationsRef.current   = cardRotations;        }, [cardRotations]);
  useEffect(() => { mirrorSettingsRef.current  = mirrorSettings;       }, [mirrorSettings]);
  useEffect(() => { pushHistRef.current = pushHistorySnapshot;  }, [pushHistorySnapshot]);

  // Commit an array of [r,c] cells to the grid at once (used by line and rect modes).
  // Uses refs for sel/eraser so it reads the correct values at mouseup time.
  const commitMultipleCells = useCallback((cells) => {
    if (!cells.length) return;
    const tileId   = selRef.current;
    const isEraser = eraserRef.current;
    const rot      = tileId ? ((cardRotationsRef.current[tileId] ?? 0) / 90 % 4) : 0;
    const ms       = mirrorSettingsRef.current;
    const placedMeta = [];
    setGrid(prev => {
      const g = prev.map(row => [...row]);
      const metaFnC = getMirrorMetaRef.current ?? getMirrorMeta;
      cells.forEach(([r, c]) => {
        metaFnC(r, c).forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          if (!isEraser && g[pr][pc] !== null && !ms.allowSwap) return;
          let id = isEraser ? null : (tileId ?? null);
          if (id && ms.mirrorSpawns && (fH || fD)) id = swapSpawnId(id);
          g[pr][pc] = id;
          if (!isEraser && tileId) placedMeta.push({ pos: [pr, pc], fV, fH, fD });
        });
      });
      return g;
    });
    if (!isEraser && tileId) {
      const tile = getTile(tileId);
      const isTileRot = tile ? isTileRotatable(tile) : false;
      setGridRotations(prev => {
        const n = { ...prev };
        placedMeta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          n[`${pr},${pc}`] = (ms.mirrorRotation && isTileRot) ? applyRotMirror(rot, fV, fH, fD) : rot;
        });
        return n;
      });
      const flipMode = cardFlipModesRef.current[tileId] ?? 'spin';
      const flipStep = (flipMode === 'flip') ? (cardFlipStepsRef.current[tileId] ?? 0) : 0;
      setGridFlips(prev => {
        const n = { ...prev };
        placedMeta.forEach(({ pos: [pr, pc] }) => {
          if (flipStep) n[`${pr},${pc}`] = flipStep; else delete n[`${pr},${pc}`];
        });
        return n;
      });
    } else if (isEraser) {
      const metaFnE = getMirrorMetaRef.current ?? getMirrorMeta;
      setGridRotations(prev => {
        const n = { ...prev };
        cells.forEach(([r, c]) => {
          metaFnE(r, c).forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });

      if (!cell) return;
      e.preventDefault();
      const [r, c] = cell;

      // ── EYEDROPPER: pick tile on tap ───────────────────────────────

      }

      // ── HIGHLIGHT MODE ─────────────────────────────────────────────

        const key = `${r},${c}`;
        if (highlightedCellsRef.current.has(key) && highlightedCellsRef.current.size > 0) {
          // Tap on a highlighted cell → start dragging the region
          isHighlightDraggingRef.current = true;
          highlightDragAnchorCell.current = [r, c];
          setHighlightDragOffset({ dr: 0, dc: 0 });
          highlightDragOffsetRef.current = { dr: 0, dc: 0 };
          setDragPos({ x: e.touches[0].clientX, y: e.touches[0].clientY });
        } else {
          // Tap on empty area → start painting highlight selection
          isTouchPainting = true;
          selectionStartRef.current = [r, c];
          selectionEndRef.current   = [r, c];
          hoveredTilesRef.current   = new Set([key]);
          const mode = selectionModeRef.current;
          if (mode === 'single') setPreviewCells([[r, c]]);
          else if (mode === 'line') setPreviewCells([[r, c]]);
          else if (mode === 'rect') setRectPreview({ r1: r, c1: c, r2: r, c2: c });

            const bfs = bfsFillRef.current;

              const fillSet = bfs(r, c, gridRef.current, gridWRef.current, gridHRef.current);

        dragFlipRef.current = gridFlips[`${r},${c}`] ?? 0;
        setGridRaw(prev => {
          const g = prev.map(row => [...row]);
          pickupPositions.forEach(([pr, pc]) => { g[pr][pc] = null; });
          return g;
        });
        setGridRotations(prev => {
          const n = { ...prev };
          pickupPositions.forEach(([pr, pc]) => { delete n[`${pr},${pc}`]; });
          return n;
        });
        setGridFlips(prev => {
          const n = { ...prev };
          pickupPositions.forEach(([pr, pc]) => { delete n[`${pr},${pc}`]; });
          return n;
        });
        setGridOffsets(prev => {
          const n = { ...prev };
          pickupPositions.forEach(([pr, pc]) => { delete n[`${pr},${pc}`]; });

        });

        dragTileRef.current = existingId;
        isDraggingRef.current = true;

      }

      selectionStartRef.current = [r, c];
      selectionEndRef.current   = [r, c];
      hoveredTilesRef.current   = new Set([`${r},${c}`]);

      if (mode === 'single')      setPreviewCells([[r, c]]);
      else if (mode === 'line')   setPreviewCells([[r, c]]);
      else if (mode === 'rect')   setRectPreview({ r1: r, c1: c, r2: r, c2: c });
      else if (mode === 'fill') {
        const bfs = bfsFillRef.current;
        if (bfs) {
          const fillSet = bfs(r, c, gridRef.current, gridWRef.current, gridHRef.current);

        } else if (mode === 'line') {
          hoveredTilesRef.current.add(`${r},${c}`);
          setPreviewCells([...hoveredTilesRef.current].map(k => k.split(',').map(Number)));
        } else if (mode === 'rect') {
          const [r1, c1] = selectionStartRef.current;

            const tile = tiles.find(x => x.id === id);

              commit(prev => {
                const g = prev.map(row => [...row]);

                const n = { ...prev };

                return n;
              });
              const tDragFlip = dragFlipRef.current;
              setGridFlips(prev => {
                const n = { ...prev };
                placedMeta.forEach(({ pos: [pr, pc] }) => {
                  if (tDragFlip) n[`${pr},${pc}`] = tDragFlip; else delete n[`${pr},${pc}`];
                });
                return n;
              });
              setGridOffsets(prev => {
                const n = { ...prev };
                placedMeta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
                  const over = computeMirrorOffsetOverride(id, fV, fH, fD);
                  if (over !== undefined) { n[`${pr},${pc}`] = over; } else { delete n[`${pr},${pc}`]; }
                });
                return n;
              });
              setDragTile(null); dragTileRef.current = null; isDraggingRef.current = false;
              return;
            }
          }
          commit(g => g);
          setDragTile(null); dragTileRef.current = null; isDraggingRef.current = false;
          return;
        }
        if (isTouchPainting && commitOnUpRef.current) commitOnUpRef.current();

      }
    };

    el.addEventListener('touchmove',   onTouchMove,  { passive: false });

    el.addEventListener('touchcancel', onTouchEnd);
    return () => {

  // ── Keyboard shortcuts ────────────────────────────────────────────
  useEffect(() => {
    const h = e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "z") { e.preventDefault(); e.shiftKey ? redo() : undo(); }
      if ((e.ctrlKey || e.metaKey) && e.key === "y") { e.preventDefault(); redo(); }

    };

    return () => window.removeEventListener("keydown", h);
  }, [undo, redo]);

  // ── Resize grid ─────────────────────────────────────────────────────
  const applyGridSize = (newW, newH) => {
    const w = Math.max(1, Math.min(99, newW)), h = Math.max(1, Math.min(99, newH));
    setGridW(w); setGridH(h);
    gridWRef.current = w; gridHRef.current = h;
    setGrid(prev => {
      const g = Array.from({ length: h }, (_, r) =>
        Array.from({ length: w }, (__, c) => (prev[r] && c < prev[r].length ? prev[r][c] : null))
      );
      return g;
    });
    setGridRotations(prev => {
      const n = {};
      Object.entries(prev).forEach(([k, v]) => {
        const [r, c] = k.split(",").map(Number);
        if (r < h && c < w) n[k] = v;
      });
      return n;
    });
    setGridFlips(prev => {
      const n = {};
      Object.entries(prev).forEach(([k, v]) => {
        const [r, c] = k.split(",").map(Number);
        if (r < h && c < w) n[k] = v;
      });
      return n;
    });
    setGridOffsets(prev => {
      const n = {};
      Object.entries(prev).forEach(([k, v]) => {
        const [r, c] = k.split(",").map(Number);
        if (r < h && c < w) n[k] = v;
      });
      return n;
    });
    applyZoom(calcFitZoom(w, h));
  };

  // ── Replace A → B ─────────────────────────────────────────────────
  const doReplace = () => {
    if (replaceA == null || replaceB == null) return;
    // Count synchronously before setGrid (updater is async in React 18)
    const count = grid.reduce((s, row) => s + row.filter(id => id === replaceA).length, 0);
    if (count === 0) {
      setReplaceMsg("⚠ No cells with that tile found on the map.");
      if (replaceMsgTimerRef.current) clearTimeout(replaceMsgTimerRef.current);
      replaceMsgTimerRef.current = setTimeout(() => setReplaceMsg(""), 2500);
      return;
    }
    setGrid(prev => prev.map(row => row.map(id => id === replaceA ? replaceB : id)));
    const tileA = getTile(replaceA); const tileB = getTile(replaceB);
    const nameA = (tileA?.isSpace ? "Space" : deriveCodename(tileA?.src)) || (tileA ? `#${replaceA}` : "?");
    const nameB = (tileB?.isSpace ? "Space" : deriveCodename(tileB?.src)) || (tileB ? `#${replaceB}` : "?");
    setReplaceMsg(`✓ Replaced ${count} × ${nameA} → ${nameB}`);
    if (replaceMsgTimerRef.current) clearTimeout(replaceMsgTimerRef.current);
    replaceMsgTimerRef.current = setTimeout(() => {

      setReplaceOpen(false); setReplaceStep(1); setReplaceA(null); setReplaceB(null);

  };

  // ── Export ────────────────────────────────────────────────────────
  const doExport = () => {
    if (!confirm("Download the map as a PNG file?")) return;
    const padding = CELL;
    const cv = document.createElement("canvas");
    cv.width  = gridW * CELL;
    cv.height = gridH * CELL + padding * 2;
    const ctx = cv.getContext("2d");
    for (let r = 0; r < gridH; r++) for (let c = 0; c < gridW; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? bg1 : bg2;
      ctx.fillRect(c * CELL, r * CELL + padding, CELL, CELL);
    }
    const draws = [];
    const spaceCells = []; // cells that should be cleared to transparent
    grid.forEach((row, r) => row.forEach((id, c) => {
      const t = id && getTile(id);
      if (!t) return;
      if (t.isSpace) { spaceCells.push({ r, c }); return; }
      draws.push({ id: t.id, src: t.blobSrc ?? t.src, r, c, mult: getTileMultiplier(t), off: getEffectiveOffset(t, r, c), rotDeg: (gridRotations[`${r},${c}`] ?? 0) * 90, flipStep: gridFlips[`${r},${c}`] ?? 0 });
    }));
    const filename = (mapName.trim() || "ophelia-map") + ".png";
    const finish = () => {
      // Clear space tile cells last so they are fully transparent in the output
      spaceCells.forEach(({ r, c }) => ctx.clearRect(c * CELL, r * CELL + padding, CELL, CELL));
      cv.toBlob(b => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b); a.download = filename; a.click();
      });
    };
    if (!draws.length) { finish(); return; }
    // Sort: bottom tiles first, then normal, then priority tiles last → correct z-order in export
    const zOrder = id => priorityTiles[id] ? 2 : (bottomTiles[id] && !priorityTiles[id]) ? 0 : 1;
    draws.sort((a, b) => zOrder(a.id) - zOrder(b.id));
    // Load all images then draw in sorted order (guarantees z-order)
    Promise.all(draws.map(d => new Promise(resolve => {
      const img = new Image(); img.src = d.src;
      img.onload = () => resolve({ ...d, img });
      img.onerror = () => resolve(null);
    }))).then(loaded => {
      loaded.forEach(item => {
        if (!item) return;
        const { img, r, c, mult, off, rotDeg, flipStep } = item;
        const drawW = CELL * mult;
        const drawH = drawW * (img.naturalHeight / img.naturalWidth);
        const cx = c * CELL + CELL / 2 + (off.ox / 100) * CELL;
        const cy = r * CELL + padding + CELL / 2 + (off.oy / 100) * CELL;
        ctx.save();
        ctx.translate(cx, cy);
        if (rotDeg) ctx.rotate(rotDeg * Math.PI / 180);
        if (flipStep) {
          const fx = (flipStep === 1 || flipStep === 2) ? -1 : 1;
          const fy = (flipStep === 2 || flipStep === 3) ? -1 : 1;
          ctx.scale(fx, fy);
        }
        ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
        ctx.restore();
      });
      finish();
    });
  };

  const commitZoom = () => {
    const v = parseInt(zoomInput, 10);

  // ── Theme-aware colours for Guides / Offset Centers / Block Overwrite ──

  // ── Tile info modal ───────────────────────────────────────────────

  const InfoModal = () => {
