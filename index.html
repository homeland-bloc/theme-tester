      erase: { label: "Erase", icon: "🧼", color: C.danger, desc: "Removes tiles from cells. Click or drag across cells to erase.", iconColor: null },
      hand:  { label: "Hand", icon: "👋", color: "#fbbf24", desc: "Drag to pan the map canvas. On mobile, swipe to scroll.", iconColor: null },
      space: { label: "Space", icon: "🛸", color: C.accentBright, desc: "Places an invisible space tile, making the cell fully transparent in the exported map.", iconColor: null },
    };
    const def = toolDefs[infoTool];
    if (!def) return null;
    // Space uses numeric SPACE_TILE_ID for starring; erase/hand use string keys
    const toolId = infoTool === "space" ? SPACE_TILE_ID : infoTool;
    const isStarredTool = starredTiles.includes(toolId);
    return (
      <div className="modal-backdrop" onClick={() => setInfoTool(null)}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>{def.label}</span>
            <button onClick={() => setInfoTool(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ background: C.panelDeep, borderRadius: 8, padding: 20, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 80 }}>
            <span style={{ fontSize: 36, color: def.iconColor ?? undefined }}>{def.icon}</span>
          </div>
          <p style={{ fontSize: 12, color: C.muted, lineHeight: 1.6 }}>{def.desc}</p>
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
            <input type="checkbox" checked={isStarredTool}
              onChange={() => toggleStar(toolId)}
              style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
            <span style={{ fontSize: 11, color: C.text }}>Starred shortcut ⭐{!isStarredTool && starredTiles.length >= 10 ? <span style={{ color: C.muted, marginLeft: 6 }}>(max 10 reached)</span> : null}</span>
          </label>
        </div>
      </div>
    );
  };

  // ─────────────────────────────────────────────────────────────────
  // Grid size in pixels (at current zoom)
  const gW = gridW * CELL * zoom;
  const gH = gridH * CELL * zoom;

  return (
    <div style={{
      display: "flex", flexDirection: "column", height: "100dvh",
      background: C.bg, color: C.text, fontFamily: "'Inter', sans-serif",
      overflow: "hidden",
      paddingTop: "env(safe-area-inset-top)", paddingBottom: "env(safe-area-inset-bottom)",
      paddingLeft: "env(safe-area-inset-left)", paddingRight: "env(safe-area-inset-right)",
    }}>

      <InfoModal />
      <ReplaceModal />
      <FailedTileModal />
      <ToolInfoModal />

      {/* Map size confirmation dialog */}
      {pendingSize && (() => {
        const { w, h } = pendingSize;
        const shrinkW = w < gridW, shrinkH = h < gridH;
        const expandW = w > gridW, expandH = h > gridH;
        const willLose = shrinkW || shrinkH;
        const lines = [];
        if (shrinkW) lines.push(`Columns reduced from ${gridW} to ${w}: tiles in columns ${w + 1}–${gridW} will be removed.`);
        if (shrinkH) lines.push(`Rows reduced from ${gridH} to ${h}: tiles in rows ${h + 1}–${gridH} will be removed.`);
        if (expandW) lines.push(`Columns increased from ${gridW} to ${w}: new empty columns added on the right.`);
        if (expandH) lines.push(`Rows increased from ${gridH} to ${h}: new empty rows added at the bottom.`);
        return (
          <div className="modal-backdrop" onClick={() => setPendingSize(null)}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Apply map size {w} × {h}?</span>
                <button onClick={() => setPendingSize(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {lines.map((l, i) => <p key={i} style={{ fontSize: 12, color: willLose ? C.danger : C.text }}>{l}</p>)}
                {!willLose && !expandW && !expandH && <p style={{ fontSize: 12, color: C.muted }}>No content changes — same size.</p>}
                {willLose && <p style={{ fontSize: 11, color: C.muted }}>This cannot be undone.</p>}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={{ ...btn(false), flex: 1 }} onClick={() => setPendingSize(null)}>Cancel</button>
                <button style={{ ...btn(true, willLose ? C.danger : C.accent, willLose ? "rgba(248,113,113,0.14)" : C.accentDim), flex: 1 }}
                  onClick={() => { applyGridSize(w, h); setPendingSize(null); }}>
                  {willLose ? "Apply & Remove tiles" : "Apply"}
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Folder panel — floating modal anchored near card (Task 4) ── */}
      {openFolderKey && (() => {
        // Search tileset + global entry lists for the open folder key
        const allEntries = [...tilesetEntries, ...globalEntries];
        const entry = allEntries.find(e => e.type === 'folder' && e.key === openFolderKey);
        if (!entry) return null;
        const cardSz = isMobile ? 46 : 56;
        const cols = 4;
        const panelW = cardSz * cols + 5 * (cols - 1) + 12; // 4 cols + gaps + padding
        const maxH = Math.min(360, window.innerHeight - 32);
        const anchorX = Math.min(folderPanelAnchor.x, window.innerWidth - panelW - 8);
        const anchorY = Math.min(folderPanelAnchor.y, window.innerHeight - maxH - 8);
        return (
          <div ref={folderPanelRef}
            style={{ position: "fixed", left: anchorX, top: anchorY, width: panelW, maxHeight: maxH,
              background: C.panel, border: `1px solid ${C.border}`, borderRadius: 10,
              boxShadow: "0 8px 32px rgba(0,0,0,0.7)", zIndex: 2000, overflow: "hidden",
              display: "flex", flexDirection: "column" }}>
            <div style={{ padding: "5px 8px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: C.accent, letterSpacing: 0.5 }}>{entry.label}</span>
              <button onClick={() => setOpenFolderKey(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 15, lineHeight: 1, padding: "0 2px" }}>×</button>
            </div>
            <div style={{ overflowY: "auto", padding: 6 }}>
              <div style={{ display: "grid", gridTemplateColumns: `repeat(${cols}, ${cardSz}px)`, gap: 5 }}>
                {entry.tiles.map(t => {
                  const active = sel === t.id && !eraser;
                  const failed = failedTiles.has(t.id);
                  const isStarredF = starredTiles.includes(t.id);
                  const rotatable = isTileRotatable(t);
                  const rotDeg = cardRotations[t.id] ?? 0;
                  return (
                    <div key={t.id}
                      onClick={() => {
                        if (failed) { setFailedWarning(true); return; }
                        if (rotatable && sel === t.id && !eraser) {
                          setCardRotations(prev => ({ ...prev, [t.id]: (prev[t.id] ?? 0) + 90 }));
                        }
                        setSel(t.id); setEraser(false); setHandMode(false);
                      }}
                      style={{ width: cardSz, height: cardSz, borderRadius: 8, cursor: failed ? "not-allowed" : "pointer",
                        border: `2px solid ${failed ? C.danger : active ? C.accentBright : C.border}`,
                        background: active ? C.accentDim : "transparent",
                        position: "relative", opacity: failed ? 0.55 : 1, overflow: "visible" }}>
                      <div style={{ position: "absolute", inset: 0, borderRadius: 6, overflow: "hidden", background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {failed ? <span style={{ fontSize: 18 }}>⚠️</span>
                          : <img src={t.src} alt="" onError={() => markFailed(t.id)} style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />}
                      </div>
                      {rotatable && (
                        <div style={{ position: "absolute", inset: 0, zIndex: 4, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                          <span style={{ fontSize: 17, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s", filter: "drop-shadow(0 1px 3px rgba(0,0,0,0.9))" }}>🐬</span>
                        </div>
                      )}
                      <span onClick={ev => { ev.stopPropagation(); setInfoTile(t.id); }}
                        style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredF ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                        title={isStarredF ? "Starred tile — click for info" : "Tile info"}>ⓘ</span>
                      <TileBadge t={t} />
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Drag ghost — follows cursor/finger while dragging a tile ── */}
      {dragTile && (() => {
        const t = getTile(dragTile);
        if (!t) return null;
        if (t.isSpace) return (
          <div style={{ position: "fixed", left: dragPos.x - (CELL * zoom) / 2, top: dragPos.y - (CELL * zoom) / 2,
            width: CELL * zoom, height: CELL * zoom, display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: CELL * zoom * 0.6, opacity: 0.65, pointerEvents: "none", zIndex: 9999 }}>🛸</div>
        );
        return (
          <img src={t.src} alt="" draggable={false}
            style={{
              position: "fixed",
              left: dragPos.x - (CELL * zoom) / 2,
              top:  dragPos.y - (CELL * zoom) / 2,
              width: CELL * zoom, height: CELL * zoom,
              objectFit: "contain", imageRendering: "pixelated",
              opacity: 0.65, pointerEvents: "none", zIndex: 9999,
              filter: "drop-shadow(0 2px 8px rgba(0,0,0,0.6))",
            }} />
        );
      })()}

      {/* ══ TOP BAR ══════════════════════════════════════════════════ */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "0 14px", height: 50, flexShrink: 0, background: C.panel, borderBottom: `1px solid ${C.border}` }}>
        <img src="favicon/favicon-32x32.png" alt="Ophelia" style={{ width: 28, height: 28, flexShrink: 0, imageRendering: "auto" }} />
        <span className="oph-title-text" style={{ fontFamily: "'Lilita One', cursive", fontWeight: 400, fontSize: isMobile ? 15 : 18, letterSpacing: 0.4, whiteSpace: "nowrap", flexShrink: 0, display: "inline-block" }}>
          Ophelia — Custom Theme Tester
        </span>
      </div>

      {/* ══ MIDDLE ROW: canvas with sidebars ════════════════════════ */}
      <div style={{ flex: 1, display: "flex", flexDirection: "row", overflow: "hidden", minHeight: 0 }}>

        {/* ── LEFT SIDEBAR: Tiles ──────────────────────────────────── */}
        <div style={{ display: "flex", flexDirection: "row", flexShrink: 0, alignSelf: "stretch" }}>
          {tilesOpen && (
            <div style={{ width: isMobile ? 160 : 240, background: C.panelDeep, borderRight: `1px solid ${C.border}`, borderRadius: "8px 0 0 8px", display: "flex", flexDirection: "column", overflow: "hidden", maxHeight: "min(88vh, 700px)" }}>
              <SectionHeader
                label={`Tiles (${tilesetTileCount + userTiles.length})`}
                open={tilesOpen}
                onToggle={() => setTilesOpen(o => !o)}
                right={uploadFlash > 0 ? (
                  <span style={{ fontSize: 10, fontWeight: 600, color: "#4ade80", background: "rgba(74,222,128,0.14)", border: "1px solid rgba(74,222,128,0.4)", borderRadius: 6, padding: "2px 6px" }}>
                    ✓ {uploadFlash}
                  </span>
                ) : null}
              />
              {/* Tileset dropdown */}
              {manifest?.tilesets?.length > 0 && (
                <div style={{ padding: "5px 8px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
                  <select
                    value={activeTileset ?? ""}
                    onChange={e => setActiveTileset(e.target.value)}
                    style={{ width: "100%", background: C.panel, color: C.text, border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 11, fontFamily: "'Inter', sans-serif", padding: "3px 6px", cursor: "pointer", outline: "none" }}
                  >
                    {manifest.tilesets.map(ts => (
                      <option key={ts.name} value={ts.name}>{ts.name}</option>
                    ))}
                  </select>
                </div>
              )}
              <input ref={fileRef} type="file" accept={ACCEPTED} multiple style={{ display: "none" }}
                onChange={e => { loadFiles(e.target.files); e.target.value = ""; }} />
              <div style={{ overflowY: "auto", flex: 1, padding: "8px 8px 10px" }}>
                {(() => {
                  // Desktop: 64px cards, 5px gaps. Mobile: 56px cards, 5px gaps, 2 per row.
                  const cardSz  = isMobile ? 56 : 64;
                  const cardGap = 5;

                  const RotChevron = ({ rotDeg }) => (
                    <div style={{ position: "absolute", inset: 0, zIndex: 4, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                      <span style={{ fontSize: 17, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s", filter: "drop-shadow(0 1px 3px rgba(0,0,0,0.9))" }}>🐬</span>
                    </div>
                  );
                  const renderFlatCard = t => {
                    const active    = sel === t.id && !eraser;
                    const failed    = failedTiles.has(t.id);
                    const rotatable = isTileRotatable(t);
                    const rotDeg    = cardRotations[t.id] ?? 0;
                    const isStarred = starredTiles.includes(t.id);
                    return (
                      <div key={t.id}
                        onClick={() => {
                          if (failed) { setFailedWarning(true); return; }
                          if (rotatable && sel === t.id && !eraser) {
                            // Already selected rotatable tile: rotate 90° clockwise
                            setCardRotations(prev => ({ ...prev, [t.id]: (prev[t.id] ?? 0) + 90 }));
                          }
                          setSel(t.id); setEraser(false); setHandMode(false);
                        }}
                        style={{ flexShrink: 0, width: cardSz, height: cardSz, borderRadius: 8, cursor: failed ? "not-allowed" : "pointer", border: `2px solid ${failed ? C.danger : active ? C.accentBright : C.border}`, background: failed ? "rgba(248,113,113,0.08)" : active ? C.accentDim : "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", opacity: failed ? 0.55 : 1, position: "relative", overflow: "visible" }}>
                        {/* Inner clipped area for image */}
                        <div style={{ position: "absolute", inset: 0, borderRadius: 6, overflow: "hidden", background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          {failed ? <span style={{ fontSize: 20 }}>⚠️</span>
                            : <img src={t.src} alt="" onError={() => markFailed(t.id)} style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />}
                        </div>
                        {rotatable && <RotChevron rotDeg={rotDeg} />}
                        {/* Info button: yellow if starred, white otherwise — top-right corner */}
                        <span onClick={e => { e.stopPropagation(); setInfoTile(t.id); }}
                          style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarred ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                          title={isStarred ? "Starred tile — click for info" : "Tile info"}>ⓘ</span>
                        <TileBadge t={t} />
                      </div>
                    );
                  };

                  const renderFolderCard = entry => {
                    const { key, label, tiles: fTiles } = entry;
                    const isThisOpen = openFolderKey === key;
                    const folderActive = !eraser && fTiles.some(t => t.id === sel);
                    const previewTiles = fTiles.slice(0, 4);
                    return (
                      <div key={key}
                        onClick={e => toggleFolder(key, e)}
                        onMouseDown={e => e.stopPropagation()}
                        onTouchStart={e => e.stopPropagation()}
                        style={{ flexShrink: 0, width: cardSz, height: cardSz, borderRadius: 8, cursor: "pointer",
                          border: `2px solid ${folderActive ? C.soft : isThisOpen ? C.accent : C.border}`,
                          background: folderActive ? "rgba(252,211,77,0.07)" : isThisOpen ? C.accentDim : C.panelDeep,
                          overflow: "hidden", position: "relative",
                          transition: "border 0.12s, background 0.12s" }}>
                        {/* 2×2 preview grid — fills full card, no label strip */}
                        <div style={{ position: "absolute", inset: 0, display: "grid", gridTemplateColumns: "1fr 1fr", gridTemplateRows: "1fr 1fr", gap: 1 }}>
                          {previewTiles.map(t => (
                            <div key={t.id} style={{ background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                              <img src={t.src} alt="" style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated", opacity: 0.55 }} />
                            </div>
                          ))}
                          {Array.from({ length: Math.max(0, 4 - previewTiles.length) }).map((_, i) => (
                            <div key={`e${i}`} style={{ background: C.panelDeep }} />
                          ))}
                        </div>
                        {/* Chevron — full white, large and tappable */}
                        <div style={{ position: "absolute", inset: 0, zIndex: 3, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                          <span style={{ fontSize: 22, lineHeight: 1, color: C.text,
                            display: "inline-block", transform: isThisOpen ? "rotate(0deg)" : "rotate(-90deg)", transition: "transform 0.15s",
                            filter: "drop-shadow(0 1px 3px rgba(0,0,0,0.9))" }}>▼</span>
                        </div>
                      </div>
                    );
                  };

                  const renderEntry = entry => entry.type === 'flat' ? renderFlatCard(entry.tile) : renderFolderCard(entry);

                  return (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: cardGap }}>
                  {/* 1. Eraser */}
                  {(() => {
                    const isStarredErase = starredTiles.includes("erase");
                    return (
                      <div onClick={() => { setEraser(true); setSel(null); setHandMode(false); }}
                        style={{ flexShrink: 0, width: cardSz, borderRadius: 8, cursor: "pointer", border: `2px solid ${eraser ? C.danger : C.border}`, background: eraser ? "rgba(248,113,113,0.14)" : "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", position: "relative", overflow: "visible" }}>
                        <div style={{ borderRadius: 6, overflow: "hidden" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", background: eraser ? "rgba(248,113,113,0.32)" : "rgba(248,113,113,0.14)", padding: "2px 4px" }}>
                            <span style={{ fontSize: 9, fontWeight: 700, color: eraser ? C.danger : "rgba(248,113,113,0.7)" }}>Erase</span>
                          </div>
                          <div style={{ height: cardSz - 18, background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <span style={{ fontSize: 20, lineHeight: 1, opacity: eraser ? 1 : 0.55 }}>🧼</span>
                          </div>
                        </div>
                        <span onClick={e => { e.stopPropagation(); setInfoTool("erase"); }}
                          style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredErase ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                          title="Erase info">ⓘ</span>
                      </div>
                    );
                  })()}
                  {/* 1b. Hand (pan) */}
                  {(() => {
                    const isStarredHand = starredTiles.includes("hand");
                    return (
                      <div onClick={() => { setHandMode(h => !h); setEraser(false); setSel(null); }}
                        style={{ flexShrink: 0, width: cardSz, borderRadius: 8, cursor: "pointer", border: `2px solid ${handMode ? "#fbbf24" : C.border}`, background: handMode ? "rgba(251,191,36,0.14)" : "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", position: "relative", overflow: "visible" }}>
                        <div style={{ borderRadius: 6, overflow: "hidden" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", background: handMode ? "rgba(251,191,36,0.28)" : "rgba(251,191,36,0.08)", padding: "2px 4px" }}>
                            <span style={{ fontSize: 9, fontWeight: 700, color: handMode ? "#fbbf24" : C.muted }}>Hand</span>
                          </div>
                          <div style={{ height: cardSz - 18, background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <span style={{ fontSize: 20, lineHeight: 1, opacity: handMode ? 1 : 0.55 }}>👋</span>
                          </div>
                        </div>
                        <span onClick={e => { e.stopPropagation(); setInfoTool("hand"); }}
                          style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredHand ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                          title="Hand info">ⓘ</span>
                      </div>
                    );
                  })()}
                  {tilesLoading ? (
                    <p style={{ fontSize: 12, color: C.muted, alignSelf: "center" }}>Loading…</p>
                  ) : (<>
                    {/* 2. Active tileset tiles */}
                    {tilesetEntries.map(renderEntry)}
                    {/* 4. User-uploaded tiles */}
                    {userTiles.map(t => {
                      const active = sel === t.id && !eraser;
                      const failed = failedTiles.has(t.id);
                      const isStarredU = starredTiles.includes(t.id);
                      return (
                        <div key={t.id}
                          onClick={() => { if (failed) { setFailedWarning(true); return; } setSel(t.id); setEraser(false); setHandMode(false); }}
                          style={{ flexShrink: 0, width: cardSz, height: cardSz, borderRadius: 8, cursor: failed ? "not-allowed" : "pointer", border: `2px solid ${failed ? C.danger : active ? C.accentBright : C.border}`, background: failed ? "rgba(248,113,113,0.08)" : active ? C.accentDim : "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", opacity: failed ? 0.55 : 1, position: "relative", overflow: "visible" }}>
                          <div style={{ position: "absolute", inset: 0, borderRadius: 6, overflow: "hidden", background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            {failed ? <span style={{ fontSize: 20 }}>⚠️</span>
                              : <img src={t.src} alt="" onError={() => markFailed(t.id)} style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", imageRendering: "pixelated" }} />}
                          </div>
                          <span onClick={e => { e.stopPropagation(); setInfoTile(t.id); }}
                            style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredU ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                            title={isStarredU ? "Starred tile — click for info" : "Tile info"}>ⓘ</span>
                          <TileBadge t={t} />
                        </div>
                      );
                    })}
                    {/* 5. Separator + Upload card */}
                    <div style={{ width: "100%", flexBasis: "100%", height: 1, background: C.border, margin: "3px 0", flexShrink: 0 }} />
                    <div onClick={() => fileRef.current.click()}
                      style={{ flexShrink: 0, width: cardSz, height: cardSz, borderRadius: 8, cursor: "pointer", border: `2px dashed ${C.border}`, background: "rgba(255,255,255,0.03)", transition: "border 0.12s, background 0.12s", overflow: "hidden", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2 }}
                      title="Upload tiles">
                      <span style={{ fontSize: 22, color: C.muted, lineHeight: 1, fontWeight: 300 }}>+</span>
                      <span style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.8, lineHeight: 1 }}>Upload</span>
                    </div>
                    {/* 6. Separator + remaining global tiles */}
                    {globalEntries.length > 0 && (<>
                      <div style={{ width: "100%", flexBasis: "100%", height: 1, background: C.border, margin: "3px 0", flexShrink: 0 }} />
                      {globalEntries.map(renderEntry)}
                    </>)}
                    {/* 7. Space tile (🛸) */}
                    <div style={{ width: "100%", flexBasis: "100%", height: 1, background: C.border, margin: "3px 0", flexShrink: 0 }} />
                    {(() => {
                      const isStarredSpace = starredTiles.includes(SPACE_TILE_ID);
                      const spaceActive = sel === SPACE_TILE_ID && !eraser;
                      return (
                        <div onClick={() => { setSel(SPACE_TILE_ID); setEraser(false); setHandMode(false); }}
                          style={{ flexShrink: 0, width: cardSz, borderRadius: 8, cursor: "pointer",
                            border: `2px solid ${spaceActive ? C.accentBright : C.border}`,
                            background: spaceActive ? C.accentDim : "rgba(255,255,255,0.03)",
                            transition: "border 0.12s, background 0.12s", position: "relative", overflow: "visible" }}
                          title="Space — makes cell transparent">
                          <div style={{ borderRadius: 6, overflow: "hidden" }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", background: spaceActive ? "rgba(125,211,252,0.22)" : "rgba(125,211,252,0.08)", padding: "2px 4px" }}>
                              <span style={{ fontSize: 9, fontWeight: 700, color: spaceActive ? C.accentBright : C.muted }}>Space</span>
                            </div>
                            <div style={{ height: cardSz - 18, background: C.panelDeep, display: "flex", alignItems: "center", justifyContent: "center" }}>
                              <span style={{ fontSize: 20, lineHeight: 1 }}>🛸</span>
                            </div>
                          </div>
                          <span onClick={e => { e.stopPropagation(); setInfoTool("space"); }}
                            style={{ position: "absolute", top: -7, right: -7, width: 15, height: 15, fontSize: 13, cursor: "pointer", color: isStarredSpace ? "#fbbf24" : "rgba(255,255,255,0.85)", lineHeight: "15px", textAlign: "center", zIndex: 6, background: "rgba(0,0,0,0.7)", borderRadius: "50%", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" }}
                            title="Space info">ⓘ</span>
                        </div>
                      );
                    })()}
                  </>)}
                  </div>
                  );
                })()}
              </div>
            </div>
          )}
          {/* Left toggle strip (with starred mini-cards when collapsed) */}
          <div style={{ width: tilesOpen ? 28 : 40, display: "flex", flexDirection: "column", flexShrink: 0, background: C.panelDeep, borderRight: `1px solid ${C.border}` }}>
            {/* Shortcut bar — selected tile + starred, when panel is collapsed */}
            {!tilesOpen && (() => {
              // Determine current selection key for dedup check
              const selKey = eraser ? "erase" : handMode ? "hand" : sel;
              const selAlreadyStarred = selKey !== null && starredTiles.includes(selKey);
              // Render a mini-card for the currently selected item (if not already starred)
              const SelectedCard = () => {
                if (selKey === null || selAlreadyStarred) return null;
                if (selKey === "erase") return (
                  <div style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${C.danger}`, background: "rgba(248,113,113,0.22)" }} title="Erase (selected)">
                    <span style={{ fontSize: 14 }}>🧼</span>
                  </div>
                );
                if (selKey === "hand") return (
                  <div style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid #fbbf24`, background: "rgba(251,191,36,0.14)" }} title="Hand (selected)">
                    <span style={{ fontSize: 13 }}>👋</span>
                  </div>
                );
                if (selKey === SPACE_TILE_ID) return (
                  <div style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${C.accentBright}`, background: C.accentDim }} title="Space (selected)">
                    <span style={{ fontSize: 13 }}>🛸</span>
                  </div>
                );
                const st = getTile(selKey);
                if (!st || !st.src) return null;
                const isRot = isTileRotatable(st);
                const rotDeg = cardRotations[selKey] ?? 0;
                return (
                  <div onClick={() => { if (isRot) setCardRotations(prev => ({ ...prev, [selKey]: (prev[selKey] ?? 0) + 90 })); }}
                    style={{ width: 32, height: 32, borderRadius: 6, cursor: isRot ? "pointer" : "default", overflow: "hidden", position: "relative", border: `1px solid ${C.accentBright}`, background: C.accentDim }}
                    title={isRot ? `${st.label || "Tile"} — click to rotate` : (st.label || "Tile (selected)")}>
                    <img src={st.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />
                    {isRot && (
                      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                        <span style={{ fontSize: 13, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.9))" }}>🐬</span>
                      </div>
                    )}
                  </div>
                );
              };
              const hasSelected = selKey !== null && !selAlreadyStarred;
              const hasStarred = starredTiles.length > 0;
              if (!hasSelected && !hasStarred) return null;
              return (
                <div style={{ display: "flex", flexDirection: "column", gap: 3, padding: "4px 2px", overflowY: "auto", scrollbarWidth: "none", msOverflowStyle: "none" }}>
                  {hasSelected && <SelectedCard />}
                  {hasSelected && hasStarred && <div style={{ height: 1, background: C.border, margin: "1px 0" }} />}
                  {starredTiles.map(sid => {
                  // Erase
                  if (sid === "erase") return (
                    <div key="erase" onClick={() => { setEraser(true); setSel(null); setHandMode(false); }}
                      style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                        border: `1px solid ${eraser ? C.danger : C.border}`, background: eraser ? "rgba(248,113,113,0.22)" : "rgba(255,255,255,0.04)" }}
                      title="Erase">
                      <span style={{ fontSize: 14, opacity: eraser ? 1 : 0.55 }}>🧼</span>
                    </div>
                  );
                  // Hand
                  if (sid === "hand") return (
                    <div key="hand" onClick={() => { setHandMode(h => !h); setEraser(false); setSel(null); }}
                      style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                        border: `1px solid ${handMode ? "#fbbf24" : C.border}`, background: handMode ? "rgba(251,191,36,0.14)" : "rgba(255,255,255,0.04)" }}
                      title="Hand (pan)">
                      <span style={{ fontSize: 13 }}>👋</span>
                    </div>
                  );
                  // Space tile
                  if (sid === SPACE_TILE_ID) return (
                    <div key="space" onClick={() => { setSel(SPACE_TILE_ID); setEraser(false); setHandMode(false); }}
                      style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                        border: `1px solid ${sel === SPACE_TILE_ID && !eraser ? C.accentBright : C.border}`, background: sel === SPACE_TILE_ID && !eraser ? C.accentDim : "rgba(255,255,255,0.04)" }}
                      title="Space">
                      <span style={{ fontSize: 13 }}>🛸</span>
                    </div>
                  );
                  // Regular tile
                  const st = getTile(sid);
                  if (!st || !st.src) return null;
                  const active = sel === sid && !eraser;
                  const isRot = isTileRotatable(st);
                  const rotDeg = cardRotations[sid] ?? 0;
                  return (
                    <div key={sid}
                      onClick={() => {
                        if (isRot && sel === sid && !eraser) {
                          setCardRotations(prev => ({ ...prev, [sid]: (prev[sid] ?? 0) + 90 }));
                        }
                        setSel(sid); setEraser(false); setHandMode(false);
                      }}
                      style={{ width: 32, height: 32, borderRadius: 6, cursor: "pointer", overflow: "hidden", position: "relative",
                        border: `1px solid ${active ? C.accentBright : C.border}`, background: active ? C.accentDim : C.panelDeep }}
                      title={isRot ? `${st.label || `Tile ${sid}`} — click to rotate` : (st.label || `Tile ${sid}`)}>
                      <img src={st.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s" }} />
                      {isRot && (
                        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                          <span style={{ fontSize: 13, lineHeight: 1, display: "inline-block", transform: `rotate(${rotDeg}deg)`, transition: "transform 0.15s", filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.9))" }}>🐬</span>
                        </div>
                      )}
                    </div>
                  );
                })}
                </div>
              );
            })()}
            {/* Toggle button — fills remaining space */}
            <button onClick={() => setTilesOpen(o => !o)}
              style={{ flex: 1, minHeight: 28, background: "none", border: "none", cursor: "pointer", color: C.accentBright, fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", userSelect: "none", fontWeight: 700 }}
              title={tilesOpen ? "Collapse tiles" : "Expand tiles"}>
              {tilesOpen ? "◀" : "▶"}
            </button>
          </div>
        </div>

        {/* ── CANVAS ───────────────────────────────────────────────── */}
          <div ref={scrollRef}
            style={{ flex: 1, minWidth: 0, height: "100%", overflow: "auto", background: C.bg, cursor: handMode ? "grab" : (dragTile ? "grabbing" : "crosshair") }}
            onWheel={onWheel}
            onMouseDown={e => {
              if (!handModeRef.current || isDraggingRef.current) return;
              // PC hand-mode: drag to pan
              const el = scrollRef.current;
              const startX = e.clientX, startY = e.clientY;
              const startScrollLeft = el.scrollLeft, startScrollTop = el.scrollTop;
              el.style.cursor = "grabbing";
              const onMove = ev => {
                el.scrollLeft = startScrollLeft - (ev.clientX - startX);
                el.scrollTop  = startScrollTop  - (ev.clientY - startY);
              };
              const onUp = () => {
                el.style.cursor = "";
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup',   onUp);
              };
              document.addEventListener('mousemove', onMove);
              document.addEventListener('mouseup',   onUp);
              e.preventDefault();
            }}
            onMouseMove={e => {
              // Active drag: update ghost + target cell highlight
              if (isDraggingRef.current) {
                setDragPos({ x: e.clientX, y: e.clientY });
                setDragTargetCell(cellFromEvent(e.clientX, e.clientY));
                return;
              }
            }}
            onMouseUp={e => {
              // Drag is fully handled by the global document mouseup listener — skip here
              if (isDraggingRef.current) return;
              if (paintingRef.current && commitOnUpRef.current) commitOnUpRef.current();
              setPainting(false);
              paintingRef.current = false;
            }}
            onMouseLeave={e => {
              // Drag continues globally via document mousemove/mouseup — do not cancel here.
              if (isDraggingRef.current) return;
              if (paintingRef.current && commitOnUpRef.current) commitOnUpRef.current();
              setPainting(false);
              paintingRef.current = false;
            }}
          >
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minWidth: "100%", minHeight: "100%", padding: 60, boxSizing: "border-box" }}>
              <div ref={canvasContainerRef} style={{ position: "relative", width: gW, height: (gridH + 2) * CELL * zoom, flexShrink: 0, isolation: "isolate" }}>

                {/* Checkerboard */}
                {Array.from({ length: gridH }).map((_, r) =>
                  Array.from({ length: gridW }).map((__, c) => (
                    <div key={`${r}-${c}`}
                      style={{ position: "absolute", left: c * CELL * zoom, top: (r + 1) * CELL * zoom, width: CELL * zoom, height: CELL * zoom, background: grid[r]?.[c] === SPACE_TILE_ID ? "transparent" : ((r + c) % 2 === 0 ? bg1 : bg2) }}
                      onMouseDown={e => onCell(r, c, e)}
                      onMouseMove={e => onCell(r, c, e)}
                    />
                  ))
                )}

                {/* Pass 1: normal tiles (z-index = r + 1 for natural depth), skipping priority tiles */}
                {grid.map((row, r) =>
                  row.map((id, c) => {
                    const t = id && getTile(id); if (!t) return null;
                    if (t.isSpace) return null; // space tile = transparent, nothing to render
                    if (priorityTiles[t.id]) return null;
                    const mult   = getTileMultiplier(t);
                    const off    = getTileOffset(t);
                    const rotDeg = (gridRotations[`${r},${c}`] ?? 0) * 90;
                    const cellPx = CELL * zoom;
                    const ox = (off.ox / 100) * cellPx;
                    const oy = (off.oy / 100) * cellPx;
                    return (
                      <img key={`t${r}-${c}`} src={t.src} alt="" draggable={false}
                        style={{ position: "absolute", left: (c + 0.5) * cellPx - (cellPx * mult) / 2 + ox, top: (r + 1 + 0.5) * cellPx + oy, width: cellPx * mult, height: "auto", transform: `translateY(-50%) rotate(${rotDeg}deg)`, pointerEvents: "none", imageRendering: "pixelated", zIndex: r + 1 }}
                      />
                    );
                  })
                )}
                {/* Pass 2: priority tiles — rendered last in DOM, always above every other tile */}
                {grid.map((row, r) =>
                  row.map((id, c) => {
                    const t = id && getTile(id); if (!t) return null;
                    if (t.isSpace) return null;
                    if (!priorityTiles[t.id]) return null;
                    const mult   = getTileMultiplier(t);
                    const off    = getTileOffset(t);
                    const rotDeg = (gridRotations[`${r},${c}`] ?? 0) * 90;
                    const cellPx = CELL * zoom;
                    const ox = (off.ox / 100) * cellPx;
                    const oy = (off.oy / 100) * cellPx;
                    return (
                      <img key={`prio${r}-${c}`} src={t.src} alt="" draggable={false}
                        style={{ position: "absolute", left: (c + 0.5) * cellPx - (cellPx * mult) / 2 + ox, top: (r + 1 + 0.5) * cellPx + oy, width: cellPx * mult, height: "auto", transform: `translateY(-50%) rotate(${rotDeg}deg)`, pointerEvents: "none", imageRendering: "pixelated", zIndex: 9999 }}
                      />
                    );
                  })
                )}

                {/* Selection preview overlay + drag target cell highlight */}
                {(previewCells || rectPreview || dragTargetCell) && (() => {
                  const pFill   = eraser ? "rgba(239,68,68,0.22)"  : "rgba(255,255,255,0.22)";
                  const pStroke = eraser ? "rgba(239,68,68,0.70)"  : "rgba(255,255,255,0.55)";
                  return (
                    <svg style={{ position: "absolute", left: 0, top: CELL * zoom, width: gW, height: gH, pointerEvents: "none", zIndex: 250, overflow: "visible" }}>
                      {previewCells && previewCells.map(([r, c]) => (
                        <rect key={`${r},${c}`} x={c * CELL * zoom} y={r * CELL * zoom} width={CELL * zoom} height={CELL * zoom} fill={pFill} stroke={pStroke} strokeWidth="1.5" />
                      ))}
                      {rectPreview && (
                        <rect x={rectPreview.c1 * CELL * zoom} y={rectPreview.r1 * CELL * zoom} width={(rectPreview.c2 - rectPreview.c1 + 1) * CELL * zoom} height={(rectPreview.r2 - rectPreview.r1 + 1) * CELL * zoom} fill={pFill} stroke={pStroke} strokeWidth="1.5" rx="2" />
                      )}
                      {dragTargetCell && (
                        <rect x={dragTargetCell[1] * CELL * zoom} y={dragTargetCell[0] * CELL * zoom} width={CELL * zoom} height={CELL * zoom} fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.7)" strokeWidth="2" rx="2" />
                      )}
                    </svg>
                  );
                })()}

                {/* Mirror guide lines — always shown when Guides is on */}
                {showGuides && (
                  <svg style={{ position: "absolute", left: 0, top: CELL * zoom, width: gW, height: gH, pointerEvents: "none", zIndex: 200, overflow: "visible" }}>
                    {/* Vertical */}
                    <line x1={gW / 2} y1={0} x2={gW / 2} y2={gH}
                      stroke={mirrorV ? C.pale : "rgba(255,255,255,0.38)"} strokeWidth={mirrorV ? 2 : 1.5} opacity={1} strokeDasharray="6 3" />
                    {/* Horizontal */}
                    <line x1={0} y1={gH / 2} x2={gW} y2={gH / 2}
                      stroke={mirrorH ? C.soft : "rgba(255,255,255,0.38)"} strokeWidth={mirrorH ? 2 : 1.5} opacity={1} strokeDasharray="6 3" />
                  </svg>
                )}

              </div>
            </div>
          </div>

        {/* ── RIGHT SIDEBAR: Tools ─────────────────────────────────── */}
        <div style={{ display: "flex", flexDirection: "row", flexShrink: 0, alignSelf: "stretch" }}>
          {/* Right toggle strip */}
          <button onClick={() => setToolsOpen(o => !o)}
            style={{ width: 28, background: C.panelDeep, border: "none", borderLeft: `1px solid ${C.border}`, cursor: "pointer", color: C.accentBright, fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, userSelect: "none" }}
            title={toolsOpen ? "Collapse tools" : "Expand tools"}>
            {toolsOpen ? "▶" : "◀"}
          </button>
          {mirrorSettingsOpen && (
            <div className="modal-backdrop" onClick={() => setMirrorSettingsOpen(false)}>
              <div className="modal-box" style={{ maxWidth: 320 }} onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Tools Settings</span>
                  <button onClick={() => setMirrorSettingsOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
                </div>
                <label style={{ display: "flex", flexDirection: "column", gap: 4, cursor: "pointer", userSelect: "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input type="checkbox" checked={mirrorSettings.mirrorSpawns}
                      onChange={ev => setMirrorSettings(p => ({ ...p, mirrorSpawns: ev.target.checked }))}
                      style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
                    <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>Mirror Spawns</span>
                  </div>
                  <span style={{ fontSize: 10, color: C.muted, paddingLeft: 22 }}>When using vertical or diagonal mirroring, red and blue spawn tiles swap automatically so the map stays balanced.</span>
                </label>
                <label style={{ display: "flex", flexDirection: "column", gap: 4, cursor: "pointer", userSelect: "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input type="checkbox" checked={mirrorSettings.mirrorRotation}
                      onChange={ev => setMirrorSettings(p => ({ ...p, mirrorRotation: ev.target.checked }))}
                      style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
                    <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>Mirror Rotation</span>
                  </div>
                  <span style={{ fontSize: 10, color: C.muted, paddingLeft: 22 }}>Mirrored tile copies have their rotation automatically flipped to match the mirroring axis (e.g. a left-pointing tile becomes right-pointing when mirrored horizontally).</span>
                </label>
                <label style={{ display: "flex", flexDirection: "column", gap: 4, cursor: "pointer", userSelect: "none" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input type="checkbox" checked={mirrorSettings.allowSwap}
                      onChange={ev => setMirrorSettings(p => ({ ...p, allowSwap: ev.target.checked }))}
                      style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
                    <span style={{ fontSize: 12, fontWeight: 600, color: C.text }}>Allow Tile Overwrite</span>
                  </div>
                  <span style={{ fontSize: 10, color: C.muted, paddingLeft: 22 }}>Clicking on an already-placed tile replaces it with the currently selected tile instead of picking it up.</span>
                </label>
              </div>
            </div>
          )}
          {toolsOpen && (
            <div style={{ width: isMobile ? 160 : 260, background: C.panelDeep, borderLeft: `1px solid ${C.border}`, borderRadius: "0 8px 8px 0", display: "flex", flexDirection: "column", overflow: "hidden", maxHeight: "min(88vh, 700px)" }}>
              <SectionHeader label="Tools" open={toolsOpen} onToggle={() => setToolsOpen(o => !o)}
                right={<button onClick={() => setMirrorSettingsOpen(true)} style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 5, cursor: "pointer", color: C.muted, fontSize: 12, padding: "1px 6px", lineHeight: 1.4 }} title="Mirroring settings">⚙</button>}
              />
              <div style={{ overflowY: "auto", flex: 1, padding: "8px 12px 10px", display: "flex", flexDirection: "column", gap: 7 }}>
                <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>Selection Mode</span>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  <button style={btn(selectionMode === 'single', C.accent, C.accentDim)} onClick={() => setSelectionMode('single')} title="Freehand">Single</button>
                  <button style={btn(selectionMode === 'line',   C.accent, C.accentDim)} onClick={() => setSelectionMode('line')}   title="Line">Line</button>
                  <button style={btn(selectionMode === 'rect',   C.accent, C.accentDim)} onClick={() => setSelectionMode('rect')}   title="Bounding box">Rectangle</button>
                </div>
                <div style={{ height: 1, background: C.border }} />
                <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>Mirroring</span>
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  <button style={btn(mirrorV, C.pale, C.paleDim)}           onClick={() => setMirrorV(v => !v)}>Horizontal</button>
                  <button style={btn(mirrorH, C.soft, C.softDim)}           onClick={() => setMirrorH(v => !v)}>Vertical</button>
                  <button style={btn(mirrorD, C.accentBright, C.accentDim)} onClick={() => setMirrorD(v => !v)}>Diagonal</button>
                </div>
                <div style={{ height: 1, background: C.border }} />
                <button style={btn(showGuides, C.accent, C.accentDim)} onClick={() => setShowGuides(v => !v)} title="Toggle mirror guide lines">Guides</button>
                <div style={{ height: 1, background: C.border }} />
                <button style={btn(false, C.soft, C.softDim)} onClick={() => { setReplaceOpen(true); setReplaceStep(1); setReplaceA(null); setReplaceB(null); setReplaceMsg(""); }}>Replace</button>
              </div>
            </div>
          )}
        </div>

      </div>

      {/* ══ BOTTOM BAR ═══════════════════════════════════════════════ */}
      <div style={{ flexShrink: 0, background: C.panelDeep, borderTop: `1px solid ${C.border}` }}>

        {/* Row 1 (always visible): Undo | Zoom | Redo | fold toggle */}
        <div style={{ display: "flex", alignItems: "center", padding: "5px 14px 3px", gap: 6 }}>
          <button style={btn(histIdx > 0, C.accent, C.accentDim)} onClick={undo} disabled={histIdx <= 0} title="Undo (Ctrl+Z)">Undo</button>
          <div style={{ flex: 1, display: "flex", justifyContent: "center", alignItems: "center", gap: 6 }}>
            <button style={{ ...btn(false), padding: "4px 9px", fontSize: 15, fontWeight: 700, lineHeight: 1 }} onClick={() => changeZoom(-ZOOM_STEP)}>−</button>
            <span onClick={() => applyZoom(calcFitZoom(gridW, gridH))}
              style={{ minWidth: 52, textAlign: "center", display: "inline-block", fontSize: 13, fontFamily: "monospace", fontWeight: 700, color: C.text, background: "rgba(180,40,40,0.10)", borderRadius: 7, padding: "3px 6px", border: `1px solid ${C.border}`, cursor: "pointer", userSelect: "none" }}
              title="Click to reset zoom to fit">
              {Math.round((zoom / calcFitZoom(gridW, gridH)) * 100)}%
            </span>
            <button style={{ ...btn(false), padding: "4px 9px", fontSize: 15, fontWeight: 700, lineHeight: 1 }} onClick={() => changeZoom(ZOOM_STEP)}>+</button>
          </div>
          <button style={btn(histIdx < history.length - 1, C.accent, C.accentDim)} onClick={redo} disabled={histIdx >= history.length - 1} title="Redo (Ctrl+Y)">Redo</button>
          <button onClick={() => setBottomOpen(o => !o)}
            style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 11, padding: "2px 4px", lineHeight: 1, flexShrink: 0 }}
            title={bottomOpen ? "Collapse bottom" : "Expand bottom"}>
            {bottomOpen ? "▼" : "▲"}
          </button>
        </div>

        {/* Rows 2-3: foldable */}
        {bottomOpen && (<>
          {/* Row 2: Clear | Map name | Download */}
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, padding: "3px 14px" }}>
            <button style={btn(true, C.danger, "rgba(248,113,113,0.18)")}
              onClick={() => { if (confirm("Clear the whole grid?")) setGrid(Array.from({ length: gridH }, () => Array(gridW).fill(null))); }}>
              Clear Map
            </button>
            <input type="text" value={mapName} onChange={e => setMapName(e.target.value)}
              placeholder="map name…"
              style={{ width: 180, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, fontFamily: "'Inter', sans-serif", fontSize: 11, padding: "4px 8px", outline: "none" }}
              spellCheck={false} />
            <button style={btn(true, C.soft, C.softDim)} onClick={doExport}>Download</button>
          </div>

          {/* Row 3: Background colour pickers */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, padding: "3px 14px 5px", alignItems: "center" }}>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Background</span>
            {[
              { label: "A", bg: bg1, hex: hex1, setHex: setHex1, apply: applyBg1 },
              { label: "B", bg: bg2, hex: hex2, setHex: setHex2, apply: applyBg2 },
            ].map(({ label, bg, hex, setHex, apply }) => (
              <div key={label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ fontSize: 10, color: C.muted, fontWeight: 600 }}>{label}</span>
                <input type="color" value={bg} onChange={e => apply(e.target.value)}
                  style={{ width: 26, height: 26, border: "none", borderRadius: 5, cursor: "pointer", padding: 2, background: "none", flexShrink: 0 }} />
                <input type="text" value={hex} maxLength={7}
                  onChange={e => { const v = e.target.value; setHex(v); if (validHex(v)) apply(v); }}
                  onBlur={() => { if (!validHex(hex)) setHex(bg); }}
                  style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "3px 6px", outline: "none" }}
                  spellCheck={false} />
              </div>
            ))}
            <button style={{ ...btn(false), fontSize: 10, padding: "3px 9px" }}
              onClick={() => { applyBg1(DEFAULT_BG1); applyBg2(DEFAULT_BG2); }}>↺ Reset</button>
          </div>

          {/* Row 4: Map size */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 14px" }}>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Map size</span>
            <input type="text" value={sizeWInput}
              onChange={e => setSizeWInput(e.target.value.replace(/\D/g, ""))}
              onBlur={() => { const w = parseInt(sizeWInput, 10); if (!isNaN(w) && w > 0) { setSizeWInput(String(Math.max(1, Math.min(99, w)))); } else setSizeWInput(String(gridW)); }}
              style={{ width: 36, textAlign: "center", background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "3px 4px", outline: "none" }} />
            <span style={{ fontSize: 11, color: C.muted }}>×</span>
            <input type="text" value={sizeHInput}
              onChange={e => setSizeHInput(e.target.value.replace(/\D/g, ""))}
              onBlur={() => { const h = parseInt(sizeHInput, 10); if (!isNaN(h) && h > 0) { setSizeHInput(String(Math.max(1, Math.min(99, h)))); } else setSizeHInput(String(gridH)); }}
              style={{ width: 36, textAlign: "center", background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 11, padding: "3px 4px", outline: "none" }} />
            <button style={{ ...btn(true, C.accent, C.accentDim), fontSize: 10, padding: "3px 9px" }}
              onClick={() => { const w = parseInt(sizeWInput, 10), h = parseInt(sizeHInput, 10); if (w > 0 && h > 0) setPendingSize({ w, h }); }}>
              Apply
            </button>
            <button style={{ ...btn(false), fontSize: 10, padding: "3px 9px" }}
              onClick={() => { setSizeWInput(String(GRID_W)); setSizeHInput(String(GRID_H)); setPendingSize({ w: GRID_W, h: GRID_H }); }}>
              ↺ Reset
            </button>
          </div>

          {/* Row 5: Theme switcher */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 14px 6px" }}>
            <span style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, userSelect: "none" }}>Theme</span>
            {["warm", "cold"].map(th => (
              <button key={th} onClick={() => setUiTheme(th)}
                style={{ ...btn(uiTheme === th, uiTheme === th ? C.accent : undefined, uiTheme === th ? C.accentDim : undefined), fontSize: 11, padding: "3px 12px" }}>
                {th === "warm" ? "🔥 Warm" : "❄️ Cold"}
              </button>
            ))}
          </div>
        </>)}

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
