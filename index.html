<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ophelia" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a0f06" />
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon setup — browsers pick the best size automatically -->
  <link rel="icon"                    href="favicon/favicon.ico" sizes="any" />
  <link rel="icon"    type="image/png" href="favicon/favicon-16x16.png"           sizes="16x16" />
  <link rel="icon"    type="image/png" href="favicon/favicon-32x32.png"           sizes="32x32" />
  <link rel="apple-touch-icon"        href="favicon/apple-touch-icon.png" />

  <title>Ophelia</title>

  <!-- Lilita One (title only) + Inter (all UI) from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; background: #1a0f06; }
    #root { height: 100%; height: 100dvh; display: flex; flex-direction: column; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.18); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(251,146,60,0.55); border-radius: 4px; border: 1px solid rgba(251,146,60,0.2); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(251,146,60,0.8); }
    * { -webkit-tap-highlight-color: transparent; }

    /* Checkered transparent background — applied to the exact-size image wrapper inside modals */
    .tile-img-checker {
      display: inline-block;
      background-color: #bbb;
      background-image: linear-gradient(45deg, #eee 25%, transparent 25%),
                        linear-gradient(-45deg, #eee 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #eee 75%),
                        linear-gradient(-45deg, transparent 75%, #eee 75%);
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0;
    }
    .tile-img-checker img { display: block; }

    /* Title gradient — overridden by oph-dyn-style on theme change */
    .oph-title-text { background: linear-gradient(90deg,#c45c6a,#fb923c,#fbbf24); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }

    /* Modal backdrop — must sit above priority tiles (z-index 9999) and folder panel (2000) */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; padding: 20px;
    }
    .modal-box {
      background: #2b1a0a; border: 1px solid rgba(251,146,60,0.18);
      border-radius: 14px; padding: 22px; max-width: 340px; width: 100%;
      display: flex; flex-direction: column; gap: 16px;
    }

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ── Constants ──────────────────────────────────────────────────────────
const GRID_W = 21, GRID_H = 33, CELL = 32;
const DEFAULT_BG1 = "#67717d", DEFAULT_BG2 = "#6e7986";
const MIN_ZOOM = 0.25, MAX_ZOOM = 4;
// Zoom buttons snap to nearest 5%
const ZOOM_STEP = 0.05;
const snapTo10 = z => Math.round(z * 20) / 20;
const SK = { tiles: "oph_tiles", grid: "oph_grid", colors: "oph_colors", userTiles: "oph_user_tiles", multipliers: "oph_multipliers", priority: "oph_priority", offsets: "oph_offsets", rotatable: "oph_rotatable", tileRots: "oph_tile_rots", gridW: "oph_gridW", gridH: "oph_gridH", tileNames: "oph_tile_names" };
const ACCEPTED = "image/png,image/jpeg,image/gif,image/webp,image/svg+xml,image/bmp";
const MAX_HISTORY = 60;
// Non-overlapping tile ID ranges — prevents collisions between sections regardless of reordering
const TILESET_ID_START = 1;   // 001–099: active tileset tiles (Mausoleum wall1=1, etc.)
const USER_ID_START    = 100; // 100–199: user-uploaded tiles
const USER_ID_MAX      = 199;
const GLOBAL_ID_START  = 200; // 200–299: global tiles (water, spawns, objectives, etc.)
const SPACE_TILE_ID    = 998; // special: makes a cell fully transparent

// Default tiles are loaded dynamically from Resources/manifest.json.
// To add/remove tiles, update that JSON file (or run generate-manifest.sh).

const load = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };

// Derive a human-readable codename from a tile's src path (display only, IDs unchanged)
const deriveCodename = src => {
  if (!src) return null;
  const file = src.split("/").pop().replace(/\.[^.]+$/, "");
  const map = {
    // Mausoleum
    "MSLM-wall": "Wall1", "MSLM-wall2": "Wall2", "MSLM-crate": "Crate", "MSLM-barrel": "Barrel",
    "MSLM-cactus": "Cactus", "MSLM-bush": "Bush", "MSLM-break": "Breakable",
    "MSLM-fence": "Fence1", "MSLM-fenceHORIZONTAL": "Fence2", "MSLM-fenceVERTICAL": "Fence3",
    "MSLM-post1": "Rope1", "MSLM-post2": "Rope2", "MSLM-post3": "Rope3", "MSLM-post4": "Rope4",
    "MSLM-water": "WaterFill", "MSLM-waterBEND": "WaterBend", "MSLM-waterCORNER": "WaterCorner", "MSLM-waterLINE": "WaterLine",
    // Global water
    "00001011": "GWaterBend", "01111111": "GWaterCorner", "01101011": "GWaterLine", "11111111": "GWaterFill",
    // Global special
    "Unbreakable": "Unbreakable", "HealPad": "HealPad", "SlowTile": "SlowTile",
    "Smoke": "Smoke", "SpeedTile": "SpeedTile", "Spikes": "Spike",
    // Spawns
    "1": "SpawnRed", "2": "SpawnBlue",
    // Objectives
    "Bounty": "BountyGObjective", "Gem_Grab": "GGObjective", "Heist": "HeistObjective", "Hot_Zone": "HZObjective",
    // Teleporters
    "Blue": "BlueTeleport", "Green": "GreenTeleport", "Red": "RedTeleport", "Yellow": "YellowTeleport",
    // Jumppads
    "B": "BottomJumppad", "BL": "BottomLeftJumppad", "BR": "BottomRightJumppad",
    "L": "LeftJumppad", "R": "RightJumppad", "T": "TopJumppad",
    "TL": "TopLeftJumppad", "TR": "TopRightJumppad",
  };
  return map[file] ?? null;
};
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const validHex = h => /^#[0-9A-Fa-f]{6}$/.test(h);
const isMobileDevice = () => typeof window !== "undefined" && window.innerWidth < 768;

// ── Colour palettes ────────────────────────────────────────────────────
const THEMES = {
  warm: {
    bg: "#1a0f06", panel: "#2b1a0a", panelDeep: "#1f1207",
    border: "rgba(251,146,60,0.18)", accent: "#fb923c",
    accentDim: "rgba(251,146,60,0.14)", accentBright: "#fdba74",
    soft: "#fcd34d", softDim: "rgba(252,211,77,0.16)",
    pale: "#fde68a", paleDim: "rgba(253,230,138,0.14)",
    text: "#fef3e2", muted: "rgba(254,243,226,0.45)", danger: "#f87171",
  },
  cold: {
    bg: "#06101a", panel: "#0a1b2e", panelDeep: "#071320",
    border: "rgba(56,189,248,0.22)", accent: "#38bdf8",
    accentDim: "rgba(56,189,248,0.15)", accentBright: "#7dd3fc",
    soft: "#34d399", softDim: "rgba(52,211,153,0.16)",
    pale: "#a7f3d0", paleDim: "rgba(167,243,208,0.14)",
    text: "#e2f0fe", muted: "rgba(226,240,254,0.45)", danger: "#f87171",
  },
};
// C is mutable so App can update it on theme change; Sep/SectionHeader always read the current value
let C = { ...THEMES.warm };

// ── Tiny helpers ───────────────────────────────────────────────────────
const Sep = () => <div style={{ width: 1, height: 22, background: C.border, flexShrink: 0, alignSelf: "center" }} />;

function SectionHeader({ label, open, onToggle, left, right }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 12px", background: C.panelDeep, borderBottom: open ? `1px solid ${C.border}` : "none" }}>
      <button onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.2, color: C.accent, textTransform: "uppercase", fontFamily: "'Inter', sans-serif" }}>{label}</span>
        <span style={{ fontSize: 9, color: C.muted, display: "inline-block", transition: "transform 0.15s", transform: open ? "rotate(0deg)" : "rotate(-90deg)" }}>▼</span>
      </button>
      {left}
      <div style={{ flex: 1 }} />
      {right}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────
// ── Fit-to-viewport zoom ───────────────────────────────────────────────
function calcFitZoom(gw, gh) {
  const gridW = gw || GRID_W, gridH = gh || GRID_H;
  const w = window.innerWidth, h = window.innerHeight;
  const mobile = w < 768;
  // Mobile: only the 28px toggle strips are visible (sidebars collapsed)
  // Desktop: left 240 + right 260 + 2×28 strips = 556
  const sideW = mobile ? 56 : 556;
  const topH = 50;
  // Bottom bar: 3 rows × ~30px each ≈ 92px
  const botH = 92;
  const pad = 24;
  const availW = Math.max(1, w - sideW - pad);
  const availH = Math.max(1, h - topH - botH - pad);
  return Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, snapTo10(Math.min(availW / (gridW * CELL), availH / (gridH * CELL)))));
}

function App() {
  const savedColors = load(SK.colors, { bg1: DEFAULT_BG1, bg2: DEFAULT_BG2 });
  const mobile = isMobileDevice();

  // Default tiles loaded dynamically from Resources/manifest.json
  const [defaultTiles, setDefaultTiles]   = useState([]);
  const [tilesLoading, setTilesLoading]   = useState(true);

  // User-uploaded tiles persisted in localStorage; IDs start after defaults
  const [userTiles, setUserTiles] = useState(() => load(SK.userTiles, []));
  const tiles = useMemo(() => [...defaultTiles, ...userTiles], [defaultTiles, userTiles]);

  const [gridW, setGridW] = useState(() => load(SK.gridW, GRID_W));
  const [gridH, setGridH] = useState(() => load(SK.gridH, GRID_H));
  const [grid,        setGridRaw]   = useState(() => {
    const saved = load(SK.grid, null);
    const gW = load(SK.gridW, GRID_W), gH = load(SK.gridH, GRID_H);
    if (saved && saved.length === gH && saved[0]?.length === gW) return saved;
    return Array.from({ length: gH }, () => Array(gW).fill(null));
  });
  const [bg1,         setBg1]       = useState(savedColors.bg1);
  const [bg2,         setBg2]       = useState(savedColors.bg2);
  const [hex1,        setHex1]      = useState(savedColors.bg1);
  const [hex2,        setHex2]      = useState(savedColors.bg2);
  const [sel,         setSel]       = useState(null);
  const [eraser,      setEraser]    = useState(false);
  const [handMode,    setHandMode]  = useState(false);
  const [mirrorV,     setMirrorV]   = useState(false);
  const [mirrorH,     setMirrorH]   = useState(false);
  const [mirrorD,     setMirrorD]   = useState(false);
  const [showGuides,    setShowGuides]    = useState(true);
  const [mirrorSettings, setMirrorSettings] = useState({ mirrorSpawns: true, mirrorRotation: true, allowSwap: false });
  const [mirrorSettingsOpen, setMirrorSettingsOpen] = useState(false);
  const [zoom,        setZoom]      = useState(calcFitZoom);
  const [zoomEditing, setZoomEdit]  = useState(false);
  const [zoomInput,   setZoomInput] = useState("");
  const [painting,    setPainting]  = useState(false);
  const [selectionMode, setSelectionMode] = useState('single'); // 'single' | 'line' | 'rect'
  const [rectPreview,   setRectPreview]   = useState(null);     // {r1,c1,r2,c2} during rect drag
  const [previewCells,  setPreviewCells]  = useState(null);     // [[r,c],...] during single/line drag
  // Drag-to-move
  const [dragTile,       setDragTile]       = useState(null);   // tile id being dragged, null when idle
  const [dragPos,        setDragPos]        = useState({ x: 0, y: 0 }); // screen coords for ghost image
  const [dragTargetCell, setDragTargetCell] = useState(null);   // [r,c] cell under cursor while dragging
  // Folder panel (floating modal)
  const [openFolderKey,    setOpenFolderKey]    = useState(null);
  const [folderPanelAnchor, setFolderPanelAnchor] = useState({ x: 0, y: 0 });
  const folderPanelRef    = useRef(null);
  const openFolderKeyRef  = useRef(null); // always-current key for reliable toggle
  // Panels: collapsed by default on mobile
  const [tilesOpen,   setTilesOpen] = useState(!mobile);
  const [toolsOpen,   setToolsOpen] = useState(!mobile);
  const [bgOpen,      setBgOpen]    = useState(!mobile);
  const [otherOpen,   setOtherOpen] = useState(!mobile);
  // Bottom section: extra rows collapsed by default on mobile
  const [bottomOpen,  setBottomOpen] = useState(!mobile);
  const [infoTile,    setInfoTile]  = useState(null);
  const [infoTool,    setInfoTool]  = useState(null); // "erase" | "hand" | "space"
  // Starred tiles: up to 5, shown when tiles panel is collapsed
  // Special IDs: "erase" and "hand"; regular tiles use numeric ID
  const [starredTiles, setStarredTiles] = useState(() => load("oph_starred", ["erase", "hand", 1, 6]));
  const toggleStar = id => setStarredTiles(prev => {
    if (prev.includes(id)) return prev.filter(s => s !== id);
    if (prev.length >= 10) return prev; // max 10
    return [...prev, id];
  });

  // Map size input fields (local string state for editing)
  const [sizeWInput, setSizeWInput] = useState(String(load(SK.gridW, GRID_W)));
  const [sizeHInput, setSizeHInput] = useState(String(load(SK.gridH, GRID_H)));

  // Replace A→B
  const [replaceOpen, setReplaceOpen] = useState(false);
  const [replaceStep, setReplaceStep] = useState(1); // 1=pick tile on map, 2=pick replacement
  const [replaceA,    setReplaceA]  = useState(null);
  const [replaceB,    setReplaceB]  = useState(null);
  // Map name for export filename
  const [mapName, setMapName] = useState(() => load("oph_map_name", ""));
  // Pending map size change awaiting confirmation
  const [pendingSize, setPendingSize] = useState(null); // { w, h }
  // Tile size multipliers
  const [tileMultipliers, setTileMultipliers] = useState(() => load(SK.multipliers, {}));
  // Priority tiles: rendered in a second DOM pass at z-index 9999 (always on top)
  const [priorityTiles, setPriorityTiles] = useState(() => load(SK.priority, {}));
  // Per-tile offsets: { [id]: { ox: %, oy: % } }  (positive oy = down, positive ox = right)
  const [tileOffsets, setTileOffsets] = useState(() => load(SK.offsets, {}));
  // Per-tile "Allow rotation" toggle: { [id]: bool } — undefined = use default
  const [rotatableMap, setRotatableMap] = useState(() => load(SK.rotatable, {}));
  // Per-tile custom names (user-uploaded tiles): { [id]: string }
  const [tileNames, setTileNames] = useState(() => load(SK.tileNames, {}));
  // Per-tile card rotation step 0-3 (0=up,1=right,2=down,3=left) — used for next placement
  const [cardRotations, setCardRotations] = useState({});
  // Per-cell grid rotation: { "r,c": 0|1|2|3 }
  const [gridRotations, setGridRotations] = useState(() => load(SK.tileRots, {}));
  // Failed tile tracking
  const [failedTiles,   setFailedTiles]   = useState(new Set());
  const [failedWarning, setFailedWarning] = useState(false);
  // Upload success flash
  const [uploadFlash,   setUploadFlash]   = useState(0);  // count of newly uploaded tiles
  const uploadTimerRef = useRef(null);
  // UI theme
  const [uiTheme, setUiTheme] = useState(() => load("oph_theme", "warm"));
  // Apply theme to mutable C before any render — Sep/SectionHeader read C at render time
  Object.assign(C, THEMES[uiTheme] || THEMES.warm);
  // Responsive
  const [isMobile,    setIsMobile]  = useState(mobile);

  // History
  const [history,  setHistory]  = useState([grid]);
  const [histIdx,  setHistIdx]  = useState(0);

  const fileRef   = useRef();
  const scrollRef = useRef();
  // nextId is for user-uploaded tiles only (range 100–199)
  const nextId    = useRef(userTiles.length ? Math.max(USER_ID_START, Math.min(USER_ID_MAX, Math.max(...userTiles.map(t => t.id)) + 1)) : USER_ID_START);

  const dragRotationRef    = useRef(0); // rotation of tile currently being dragged
  const cardRotationsRef   = useRef({});
  const mirrorSettingsRef  = useRef({ mirrorSpawns: true, mirrorRotation: true, allowSwap: false });
  const canvasContainerRef = useRef(null); // ref to the relative canvas container for accurate coordinate calc

  // Stable refs for touch/paint handlers
  const selRef      = useRef(sel);
  const eraserRef   = useRef(eraser);
  const zoomRef     = useRef(zoom);
  const paintRef    = useRef(null);
  const absZoomRef  = useRef(null);
  const pinchRef    = useRef(null);

  // Selection mode refs (stable across touch handler closures)
  const selectionModeRef  = useRef('single');
  const selectionStartRef = useRef(null);     // [r, c] of mousedown cell
  const selectionEndRef   = useRef(null);     // [r, c] of latest mousemove cell
  const hoveredTilesRef   = useRef(new Set()); // accumulated "r,c" strings for line mode
  const commitOnUpRef     = useRef(null);     // commitSelectionOnMouseUp
  const pushHistRef       = useRef(null);     // pushHistorySnapshot
  const dragTileRef       = useRef(null);     // mirrors dragTile for event-handler closures
  const isDraggingRef     = useRef(false);    // true while a tile is being drag-moved
  const setGridStableRef  = useRef(null);     // always-current setGrid for touch handler closures
  const paintingRef       = useRef(false);    // mirrors painting state for event-handler closures
  const gridRef           = useRef(null);     // up-to-date grid for touch-handler closure
  const getMirrorRef      = useRef(null);     // always-current getMirrorPositions for touch handler

  const handModeRef = useRef(false);
  const gridWRef = useRef(gridW);
  const gridHRef = useRef(gridH);
  useEffect(() => { gridWRef.current = gridW; }, [gridW]);
  useEffect(() => { gridHRef.current = gridH; }, [gridH]);
  useEffect(() => { selRef.current          = sel;           }, [sel]);
  useEffect(() => { eraserRef.current       = eraser;        }, [eraser]);
  useEffect(() => { handModeRef.current     = handMode;      }, [handMode]);
  useEffect(() => { zoomRef.current         = zoom;          }, [zoom]);
  useEffect(() => { selectionModeRef.current = selectionMode; }, [selectionMode]);
  useEffect(() => { gridRef.current = grid; }, [grid]);
  useEffect(() => { paintingRef.current = painting; }, [painting]);

  // Persist
  useEffect(() => { save(SK.userTiles,    userTiles);       }, [userTiles]);
  useEffect(() => { save(SK.grid,         grid);            }, [grid]);
  useEffect(() => { save(SK.multipliers,  tileMultipliers); }, [tileMultipliers]);
  useEffect(() => { save(SK.priority,     priorityTiles);   }, [priorityTiles]);
  useEffect(() => { save(SK.offsets,      tileOffsets);     }, [tileOffsets]);
  useEffect(() => { save(SK.rotatable,    rotatableMap);    }, [rotatableMap]);
  useEffect(() => { save(SK.tileRots,     gridRotations);   }, [gridRotations]);
  useEffect(() => { save(SK.tileNames,    tileNames);       }, [tileNames]);
  useEffect(() => {
    save("oph_theme", uiTheme);
    document.body.style.background = C.bg;
    // Update dynamic theme styles (scrollbars, modal)
    const isC = uiTheme === "cold";
    const scrollColor = isC ? "rgba(56,189,248,0.55)" : "rgba(251,146,60,0.55)";
    const scrollColorHover = isC ? "rgba(56,189,248,0.85)" : "rgba(251,146,60,0.8)";
    const scrollBorder = isC ? "rgba(56,189,248,0.2)" : "rgba(251,146,60,0.2)";
    const modalBg = isC ? "#0a1b2e" : "#2b1a0a";
    const modalBorder = isC ? "rgba(56,189,248,0.22)" : "rgba(251,146,60,0.18)";
    let dynStyle = document.getElementById("oph-dyn-style");
    if (!dynStyle) { dynStyle = document.createElement("style"); dynStyle.id = "oph-dyn-style"; document.head.appendChild(dynStyle); }
    const titleGrad = isC
      ? "linear-gradient(90deg,#a78bfa,#38bdf8,#34d399)"
      : "linear-gradient(90deg,#c45c6a,#fb923c,#fbbf24)";
    dynStyle.textContent = `
      ::-webkit-scrollbar-thumb { background: ${scrollColor} !important; border-color: ${scrollBorder} !important; }
      ::-webkit-scrollbar-thumb:hover { background: ${scrollColorHover} !important; }
      .modal-box { background: ${modalBg} !important; border-color: ${modalBorder} !important; }
      .oph-title-text { background: ${titleGrad} !important; -webkit-background-clip: text !important; background-clip: text !important; -webkit-text-fill-color: transparent !important; color: transparent !important; }
    `;
  }, [uiTheme]);
  useEffect(() => { save("oph_starred", starredTiles); }, [starredTiles]);
  useEffect(() => { save("oph_map_name", mapName); }, [mapName]);
  useEffect(() => { save(SK.gridW, gridW); setSizeWInput(String(gridW)); }, [gridW]);
  useEffect(() => { save(SK.gridH, gridH); setSizeHInput(String(gridH)); }, [gridH]);

  const getDefaultMultiplier = t => {
    if (!t?.src) return 1.0;
    const s = t.src;
    // Spawns
    if (s.includes("Spawns/")) return 1.65;
    // Barrel
    if (s.includes("barrel") || s.includes("MSLM-barrel")) return 1.1;
    // Breakable (MSLM-break only, NOT Unbreakable)
    if (s.includes("MSLM-break") || (s.includes("break") && !s.includes("Unbreakable"))) return 1.2;
    // Jumppads & Teleporters & HealPad → 2x
    if (s.includes("Jumppads/") || s.includes("Teleporters/") || s.includes("HealPad")) return 2.0;
    // Hot Zone
    if (s.includes("Hot_Zone")) return 7.0;
    // Smoke / poison / gas
    if (s.includes("Smoke")) return 1.65;
    // Gem Grab & Heist objectives → 2x
    if (s.includes("Gem_Grab") || s.includes("Heist")) return 2.0;
    return 1.0;
  };

  const getTileMultiplier = t => {
    if (tileMultipliers[t.id] !== undefined) return tileMultipliers[t.id];
    return getDefaultMultiplier(t);
  };

  // Returns { ox, oy } in % (100 = one full cell width/height). Positive ox=right, positive oy=down.
  const getDefaultOffset = t => {
    if (!t?.src) return { ox: 0, oy: 0 };
    const s = t.src;
    // Jumppads, Teleporters, HealPad: +50% H and +50% V so 2× tile sits centred on a 2×2 area
    if (s.includes("Jumppads/") || s.includes("Teleporters/") || s.includes("HealPad")) return { ox: 50, oy: 50 };
    return { ox: 0, oy: 0 };
  };

  const getTileOffset = t => {
    if (tileOffsets[t.id] !== undefined) return tileOffsets[t.id];
    return getDefaultOffset(t);
  };

  // Spawn tile identification (src-based)
  const isSpawn1 = t => !!(t?.src && t.src.includes("Spawns/1.png")); // red
  const isSpawn2 = t => !!(t?.src && t.src.includes("Spawns/2.png")); // blue
  const swapSpawnId = (id) => {
    const t = tiles.find(x => x.id === id);
    if (!t) return id;
    if (isSpawn1(t)) { const b = tiles.find(x => isSpawn2(x)); return b ? b.id : id; }
    if (isSpawn2(t)) { const r = tiles.find(x => isSpawn1(x)); return r ? r.id : id; }
    return id;
  };

  // Water tiles have rotation on by default
  const isDefaultRotatable = t => !!(t?.src && (t.src.includes("Global/Water/") || t.src.includes("Mausoleum/Water/")));

  const isTileRotatable = t => {
    if (rotatableMap[t.id] !== undefined) return rotatableMap[t.id];
    return isDefaultRotatable(t);
  };

  // Badge label shown at bottom-left of tile cards
  const TileBadge = ({ t }) => {
    const mult   = getTileMultiplier(t);
    const off    = getTileOffset(t);
    const hasMult  = mult !== 1.0;
    const hasOff   = off.ox !== 0 || off.oy !== 0;
    const isPrio   = !!priorityTiles[t.id];
    if (!hasMult && !hasOff && !isPrio) return null;
    const parts = [];
    if (hasMult) parts.push(`${mult}×`);
    if (isPrio)  parts.push("🚨");
    if (hasOff)  parts.push("📐");
    return (
      <span style={{ position: "absolute", bottom: 2, left: 3, fontSize: 8, fontWeight: 700, color: C.accentBright, background: "rgba(0,0,0,0.65)", borderRadius: 3, padding: "1px 3px", lineHeight: 1.3, pointerEvents: "none" }}>
        {parts.join("")}
      </span>
    );
  };

  // Active tileset name (drives which tileset's tiles are shown)
  const [activeTileset, setActiveTileset] = useState(null);
  // Parsed manifest data
  const [manifest, setManifest] = useState(null);
  useEffect(() => { openFolderKeyRef.current = openFolderKey; }, [openFolderKey]);
  // toggleFolder uses ref to read current value — avoids stale-closure reopening after
  // the outside-click mousedown handler closes the panel in the same event cycle.
  const toggleFolder = (key, e) => {
    if (openFolderKeyRef.current === key) {
      setOpenFolderKey(null);
    } else {
      setOpenFolderKey(key);
      if (e?.currentTarget) {
        const rect = e.currentTarget.getBoundingClientRect();
        setFolderPanelAnchor({ x: rect.right + 6, y: rect.top });
      }
    }
  };
  // Close folder panel on outside click
  useEffect(() => {
    if (!openFolderKey) return;
    const handler = ev => {
      if (folderPanelRef.current && !folderPanelRef.current.contains(ev.target)) {
        setOpenFolderKey(null);
      }
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('touchstart', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('touchstart', handler);
    };
  }, [openFolderKey]);

  // Build the flat defaultTiles list and the ordered panel entries from manifest + activeTileset.
  // IDs are assigned in panel display order: tileset tiles first (wall1=ID#1), global tiles after.
  // Returns: tilesetEntries, globalEntries, flatDefaultTiles, tilesetTileCount
  const { tilesetEntries, globalEntries, flatDefaultTiles, tilesetTileCount } = useMemo(() => {
    if (!manifest) return { tilesetEntries: [], globalEntries: [], flatDefaultTiles: [], tilesetTileCount: 0 };
    const flatTiles = [];
    // Tileset tiles start at TILESET_ID_START (1); global tiles start at GLOBAL_ID_START (200)
    let idCounter = TILESET_ID_START;
    const makeTile = src => ({ id: idCounter++, src: `Resources/${src}`, isDefault: true });
    // Derive a human-readable display label from the folder path (e.g. "Global/Special Tiles/" → "Special Tiles")
    const displayLabel = (key, folderPath) => {
      if (folderPath) { const s = folderPath.replace(/\/$/, '').split('/').pop(); if (s) return s; }
      return key;
    };

    // ── Active tileset tiles FIRST — these get IDs starting at TILESET_ID_START (1) ──
    const tsDef = manifest.tilesets?.find(ts => ts.name === activeTileset) ?? manifest.tilesets?.[0];
    const tsEntries = [];
    let tsCount = 0;
    if (tsDef) {
      for (const key of (tsDef.order ?? [])) {
        if (tsDef.folders?.[key]) {
          const folderPath = tsDef.folderPaths?.[key] ?? `${tsDef.name}/${key}/`;
          const label = displayLabel(key, folderPath);
          const folderTiles = tsDef.folders[key].map(fn => {
            const t = makeTile(`${folderPath}${fn}`);
            t.folderKey = key; t.folderLabel = label;
            return t;
          });
          flatTiles.push(...folderTiles);
          tsEntries.push({ type: 'folder', key, label, tiles: folderTiles });
          tsCount += folderTiles.length;
        } else if (tsDef.files?.[key]) {
          const t = makeTile(tsDef.files[key]);
          flatTiles.push(t);
          tsEntries.push({ type: 'flat', tile: t });
          tsCount++;
        }
      }
    }

    // ── Global tiles (including objectives) — IDs start at GLOBAL_ID_START (200) ──
    idCounter = GLOBAL_ID_START; // jump to 200 regardless of how many tileset tiles there were
    const gDef = manifest.global;
    const glbEntries = [];
    if (gDef) {
      for (const key of (gDef.order ?? [])) {
        const files = gDef.folders?.[key];
        if (!files || files.length === 0) continue;
        const folderPath = gDef.folderPaths?.[key] ?? `Global/${key}/`;
        const label = displayLabel(key, folderPath);
        const folderTiles = files.map(fn => {
          const t = makeTile(`${folderPath}${fn}`);
          t.folderKey = `global_${key}`; t.folderLabel = label;
          return t;
        });
        flatTiles.push(...folderTiles);
        glbEntries.push({ type: 'folder', key: `global_${key}`, label, tiles: folderTiles });
      }
    }

    return { tilesetEntries: tsEntries, globalEntries: glbEntries, flatDefaultTiles: flatTiles, tilesetTileCount: tsCount };
  }, [manifest, activeTileset]);

  // Sync defaultTiles and nextId whenever flatDefaultTiles changes.
  // Auto-flag any tile whose src path contains "/objectives/" as priority (case-insensitive).
  useEffect(() => {
    setDefaultTiles(flatDefaultTiles);
    if (flatDefaultTiles.length > 0) {
      setSel(prev => prev ?? flatDefaultTiles[0].id);
      setPriorityTiles(prev => {
        const next = { ...prev };
        let changed = false;
        flatDefaultTiles.forEach(t => {
          if (/\/objectives\//i.test(t.src) && !next[t.id]) {
            next[t.id] = true; changed = true;
          }
        });
        return changed ? next : prev;
      });
    }
  }, [flatDefaultTiles]);

  // Load manifest from Resources/manifest.json
  useEffect(() => {
    fetch("Resources/manifest.json")
      .then(r => r.ok ? r.json() : {})
      .then(data => {
        setManifest(data);
        const firstName = data.tilesets?.[0]?.name ?? null;
        setActiveTileset(firstName);
      })
      .catch(() => {})
      .finally(() => setTilesLoading(false));
  }, []);

  // Responsive resize listener
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const saveColors = (b1, b2) => save(SK.colors, { bg1: b1, bg2: b2 });
  const applyBg1   = v => { setBg1(v); setHex1(v); saveColors(v, bg2); };
  const applyBg2   = v => { setBg2(v); setHex2(v); saveColors(bg1, v); };

  const markFailed = id => setFailedTiles(prev => new Set([...prev, id]));

  // Grid with history
  const setGrid = useCallback((updater, skipHistory = false) => {
    setGridRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (!skipHistory) {
        setHistory(h => {
          const trimmed = h.slice(0, histIdx + 1);
          const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
          return [...capped, next];
        });
        setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
      }
      return next;
    });
  }, [histIdx]);

  const undo = useCallback(() => {
    if (histIdx <= 0) return;
    const newIdx = histIdx - 1;
    setHistIdx(newIdx);
    setGridRaw(history[newIdx]);
  }, [history, histIdx]);

  const redo = useCallback(() => {
    if (histIdx >= history.length - 1) return;
    const newIdx = histIdx + 1;
    setHistIdx(newIdx);
    setGridRaw(history[newIdx]);
  }, [history, histIdx]);

  // Push the current grid as a history snapshot (called once on mousedown, before any paint).
  // All cell writes during a drag use skipHistory=true, so the whole drag is one undo step.
  const pushHistorySnapshot = useCallback(() => {
    const snap = grid;
    setHistory(h => {
      const trimmed = h.slice(0, histIdx + 1);
      const capped  = trimmed.length >= MAX_HISTORY ? trimmed.slice(1) : trimmed;
      return [...capped, snap];
    });
    setHistIdx(i => Math.min(i + 1, MAX_HISTORY - 1));
  }, [histIdx, grid]);

  const loadFiles = files => {
    const imageFiles = [...files].filter(f => f.type.startsWith("image/"));
    if (!imageFiles.length) return;
    let loaded = 0;
    imageFiles.forEach(f => {
      const r = new FileReader();
      r.onload = e => {
        if (nextId.current > USER_ID_MAX) { console.warn("User tile limit reached (IDs 100–199)"); return; }
        const id = nextId.current++;
        setUserTiles(prev => [...prev, { id, src: e.target.result }]);
        loaded++;
        if (loaded === imageFiles.length) {
          // Flash notification
          setUploadFlash(imageFiles.length);
          if (uploadTimerRef.current) clearTimeout(uploadTimerRef.current);
          uploadTimerRef.current = setTimeout(() => setUploadFlash(0), 2500);
        }
      };
      r.readAsDataURL(f);
    });
  };

  const deleteTile = id => {
    setUserTiles(p => p.filter(t => t.id !== id));
    if (sel === id) setSel(null);
    setInfoTile(null);
  };

  // Returns [pos] — just positions (used by existing drag/drop code)
  const getMirrorPositions = useCallback((r, c) => {
    return getMirrorMeta(r, c).map(m => m.pos);
  }, [mirrorV, mirrorH, mirrorD]); // eslint-disable-line

  // Returns [{pos, fV, fH, fD}] — positions + which mirror flags apply
  function getMirrorMeta(r, c) {
    const cR = (gridH - 1) / 2, cC = (gridW - 1) / 2;
    const oR = r - cR, oC = c - cC;
    const entries = [{ pos: [r, c], fV: false, fH: false, fD: false }];
    if (mirrorV) entries.push({ pos: [r, gridW - 1 - c],               fV: true,  fH: false, fD: false });
    if (mirrorH) entries.push({ pos: [gridH - 1 - r, c],               fV: false, fH: true,  fD: false });
    if (mirrorD) entries.push({ pos: [Math.round(cR - oR), Math.round(cC - oC)], fV: false, fH: false, fD: true });
    if (mirrorV && mirrorD) entries.push({ pos: [Math.round(cR - oR), gridW - 1 - c],   fV: true,  fH: false, fD: true });
    if (mirrorH && mirrorD) entries.push({ pos: [gridH - 1 - r, Math.round(cC - oC)],   fV: false, fH: true,  fD: true });
    if (mirrorV && mirrorH && mirrorD) entries.push({ pos: [gridH - 1 - r, gridW - 1 - c], fV: true, fH: true, fD: true });
    const seen = new Set();
    return entries.filter(({ pos: [pr, pc] }) => {
      if (pr < 0 || pr >= gridH || pc < 0 || pc >= gridW) return false;
      const k = `${pr},${pc}`; if (seen.has(k)) return false; seen.add(k); return true;
    });
  }

  // Flip a rotation step (0-3) based on mirror axes applied
  // fV = flip left-right (horizontal axis flip), fH = flip top-bottom, fD = 180° rotation
  const applyRotMirror = (rot, fV, fH, fD) => {
    let r = rot;
    if (fV) { if (r === 0) r = 2; else if (r === 2) r = 0; }       // ↑↓ swap (vertical mirror)
    if (fH) { if (r === 1) r = 3; else if (r === 3) r = 1; }       // ←→ swap (horizontal mirror)
    if (fD) { r = (r + 2) % 4; }                                    // 180°
    return r;
  };

  const paintCells = useCallback((r, c) => {
    const meta   = getMirrorMeta(r, c);
    const tileId = eraser ? null : (sel ?? null);
    const rot    = tileId ? ((cardRotationsRef.current[tileId] ?? 0) / 90 % 4) : 0;
    const ms     = mirrorSettingsRef.current;
    setGrid(prev => {
      const g = prev.map(row => [...row]);
      meta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
        // Spawn swapping: applies when fH (top-bottom) or fD (diagonal) flips teams
        let id = tileId;
        if (id && ms.mirrorSpawns && (fH || fD)) id = swapSpawnId(id);
        g[pr][pc] = eraser ? null : id;
      });
      return g;
    }, true);
    if (!eraser && tileId) {
      const tile = getTile(tileId);
      const isTileRot = tile ? isTileRotatable(tile) : false;
      setGridRotations(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          n[`${pr},${pc}`] = (ms.mirrorRotation && isTileRot) ? applyRotMirror(rot, fV, fH, fD) : rot;
        });
        return n;
      });
    } else if (eraser) {
      setGridRotations(prev => {
        const n = { ...prev };
        meta.forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        return n;
      });
    }
  }, [eraser, sel, mirrorV, mirrorH, mirrorD, setGrid, tiles]);

  useEffect(() => { paintRef.current        = paintCells;           }, [paintCells]);
  useEffect(() => { cardRotationsRef.current   = cardRotations;        }, [cardRotations]);
  useEffect(() => { mirrorSettingsRef.current  = mirrorSettings;       }, [mirrorSettings]);
  useEffect(() => { pushHistRef.current = pushHistorySnapshot;  }, [pushHistorySnapshot]);

  // Commit an array of [r,c] cells to the grid at once (used by line and rect modes).
  // Uses refs for sel/eraser so it reads the correct values at mouseup time.
  const commitMultipleCells = useCallback((cells) => {
    if (!cells.length) return;
    const tileId   = selRef.current;
    const isEraser = eraserRef.current;
    const rot      = tileId ? ((cardRotationsRef.current[tileId] ?? 0) / 90 % 4) : 0;
    const ms       = mirrorSettingsRef.current;
    const placedMeta = [];
    setGrid(prev => {
      const g = prev.map(row => [...row]);
      cells.forEach(([r, c]) => {
        getMirrorMeta(r, c).forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          if (!isEraser && g[pr][pc] !== null && !ms.allowSwap) return;
          let id = isEraser ? null : (tileId ?? null);
          if (id && ms.mirrorSpawns && (fH || fD)) id = swapSpawnId(id);
          g[pr][pc] = id;
          if (!isEraser && tileId) placedMeta.push({ pos: [pr, pc], fV, fH, fD });
        });
      });
      return g;
    });
    if (!isEraser && tileId) {
      const tile = getTile(tileId);
      const isTileRot = tile ? isTileRotatable(tile) : false;
      setGridRotations(prev => {
        const n = { ...prev };
        placedMeta.forEach(({ pos: [pr, pc], fV, fH, fD }) => {
          n[`${pr},${pc}`] = (ms.mirrorRotation && isTileRot) ? applyRotMirror(rot, fV, fH, fD) : rot;
        });
        return n;
      });
    } else if (isEraser) {
      setGridRotations(prev => {
        const n = { ...prev };
        cells.forEach(([r, c]) => {
          getMirrorMeta(r, c).forEach(({ pos: [pr, pc] }) => { delete n[`${pr},${pc}`]; });
        });
        return n;
      });
    }
  }, [mirrorV, mirrorH, mirrorD, setGrid, tiles]);

  // Called on mouseup / touch-end to finalise the current selection.
  // All three modes defer their grid write to this point.
  const commitSelectionOnMouseUp = useCallback(() => {
    const mode = selectionModeRef.current;
    if (mode === 'single') {
      // place tile at the end point (where the mouse was released)
      if (selectionEndRef.current) {
        commitMultipleCells([selectionEndRef.current]);
      }
    } else if (mode === 'line') {
      const cells = [...hoveredTilesRef.current].map(k => k.split(',').map(Number));
      commitMultipleCells(cells);
    } else if (mode === 'rect') {
      if (!selectionStartRef.current) return;
      const [sr, sc] = selectionStartRef.current;
      const [er, ec] = selectionEndRef.current ?? [sr, sc];
      const cells = [];
      for (let r = Math.min(sr, er); r <= Math.max(sr, er); r++)
        for (let c = Math.min(sc, ec); c <= Math.max(sc, ec); c++)
          cells.push([r, c]);
      commitMultipleCells(cells);
    }
    setRectPreview(null);
    setPreviewCells(null);
    selectionStartRef.current = null;
    selectionEndRef.current   = null;
    hoveredTilesRef.current   = new Set();
  }, [commitMultipleCells]);

  useEffect(() => { commitOnUpRef.current = commitSelectionOnMouseUp; }, [commitSelectionOnMouseUp]);

  // Convert screen (clientX, clientY) → grid [r, c], or null if outside the grid area
  const cellFromEvent = (clientX, clientY) => {
    const container = canvasContainerRef.current;
    if (!container) return null;
    const rect = container.getBoundingClientRect();
    const z = zoomRef.current;
    const x = clientX - rect.left;
    const y = clientY - rect.top - CELL * z; // subtract 1-row top border offset
    const c = Math.floor(x / (CELL * z));
    const r = Math.floor(y / (CELL * z));
    return r >= 0 && r < gridH && c >= 0 && c < gridW ? [r, c] : null;
  };

  const onCell = (r, c, e) => {
    if (handModeRef.current) return; // hand mode: let native scroll handle panning
    if (e.type === "mousedown") {
      e.preventDefault(); // prevent native browser drag + text selection
      // Drag and paint are mutually exclusive — decide here, never switch mid-gesture
      // Use gridRef for freshest value (avoids stale closure on rapid clicks)
      const existingId = gridRef.current?.[r]?.[c];

      if (existingId && !eraserRef.current && !mirrorSettingsRef.current?.allowSwap) {
        // ── OCCUPIED CELL (non-eraser, overwrite disabled): immediate pickup ─────
        const mirrorPositions = getMirrorRef.current ? getMirrorRef.current(r, c) : getMirrorPositions(r, c);
        // Carry the rotation of the picked-up tile
        dragRotationRef.current = gridRotations[`${r},${c}`] ?? 0;
        setGridRaw(prevGrid => {
          const g = prevGrid.map(row => [...row]);
          mirrorPositions.forEach(([pr, pc]) => { g[pr][pc] = null; });
          return g;
        });
        setGridRotations(prev => {
          const n = { ...prev };
          mirrorPositions.forEach(([pr, pc]) => { delete n[`${pr},${pc}`]; });
          return n;
        });
        setDragTile(existingId);
        dragTileRef.current = existingId;
        isDraggingRef.current = true;
        setDragPos({ x: e.clientX, y: e.clientY });
        setDragTargetCell(null);
        return; // do NOT enter painting mode
      }

      // ── NORMAL PAINT: empty cells (or eraser on any cell) ───────────────────
      setPainting(true);
      paintingRef.current = true;
      selectionStartRef.current = [r, c];
      selectionEndRef.current   = [r, c];
      hoveredTilesRef.current   = new Set([`${r},${c}`]);
      const mode = selectionModeRef.current;
      if (mode === 'single') setPreviewCells([[r, c]]);
      else if (mode === 'line') setPreviewCells([[r, c]]);
      else if (mode === 'rect') setRectPreview({ r1: r, c1: c, r2: r, c2: c });

    } else if (e.type === "mousemove") {
      // If dragging, update ghost + target cell — never paint
      if (isDraggingRef.current) {
        setDragPos({ x: e.clientX, y: e.clientY });
        setDragTargetCell(cellFromEvent(e.clientX, e.clientY));
        return;
      }
      if (!paintingRef.current) return;
      selectionEndRef.current = [r, c];
      const mode = selectionModeRef.current;
      if (mode === 'single') {
        setPreviewCells([[r, c]]);
      } else if (mode === 'line') {
        hoveredTilesRef.current.add(`${r},${c}`);
        setPreviewCells([...hoveredTilesRef.current].map(k => k.split(',').map(Number)));
      } else if (mode === 'rect') {
        const [r1, c1] = selectionStartRef.current;
        setRectPreview({
          r1: Math.min(r1, r), c1: Math.min(c1, c),
          r2: Math.max(r1, r), c2: Math.max(c1, c),
        });
      }
    }
  };

  const SPACE_TILE = { id: SPACE_TILE_ID, src: null, label: "Space", isSpace: true };
  const getTile = id => id === SPACE_TILE_ID ? SPACE_TILE : tiles.find(t => t.id === id);

  // ── Zoom ──────────────────────────────────────────────────────────
  const applyZoom = useCallback((newZ, focal = null) => {
    setZoom(prev => {
      const z = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, +newZ.toFixed(2)));
      if (focal && scrollRef.current && z !== prev) {
        const scale = z / prev;
        requestAnimationFrame(() => {
          if (!scrollRef.current) return;
          scrollRef.current.scrollLeft = focal.cx * scale - focal.ox;
          scrollRef.current.scrollTop  = focal.cy * scale - focal.oy;
        });
      }
      return z;
    });
  }, []);

  // +/- buttons: snap to nearest 5%; default focal = viewport centre
  const changeZoom = useCallback((delta, focal = null) => {
    setZoom(prev => {
      const z = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, snapTo10(prev + delta)));
      const el = scrollRef.current;
      if (el && z !== prev) {
        const fp = focal ?? (() => {
          const ox = el.clientWidth / 2, oy = el.clientHeight / 2;
          return { cx: ox + el.scrollLeft, cy: oy + el.scrollTop, ox, oy };
        })();
        const scale = z / prev;
        requestAnimationFrame(() => {
          if (!scrollRef.current) return;
          scrollRef.current.scrollLeft = fp.cx * scale - fp.ox;
          scrollRef.current.scrollTop  = fp.cy * scale - fp.oy;
        });
      }
      return z;
    });
  }, []);

  useEffect(() => { absZoomRef.current   = applyZoom;            }, [applyZoom]);
  useEffect(() => { getMirrorRef.current  = getMirrorPositions;  }, [getMirrorPositions]);
  useEffect(() => { setGridStableRef.current = setGrid;          }, [setGrid]);

  // Global mousemove/mouseup: keep ghost following cursor even outside the canvas container,
  // and correctly complete or discard the drag on mouseup anywhere on the page.
  useEffect(() => {
    const onMove = e => {
      if (!isDraggingRef.current) return;
      setDragPos({ x: e.clientX, y: e.clientY });
      // Update target cell highlight if cursor is inside scroll container
      setDragTargetCell(cellFromEvent(e.clientX, e.clientY));
    };
    const onUp = e => {
      if (!isDraggingRef.current) return;
      setDragTargetCell(null);
      const cell = cellFromEvent(e.clientX, e.clientY);
      const id  = dragTileRef.current;
      const rot = dragRotationRef.current;
      if (cell) {
        const [r, c] = cell;
        const positions = getMirrorRef.current ? getMirrorRef.current(r, c) : [[r, c]];
        const placed = [];
        setGridStableRef.current(prev => {
          const anyEmpty = positions.some(([pr, pc]) => prev[pr]?.[pc] === null);
          if (!anyEmpty) return prev;
          const g = prev.map(row => [...row]);
          positions.forEach(([pr, pc]) => { if (g[pr]?.[pc] === null) { g[pr][pc] = id; placed.push([pr, pc]); } });
          return g;
        });
        if (placed.length) {
          setGridRotations(prev => {
            const n = { ...prev };
            placed.forEach(([pr, pc]) => { n[`${pr},${pc}`] = rot; });
            return n;
          });
        }
      } else {
        setGridStableRef.current(g => g);
      }
      setDragTile(null); dragTileRef.current = null; isDraggingRef.current = false;
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    };
  }, []); // stable refs only — no deps needed

  // Centre the grid in the scroll container on first render
  useEffect(() => {
    requestAnimationFrame(() => {
      const el = scrollRef.current;
      if (!el) return;
      const z = zoomRef.current;
      const totalW = gridWRef.current * CELL * z + 120; // grid + 2×60 padding
      const totalH = (gridHRef.current + 2) * CELL * z + 120;
      el.scrollLeft = Math.max(0, (totalW - el.clientWidth) / 2);
      el.scrollTop  = Math.max(0, (totalH - el.clientHeight) / 2);
    });
  }, []); // mount only

  const onWheel = useCallback(e => {
    if (!(e.ctrlKey || e.metaKey)) return;
    e.preventDefault();
    const el = scrollRef.current;
    const focal = el ? (() => {
      const rect = el.getBoundingClientRect();
      const ox = e.clientX - rect.left, oy = e.clientY - rect.top;
      return { cx: ox + el.scrollLeft, cy: oy + el.scrollTop, ox, oy };
    })() : null;
    changeZoom(e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP, focal);
  }, [changeZoom]);

  // ── Touch events ─────────────────────────────────────────────────
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    // Converts a Touch to grid [r, c], or null if outside the grid
    const cellAt = touch => {
      const container = canvasContainerRef.current;
      if (!container) return null;
      const rect = container.getBoundingClientRect();
      const z = zoomRef.current;
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top - CELL * z; // subtract 1-row top border offset
      const c = Math.floor(x / (CELL * z));
      const r = Math.floor(y / (CELL * z));
      return r >= 0 && r < gridHRef.current && c >= 0 && c < gridWRef.current ? [r, c] : null;
    };
    let isTouchPainting = false;

    const onTouchStart = e => {
      // ── Two-finger pinch-to-zoom ──────────────────────────────────
      if (e.touches.length === 2) {
        const t0 = e.touches[0], t1 = e.touches[1];
        const mx = (t0.clientX + t1.clientX) / 2, my = (t0.clientY + t1.clientY) / 2;
        const rect = el.getBoundingClientRect();
        pinchRef.current = {
          dist: Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY),
          startZoom: zoomRef.current,
          cx: mx - rect.left + el.scrollLeft, cy: my - rect.top + el.scrollTop,
          ox: mx - rect.left, oy: my - rect.top,
        };
        e.preventDefault(); return;
      }
      if (e.touches.length !== 1) return;
      // Hand mode: allow native scroll, no painting/dragging
      if (handModeRef.current) return;
      const cell = cellAt(e.touches[0]);
      if (!cell) return;
      e.preventDefault();
      const [r, c] = cell;

      // ── IMMEDIATE PICK-UP: occupied cell, no eraser → remove tile + mirror counterparts, start drag ──
      // History written once at touchend (drop/discard), not here.
      const existingId = gridRef.current?.[r]?.[c];
      if (existingId && !eraserRef.current && !mirrorSettingsRef.current?.allowSwap) {
        // Remove the dragged tile AND all its mirrored counterparts from the grid
        const pickupPositions = getMirrorRef.current ? getMirrorRef.current(r, c) : [[r, c]];
        dragRotationRef.current = gridRotations[`${r},${c}`] ?? 0;
        setGridRaw(prev => {
          const g = prev.map(row => [...row]);
          pickupPositions.forEach(([pr, pc]) => { g[pr][pc] = null; });
          return g;
        });
        setGridRotations(prev => {
          const n = { ...prev };
          pickupPositions.forEach(([pr, pc]) => { delete n[`${pr},${pc}`]; });
          return n;
        });
        setDragTile(existingId);
        dragTileRef.current = existingId;
        isDraggingRef.current = true;
        setDragPos({ x: e.touches[0].clientX, y: e.touches[0].clientY });
        setDragTargetCell(null);
        isTouchPainting = false;
        return;
      }

      // ── Normal paint: only on empty cells (or eraser) ────────────
      if (!selRef.current && !eraserRef.current) return;
      isTouchPainting = true;
      selectionStartRef.current = [r, c];
      selectionEndRef.current   = [r, c];
      hoveredTilesRef.current   = new Set([`${r},${c}`]);
      const mode = selectionModeRef.current;
      if (mode === 'single')      setPreviewCells([[r, c]]);
      else if (mode === 'line')   setPreviewCells([[r, c]]);
      else if (mode === 'rect')   setRectPreview({ r1: r, c1: c, r2: r, c2: c });
    };

    const onTouchMove = e => {
      // Pinch zoom
      if (e.touches.length === 2 && pinchRef.current) {
        e.preventDefault();
        const t0 = e.touches[0], t1 = e.touches[1];
        const dist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
        absZoomRef.current(+(pinchRef.current.startZoom * dist / pinchRef.current.dist).toFixed(2), {
          cx: pinchRef.current.cx, cy: pinchRef.current.cy,
          ox: pinchRef.current.ox, oy: pinchRef.current.oy,
        }); return;
      }
      if (e.touches.length !== 1) return;
      // Hand mode: allow native scroll (do not prevent default)
      if (handModeRef.current) return;
      e.preventDefault();

      // Active drag: ghost follows finger + target cell highlight
      if (isDraggingRef.current) {
        setDragPos({ x: e.touches[0].clientX, y: e.touches[0].clientY });
        setDragTargetCell(cellAt(e.touches[0]));
        return;
      }

      if (!isTouchPainting) return;
      const cell = cellAt(e.touches[0]);
      if (!cell) return;
      const [r, c] = cell;
      selectionEndRef.current = [r, c];
      const mode = selectionModeRef.current;
      if (mode === 'single') {
        setPreviewCells([[r, c]]);
      } else if (mode === 'line') {
        hoveredTilesRef.current.add(`${r},${c}`);
        setPreviewCells([...hoveredTilesRef.current].map(k => k.split(',').map(Number)));
      } else if (mode === 'rect') {
        const [r1, c1] = selectionStartRef.current;
        setRectPreview({
          r1: Math.min(r1, r), c1: Math.min(c1, c),
          r2: Math.max(r1, r), c2: Math.max(c1, c),
        });
      }
    };

    const onTouchEnd = e => {
      if (e.touches.length < 2) pinchRef.current = null;
      if (e.touches.length === 0) {
        // ── DROP: if dragging, place at target + mirror positions (if empty) ──
        if (isDraggingRef.current) {
          setDragTargetCell(null);
          const touch = e.changedTouches[0];
          const cell = cellAt(touch);
          const id = dragTileRef.current;
          const commit = setGridStableRef.current; // latest setGrid (writes history)
          const rot = dragRotationRef.current;
          if (cell) {
            const [r, c] = cell;
            const positions = getMirrorRef.current ? getMirrorRef.current(r, c) : [[r, c]];
            const anyEmpty = positions.some(([pr, pc]) => gridRef.current?.[pr]?.[pc] === null);
            if (anyEmpty) {
              const placed = [];
              commit(prev => {
                const g = prev.map(row => [...row]);
                positions.forEach(([pr, pc]) => { if (g[pr][pc] === null) { g[pr][pc] = id; placed.push([pr, pc]); } });
                return g;
              });
              setGridRotations(prev => {
                const n = { ...prev };
                placed.forEach(([pr, pc]) => { n[`${pr},${pc}`] = rot; });
                return n;
              });
              setDragTile(null); dragTileRef.current = null; isDraggingRef.current = false;
              return;
            }
          }
          commit(g => g);
          setDragTile(null); dragTileRef.current = null; isDraggingRef.current = false;
          return;
        }
        if (isTouchPainting && commitOnUpRef.current) commitOnUpRef.current();
        isTouchPainting = false;
      }
    };

    el.addEventListener('touchstart',  onTouchStart, { passive: false });
    el.addEventListener('touchmove',   onTouchMove,  { passive: false });
    el.addEventListener('touchend',    onTouchEnd);
    el.addEventListener('touchcancel', onTouchEnd);
    return () => {
      el.removeEventListener('touchstart',  onTouchStart);
      el.removeEventListener('touchmove',   onTouchMove);
      el.removeEventListener('touchend',    onTouchEnd);
      el.removeEventListener('touchcancel', onTouchEnd);
    };
  }, []);

  // ── Keyboard shortcuts ────────────────────────────────────────────
  useEffect(() => {
    const h = e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "z") { e.preventDefault(); e.shiftKey ? redo() : undo(); }

    return () => window.removeEventListener("keydown", h);
  }, [undo, redo]);

  // ── Resize grid ─────────────────────────────────────────────────────
  const applyGridSize = (newW, newH) => {
    const w = Math.max(1, Math.min(99, newW)), h = Math.max(1, Math.min(99, newH));
    setGridW(w); setGridH(h);
    setGrid(prev => {
      const g = Array.from({ length: h }, (_, r) =>
        Array.from({ length: w }, (__, c) => (prev[r] && c < prev[r].length ? prev[r][c] : null))
      );
      return g;
    });
    setGridRotations(prev => {
      const n = {};
      Object.entries(prev).forEach(([k, v]) => {
        const [r, c] = k.split(",").map(Number);
        if (r < h && c < w) n[k] = v;
      });
      return n;
    });
    applyZoom(calcFitZoom(w, h));
  };

  // ── Replace A → B ─────────────────────────────────────────────────
  const doReplace = () => {
    if (replaceA == null || replaceB == null) return;
    let count = 0;
    setGrid(prev => prev.map(row => row.map(id => { if (id === replaceA) { count++; return replaceB; } return id; })));
    if (count === 0) {
      setReplaceMsg("⚠ No cells with that tile found on the map.");
      if (replaceMsgTimerRef.current) clearTimeout(replaceMsgTimerRef.current);
      replaceMsgTimerRef.current = setTimeout(() => setReplaceMsg(""), 2500);
      return;
    }
    const tileA = getTile(replaceA); const tileB = getTile(replaceB);
    const nameA = (tileA?.isSpace ? "Space" : deriveCodename(tileA?.src)) || (tileA ? `#${replaceA}` : "?");
    const nameB = (tileB?.isSpace ? "Space" : deriveCodename(tileB?.src)) || (tileB ? `#${replaceB}` : "?");
    setReplaceMsg(`✓ Replaced ${count} × ${nameA} → ${nameB}`);
    if (replaceMsgTimerRef.current) clearTimeout(replaceMsgTimerRef.current);
    replaceMsgTimerRef.current = setTimeout(() => {
      setReplaceMsg("");
      setReplaceOpen(false); setReplaceStep(1); setReplaceA(null); setReplaceB(null);
    }, 2000);
  };

  // ── Export ────────────────────────────────────────────────────────
  const doExport = () => {
    if (!confirm("Download the map as a PNG file?")) return;
    const padding = CELL;
    const cv = document.createElement("canvas");
    cv.width  = gridW * CELL;
    cv.height = gridH * CELL + padding * 2;
    const ctx = cv.getContext("2d");
    for (let r = 0; r < gridH; r++) for (let c = 0; c < gridW; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? bg1 : bg2;
      ctx.fillRect(c * CELL, r * CELL + padding, CELL, CELL);
    }
    const draws = [];
    const spaceCells = []; // cells that should be cleared to transparent
    grid.forEach((row, r) => row.forEach((id, c) => {
      const t = id && getTile(id);
      if (!t) return;
      if (t.isSpace) { spaceCells.push({ r, c }); return; }
      draws.push({ id: t.id, src: t.src, r, c, mult: getTileMultiplier(t), off: getTileOffset(t), rotDeg: (gridRotations[`${r},${c}`] ?? 0) * 90 });
    }));
    const filename = (mapName.trim() || "ophelia-map") + ".png";
    const finish = () => {
      // Clear space tile cells last so they are fully transparent in the output
      spaceCells.forEach(({ r, c }) => ctx.clearRect(c * CELL, r * CELL + padding, CELL, CELL));
      cv.toBlob(b => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b); a.download = filename; a.click();
      });
    };
    if (!draws.length) { finish(); return; }
    // Sort so priority tiles are drawn last → always on top in the exported image
    draws.sort((a, b) => (priorityTiles[a.id] ? 1 : 0) - (priorityTiles[b.id] ? 1 : 0));
    // Load all images then draw in sorted order (guarantees z-order)
    Promise.all(draws.map(d => new Promise(resolve => {
      const img = new Image(); img.src = d.src;
      img.onload = () => resolve({ ...d, img });
      img.onerror = () => resolve(null);
    }))).then(loaded => {
      loaded.forEach(item => {
        if (!item) return;
        const { img, r, c, mult, off, rotDeg } = item;
        const drawW = CELL * mult;
        const drawH = drawW * (img.naturalHeight / img.naturalWidth);
        const cx = c * CELL + CELL / 2 + (off.ox / 100) * CELL;
        const cy = r * CELL + padding + CELL / 2 + (off.oy / 100) * CELL;
        ctx.save();
        ctx.translate(cx, cy);
        if (rotDeg) ctx.rotate(rotDeg * Math.PI / 180);
        ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
        ctx.restore();
      });
      finish();
    });
  };

  const commitZoom = () => {
    const v = parseInt(zoomInput, 10);
    if (!isNaN(v) && v > 0) {
      // Snap to nearest 5%
      const snapped = Math.round(v / 5) * 5;
      setZoom(Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, snapped / 100)));
    }
    setZoomEdit(false);
  };

  // ── Shared styles ─────────────────────────────────────────────────
  const btn = (active, color = C.accent, dim = C.accentDim) => ({
    padding: "5px 11px", borderRadius: 7, fontSize: 12, fontWeight: 600,
    cursor: "pointer", touchAction: "manipulation", userSelect: "none",
    fontFamily: "'Inter', sans-serif",
    background: active ? dim : "rgba(255,255,255,0.04)",
    color:      active ? color : C.muted,
    border:    `1px solid ${active ? color : "rgba(255,255,255,0.1)"}`,
    transition: "all 0.12s", flexShrink: 0,
  });

  const inputStyle = {
    background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`,
    borderRadius: 5, color: C.text, fontFamily: "'Inter', monospace", fontSize: 11,
    padding: "4px 8px", outline: "none", width: "100%",
  };

  // ── Tile info modal ───────────────────────────────────────────────
  const MAX_MULT_ARROW = 7; // arrow buttons cap; text field has no cap
  const InfoModal = () => {
    if (!infoTile) return null;
    const t = getTile(infoTile);
    if (!t) { setInfoTile(null); return null; }
    const defaultMult = getDefaultMultiplier(t);
    const currentMult = getTileMultiplier(t);
    const defaultOff  = getDefaultOffset(t);
    const currentOff  = getTileOffset(t);
    const [multInput, setMultInput] = React.useState(String(currentMult));
    const [oxInput,   setOxInput]   = React.useState(String(currentOff.ox));
    const [oyInput,   setOyInput]   = React.useState(String(currentOff.oy));
    const isPriority = !!priorityTiles[t.id];

    const commitMult = val => {
      const v = parseFloat(val ?? multInput);
      if (!isNaN(v) && v > 0) {
        const rounded = Math.round(v * 100) / 100;
        setTileMultipliers(prev => ({ ...prev, [t.id]: rounded }));
        setMultInput(String(rounded));
      } else setMultInput(String(currentMult));
    };
    const stepMult = delta => {
      const cur = parseFloat(multInput) || currentMult;
      const next = Math.max(0.1, Math.min(MAX_MULT_ARROW, Math.round((cur + delta) * 20) / 20));
      commitMult(String(next));
    };
    const commitOffset = (ox2, oy2) => {
      const ox = ox2 !== undefined ? ox2 : parseFloat(oxInput);
      const oy = oy2 !== undefined ? oy2 : parseFloat(oyInput);
      const newOff = { ox: isNaN(ox) ? 0 : ox, oy: isNaN(oy) ? 0 : oy };
      setTileOffsets(prev => ({ ...prev, [t.id]: newOff }));
    };
    const stepOx = delta => {
      const cur = parseFloat(oxInput) || 0;
      const next = Math.round((cur + delta) * 100) / 100;
      setOxInput(String(next));
      commitOffset(next, parseFloat(oyInput) || 0);
    };
    const stepOy = delta => {
      const cur = parseFloat(oyInput) || 0;
      const next = Math.round((cur + delta) * 100) / 100;
      setOyInput(String(next));
      commitOffset(parseFloat(oxInput) || 0, next);
    };

    const fieldRow = (label, input, setInput, onBlur, extra) => (
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>{label}</span>
        <input type="number" value={input} onChange={e => setInput(e.target.value)}
          onBlur={onBlur} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
          style={{ width: 72, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none" }} />
        {extra}
      </div>
    );

    return (
      <div className="modal-backdrop" onClick={() => setInfoTile(null)}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Tile info</span>
            <button onClick={() => setInfoTile(null)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ background: C.panelDeep, borderRadius: 8, padding: 12, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 120 }}>
            <div className="tile-img-checker" style={{ borderRadius: 4, overflow: "hidden" }}>
              <img src={t.src} alt="" style={{ maxWidth: "260px", maxHeight: 180, imageRendering: "pixelated" }} />
            </div>
          </div>

          {/* Tile codename */}
          {(() => {
            const codename = deriveCodename(t.src);
            const customName = tileNames[t.id] ?? "";
            if (t.isDefault && codename) {
              return <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Codename</span>
                <span style={{ fontSize: 12, fontFamily: "monospace", color: C.text }}>{codename}</span>
              </div>;
            }
            if (!t.isDefault) {
              return <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Name</span>
                <input value={customName} onChange={e => setTileNames(prev => ({ ...prev, [t.id]: e.target.value }))}
                  placeholder="Enter name…"
                  style={{ flex: 1, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none" }} />
              </div>;
            }
            return null;
          })()}

          {/* Size multiplier */}
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Size multiplier (%)</span>
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepMult(-0.05)}>−</button>
            <input type="number" value={multInput} step="0.05"
              onChange={e => setMultInput(e.target.value)}
              onBlur={() => commitMult()}
              onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
              style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none", textAlign: "center" }} />
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepMult(+0.05)}>+</button>
            <button style={{ ...btn(false), fontSize: 10, padding: "3px 7px", marginLeft: "auto" }}
              onClick={() => { setTileMultipliers(prev => { const n = {...prev}; delete n[t.id]; return n; }); setMultInput(String(defaultMult)); }}>Reset</button>
          </div>

          {/* Offsets */}
          <span style={{ fontSize: 11, color: C.muted, fontWeight: 600 }}>Offsets (%) 📐</span>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Horizontal</span>
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOx(-0.05)}>−</button>
            <input type="number" value={oxInput} onChange={e => setOxInput(e.target.value)}
              onBlur={() => commitOffset()} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
              style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none", textAlign: "center" }} />
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOx(+0.05)}>+</button>
            <button style={{ ...btn(false), fontSize: 10, padding: "3px 7px", marginLeft: "auto" }}
              onClick={() => { setOxInput(String(defaultOff.ox)); setTileOffsets(prev => { const n = {...prev}; const o = {...(prev[t.id] ?? {}), ox: defaultOff.ox}; n[t.id] = o; return n; }); }}>Reset</button>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: C.muted, width: 100, flexShrink: 0 }}>Vertical</span>
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOy(-0.05)}>−</button>
            <input type="number" value={oyInput} onChange={e => setOyInput(e.target.value)}
              onBlur={() => commitOffset()} onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
              style={{ width: 62, background: "rgba(180,40,40,0.09)", border: `1px solid ${C.border}`, borderRadius: 5, color: C.text, fontFamily: "monospace", fontSize: 12, padding: "4px 6px", outline: "none", textAlign: "center" }} />
            <button style={{ ...btn(false), padding: "3px 8px", fontSize: 14, lineHeight: 1 }} onClick={() => stepOy(+0.05)}>+</button>
            <button style={{ ...btn(false), fontSize: 10, padding: "3px 7px", marginLeft: "auto" }}
              onClick={() => { setOyInput(String(defaultOff.oy)); setTileOffsets(prev => { const n = {...prev}; const o = {...(prev[t.id] ?? {}), oy: defaultOff.oy}; n[t.id] = o; return n; }); }}>Reset</button>
          </div>

          {/* Allow rotation */}
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
            <input type="checkbox" checked={isTileRotatable(t)}
              onChange={ev => setRotatableMap(prev => ({ ...prev, [t.id]: ev.target.checked }))}
              style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
            <span style={{ fontSize: 11, color: C.text }}>Allow rotation 🔄</span>
          </label>
          {/* Always render on top */}
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
            <input type="checkbox" checked={isPriority}
              onChange={ev => setPriorityTiles(prev => { const n = { ...prev }; if (ev.target.checked) n[t.id] = true; else delete n[t.id]; return n; })}
              style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
            <span style={{ fontSize: 11, color: C.text }}>Always render on top 🚨</span>
          </label>
          {/* Starred shortcut */}
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", userSelect: "none" }}>
            <input type="checkbox" checked={starredTiles.includes(t.id)}
              onChange={() => toggleStar(t.id)}
              style={{ width: 14, height: 14, accentColor: C.accent, cursor: "pointer" }} />
            <span style={{ fontSize: 11, color: C.text }}>Starred shortcut ⭐{!starredTiles.includes(t.id) && starredTiles.length >= 10 ? <span style={{ color: C.muted, marginLeft: 6 }}>(max 10 reached)</span> : null}</span>
          </label>

          {!t.isDefault && (
            <button style={{ ...btn(false, C.danger, "rgba(248,113,113,0.14)"), width: "100%", justifyContent: "center" }}
              onClick={() => deleteTile(t.id)}>Delete tile</button>
          )}
          {t.isDefault && (
            <p style={{ fontSize: 11, color: C.muted, textAlign: "center" }}>Default tile — cannot be deleted.</p>
          )}
        </div>
      </div>
    );
  };

  // ── Replace modal ─────────────────────────────────────────────────
  const [replaceMsg, setReplaceMsg] = useState("");
  const replaceMsgTimerRef = useRef(null);

  const replaceScrollRef = useRef(null);
  const ReplaceModal = () => {
    if (!replaceOpen) return null;
    const close = () => { setReplaceOpen(false); setReplaceMsg(""); setReplaceStep(1); setReplaceA(null); setReplaceB(null); };

    // Tile card used in both steps
    const RCard = ({ t, selected, onSelect, isSpace }) => (
      <div onClick={() => onSelect(isSpace ? SPACE_TILE_ID : t.id)}
        style={{ cursor: "pointer", borderRadius: 6, overflow: "hidden", aspectRatio: "1",
          border: `2px solid ${selected === (isSpace ? SPACE_TILE_ID : t.id) ? C.accentBright : C.border}`,
          background: selected === (isSpace ? SPACE_TILE_ID : t.id) ? C.accentDim : "transparent",
          display: "flex", alignItems: "center", justifyContent: "center" }}>
        {isSpace
          ? <span style={{ fontSize: 20 }}>🛸</span>
          : <img src={t.src} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", imageRendering: "pixelated" }} />}
      </div>
    );

    const TileGridBox = ({ tileList, selected, onSelect, includeSpace }) => (
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(52px, 1fr))", gap: 5 }}>
        {tileList.map(t => <RCard key={t.id} t={t} selected={selected} onSelect={onSelect} />)}
        {includeSpace && <RCard key="space" t={null} selected={selected} onSelect={onSelect} isSpace />}
      </div>
    );

    const SepLine = ({ label }) => (
      <div style={{ gridColumn: "1 / -1", display: "flex", alignItems: "center", gap: 8, margin: "4px 0 2px" }}>
        <div style={{ height: 1, flex: 1, background: C.border }} />
        <span style={{ fontSize: 9, color: C.muted, letterSpacing: 1, textTransform: "uppercase" }}>{label}</span>
        <div style={{ height: 1, flex: 1, background: C.border }} />
      </div>
    );

    if (replaceStep === 1) {
      // Step 1: only tiles actually on the map
      const idsOnMap = new Set();
      grid.forEach(row => row.forEach(id => { if (id != null) idsOnMap.add(id); }));
      const tilesOnMap = tiles.filter(t => idsOnMap.has(t.id));
      const spaceOnMap = idsOnMap.has(SPACE_TILE_ID);
      return (
        <div className="modal-backdrop" onClick={close}>
          <div className="modal-box" style={{ maxWidth: 380 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Replace — which tile?</span>
              <button onClick={close} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
            </div>
            {tilesOnMap.length === 0 && !spaceOnMap ? (
              <p style={{ fontSize: 12, color: C.muted, textAlign: "center", padding: "12px 0" }}>No tiles on map</p>
            ) : (
              <div style={{ overflowY: "auto", maxHeight: 300 }}>
                <TileGridBox tileList={tilesOnMap} selected={replaceA} onSelect={setReplaceA} includeSpace={spaceOnMap} />
              </div>
            )}
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btn(false), flex: 1 }} onClick={close}>Cancel</button>
              <button style={{ ...btn(replaceA != null, C.accent, C.accentDim), flex: 1 }}
                disabled={replaceA == null} onClick={() => setReplaceStep(2)}>Continue →</button>
            </div>
          </div>
        </div>
      );
    }

    // Step 2: full tile list with section separators
    const tilesetTiles_ = tiles.filter(t => t.id >= TILESET_ID_START && t.id < USER_ID_START);
    const userTiles_    = tiles.filter(t => t.id >= USER_ID_START && t.id < GLOBAL_ID_START);
    const globalTiles_  = tiles.filter(t => t.id >= GLOBAL_ID_START);
    return (
      <div className="modal-backdrop" onClick={close}>
        <div className="modal-box" style={{ maxWidth: 380 }} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.accentBright }}>Replace with — which tile?</span>
            <button onClick={close} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18 }}>×</button>
          </div>
          <div ref={replaceScrollRef} style={{ overflowY: "auto", maxHeight: 320, padding: "2px 0" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(52px, 1fr))", gap: 5 }}>
              {tilesetTiles_.length > 0 && <SepLine label="Tileset" />}
              {tilesetTiles_.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={id => { const s = replaceScrollRef.current?.scrollTop; setReplaceB(id); requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; }); }} />)}
              {userTiles_.length > 0 && <SepLine label="Uploaded" />}
              {userTiles_.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={id => { const s = replaceScrollRef.current?.scrollTop; setReplaceB(id); requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; }); }} />)}
              {globalTiles_.length > 0 && <SepLine label="Global" />}
              {globalTiles_.map(t => <RCard key={t.id} t={t} selected={replaceB} onSelect={id => { const s = replaceScrollRef.current?.scrollTop; setReplaceB(id); requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; }); }} />)}
              <SepLine label="Special" />
              <RCard key="space" t={null} selected={replaceB} onSelect={id => { const s = replaceScrollRef.current?.scrollTop; setReplaceB(id); requestAnimationFrame(() => { if (replaceScrollRef.current) replaceScrollRef.current.scrollTop = s; }); }} isSpace />
            </div>
          </div>
          {replaceMsg ? (
            <div style={{ textAlign: "center", fontSize: 12, fontWeight: 600, color: "#4ade80", background: "rgba(74,222,128,0.12)", border: "1px solid rgba(74,222,128,0.35)", borderRadius: 7, padding: "6px 12px" }}>
              {replaceMsg}
            </div>
          ) : (
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ ...btn(false), flex: 1 }} onClick={() => { setReplaceStep(1); setReplaceB(null); }}>← Back</button>
              <button style={{ ...btn(replaceB != null, C.accent, C.accentDim), flex: 1 }}
                disabled={replaceB == null} onClick={doReplace}>Replace all</button>
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── Failed tile warning modal ─────────────────────────────────────
  const FailedTileModal = () => {
    if (!failedWarning) return null;
    return (
      <div className="modal-backdrop" onClick={() => setFailedWarning(false)}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.danger }}>Tile unavailable</span>
            <button onClick={() => setFailedWarning(false)} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <p style={{ fontSize: 13, color: C.text, lineHeight: 1.6 }}>
            This tile's image could not be loaded. The file may be missing from the <code style={{ color: C.accentBright }}>Resources/</code> folder.
          </p>
          <p style={{ fontSize: 11, color: C.muted }}>
            To fix this, restore the missing image file to the Resources folder and refresh the page. You can also update <code style={{ color: C.accentBright }}>Resources/manifest.json</code> to remove deleted entries.
          </p>
          <button style={{ ...btn(false, C.accent, C.accentDim) }} onClick={() => setFailedWarning(false)}>OK</button>
        </div>
      </div>
    );
  };

  // ── Tool info modal (Erase / Hand / Space) ───────────────────────
  const ToolInfoModal = () => {
    if (!infoTool) return null;
    const toolDefs = {
